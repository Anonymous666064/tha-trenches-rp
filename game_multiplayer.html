<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D MULTIPLAYER WORLD - WORKING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI Panel */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            border: 2px solid #00ff88;
            min-width: 280px;
            pointer-events: auto;
            font-size: 14px;
        }

        #ui h3 {
            margin-bottom: 10px;
            color: #00ff88;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            background: #222;
            color: white;
            text-align: center;
        }

        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .success { color: #00ff88; background: rgba(0,255,136,0.1); }
        .error { color: #ff4444; background: rgba(255,68,68,0.1); }
        .info { color: #ffaa44; background: rgba(255,170,68,0.1); }

        #players-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            border: 2px solid #00ff88;
            min-width: 180px;
            z-index: 100;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        .code-badge {
            font-size: 18px;
            font-weight: bold;
            background: #000;
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 8px;
        }

        #leaveBtn {
            background: #ff4444;
            margin-top: 10px;
            width: 100%;
        }

        #leaveBtn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 3D MULTIPLAYER WORLD</h3>
        <div>
            <button id="hostBtn">🌟 CREATE GAME</button>
            <input type="text" id="customCode" placeholder="Custom code" maxlength="6" style="width: 100px; text-transform: uppercase;">
        </div>
        <div style="margin-top: 8px;">

        <strong>👥 Players Online</strong>

        // ==================== CREATE 3D WORLD ====================
        function init3D() {
            console.log("🎨 Creating 3D world...");
            
            // Create scene with bright sky
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 300);
            
            // Create camera

            renderer.shadowMap.enabled = true;

            console.log("✅ Renderer created");

            // ========== GROUND ==========

            // Grid helper

            // ========== TREES ==========

            // Outer ring of trees

                const z = Math.sin(angle) * radius;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 2, 6), trunkMat);
                trunk.position.set(x, -0.2, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.5, 8), leafMat);
                leaves.position.set(x, 0.8, z);
                leaves.castShadow = true;
                scene.add(leaves);
                trees.push(trunk, leaves);
            }
            
            // Random inner trees
            for (let i = 0; i < 120; i++) {
                const x = (Math.random() - 0.5) * 300;
                const z = (Math.random() - 0.5) * 300;
                if (Math.abs(x) < 80 && Math.abs(z) < 80) continue;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1.8, 6), trunkMat);
                trunk.position.set(x, -0.2, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 8), leafMat);
                leaves.position.set(x, 0.7, z);
                leaves.castShadow = true;
                scene.add(leaves);
                trees.push(trunk, leaves);
            }
            
            // ========== BUILDINGS ==========
            const buildingColors = [0xaa8866, 0xccaa88, 0x88aacc, 0x99bb99];
            for (let i = 0; i < 50; i++) {
                const x = (Math.random() - 0.5) * 280;
                const z = (Math.random() - 0.5) * 280;
                if (Math.abs(x) < 60 && Math.abs(z) < 60) continue;
                
                const width = 5 + Math.random() * 6;
                const depth = 5 + Math.random() * 6;
                const height = 6 + Math.random() * 10;
                const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                const buildingMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
                const building = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), buildingMat);
                building.position.set(x, height / 2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
                buildings.push(building);
            }
            
            // ========== ROADS ==========
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a });
            for (let x = -150; x <= 150; x += 50) {

                orb.position.z = Math.sin(angle) * radius;
                orb.position.y = 1 + Math.random() * 8;
                orb.castShadow = true;
                scene.add(orb);
            }
            
            // ========== FLOATING PARTICLES ==========
            const particleCount = 1500;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 400;
                particlePositions[i*3+1] = Math.random() * 20;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 400;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.08 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            // ========== RED CENTER MARKER ==========
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });
            const marker = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), markerMat);
            marker.position.set(0, 0.5, 0);
            scene.add(marker);
            
            console.log("✅ 3D World created with", trees.length, "trees,", buildings.length, "buildings");
            console.log("📍 World should be visible! Look for trees, buildings, and a red center marker.");
        }
        
        // ==================== CREATE PLAYER MODEL ====================
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            leftEye.position.set(-0.18, 1.38, 0.48);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            rightEye.position.set(0.18, 1.38, 0.48);
            group.add(rightEye);
            
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            leftPupil.position.set(0, 0, 0.08);
            leftEye.add(leftPupil);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            rightPupil.position.set(0, 0, 0.08);
            rightEye.add(rightPupil);
            
            // Crown for local player
            if (isLocal) {
                const crownMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
                const crownBase = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.2, 8), crownMat);
                crownBase.position.y = 1.55;
                group.add(crownBase);
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), crownMat);
                    const angle = (i / 5) * Math.PI * 2;
                    spike.position.x = Math.cos(angle) * 0.5;
                    spike.position.z = Math.sin(angle) * 0.5;
                    spike.position.y = 1.7;
                    group.add(spike);
                }
            }
            
            group.castShadow = true;
            return group;
        }
        
        // ==================== MULTIPLAYER FUNCTIONS ====================
        async function createGameSession(customCode) {
            let code = customCode?.toUpperCase().trim();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing && existing.length > 0) {
                throw new Error('Code already taken!');
            }
            
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            return code;
        }
        
        async function joinGameSession(code) {
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .maybeSingle();
            
            if (error || !data) throw new Error('Game not found!');
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode, isHostPlayer = false) {
            myPlayerId = 'p_' + Math.random().toString(36).substring(2, 12);
            isHost = isHostPlayer;
            
            const startX = (Math.random() - 0.5) * 80;
            const startZ = (Math.random() - 0.5) * 80;
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            localPlayer = createPlayerModel(0x66ff88, true);
            localPlayer.position.set(startX, 0.7, startZ);
            scene.add(localPlayer);
            
            await loadExistingPlayers(sessionCode);
            subscribeToGame(sessionCode);
            
            heartbeatInterval = setInterval(() => updatePosition(), 2000);
            
            updatePlayersUI();
            return true;
        }
        
        async function loadExistingPlayers(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) return;
            
            for (let p of data) {
                if (p.player_id !== myPlayerId && !remotePlayers.has(p.player_id)) {
                    const playerModel = createPlayerModel(0xff8844, false);
                    playerModel.position.set(p.pos_x, 0.7, p.pos_z);
                    scene.add(playerModel);
                    remotePlayers.set(p.player_id, playerModel);
                }
            }
            updatePlayersUI();
        }
        
        function subscribeToGame(sessionCode) {
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            
            subscription = supabase
                .channel(`game:${sessionCode}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                        const playerModel = createPlayerModel(0xff8844, false);
                        playerModel.position.set(payload.new.pos_x, 0.7, payload.new.pos_z);
                        scene.add(playerModel);
                        remotePlayers.set(payload.new.player_id, playerModel);
                        updatePlayersUI();
                        showMessage(`👤 Player joined!`, '#00ff88');
                    }
                    else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        const playerModel = remotePlayers.get(payload.new.player_id);
                        if (playerModel) {
                            playerModel.position.x += (payload.new.pos_x - playerModel.position.x) * 0.3;
                            playerModel.position.z += (payload.new.pos_z - playerModel.position.z) * 0.3;
                        }
                    }
                    else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        const playerModel = remotePlayers.get(payload.old.player_id);
                        if (playerModel) {
                            scene.remove(playerModel);
                            remotePlayers.delete(payload.old.player_id);
                            updatePlayersUI();
                            showMessage(`👋 Player left`, '#ffaa44');
                        }
                    }
                })
                .subscribe();
        }
        
        async function updatePosition() {
            if (!currentSession || !myPlayerId || !localPlayer) return;
            
            try {
                await supabase
                    .from('players')
                    .update({
                        pos_x: localPlayer.position.x,
                        pos_z: localPlayer.position.z,
                        last_seen: new Date()
                    })
                    .eq('player_id', myPlayerId);
            } catch (e) {
                console.warn('Update failed');
            }
        }
        
        async function leaveGame() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
            
            if (isHost && currentSession) {
                await supabase.from('game_sessions').delete().eq('session_code', currentSession);
            }
            
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            
            for (let [id, model] of remotePlayers) {
                scene.remove(model);
            }
            remotePlayers.clear();
            
            if (localPlayer && scene) {
                scene.remove(localPlayer);
                localPlayer = null;
            }
            
            currentSession = null;
            myPlayerId = null;
            isHost = false;
            
            updatePlayersUI();
            document.getElementById('activeCode').innerHTML = '';
            document.getElementById('gameInfo').innerHTML = '✨ Left game. Ready to play!';
            document.getElementById('gameInfo').className = 'status info';
            document.getElementById('hostBtn').disabled = false;
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('leaveBtnContainer').innerHTML = '';
            
            showMessage('Left game session', '#ffaa44');
        }
        
        function updatePlayersUI() {
            const container = document.getElementById('playersList');
            if (!container) return;
            
            if (!myPlayerId) {
                container.innerHTML = 'Waiting for players...';
                return;
            }
            
            let html = `<div style="color:#00ff88">👑 YOU (${isHost ? 'Host' : 'Player'})</div>`;
            for (let [id] of remotePlayers) {
                html += `<div>🎮 ${id.slice(0, 8)}</div>`;
            }
            if (remotePlayers.size === 0) {
                html += '<div style="color:#888;">Waiting for players...</div>';
            }
            container.innerHTML = html;
        }
        
        function showMessage(msg, color) {
            const info = document.getElementById('gameInfo');
            info.innerHTML = msg;
            info.className = 'status success';
            info.style.color = color;
            setTimeout(() => {
                if (currentSession) {
                    info.innerHTML = `✅ In game: ${currentSession}`;
                } else {
                    info.innerHTML = '✨ Ready to play';
                    info.className = 'status info';
                }
            }, 2000);
        }
        
        function addLeaveButton() {
            const container = document.getElementById('leaveBtnContainer');
            container.innerHTML = '';
            const btn = document.createElement('button');
            btn.id = 'leaveBtn';
            btn.textContent = '🚪 LEAVE GAME';
            btn.onclick = () => leaveGame();
            container.appendChild(btn);
        }
        
        // ==================== MOVEMENT & CAMERA ====================
        function handleMovement() {
            if (!localPlayer) return;
            
            let moved = false;
            let newX = localPlayer.position.x;
            let newZ = localPlayer.position.z;
            const speed = 7;
            
            if (keys.w) { newZ -= 0.1; moved = true; }
            if (keys.s) { newZ += 0.1; moved = true; }
            if (keys.a) { newX -= 0.1; moved = true; }
            if (keys.d) { newX += 0.1; moved = true; }
            
            const bound = 170;
            newX = Math.max(-bound, Math.min(bound, newX));
            newZ = Math.max(-bound, Math.min(bound, newZ));
            
            if (moved) {
                localPlayer.position.x = newX;
                localPlayer.position.z = newZ;
                
                const now = Date.now();
                if (now - lastUpdateTime > 100) {
                    updatePosition();
                    lastUpdateTime = now;
                }
            }
            
            // Camera follow
            const targetX = localPlayer.position.x;
            const targetZ = localPlayer.position.z;
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.z += (targetZ + 12 - camera.position.z) * 0.1;
            camera.position.y = 8;
            camera.lookAt(localPlayer.position);
        }
        
        // ==================== UI & EVENT HANDLERS ====================
        let connecting = false;
        
        document.getElementById('hostBtn').onclick = async () => {
            if (connecting) return;
            connecting = true;
            const customCode = document.getElementById('customCode').value;
            try {
                const code = await createGameSession(customCode);
                currentSession = code;
                await addPlayerToGame(code, true);
                document.getElementById('gameInfo').innerHTML = `✅ Game Created! Code: <strong>${code}</strong>`;
                document.getElementById('gameInfo').className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🔑 ${code}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
                addLeaveButton();
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').className = 'status error';
            } finally {
                connecting = false;
            }
        };
        
        document.getElementById('joinBtn').onclick = async () => {
            if (connecting) return;
            connecting = true;
            const code = document.getElementById('joinCode').value;
            if (!code) {
                document.getElementById('gameInfo').innerHTML = '❌ Please enter a code';
                document.getElementById('gameInfo').className = 'status error';
                connecting = false;
                return;
            }
            try {
                const sessionCode = await joinGameSession(code);
                currentSession = sessionCode;
                await addPlayerToGame(sessionCode, false);
                document.getElementById('gameInfo').innerHTML = `✅ Joined game: ${sessionCode}`;
                document.getElementById('gameInfo').className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🎮 ${sessionCode}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
                addLeaveButton();
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').className = 'status error';
            } finally {
                connecting = false;
            }
        };
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
        });
        
        // Mouse look
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                cameraAngle -= e.movementX * 0.002;
                cameraPitch -= e.movementY * 0.002;
                cameraPitch = Math.max(-0.5, Math.min(0.5, cameraPitch));
            }
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            handleMovement();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // ==================== START GAME ====================
        init3D();
        animate();
        
        console.log("🎮 Game ready! Create or join a game to play with friends!");
        console.log("📍 Click the canvas, then use WASD to move around the colorful 3D world!");
    </script>
</body>
</html>
