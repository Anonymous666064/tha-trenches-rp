<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple 3D World</title>
<style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: Arial;
        z-index: 10;
    }
</style>
</head>
<body>

<div id="info">Click to lock mouse | WASD to move</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();

let yaw = 0;
let pitch = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.y = 2;

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // LIGHT
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 100, 50);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0xaaaaaa);
    scene.add(ambient);

    // GROUND
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // BUILDINGS
    for (let i = 0; i < 30; i++) {
        const height = Math.random() * 10 + 5;

        const building = new THREE.Mesh(
            new THREE.BoxGeometry(4, height, 4),
            new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
        );

        building.position.set(
            (Math.random() - 0.5) * 100,
            height / 2,
            (Math.random() - 0.5) * 100
        );

        scene.add(building);
    }

    // CONTROLS (mouse look)
    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;

            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        }
    });

    // KEY INPUT
    document.addEventListener('keydown', (e) => {
        switch(e.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyD': moveRight = true; break;
        }
    });

    document.addEventListener('keyup', (e) => {
        switch(e.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyD': moveRight = false; break;
        }
    });

    window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);

    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();

    const speed = 0.2;

    if (moveForward || moveBackward) velocity.z = direction.z * speed;
    else velocity.z = 0;

    if (moveLeft || moveRight) velocity.x = direction.x * speed;
    else velocity.x = 0;

    // ROTATION
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // MOVEMENT (relative to direction)
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);

    const right = new THREE.Vector3();
    right.crossVectors(forward, camera.up);

    camera.position.addScaledVector(forward, velocity.z);
    camera.position.addScaledVector(right, velocity.x);

    renderer.render(scene, camera);
}
</script>

</body>
</html>
