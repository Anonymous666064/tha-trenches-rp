<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer RP Game</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#000; }

/* MENU */
#menu {
  position:fixed;
  width:100%;
  height:100%;
  background:#0a0f1e;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  background:#4ec9e0;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="menu">
  <h1>🌍 Multiplayer RP</h1>
  <input id="username" placeholder="Username">
  <input id="serverCode" placeholder="Server Code">
  <button onclick="createServer()">Create Server</button>
  <button onclick="joinServer()">Join Server</button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://hcvewiwhtxqpbogcrukk.supabase.co";
const SUPABASE_KEY = "YOUR_API_KEY_HERE"; // put your key

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let playerId = crypto.randomUUID();
let server = null;

let scene, camera, renderer;
let player, players = {}, meshes = {};

let keys = {};

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* ================= SERVER ================= */

window.createServer = async () => {
  const code = document.getElementById('serverCode').value;
  const username = document.getElementById('username').value;

  if (!code || !username) return alert("Enter info");

  await supabase.from('servers').insert({ code });

  startGame(username, code);
};

window.joinServer = async () => {
  const code = document.getElementById('serverCode').value;
  const username = document.getElementById('username').value;

  if (!code || !username) return alert("Enter info");

  startGame(username, code);
};

/* ================= GAME START ================= */

async function startGame(username, code) {
  server = code;

  document.getElementById('menu').style.display = "none";

  await supabase.from('players').upsert({
    id: playerId,
    username,
    server
  });

  initThree();
  startRealtime();
  animate();
}

/* ================= THREE ================= */

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,5,10);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10,10,10);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({ color:0x228B22 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color:0x00ff00 })
  );
  scene.add(player);
}

/* ================= REALTIME ================= */

function startRealtime() {
  supabase.channel('room-'+server)
    .on('postgres_changes',{
      event:'*',
      schema:'public',
      table:'players',
      filter:`server=eq.${server}`
    }, payload => {
      players[payload.new.id] = payload.new;
    })
    .subscribe();
}

/* ================= SYNC ================= */

async function syncPlayer() {
  await supabase.from('players').update({
    x: player.position.x,
    y: player.position.y,
    z: player.position.z
  }).eq('id', playerId);
}

setInterval(syncPlayer, 100);

/* ================= OTHER PLAYERS ================= */

function updatePlayers() {
  for (let id in players) {
    if (id === playerId) continue;

    if (!meshes[id]) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({ color:0xff0000 })
      );
      scene.add(mesh);
      meshes[id] = mesh;
    }

    let data = players[id];
    meshes[id].position.set(data.x, data.y, data.z);
  }
}

/* ================= MOVEMENT ================= */

function updateMovement() {
  let speed = 0.1;

  if (keys['w']) player.position.z -= speed;
  if (keys['s']) player.position.z += speed;
  if (keys['a']) player.position.x -= speed;
  if (keys['d']) player.position.x += speed;

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);
}

/* ================= LOOP ================= */

function animate() {
  requestAnimationFrame(animate);

  updateMovement();
  updatePlayers();

  renderer.render(scene, camera);
}
</script>
</body>
</html>
