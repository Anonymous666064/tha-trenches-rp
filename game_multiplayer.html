<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Metropolis - Multiplayer 3D Open World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }
        
        /* UI Overlay */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-left: 4px solid #00ffcc;
            pointer-events: none;
            font-family: monospace;
        }
        
        .hud span {
            color: #00ffcc;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .phone-icon {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #1e1e2f;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,255,200,0.3);
            border: 1px solid #00ffcc;
            transition: 0.2s;
            font-size: 28px;
            z-index: 20;
        }
        
        .phone-icon:hover {
            transform: scale(1.05);
            background: #2a2a3a;
        }
        
        /* Modal Screens */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15,15,25,0.98);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 25px;
            width: 380px;
            color: white;
            border: 1px solid #00ffcc88;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 100;
            font-family: monospace;
        }
        
        .modal h3 {
            margin-top: 0;
            text-align: center;
            color: #00ffcc;
        }
        
        .modal input, .modal select {
            width: 92%;
            padding: 12px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #00ffcc;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal button {
            background: #00ccaa;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            width: 100%;
        }
        
        .modal button:hover {
            background: #00ffcc;
            transform: scale(1.02);
        }
        
        .close-btn {
            background: #aa3355;
        }
        
        .close-btn:hover {
            background: #cc4466;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            color: #ff6666;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
        
        .success-message {
            color: #66ff66;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        .login-btn {
            background: #3388ff;
        }
        
        .register-btn {
            background: #ff8833;
        }
        
        .server-code {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            letter-spacing: 2px;
            color: #00ffcc;
        }
        
        .phone-app {
            width: 300px;
            background: #0a0a1ad9;
            border-radius: 32px;
            padding: 15px;
        }
        
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        
        .app-btn {
            background: #1f1f2f;
            padding: 12px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .app-btn:hover {
            background: #2f2f4f;
            transform: scale(1.05);
        }
        
        .chat-box {
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            background: #000000aa;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 8px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 5px;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 8px;
            background: #222;
            border: 1px solid #00ffcc;
            color: white;
            border-radius: 8px;
        }
        
        .blackmarket-item {
            background: #2a2a2a;
            margin: 8px 0;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #respawn-screen {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            z-index: 200;
            border: 1px solid #ff4444;
        }
        
        .username-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            font-family: monospace;
        }
        
        .server-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 10px;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="hud">
            <div class="stats">
                <div>❤️ <span id="health-val">100</span></div>
                <div>🍔 <span id="hunger-val">100</span></div>
                <div>💧 <span id="thirst-val">100</span></div>
                <div>💰 $<span id="money-val">1000</span></div>
            </div>
        </div>
        <div class="username-display" id="username-display"></div>
        <div class="server-info" id="server-info"></div>
        <div class="controls-hint">WASD: Move | Mouse: Look | F: Shoot | T: Chat</div>
        <div class="phone-icon" id="phoneBtn">📱</div>

        <!-- Login/Register Modal -->
        <div id="authModal" class="modal">
            <h3>🎮 NEON METROPOLIS</h3>
            <p style="font-size: 12px; text-align: center;">Enter your credentials</p>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <div class="button-group">
                <button id="loginBtn" class="login-btn">🔐 Login</button>
                <button id="registerBtn" class="register-btn">✨ Register</button>
            </div>
            <div id="authMessage" class="error-message"></div>
        </div>

        <!-- Server Modal -->
        <div id="serverModal" class="modal hidden">
            <h3>🌐 MULTIPLAYER</h3>
            <p>Welcome, <span id="welcomeUsername"></span>!</p>
            <button id="createServerBtn">✨ Create New Server</button>
            <div id="createdServerCode" class="server-code hidden"></div>
            <input type="text" id="joinCode" placeholder="Enter Server Code">
            <button id="joinServerBtn">🔗 Join Server</button>
            <button id="closeServerBtn" class="close-btn">Close</button>
        </div>

        <!-- Phone Interface -->
        <div id="phoneModal" class="modal hidden" style="width: 340px;">
            <div class="phone-app">
                <h3>📱 PHONE</h3>
                <div class="app-grid">
                    <div class="app-btn" data-app="jobs">💼 Jobs</div>
                    <div class="app-btn" data-app="vehicles">🚗 Vehicles</div>
                    <div class="app-btn" data-app="chat">💬 Chat</div>
                    <div class="app-btn" data-app="blackmarket">🖤 Black Market</div>
                </div>
                <div id="appContent" style="margin-top:12px; max-height:300px; overflow-y:auto;">
                    <p style="text-align:center;">Select an app</p>
                </div>
                <button id="closePhoneBtn" class="close-btn">Close</button>
            </div>
        </div>

        <!-- Respawn Screen -->
        <div id="respawn-screen" class="hidden">
            <h2>💀 YOU DIED</h2>
            <p>You were eliminated!</p>
            <button id="respawnBtn">🏥 Respawn at Hospital</button>
        </div>
        
        <!-- Chat Input (floating) -->
        <div id="chatInputArea" style="position: absolute; bottom: 100px; left: 20px; pointer-events: auto; background: #000000cc; border-radius: 20px; padding: 8px; display: none; z-index: 50;">
            <input type="text" id="chatMsgInput" placeholder="Type message..." style="width: 250px; padding: 8px; background: black; color:white; border:1px solid cyan; border-radius: 8px;">
            <button id="sendChatBtn" style="margin-left: 5px; padding: 8px 15px;">Send</button>
        </div>
    </div>

    <!-- Import Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { createClient } from '@supabase/supabase-js';

        // ---------- SUPABASE CONFIG ----------
        const SUPABASE_URL = "https://hcvewiwhtxqpbogcrukk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global state
        let currentUser = null;
        let currentServerId = null;
        let playersMap = new Map();
        let localPlayerMesh = null;
        let localPlayerData = { money: 1000, health: 100, hunger: 100, thirst: 100 };
        let keys = { w: false, s: false, a: false, d: false, shift: false };
        let camera, scene, renderer;
        let moveSpeed = 8;
        let isDead = false;
        let playersChannel = null;
        let chatMessages = [];
        
        // Camera controls
        let mouseX = 0, mouseY = 0;
        let pitch = 0, yaw = -Math.PI / 4;
        let cameraTarget = new THREE.Vector3();
        
        // World objects
        let worldGroup;
        let buildings = [];
        
        // ---------- THREE.JS Setup ----------
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.003);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, 10, 0);
        scene.add(fillLight);
        
        const streetLight = new THREE.PointLight(0xffaa66, 0.5);
        streetLight.position.set(0, 5, 0);
        scene.add(streetLight);
        
        // Ground
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid helper
        const gridHelper = new THREE.GridHelper(200, 40, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        // Create detailed city
        function createCity() {
            const buildingColors = [0x4a6c8f, 0x5a7c9f, 0x3a5c7f, 0x6a8caf, 0x2a4c6f];
            const glassColors = [0x88aaff, 0x77aaff, 0x99bbff];
            
            // Buildings in a grid
            for (let i = -12; i <= 12; i++) {
                for (let j = -12; j <= 12; j++) {
                    if (Math.abs(i) < 3 && Math.abs(j) < 3) continue; // Center park area
                    
                    const height = 1.5 + Math.random() * 4;
                    const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                    const buildingMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.7 });
                    
                    const building = new THREE.Mesh(new THREE.BoxGeometry(1.8, height, 1.8), buildingMat);
                    building.position.set(i * 3.5, height/2 - 0.5, j * 3.5);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);
                    buildings.push(building);
                    
                    // Roof
                    const roofMat = new THREE.MeshStandardMaterial({ color: glassColors[Math.floor(Math.random() * glassColors.length)], emissive: 0x224466, emissiveIntensity: 0.3 });
                    const roof = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.3, 4), roofMat);
                    roof.position.set(i * 3.5, height - 0.2, j * 3.5);
                    roof.castShadow = true;
                    scene.add(roof);
                    
                    // Windows effect (small emissive cubes)
                    if (height > 2.5) {
                        const windowMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff6622, emissiveIntensity: 0.5 });
                        const windowLight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.05), windowMat);
                        windowLight.position.set(i * 3.5, height/2, j * 3.5 + 0.95);
                        windowLight.castShadow = false;
                        scene.add(windowLight);
                    }
                }
            }
            
            // Roads (simple dark strips)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            for (let x = -40; x <= 40; x += 3.5) {
                const road = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 120), roadMat);
                road.position.set(x, -0.45, 0);
                road.receiveShadow = true;
                scene.add(road);
                
                const roadZ = new THREE.Mesh(new THREE.BoxGeometry(120, 0.1, 0.8), roadMat);
                roadZ.position.set(0, -0.45, x);
                roadZ.receiveShadow = true;
                scene.add(roadZ);
            }
        }
        
        // Create landmarks
        function createLandmarks() {
            // Hospital (red cross building)
            const hospitalMat = new THREE.MeshStandardMaterial({ color: 0xff6666, emissive: 0x441111 });
            const hospital = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 4), hospitalMat);
            hospital.position.set(20, 1, 20);
            hospital.castShadow = true;
            scene.add(hospital);
            
            const crossMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000 });
            const cross = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.2), crossMat);
            cross.position.set(20, 2.5, 20.5);
            scene.add(cross);
            
            const cross2 = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.2), crossMat);
            cross2.position.set(20, 2, 20.5);
            scene.add(cross2);
            
            // Police Station
            const policeMat = new THREE.MeshStandardMaterial({ color: 0x3366cc });
            const police = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.5, 3.5), policeMat);
            police.position.set(-18, 1, 15);
            police.castShadow = true;
            scene.add(police);
            
            // Car Dealership
            const dealerMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
            const dealer = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 4), dealerMat);
            dealer.position.set(15, 1, -18);
            dealer.castShadow = true;
            scene.add(dealer);
            
            // Park (green area with trees)
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x44aa44 });
            const parkGround = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), grassMat);
            parkGround.rotation.x = -Math.PI / 2;
            parkGround.position.set(0, -0.4, 0);
            parkGround.receiveShadow = true;
            scene.add(parkGround);
            
            // Trees
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x3a8c3a });
            
            for (let i = -4; i <= 4; i++) {
                for (let j = -4; j <= 4; j++) {
                    if (Math.abs(i) + Math.abs(j) > 5) continue;
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1, 6), trunkMat);
                    trunk.position.set(i * 1.8, 0, j * 1.8);
                    trunk.castShadow = true;
                    scene.add(trunk);
                    
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.2, 8), leafMat);
                    leaves.position.set(i * 1.8, 0.8, j * 1.8);
                    leaves.castShadow = true;
                    scene.add(leaves);
                }
            }
        }
        
        createCity();
        createLandmarks();
        
        // Local player mesh
        const playerGeometry = new THREE.BoxGeometry(0.8, 1.6, 0.8);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266aa, emissiveIntensity: 0.3 });
        localPlayerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
        localPlayerMesh.castShadow = true;
        localPlayerMesh.receiveShadow = true;
        scene.add(localPlayerMesh);
        
        // Add a simple character head
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), headMat);
        head.position.y = 0.9;
        localPlayerMesh.add(head);
        
        function createRemotePlayer() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffaa55 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const remoteHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            remoteHead.position.y = 1.2;
            remoteHead.castShadow = true;
            group.add(remoteHead);
            
            return group;
        }
        
        // ---------- Mouse Look ----------
        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement === renderer.domElement) {
                mouseX += event.movementX * 0.002;
                mouseY += event.movementY * 0.002;
                
                mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
                yaw = mouseX;
                pitch = mouseY;
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        // ---------- Authentication Functions ----------
        async function registerUser(username, password) {
            if (!username || !password) {
                showAuthMessage("Please enter username and password", "error");
                return null;
            }
            
            try {
                const { data: existing, error: checkError } = await supabase
                    .from('players')
                    .select('username')
                    .eq('username', username);
                
                if (checkError) {
                    showAuthMessage("Database error: " + checkError.message, "error");
                    return null;
                }
                
                if (existing && existing.length > 0) {
                    showAuthMessage("Username already exists! Please login.", "error");
                    return null;
                }
                
                const newPlayer = {
                    username: username,
                    password: password,
                    money: 1000,
                    health: 100,
                    hunger: 100,
                    thirst: 100,
                    position_x: 0,
                    position_y: 2,
                    position_z: 0
                };
                
                const { data: inserted, error: insertError } = await supabase
                    .from('players')
                    .insert([newPlayer])
                    .select();
                
                if (insertError) {
                    showAuthMessage("Registration failed: " + insertError.message, "error");
                    return null;
                }
                
                if (inserted && inserted.length > 0) {
                    showAuthMessage("Registration successful! Welcome!", "success");
                    return inserted[0];
                }
                return null;
            } catch (error) {
                showAuthMessage("Connection error. Please try again.", "error");
                return null;
            }
        }
        
        async function loginUser(username, password) {
            if (!username || !password) {
                showAuthMessage("Please enter username and password", "error");
                return null;
            }
            
            try {
                const { data, error } = await supabase
                    .from('players')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password);
                
                if (error) {
                    showAuthMessage("Database error: " + error.message, "error");
                    return null;
                }
                
                if (data && data.length > 0) {
                    showAuthMessage("Login successful! Welcome back!", "success");
                    return data[0];
                } else {
                    showAuthMessage("Invalid username or password!", "error");
                    return null;
                }
            } catch (error) {
                showAuthMessage("Connection error. Please try again.", "error");
                return null;
            }
        }
        
        function showAuthMessage(message, type) {
            const msgDiv = document.getElementById('authMessage');
            msgDiv.textContent = message;
            msgDiv.className = type === 'error' ? 'error-message' : 'success-message';
            setTimeout(() => {
                if (msgDiv.textContent === message) msgDiv.textContent = '';
            }, 3000);
        }
        
        async function updateLocalPlayerDB() {
            if (!currentUser) return;
            await supabase.from('players').update({
                money: localPlayerData.money,
                health: localPlayerData.health,
                hunger: localPlayerData.hunger,
                thirst: localPlayerData.thirst,
                position_x: localPlayerMesh.position.x,
                position_y: localPlayerMesh.position.y,
                position_z: localPlayerMesh.position.z
            }).eq('id', currentUser.id);
        }
        
        function respawnPlayer() {
            isDead = false;
            localPlayerData.health = 100;
            localPlayerData.hunger = 80;
            localPlayerData.thirst = 80;
            localPlayerMesh.position.set(20, 2, 20);
            localPlayerMesh.visible = true;
            updateLocalPlayerDB();
            updateHUD();
            document.getElementById('respawn-screen').classList.add('hidden');
        }
        
        function applyDamage(amount) {
            if (isDead) return;
            localPlayerData.health = Math.max(0, localPlayerData.health - amount);
            updateHUD();
            if (localPlayerData.health <= 0) {
                isDead = true;
                localPlayerData.health = 0;
                document.getElementById('respawn-screen').classList.remove('hidden');
                localPlayerMesh.visible = false;
            }
            updateLocalPlayerDB();
        }
        
        // ----- Real-time Multiplayer Sync -----
        async function joinServer(serverCode) {
            if (playersChannel) await supabase.removeChannel(playersChannel);
            currentServerId = serverCode;
            document.getElementById('server-info').innerHTML = `🖥️ Server: ${serverCode}`;
            
            playersChannel = supabase.channel(`server:${serverCode}`, {
                config: { broadcast: { ack: true }, presence: { key: currentUser.id } }
            });
            
            playersChannel.on('broadcast', { event: 'player-move' }, (payload) => {
                const { userId, x, y, z } = payload;
                if (userId === currentUser.id) return;
                const remote = playersMap.get(userId);
                if (remote) {
                    remote.position.set(x, y, z);
                }
            });
            
            playersChannel.on('broadcast', { event: 'player-damage' }, (payload) => {
                if (payload.targetId === currentUser.id) {
                    applyDamage(payload.damage);
                }
            });
            
            playersChannel.on('broadcast', { event: 'chat' }, (payload) => {
                chatMessages.unshift(payload);
                updateChatUI();
            });
            
            await playersChannel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await playersChannel.track({
                        user_id: currentUser.id,
                        username: currentUser.username,
                        x: localPlayerMesh.position.x,
                        y: localPlayerMesh.position.y,
                        z: localPlayerMesh.position.z
                    });
                    
                    playersChannel.on('presence', { event: 'sync' }, () => {
                        const state = playersChannel.presenceState();
                        for (let [id, presences] of Object.entries(state)) {
                            if (id === currentUser.id) continue;
                            if (!playersMap.has(id)) {
                                const remotePlayer = createRemotePlayer();
                                scene.add(remotePlayer);
                                playersMap.set(id, remotePlayer);
                            }
                            const pdata = presences[0];
                            if (pdata && playersMap.has(id)) {
                                playersMap.get(id).position.set(pdata.x, pdata.y, pdata.z);
                            }
                        }
                        for (let [id] of playersMap) {
                            if (!state[id] && id !== currentUser.id) {
                                scene.remove(playersMap.get(id));
                                playersMap.delete(id);
                            }
                        }
                    });
                }
            });
            
            // Broadcast position every 50ms
            setInterval(() => {
                if (currentServerId && playersChannel && !isDead) {
                    playersChannel.send({
                        type: 'broadcast',
                        event: 'player-move',
                        payload: { userId: currentUser.id, x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z }
                    });
                    playersChannel.track({
                        user_id: currentUser.id, username: currentUser.username,
                        x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z
                    });
                }
            }, 50);
        }
        
        // ---------- UI & Phone Apps ----------
        function updateHUD() {
            document.getElementById('health-val').innerText = Math.floor(localPlayerData.health);
            document.getElementById('hunger-val').innerText = Math.floor(localPlayerData.hunger);
            document.getElementById('thirst-val').innerText = Math.floor(localPlayerData.thirst);
            document.getElementById('money-val').innerText = localPlayerData.money;
        }
        
        function updateChatUI() {
            const chatDiv = document.querySelector('#appContent .chat-box');
            if (chatDiv) {
                chatDiv.innerHTML = chatMessages.slice(0, 20).map(m => `<div><b>${m.username}:</b> ${m.message}</div>`).join('');
            }
        }
        
        function openPhoneApp(appName) {
            const contentDiv = document.getElementById('appContent');
            if (appName === 'jobs') {
                contentDiv.innerHTML = `<h4>💼 AVAILABLE JOBS</h4>
                    <div class="blackmarket-item">🚔 Police Officer - $150/shift <button onclick="alert('Job applied!')">Apply</button></div>
                    <div class="blackmarket-item">🚕 Taxi Driver - $80/ride <button onclick="alert('Job applied!')">Apply</button></div>
                    <div class="blackmarket-item">🌿 Weed Farmer - $250/sale <button id="weedJobBtn">Sell Weed (+$50)</button></div>`;
                setTimeout(() => {
                    document.getElementById('weedJobBtn')?.addEventListener('click', () => {
                        localPlayerData.money += 50;
                        updateLocalPlayerDB();
                        updateHUD();
                        alert("You sold weed! +$50");
                    });
                }, 100);
            } else if (appName === 'vehicles') {
                contentDiv.innerHTML = `<h4>🚗 MY VEHICLES</h4>
                    <div class="blackmarket-item">🚗 Sedan - Available <button id="spawnCarBtn">Spawn</button></div>
                    <div class="blackmarket-item">🏍️ Motorcycle - Available <button id="spawnMotoBtn">Spawn</button></div>`;
                setTimeout(() => {
                    document.getElementById('spawnCarBtn')?.addEventListener('click', () => {
                        const carGeo = new THREE.BoxGeometry(1, 0.5, 1.8);
                        const carMat = new THREE.MeshStandardMaterial({ color: 0xff3300 });
                        const car = new THREE.Mesh(carGeo, carMat);
                        car.position.copy(localPlayerMesh.position);
                        car.position.y -= 0.6;
                        scene.add(car);
                        setTimeout(() => scene.remove(car), 8000);
                        alert("Vehicle spawned! (Temporary)");
                    });
                    document.getElementById('spawnMotoBtn')?.addEventListener('click', () => {
                        const motoGeo = new THREE.BoxGeometry(0.6, 0.4, 1.4);
                        const motoMat = new THREE.MeshStandardMaterial({ color: 0x33ff33 });
                        const moto = new THREE.Mesh(motoGeo, motoMat);
                        moto.position.copy(localPlayerMesh.position);
                        moto.position.y -= 0.6;
                        scene.add(moto);
                        setTimeout(() => scene.remove(moto), 8000);
                        alert("Motorcycle spawned!");
                    });
                }, 100);
            } else if (appName === 'chat') {
                contentDiv.innerHTML = `<h4>💬 GLOBAL CHAT</h4>
                    <div class="chat-box" id="chatMsgList"></div>
                    <div class="chat-input-area" style="margin-top: 8px;">
                        <input type="text" id="chatInputField" placeholder="Type message...">
                        <button id="sendMsgBtn">Send</button>
                    </div>`;
                updateChatUI();
                setTimeout(() => {
                    const sendBtn = document.getElementById('sendMsgBtn');
                    const input = document.getElementById('chatInputField');
                    if (sendBtn && input) {
                        sendBtn.addEventListener('click', () => {
                            if (input.value && playersChannel) {
                                playersChannel.send({ type: 'broadcast', event: 'chat', payload: { username: currentUser.username, message: input.value } });
                                input.value = '';
                            }
                        });
                        input.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter' && input.value && playersChannel) {
                                playersChannel.send({ type: 'broadcast', event: 'chat', payload: { username: currentUser.username, message: input.value } });
                                input.value = '';
                            }
                        });
                    }
                }, 100);
            } else if (appName === 'blackmarket') {
                contentDiv.innerHTML = `<h4>🖤 BLACK MARKET</h4>
                    <div class="blackmarket-item">🔫 Pistol - $300 <button class="buyGun">Buy</button></div>
                    <div class="blackmarket-item">💊 Medkit - $100 <button class="buyMedkit">Buy</button></div>
                    <div class="blackmarket-item">🌿 Weed - $50 <button class="buyWeed">Buy</button></div>
                    <div class="blackmarket-item">🔪 Combat Knife - $150 <button class="buyKnife">Buy</button></div>`;
                setTimeout(() => {
                    document.querySelector('.buyGun')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 300) {
                            localPlayerData.money -= 300;
                            updateHUD();
                            alert("Bought Pistol! Press F to shoot!");
                        } else alert("Not enough money!");
                    });
                    document.querySelector('.buyMedkit')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 100 && localPlayerData.health < 100) {
                            localPlayerData.money -= 100;
                            localPlayerData.health = Math.min(100, localPlayerData.health + 50);
                            updateHUD();
                            alert("Health restored!");
                        } else alert("Cannot use medkit or not enough money!");
                    });
                    document.querySelector('.buyWeed')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 50) {
                            localPlayerData.money -= 50;
                            localPlayerData.hunger = Math.min(100, localPlayerData.hunger + 15);
                            updateHUD();
                            alert("You consumed weed!");
                        }
                    });
                }, 100);
            }
        }
        
        // ---------- Combat: shoot ray ----------
        function shootRay() {
            if (isDead) {
                alert("You are dead! Respawn first.");
                return;
            }
            
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyEuler(new THREE.Euler(pitch, yaw, 0));
            
            const raycaster = new THREE.Raycaster(localPlayerMesh.position.clone().add(new THREE.Vector3(0, 0.8, 0)), direction, 0, 10);
            
            let hitPlayerId = null;
            for (let [id, playerMesh] of playersMap.entries()) {
                const box = new THREE.Box3().setFromObject(playerMesh);
                if (raycaster.ray.intersectBox(box, new THREE.Vector3())) {
                    hitPlayerId = id;
                    break;
                }
            }
            
            if (hitPlayerId && playersChannel) {
                playersChannel.send({ type: 'broadcast', event: 'player-damage', payload: { targetId: hitPlayerId, damage: 35 } });
                // Visual effect
                const flash = new THREE.PointLight(0xff4400, 1, 5);
                flash.position.copy(localPlayerMesh.position);
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 100);
            } else {
                // Miss effect
                const flash = new THREE.PointLight(0xffaa00, 0.5, 3);
                flash.position.copy(localPlayerMesh.position);
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 50);
            }
        }
        
        // ---------- Movement ----------
        function handleMovement(deltaTime) {
            if (isDead) return;
            
            const speed = moveSpeed * deltaTime * (keys.shift ? 2 : 1);
            const moveDirection = new THREE.Vector3(0, 0, 0);
            
            if (keys.w) moveDirection.z -= 1;
            if (keys.s) moveDirection.z += 1;
            if (keys.a) moveDirection.x -= 1;
            if (keys.d) moveDirection.x += 1;
            
            if (moveDirection.length() > 0) moveDirection.normalize();
            
            // Rotate move direction based on camera yaw
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            
            const movement = new THREE.Vector3(0, 0, 0);
            movement.addScaledVector(forward, moveDirection.z);
            movement.addScaledVector(right, moveDirection.x);
            
            localPlayerMesh.position.x += movement.x * speed;
            localPlayerMesh.position.z += movement.z * speed;
            
            // Boundaries
            localPlayerMesh.position.x = Math.max(-55, Math.min(55, localPlayerMesh.position.x));
            localPlayerMesh.position.z = Math.max(-55, Math.min(55, localPlayerMesh.position.z));
            
            // Update camera position with smooth follow
            const targetX = localPlayerMesh.position.x;
            const targetZ = localPlayerMesh.position.z;
            
            // Update camera based on mouse look
            camera.position.x = localPlayerMesh.position.x;
            camera.position.y = localPlayerMesh.position.y + 1.2;
            camera.position.z = localPlayerMesh.position.z;
            
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            
            // Hunger/thirst decay
            if (Math.random() < 0.01) {
                localPlayerData.hunger = Math.max(0, localPlayerData.hunger - 0.3);
                localPlayerData.thirst = Math.max(0, localPlayerData.thirst - 0.4);
                if (localPlayerData.hunger <= 0 || localPlayerData.thirst <= 0) applyDamage(0.5);
                updateHUD();
            }
        }
        
        // ---------- Event Listeners ----------
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w') keys.w = true;
            if (e.key === 's') keys.s = true;
            if (e.key === 'a') keys.a = true;
            if (e.key === 'd') keys.d = true;
            if (e.key === 'Shift') keys.shift = true;
            if (e.key === 'f') shootRay();
            if (e.key === 't') {
                document.getElementById('chatInputArea').style.display = 'flex';
                document.getElementById('chatMsgInput').focus();
            }
            if (e.key === 'Escape') {
                document.exitPointerLock();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'w') keys.w = false;
            if (e.key === 's') keys.s = false;
            if (e.key === 'a') keys.a = false;
            if (e.key === 'd') keys.d = false;
            if (e.key === 'Shift') keys.shift = false;
        });
        
        document.getElementById('sendChatBtn')?.addEventListener('click', () => {
            const input = document.getElementById('chatMsgInput');
            if (input.value && playersChannel) {
                playersChannel.send({ type: 'broadcast', event: 'chat', payload: { username: currentUser.username, message: input.value } });
                input.value = '';
                document.getElementById('chatInputArea').style.display = 'none';
            }
        });
        
        // Auth UI handlers
        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const player = await loginUser(username, password);
            if (player) {
                currentUser = player;
                localPlayerData.money = player.money;
                localPlayerData.health = player.health;
                localPlayerData.hunger = player.hunger;
                localPlayerData.thirst = player.thirst;
                localPlayerMesh.position.set(player.position_x, player.position_y, player.position_z);
                updateHUD();
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('username-display').innerHTML = `👤 ${player.username}`;
                document.getElementById('welcomeUsername').innerText = player.username;
                document.getElementById('serverModal').classList.remove('hidden');
            }
        };
        
        document.getElementById('registerBtn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const player = await registerUser(username, password);
            if (player) {
                currentUser = player;
                localPlayerData.money = player.money;
                localPlayerData.health = player.health;
                localPlayerData.hunger = player.hunger;
                localPlayerData.thirst = player.thirst;
                localPlayerMesh.position.set(player.position_x, player.position_y, player.position_z);
                updateHUD();
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('username-display').innerHTML = `👤 ${player.username}`;
                document.getElementById('welcomeUsername').innerText = player.username;
                document.getElementById('serverModal').classList.remove('hidden');
            }
        };
        
        document.getElementById('createServerBtn').onclick = () => {
            const code = Math.random().toString(36).substring(2, 10).toUpperCase();
            const codeDiv = document.getElementById('createdServerCode');
            codeDiv.innerHTML = `📋 Your Server Code: <span style="color:#00ffcc;">${code}</span><br><small>Share this with friends!</small>`;
            codeDiv.classList.remove('hidden');
            joinServer(code);
            setTimeout(() => {
                document.getElementById('serverModal').classList.add('hidden');
            }, 2000);
        };
        
        document.getElementById('joinServerBtn').onclick = () => {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if (code) {
                joinServer(code);
                document.getElementById('serverModal').classList.add('hidden');
            } else {
                alert("Please enter a server code");
            }
        };
        
        document.getElementById('closeServerBtn').onclick = () => document.getElementById('serverModal').classList.add('hidden');
        document.getElementById('phoneBtn').onclick = () => document.getElementById('phoneModal').classList.remove('hidden');
        document.getElementById('closePhoneBtn').onclick = () => document.getElementById('phoneModal').classList.add('hidden');
        document.querySelectorAll('.app-btn').forEach(btn => {
            btn.addEventListener('click', () => openPhoneApp(btn.dataset.app));
        });
        document.getElementById('respawnBtn').onclick = () => { respawnPlayer(); };
        
        // Animation loop
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            handleMovement(delta);
            
            // Animate street light
            streetLight.intensity = 0.5 + Math.sin(Date.now() * 0.003) * 0.2;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        console.log("Game initialized! Click the screen to lock mouse, use WASD to move.");
    </script>
</body>
