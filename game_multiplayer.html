<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Game</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  canvas { display: block; }
  #joinDiv {
    position: absolute; top: 10px; left: 10px; z-index: 100;
    background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
    color: #fff;
  }
</style>
</head>
<body>

<div id="joinDiv">
  Session ID: <input type="text" id="sessionInput" value="test_session">
  <button id="joinBtn">Join Game</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.30.0/dist/supabase.min.js"></script>

<script>
// ===== Supabase Setup =====
const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== Three.js Setup =====
let scene, camera, renderer;
let localPlayerId = null;
let players = new Map();
let keys = { w:false, a:false, s:false, d:false };
let subscription = null;

// ===== Initialize 3D World =====
function setup3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,5,10);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Ground
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100,100), groundMat);
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // Lights
    const light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(10,20,10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff,0.3));

    // Random buildings
    for(let i=0;i<15;i++){
        const b = new THREE.Mesh(
            new THREE.BoxGeometry(2,Math.random()*5+1,2),
            new THREE.MeshStandardMaterial({ color: Math.random()*0xffffff })
        );
        b.position.set((Math.random()-0.5)*50, b.geometry.parameters.height/2, (Math.random()-0.5)*50);
        scene.add(b);
    }

    animate();
}

// ===== Player Functions =====
function addPlayer(id,x=0,z=0,isLocal=false){
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshStandardMaterial({ color: isLocal?0x00ff00:0xff0000 });
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set(x,0.5,z);
    scene.add(mesh);
    players.set(id,{ id, mesh, lastUpdate: Date.now() });
}

// ===== Movement & Camera =====
function handleMovement(){
    const speed = 0.1;
    const player = players.get(localPlayerId);
    if(!player) return;

    if(keys.w) player.mesh.position.z -= speed;
    if(keys.s) player.mesh.position.z += speed;
    if(keys.a) player.mesh.position.x -= speed;
    if(keys.d) player.mesh.position.x += speed;

    // Camera follow
    camera.position.x = player.mesh.position.x;
    camera.position.z = player.mesh.position.z + 10;
    camera.position.y = 5;
    camera.lookAt(player.mesh.position);

    // Update Supabase
    supabase.from('players').upsert({
        player_id: localPlayerId,
        session_id: currentSession,
        pos_x: player.mesh.position.x,
        pos_z: player.mesh.position.z,
        last_seen: new Date()
    });
}

// ===== Animation =====
function animate(){
    requestAnimationFrame(animate);
    handleMovement();

    players.forEach(p=>{
        if(p.id!==localPlayerId) p.mesh.rotation.y += 0.01;
    });

    renderer.render(scene,camera);
}

// ===== Input =====
window.addEventListener('keydown',e=>{ if(keys[e.key.toLowerCase()]!==undefined) keys[e.key.toLowerCase()] = true });
window.addEventListener('keyup',e=>{ if(keys[e.key.toLowerCase()]!==undefined) keys[e.key.toLowerCase()] = false });

// ===== Multiplayer =====
let currentSession = null;
async function joinGame(sessionId){
    currentSession = sessionId;
    localPlayerId = 'p_'+Math.random().toString(36).substring(2,15);
    addPlayer(localPlayerId,(Math.random()-0.5)*10,(Math.random()-0.5)*10,true);

    // Add to DB
    await supabase.from('players').upsert({
        player_id: localPlayerId,
        session_id: sessionId,
        pos_x: 0,
        pos_z: 0,
        last_seen: new Date()
    });

    // Listen for changes
    if(subscription) subscription.unsubscribe();

    subscription = supabase.channel('game_updates')
        .on('postgres_changes',{
            event:'*',
            schema:'public',
            table:'players',
            filter:`session_id=eq.${sessionId}`
        }, payload=>{
            const p = payload.new;
            if(!p || p.player_id===localPlayerId) return;

            if(!players.has(p.player_id)){
                addPlayer(p.player_id,p.pos_x,p.pos_z,false);
            } else {
                const pl = players.get(p.player_id);
                pl.mesh.position.x = p.pos_x;
                pl.mesh.position.z = p.pos_z;
                pl.lastUpdate = Date.now();
            }
        }).subscribe();

    // Remove inactive
    setInterval(()=>{
        const now = Date.now();
        players.forEach((p,id)=>{
            if(id===localPlayerId) return;
            if(now-p.lastUpdate>15000){
                scene.remove(p.mesh);
                players.delete(id);
            }
        });
    },10000);
}

// ===== Join Button =====
document.getElementById('joinBtn').addEventListener('click',()=>{
    const session = document.getElementById('sessionInput').value;
    joinGame(session);
});

// ===== Start 3D =====
setup3D();
</script>
</body>
</html>
