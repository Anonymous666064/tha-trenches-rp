<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid #0f0;
            min-width: 250px;
        }
        button {
            background: #0f0;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #0c0; }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #0f0;
            background: #333;
            color: white;
        }
        .status { margin-top: 10px; font-size: 12px; color: #0f0; }
        .error { color: #f44; }
        #playersList {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            border: 1px solid #0f0;
            min-width: 150px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 Multiplayer Game</h3>
        <div>
            <button id="hostBtn">🌟 Create Game</button>
            <input type="text" id="customCode" placeholder="Custom code (6 digits)" maxlength="6" style="width: 100px;">
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="joinCode" placeholder="Enter 6-digit code" maxlength="6">
            <button id="joinBtn">🔗 Join Game</button>
        </div>
        <div id="gameInfo" class="status"></div>
    </div>
    <div id="playersList">
        <strong>👥 Players</strong>
        <div id="players"></div>
    </div>
    <div class="controls">
        🎮 Move with <strong>W A S D</strong>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import * as THREE from 'three';

        // ========== SUPABASE SETUP ==========
        // REPLACE WITH YOUR CREDENTIALS:
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ========== GAME STATE ==========
        let currentSession = null;
        let myPlayerId = null;
        let players = new Map();
        let localPlayer = null;
        let scene, camera, renderer;
        let keys = { w: false, s: false, a: false, d: false };
        let subscription = null;
        
        // ========== 3D SETUP ==========
        function setup3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 12);
            
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(25, 25),
                new THREE.MeshStandardMaterial({ color: 0x2c3e50 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid
            const grid = new THREE.GridHelper(25, 20, 0x3498db, 0x2980b9);
            grid.position.y = 0.01;
            scene.add(grid);
            
            // Simple trees
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x27ae60 });
            
            for (let i = -10; i <= 10; i += 5) {
                for (let j = -10; j <= 10; j += 5) {
                    if (Math.abs(i) < 3 && Math.abs(j) < 3) continue;
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1, 6), trunkMat);
                    trunk.position.set(i, 0.5, j);
                    trunk.castShadow = true;
                    scene.add(trunk);
                    
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 8), leafMat);
                    leaves.position.set(i, 1, j);
                    leaves.castShadow = true;
                    scene.add(leaves);
                }
            }
            
            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 5);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404060));
            
            animate();
        }
        
        function createPlayer(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 1, 0.7),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.1;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.18, 1.22, 0.45);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.18, 1.22, 0.45);
            group.add(rightEye);
            
            // Hat for local player
            if (isLocal) {
                const hat = new THREE.Mesh(
                    new THREE.ConeGeometry(0.4, 0.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0xff4444 })
                );
                hat.position.y = 1.45;
                group.add(hat);
            }
            
            return group;
        }
        
        function addPlayer(playerId, x, z, isLocal = false) {
            const color = isLocal ? 0x44ff44 : 0xff6644;
            const playerMesh = createPlayer(color, isLocal);
            playerMesh.position.set(x, 0, z);
            scene.add(playerMesh);
            
            players.set(playerId, { mesh: playerMesh, x, z });
            
            if (isLocal) {
                localPlayer = playerMesh;
                camera.position.set(x, 8, x + 12);
            }
            
            updatePlayersList();
            return playerMesh;
        }
        
        function updatePlayersList() {
            const listDiv = document.getElementById('players');
            let html = '';
            for (let [id, player] of players) {
                html += `🎮 ${id.slice(0, 6)}<br>`;
            }
            listDiv.innerHTML = html || 'Waiting for players...';
        }
        
        function handleMovement() {
            if (!localPlayer || !currentSession) return;
            
            let moved = false;
            let newX = localPlayer.position.x;
            let newZ = localPlayer.position.z;
            const speed = 0.2;
            
            if (keys.w) { newZ -= speed; moved = true; }
            if (keys.s) { newZ += speed; moved = true; }
            if (keys.a) { newX -= speed; moved = true; }
            if (keys.d) { newX += speed; moved = true; }
            
            newX = Math.max(-11, Math.min(11, newX));
            newZ = Math.max(-11, Math.min(11, newZ));
            
            if (moved) {
                localPlayer.position.set(newX, 0, newZ);
                camera.position.x = newX;
                camera.position.z = newZ + 8;
                camera.lookAt(newX, 2, newZ);
                
                updatePositionInDB(newX, newZ);
            }
        }
        
        async function updatePositionInDB(x, z) {
            if (!currentSession || !myPlayerId) return;
            await supabase
                .from('players')
                .update({ pos_x: x, pos_z: z, last_seen: new Date() })
                .eq('player_id', myPlayerId);
        }
        
        // ========== DATABASE FUNCTIONS ==========
        async function createSession(customCode) {
            let code = customCode?.toUpperCase();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing?.length > 0) {
                throw new Error('Code taken, try another');
            }
            
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            return code;
        }
        
        async function joinSession(code) {
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .single();
            
            if (error || !data) throw new Error('Game not found');
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode) {
            myPlayerId = Math.random().toString(36).substring(2, 15);
            const startX = (Math.random() - 0.5) * 8;
            const startZ = (Math.random() - 0.5) * 8;
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            addPlayer(myPlayerId, startX, startZ, true);
            await loadPlayers(sessionCode);
            subscribeToPlayers(sessionCode);
            
            return startX;
        }
        
        async function loadPlayers(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) return;
            
            for (let p of data) {
                if (p.player_id !== myPlayerId && !players.has(p.player_id)) {
                    addPlayer(p.player_id, p.pos_x, p.pos_z, false);
                } else if (p.player_id !== myPlayerId && players.has(p.player_id)) {
                    players.get(p.player_id).mesh.position.set(p.pos_x, 0, p.pos_z);
                }
            }
        }
        
        function subscribeToPlayers(sessionCode) {
            if (subscription) subscription.unsubscribe();
            
            subscription = supabase
                .channel('players-channel')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                        addPlayer(payload.new.player_id, payload.new.pos_x, payload.new.pos_z, false);
                    } else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        const player = players.get(payload.new.player_id);
                        if (player) {
                            player.mesh.position.set(payload.new.pos_x, 0, payload.new.pos_z);
                        }
                    } else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        const player = players.get(payload.old.player_id);
                        if (player) {
                            scene.remove(player.mesh);
                            players.delete(payload.old.player_id);
                            updatePlayersList();
                        }
                    }
                })
                .subscribe();
        }
        
        // ========== UI ==========
        document.getElementById('hostBtn').onclick = async () => {
            const customCode = document.getElementById('customCode').value;
            try {
                const code = await createSession(customCode);
                currentSession = code;
                await addPlayerToGame(code);
                document.getElementById('gameInfo').innerHTML = `✅ Game: ${code}<br>Share this code!`;
                document.getElementById('gameInfo').style.color = '#0f0';
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').style.color = '#f44';
            }
        };
        
        document.getElementById('joinBtn').onclick = async () => {
            const code = document.getElementById('joinCode').value;
            if (!code) return alert('Enter code');
            try {
                currentSession = await joinSession(code);
                await addPlayerToGame(currentSession);
                document.getElementById('gameInfo').innerHTML = `✅ Joined: ${currentSession}`;
                document.getElementById('gameInfo').style.color = '#0f0';
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').style.color = '#f44';
            }
        };
        
        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });
        
        // Cleanup
        window.addEventListener('beforeunload', async () => {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            handleMovement();
            renderer.render(scene, camera);
        }
        
        setup3D();
        
        // Config check
        if (SUPABASE_URL.includes('YOUR_PROJECT')) {
            document.getElementById('gameInfo').innerHTML = '⚠️ Configure Supabase first!';
            document.getElementById('gameInfo').style.color = '#ff0';
        }
    </script>
</body>
</html>
