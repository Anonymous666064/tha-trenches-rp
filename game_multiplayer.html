<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Multiplayer World - Working!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            border: 1px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
            min-width: 300px;
            pointer-events: auto;
        }

        h3 {
            margin: 0 0 15px 0;
            color: #00ff88;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(135deg, #00ff99, #00dd77);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            background: #222;
            color: white;
            font-size: 14px;
            text-align: center;
        }

        .status {
            margin-top: 12px;
            font-size: 12px;
            padding: 8px;
            border-radius: 5px;
            background: rgba(0,0,0,0.5);
        }

        .success {
            color: #00ff88;
        }

        .error {
            color: #ff4444;
        }

        .info {
            color: #ffaa44;
        }

        #playersList {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            border: 1px solid #00ff88;
            min-width: 180px;
            z-index: 100;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        .code-badge {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #000;
            padding: 5px 15px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }

        #leaveBtn {
            margin-top: 10px;
            background: #ff4444;
            width: 100%;
        }

        #leaveBtn:hover {
            background: #ff6666;
        }

        @media (max-width: 700px) {
            #ui {
                min-width: 260px;
                padding: 15px;
            }
            button {
                padding: 8px 15px;
                font-size: 12px;
            }
            input {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 3D Multiplayer Arena</h3>
        <div>
            <button id="hostBtn">🌟 Create Game</button>
            <input type="text" id="customCode" placeholder="Custom code" maxlength="6" style="width: 100px; text-transform: uppercase;">
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="joinCode" placeholder="Enter 6-digit code" maxlength="6" style="width: 120px; text-transform: uppercase;">
            <button id="joinBtn">🔗 Join Game</button>
        </div>
        <div id="gameInfo" class="status info">⚡ Ready to play</div>
        <div id="activeCode" style="margin-top: 10px; text-align: center;"></div>
        <div id="leaveBtnContainer"></div>
    </div>

    <div id="playersList">
        <strong>👥 Players Online</strong>
        <hr style="margin: 8px 0; border-color: #00ff88;">
        <div id="players">Waiting for players...</div>
    </div>

    <div class="controls">
        🎮 WASD to move | 🏃 Explore the 3D world!
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import * as THREE from 'three';

        // Supabase configuration
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Game state
        let currentSession = null;
        let myPlayerId = null;
        let isHost = false;
        let players = new Map();
        let localPlayerMesh = null;
        let scene, camera, renderer;
        let keys = { w: false, s: false, a: false, d: false };
        let subscription = null;
        let lastUpdateTime = 0;
        let heartbeatInterval = null;
        let cleanupInterval = null;

        // Initialize 3D world immediately
        function init3D() {
            console.log("Initializing 3D world...");
            
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            camera.lookAt(0, 0, 0);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setClearColor(0x87CEEB);
            document.body.appendChild(renderer.domElement);
            
            console.log("Renderer created and added to body");
            
            // Add ground
            const groundGeometry = new THREE.PlaneGeometry(30, 30);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x5c9e5c, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Add grid helper
            const gridHelper = new THREE.GridHelper(30, 20, 0xffffff, 0x888888);
            gridHelper.position.y = -0.4;
            scene.add(gridHelper);
            
            // Add trees
            const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
            
            for (let i = 0; i < 40; i++) {
                const angle = (i / 40) * Math.PI * 2;
                const radius = 12;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 1.5, 6), trunkMaterial);
                trunk.position.set(x, -0.2, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 8), leafMaterial);
                leaves.position.set(x, 0.6, z);
                leaves.castShadow = true;
                scene.add(leaves);
            }
            
            // Add random orbs
            const colors = [0xff4444, 0xffaa44, 0x44ff44, 0x44aaff, 0xff44ff];
            for (let i = 0; i < 100; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const orbMaterial = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
                const orb = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), orbMaterial);
                const angle = Math.random() * Math.PI * 2;
                const radius = 5 + Math.random() * 10;
                orb.position.x = Math.cos(angle) * radius;
                orb.position.z = Math.sin(angle) * radius;
                orb.position.y = 0.5 + Math.random() * 2;
                orb.castShadow = true;
                scene.add(orb);
            }
            
            // Add particles
            const particleCount = 1000;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 30;
                particlePositions[i*3+1] = Math.random() * 8;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 30;
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMaterial = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.05 });
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
            
            // Add lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xfff5e6, 1);
            directionalLight.position.set(10, 20, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0x4466ff, 0.5);
            backLight.position.set(0, 5, -10);
            scene.add(backLight);
            
            const fillLight = new THREE.PointLight(0xffaa66, 0.4);
            fillLight.position.set(5, 5, 5);
            scene.add(fillLight);
            
            // Add a visible center marker
            const centerMarker = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.5, 0.5),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400 })
            );
            centerMarker.position.set(0, 0, 0);
            scene.add(centerMarker);
            
            console.log("3D world initialized successfully!");
            
            // Start animation loop
            animate();
        }
        
        // Create player model
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 1, 8),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
            );
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.05;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMaterial);
            leftEye.position.set(-0.18, 1.15, 0.48);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMaterial);
            rightEye.position.set(0.18, 1.15, 0.48);
            group.add(rightEye);
            
            // Pupils
            const pupilMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMaterial);
            leftPupil.position.set(0, 0, 0.08);
            leftEye.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMaterial);
            rightPupil.position.set(0, 0, 0.08);
            rightEye.add(rightPupil);
            
            // Crown for local player
            if (isLocal) {
                const crown = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.55, 0.2, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 })
                );
                crown.position.y = 1.4;
                group.add(crown);
                
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(
                        new THREE.ConeGeometry(0.12, 0.35, 6),
                        new THREE.MeshStandardMaterial({ color: 0xffdd88 })
                    );
                    const angle = (i / 5) * Math.PI * 2;
                    spike.position.x = Math.cos(angle) * 0.45;
                    spike.position.z = Math.sin(angle) * 0.45;
                    spike.position.y = 1.52;
                    group.add(spike);
                }
            }
            
            return group;
        }
        
        function addPlayer(playerId, x, z, isLocal = false) {
            if (!scene) return null;
            const color = isLocal ? 0x66ff88 : 0xff8844;
            const playerModel = createPlayerModel(color, isLocal);
            playerModel.position.set(x, -0.2, z);
            scene.add(playerModel);
            players.set(playerId, { mesh: playerModel, name: playerId.slice(0, 6) });
            if (isLocal) localPlayerMesh = playerModel;
            updatePlayersList();
            return playerModel;
        }
        
        function removePlayer(playerId) {
            const player = players.get(playerId);
            if (player && scene) {
                scene.remove(player.mesh);
                players.delete(playerId);
                updatePlayersList();
            }
        }
        
        function updatePlayersList() {
            const playersDiv = document.getElementById('players');
            if (!playersDiv) return;
            if (players.size === 0) {
                playersDiv.innerHTML = 'Waiting for players...';
                return;
            }
            let html = '';
            for (let [id, player] of players) {
                const isMe = id === myPlayerId;
                const hostIcon = (isHost && isMe) ? '👑 ' : '';
                html += `${hostIcon}🎮 ${player.name}${isMe ? ' (YOU)' : ''}<br>`;
            }
            playersDiv.innerHTML = html;
        }
        
        function handleMovement() {
            if (!localPlayerMesh || !currentSession) return;
            let moved = false;
            let newX = localPlayerMesh.position.x;
            let newZ = localPlayerMesh.position.z;
            const speed = 0.22;
            
            if (keys.w) { newZ -= speed; moved = true; }
            if (keys.s) { newZ += speed; moved = true; }
            if (keys.a) { newX -= speed; moved = true; }
            if (keys.d) { newX += speed; moved = true; }
            
            const bounds = 13;
            newX = Math.max(-bounds, Math.min(bounds, newX));
            newZ = Math.max(-bounds, Math.min(bounds, newZ));
            
            if (moved) {
                localPlayerMesh.position.set(newX, -0.2, newZ);
                
                // Camera follow
                const targetX = newX * 0.3;
                const targetZ = newZ + 12;
                camera.position.x += (targetX - camera.position.x) * 0.1;
                camera.position.z += (targetZ - camera.position.z) * 0.1;
                camera.position.y = 8;
                camera.lookAt(newX, 1, newZ);
                
                const now = Date.now();
                if (now - lastUpdateTime > 66) {
                    updatePositionInDB(newX, newZ);
                    lastUpdateTime = now;
                }
            }
        }
        
        async function updatePositionInDB(x, z) {
            if (!currentSession || !myPlayerId) return;
            try {
                await supabase
                    .from('players')
                    .update({ pos_x: x, pos_z: z, last_seen: new Date() })
                    .eq('player_id', myPlayerId);
            } catch (e) {
                console.warn('Update failed:', e);
            }
        }
        
        async function sendHeartbeat() {
            if (!currentSession || !myPlayerId) return;
            try {
                await supabase
                    .from('players')
                    .update({ last_seen: new Date() })
                    .eq('player_id', myPlayerId);
            } catch (e) {}
        }
        
        async function cleanupDisconnectedPlayers() {
            if (!currentSession) return;
            const cutoffTime = new Date(Date.now() - 10000);
            const { data, error } = await supabase
                .from('players')
                .select('player_id')
                .eq('session_id', currentSession)
                .lt('last_seen', cutoffTime.toISOString());
            if (error) return;
            for (let player of data) {
                if (player.player_id !== myPlayerId) {
                    await supabase.from('players').delete().eq('player_id', player.player_id);
                }
            }
        }
        
        async function leaveGame() {
            console.log('Leaving game...');
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (cleanupInterval) clearInterval(cleanupInterval);
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
            if (isHost && currentSession) {
                await supabase.from('game_sessions').delete().eq('session_code', currentSession);
            }
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            currentSession = null;
            myPlayerId = null;
            isHost = false;
            for (let [id, player] of players) {
                if (scene && player.mesh) {
                    scene.remove(player.mesh);
                }
            }
            players.clear();
            localPlayerMesh = null;
            
            document.getElementById('hostBtn').disabled = false;
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('gameInfo').innerHTML = '⚡ Left the game. Ready to play!';
            document.getElementById('gameInfo').className = 'status info';
            document.getElementById('activeCode').innerHTML = '';
            document.getElementById('players').innerHTML = 'Waiting for players...';
            document.getElementById('leaveBtnContainer').innerHTML = '';
            
            if (camera) {
                camera.position.set(0, 8, 15);
                camera.lookAt(0, 0, 0);
            }
        }
        
        // Database functions
        async function createSession(customCode) {
            let code = customCode?.toUpperCase();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            if (existing && existing.length > 0) {
                throw new Error('Code already taken!');
            }
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            if (error) throw error;
            return code;
        }
        
        async function joinSession(code) {
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .maybeSingle();
            if (error) throw error;
            if (!data) throw new Error('Game not found!');
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode, isHostPlayer = false) {
            myPlayerId = 'p_' + Math.random().toString(36).substring(2, 15);
            isHost = isHostPlayer;
            const startX = (Math.random() - 0.5) * 10;
            const startZ = (Math.random() - 0.5) * 10;
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            if (error) throw error;
            addPlayer(myPlayerId, startX, startZ, true);
            await loadPlayers(sessionCode);
            subscribeToPlayers(sessionCode);
            
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                sendHeartbeat();
                cleanupDisconnectedPlayers();
            }, 3000);
        }
        
        async function loadPlayers(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            if (error) {
                console.error('Load error:', error);
                return;
            }
            for (let p of data) {
                if (p.player_id !== myPlayerId && !players.has(p.player_id)) {
                    addPlayer(p.player_id, p.pos_x, p.pos_z, false);
                }
            }
        }
        
        function subscribeToPlayers(sessionCode) {
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            subscription = supabase
                .channel(`players:${sessionCode}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                        addPlayer(payload.new.player_id, payload.new.pos_x, payload.new.pos_z, false);
                    } else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        const player = players.get(payload.new.player_id);
                        if (player) {
                            player.mesh.position.set(payload.new.pos_x, -0.2, payload.new.pos_z);
                        }
                    } else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        removePlayer(payload.old.player_id);
                    }
                })
                .subscribe();
        }
        
        function addLeaveButton() {
            const container = document.getElementById('leaveBtnContainer');
            if (!container) return;
            container.innerHTML = '';
            const leaveBtn = document.createElement('button');
            leaveBtn.id = 'leaveBtn';
            leaveBtn.textContent = '🚪 Leave Game';
            leaveBtn.style.marginTop = '10px';
            leaveBtn.style.background = '#ff4444';
            leaveBtn.style.width = '100%';
            leaveBtn.onclick = async () => {
                await leaveGame();
            };
            container.appendChild(leaveBtn);
        }
        
        // UI Event Handlers
        let isConnecting = false;
        const hostBtn = document.getElementById('hostBtn');
        const joinBtn = document.getElementById('joinBtn');
        const gameInfo = document.getElementById('gameInfo');
        
        hostBtn.onclick = async () => {
            if (isConnecting) return;
            isConnecting = true;
            const customCode = document.getElementById('customCode')?.value || '';
            try {
                const code = await createSession(customCode);
                currentSession = code;
                await addPlayerToGame(code, true);
                gameInfo.innerHTML = `✅ Game Created! Code: <strong style="font-size:18px">${code}</strong><br>Share this code with friends!`;
                gameInfo.className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🔑 ${code}</div>`;
                hostBtn.disabled = true;
                joinBtn.disabled = true;
                addLeaveButton();
            } catch (err) {
                gameInfo.innerHTML = `❌ ${err.message}`;
                gameInfo.className = 'status error';
                console.error(err);
            } finally {
                isConnecting = false;
            }
        };
        
        joinBtn.onclick = async () => {
            if (isConnecting) return;
            isConnecting = true;
            const code = document.getElementById('joinCode')?.value || '';
            if (!code) {
                gameInfo.innerHTML = '❌ Please enter a game code';
                gameInfo.className = 'status error';
                isConnecting = false;
                return;
            }
            try {
                currentSession = await joinSession(code);
                await addPlayerToGame(currentSession, false);
                gameInfo.innerHTML = `✅ Joined game: <strong>${currentSession}</strong>`;
                gameInfo.className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🎮 ${currentSession}</div>`;
                hostBtn.disabled = true;
                joinBtn.disabled = true;
                addLeaveButton();
            } catch (err) {
                gameInfo.innerHTML = `❌ ${err.message}`;
                gameInfo.className = 'status error';
                console.error(err);
            } finally {
                isConnecting = false;
            }
        };
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
        });
        
        // Handle page close
        window.addEventListener('beforeunload', async () => {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
            if (isHost && currentSession) {
                await supabase.from('game_sessions').delete().eq('session_code', currentSession);
            }
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            handleMovement();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // Start the game
        console.log("Starting game...");
        init3D();
        console.log("Game ready! Create or join a game to start playing!");
    </script>
</body>
</html>
