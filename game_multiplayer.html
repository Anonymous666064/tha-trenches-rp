<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer 3D World - Fixed Version</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            border-left: 3px solid #00ffaa;
            font-weight: bold;
            font-family: monospace;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #ccc;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #player-count {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #00ffaa;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffaa44;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #debug-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            max-width: 350px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #00ff00;
        }
        @media (max-width: 600px) {
            #debug-panel { max-width: 250px; max-height: 150px; font-size: 8px; top: 70px; }
            #info, #controls, #player-count { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 MULTIPLAYER 3D WORLD | <span style="color:#00ffaa;">WASD</span> to Move
    </div>
    <div id="controls">
        🖱️ Mouse drag to look around | WASD to move
    </div>
    <div id="player-count">
        👥 Players: <span id="playerCount">1</span>
    </div>
    <div id="status">
        🔄 Connecting...
    </div>
    <div id="debug-panel">
        📡 Debug Console<br>
        -----------------<br>
        Initializing...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';

        // Debug logging
        const debugMessages = [];
        function addDebug(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] ${message}`;
            debugMessages.unshift(logMsg);
            if (debugMessages.length > 15) debugMessages.pop();
            
            const debugPanel = document.getElementById('debug-panel');
            debugPanel.innerHTML = `📡 Debug Console<br>-----------------<br>${debugMessages.join('<br>')}`;
            console.log(logMsg);
            if (isError) console.error(message);
        }

        addDebug('Starting application...');
        
        // --- Supabase Configuration ---
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        addDebug('Supabase client created');
        
        // --- Generate unique player ID ---
        let playerId = localStorage.getItem('mp_player_id');
        if (!playerId) {
            playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            localStorage.setItem('mp_player_id', playerId);
        }
        addDebug(`Player ID: ${playerId}`);
        
        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 100);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 Renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        scene.add(sunLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // --- Ground ---
        const groundGeometry = new THREE.PlaneGeometry(60, 60);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x6c9e4a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const gridHelper = new THREE.GridHelper(62, 30, 0x88aa66, 0x446633);
        gridHelper.position.y = -0.02;
        scene.add(gridHelper);
        
        // Add some markers to show world bounds
        const markerMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
        for (let i = -25; i <= 25; i += 5) {
            if (Math.abs(i) > 20) {
                const marker = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), markerMat);
                marker.position.set(i, 0, -23);
                marker.castShadow = true;
                scene.add(marker);
                
                const marker2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), markerMat);
                marker2.position.set(i, 0, 23);
                marker2.castShadow = true;
                scene.add(marker2);
            }
        }
        
        // --- Local Player Model (Red/Blue to stand out) ---
        const localPlayerGroup = new THREE.Group();
        
        const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.0, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x004466 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.position.y = 0.5;
        localPlayerGroup.add(body);
        
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), headMat);
        head.castShadow = true;
        head.position.y = 1.15;
        localPlayerGroup.add(head);
        
        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        leftEye.position.set(-0.2, 1.25, 0.52);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        rightEye.position.set(0.2, 1.25, 0.52);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
        leftPupil.position.set(-0.2, 1.23, 0.6);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
        rightPupil.position.set(0.2, 1.23, 0.6);
        localPlayerGroup.add(leftEye, rightEye, leftPupil, rightPupil);
        
        // Hat
        const hatMat = new THREE.MeshStandardMaterial({ color: 0xdd5533 });
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.65, 0.5, 8), hatMat);
        hat.position.y = 1.55;
        hat.castShadow = true;
        localPlayerGroup.add(hat);
        
        localPlayerGroup.position.set(0, 0, 0);
        localPlayerGroup.castShadow = true;
        scene.add(localPlayerGroup);
        
        // Local player label
        const localLabelDiv = document.createElement('div');
        localLabelDiv.textContent = `⭐ YOU (${playerId.slice(-6)})`;
        localLabelDiv.style.cssText = 'color:#ffff00; font-size:14px; font-weight:bold; background:rgba(0,0,0,0.7); padding:3px 10px; border-radius:20px; border:2px solid #ffff00; font-family:monospace; white-space:nowrap;';
        const localLabel = new CSS2DObject(localLabelDiv);
        localLabel.position.set(0, 2.1, 0);
        localPlayerGroup.add(localLabel);
        
        // Add a glowing ring under player
        const ringGeo = new THREE.RingGeometry(0.7, 0.9, 16);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2288ff, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.01;
        localPlayerGroup.add(ring);
        
        // --- Remote Players Storage ---
        const remotePlayers = new Map();
        
        function createRemotePlayerModel(playerIdShort) {
            const group = new THREE.Group();
            // Generate color based on ID
            let hash = 0;
            for (let i = 0; i < playerIdShort.length; i++) hash = ((hash << 5) - hash) + playerIdShort.charCodeAt(i);
            const hue = Math.abs(hash % 360);
            const color = new THREE.Color().setHSL(hue / 360, 0.7, 0.5);
            
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.0, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.position.y = 0.5;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), headMat);
            head.castShadow = true;
            head.position.y = 1.15;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.18, 1.28, 0.53);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.18, 1.28, 0.53);
            group.add(leftEye, rightEye);
            
            const hatMat = new THREE.MeshStandardMaterial({ color: 0x44aa55 });
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.45, 8), hatMat);
            hat.position.y = 1.52;
            hat.castShadow = true;
            group.add(hat);
            
            group.castShadow = true;
            return group;
        }
        
        // --- Movement Logic ---
        const keyState = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 'a') keyState.a = true;
            if (key === 's') keyState.s = true;
            if (key === 'd') keyState.d = true;
            if (['w','a','s','d'].includes(key)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 'a') keyState.a = false;
            if (key === 's') keyState.s = false;
            if (key === 'd') keyState.d = false;
        });
        
        const MOVE_SPEED = 7.0;
        const WORLD_LIMIT = 25;
        
        function updateLocalMovement(deltaTime) {
            let moveX = 0, moveZ = 0;
            if (keyState.w) moveZ -= 1;
            if (keyState.s) moveZ += 1;
            if (keyState.a) moveX -= 1;
            if (keyState.d) moveX += 1;
            if (moveX === 0 && moveZ === 0) return false;
            
            const len = Math.hypot(moveX, moveZ);
            if (len > 0) { moveX /= len; moveZ /= len; }
            
            const cameraDir = camera.getWorldDirection(new THREE.Vector3());
            const forward = new THREE.Vector3(cameraDir.x, 0, cameraDir.z).normalize();
            const right = new THREE.Vector3(-forward.z, 0, forward.x);
            
            let deltaPos = new THREE.Vector3(0, 0, 0);
            deltaPos.addScaledVector(forward, moveZ);
            deltaPos.addScaledVector(right, moveX);
            deltaPos.multiplyScalar(MOVE_SPEED * deltaTime);
            
            let newX = localPlayerGroup.position.x + deltaPos.x;
            let newZ = localPlayerGroup.position.z + deltaPos.z;
            newX = Math.min(WORLD_LIMIT, Math.max(-WORLD_LIMIT, newX));
            newZ = Math.min(WORLD_LIMIT, Math.max(-WORLD_LIMIT, newZ));
            
            localPlayerGroup.position.set(newX, 0, newZ);
            
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(deltaPos.x, deltaPos.z);
                localPlayerGroup.rotation.y = angle;
            }
            return true;
        }
        
        // --- Supabase Functions ---
        const TABLE_NAME = 'player_positions';
        let lastSendTime = 0;
        
        async function sendPosition() {
            const x = localPlayerGroup.position.x;
            const z = localPlayerGroup.position.z;
            try {
                const { error } = await supabase
                    .from(TABLE_NAME)
                    .upsert({ 
                        id: playerId, 
                        x: x, 
                        z: z, 
                        updated_at: new Date().toISOString() 
                    });
                
                if (error) {
                    addDebug(`❌ Send error: ${error.message}`, true);
                } else {
                    // Silent success to avoid spam
                }
            } catch(e) {
                addDebug(`❌ Send exception: ${e.message}`, true);
            }
        }
        
        // Function to update remote player
        function updateRemotePlayer(data) {
            if (!data || data.id === playerId) return;
            
            const remoteId = data.id;
            const x = data.x;
            const z = data.z;
            
            if (remotePlayers.has(remoteId)) {
                const player = remotePlayers.get(remoteId);
                player.targetX = x;
                player.targetZ = z;
                player.lastUpdate = Date.now();
            } else {
                addDebug(`➕ New player joined: ${remoteId.slice(-6)} at (${x.toFixed(1)}, ${z.toFixed(1)})`);
                const remoteGroup = createRemotePlayerModel(remoteId);
                remoteGroup.position.set(x, 0, z);
                scene.add(remoteGroup);
                
                const labelDiv = document.createElement('div');
                labelDiv.textContent = `👤 ${remoteId.slice(-6)}`;
                labelDiv.style.cssText = 'color:#ffdd99; font-size:12px; background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:16px; border:1px solid #ffaa66; font-family:monospace; white-space:nowrap;';
                const label = new CSS2DObject(labelDiv);
                label.position.set(0, 2.0, 0);
                remoteGroup.add(label);
                
                remotePlayers.set(remoteId, {
                    group: remoteGroup,
                    label: label,
                    targetX: x,
                    targetZ: z,
                    lastUpdate: Date.now()
                });
                updatePlayerCount();
            }
        }
        
        function removeRemotePlayer(id) {
            if (remotePlayers.has(id)) {
                addDebug(`➖ Player left: ${id.slice(-6)}`);
                scene.remove(remotePlayers.get(id).group);
                remotePlayers.delete(id);
                updatePlayerCount();
            }
        }
        
        function updatePlayerCount() {
            const count = remotePlayers.size + 1;
            document.getElementById('playerCount').innerText = count;
        }
        
        function cleanupStalePlayers() {
            const now = Date.now();
            for (const [id, player] of remotePlayers.entries()) {
                if (now - player.lastUpdate > 20000) {
                    removeRemotePlayer(id);
                }
            }
        }
        
        // Poll for updates as fallback (in case real-time fails)
        let lastPollTime = 0;
        async function pollForUpdates() {
            try {
                const { data, error } = await supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .neq('id', playerId);
                
                if (error) {
                    addDebug(`❌ Poll error: ${error.message}`, true);
                    return;
                }
                
                if (data) {
                    // Update existing players
                    const currentRemoteIds = new Set(remotePlayers.keys());
                    const receivedIds = new Set();
                    
                    for (const player of data) {
                        receivedIds.add(player.id);
                        updateRemotePlayer(player);
                    }
                    
                    // Remove players that are no longer in the database
                    for (const id of currentRemoteIds) {
                        if (!receivedIds.has(id)) {
                            removeRemotePlayer(id);
                        }
                    }
                }
            } catch(e) {
                addDebug(`❌ Poll exception: ${e.message}`, true);
            }
        }
        
        // --- Setup Real-time Subscription ---
        async function setupRealtime() {
            addDebug('Setting up real-time subscription...');
            
            // First, test connection
            try {
                const { data, error } = await supabase.from(TABLE_NAME).select('count').limit(1);
                if (error) {
                    addDebug(`❌ Table access error: ${error.message}`, true);
                    document.getElementById('status').innerHTML = '⚠️ Table Error';
                    return false;
                }
                addDebug(`✅ Table "${TABLE_NAME}" accessible`);
            } catch(e) {
                addDebug(`❌ Connection test failed: ${e.message}`, true);
                return false;
            }
            
            // Subscribe to real-time changes
            const channel = supabase.channel('public:player_positions');
            
            channel
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: TABLE_NAME },
                    (payload) => {
                        addDebug(`📥 INSERT: ${payload.new.id?.slice(-6)}`);
                        updateRemotePlayer(payload.new);
                    }
                )
                .on('postgres_changes', 
                    { event: 'UPDATE', schema: 'public', table: TABLE_NAME },
                    (payload) => {
                        addDebug(`🔄 UPDATE: ${payload.new.id?.slice(-6)}`);
                        updateRemotePlayer(payload.new);
                    }
                )
                .on('postgres_changes', 
                    { event: 'DELETE', schema: 'public', table: TABLE_NAME },
                    (payload) => {
                        addDebug(`🗑️ DELETE: ${payload.old.id?.slice(-6)}`);
                        removeRemotePlayer(payload.old.id);
                    }
                )
                .subscribe((status) => {
                    addDebug(`📡 Subscription status: ${status}`);
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('status').innerHTML = '🟢 Real-time Connected';
                        document.getElementById('status').style.color = '#00ffaa';
                    } else if (status === 'CHANNEL_ERROR') {
                        document.getElementById('status').innerHTML = '🔴 Error - Using Polling';
                        document.getElementById('status').style.color = '#ff6666';
                    } else {
                        document.getElementById('status').innerHTML = `🟡 ${status}`;
                    }
                });
            
            // Initial load of existing players
            setTimeout(() => {
                addDebug('Loading existing players...');
                pollForUpdates();
            }, 1000);
            
            return true;
        }
        
        // --- Animation Loop ---
        let lastFrameTime = performance.now();
        let lastSendFrame = 0;
        let lastPollFrame = 0;
        
        async function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            // Update local movement
            updateLocalMovement(delta);
            
            // Send position every 100ms
            if (now - lastSendFrame > 100) {
                lastSendFrame = now;
                await sendPosition();
            }
            
            // Poll for updates every 2 seconds as fallback
            if (now - lastPollFrame > 2000) {
                lastPollFrame = now;
                await pollForUpdates();
            }
            
            // Smooth interpolation for remote players
            for (const player of remotePlayers.values()) {
                if (player.targetX !== undefined) {
                    player.group.position.x += (player.targetX - player.group.position.x) * 0.3;
                    player.group.position.z += (player.targetZ - player.group.position.z) * 0.3;
                    
                    const dx = player.targetX - player.group.position.x;
                    const dz = player.targetZ - player.group.position.z;
                    if (Math.abs(dx) > 0.05 || Math.abs(dz) > 0.05) {
                        player.group.rotation.y = Math.atan2(dx, dz);
                    }
                }
            }
            
            cleanupStalePlayers();
            
            // Update camera target
            controls.target.copy(localPlayerGroup.position);
            controls.update();
            
            // Idle animation
            const time = Date.now() * 0.005;
            const bob = Math.sin(time) * 0.008;
            localPlayerGroup.position.y = bob;
            localLabel.position.y = 2.1 + Math.abs(bob) * 0.2;
            
            // Rotate ring
            ring.rotation.z += 0.05;
            
            // Render
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Start the application
        async function start() {
            addDebug(`Starting with ID: ${playerId}`);
            await setupRealtime();
            addDebug('Animation starting...');
            animate();
        }
        
        start();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Cleanup on page close
        window.addEventListener('beforeunload', async () => {
            try {
                await supabase.from(TABLE_NAME).delete().eq('id', playerId);
                addDebug('Cleaned up player on exit');
            } catch(e) {}
        });
    </script>
</body>
</html>
