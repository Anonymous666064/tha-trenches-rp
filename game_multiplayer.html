<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D World - Multiplayer Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            border-left: 4px solid #00ff88;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }

        #ui h2 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #00ff88;
        }

        #ui p {
            font-size: 10px;
            color: #ccc;
        }

        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            text-align: right;
            border-right: 3px solid #00ff88;
        }

        #coordinates {
            font-size: 10px;
            color: #88ff88;
            margin-top: 5px;
        }

        /* Multiplayer Panel */
        #multiplayer-panel {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #4ec9e0;
            min-width: 200px;
            z-index: 200;
            font-size: 11px;
            pointer-events: auto;
        }

        #multiplayer-panel h4 {
            color: #4ec9e0;
            margin-bottom: 8px;
            font-size: 12px;
        }

        #multiplayer-panel button {
            width: 100%;
            margin-bottom: 6px;
            padding: 8px;
            background: #4ec9e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            pointer-events: auto;
            transition: all 0.2s;
            color: #000;
        }

        #multiplayer-panel button:hover {
            background: #6ee0ff;
            transform: scale(1.02);
        }

        #leave-game-btn {
            background: #ff4444 !important;
            color: white !important;
        }

        #leave-game-btn:hover {
            background: #ff6666 !important;
        }

        #session-code-display {
            font-size: 10px;
            color: #ffaa00;
            text-align: center;
            margin-top: 5px;
            word-break: break-all;
        }

        #players-list {
            max-height: 120px;
            overflow-y: auto;
            margin-top: 8px;
            font-size: 10px;
        }

        .player-entry {
            padding: 3px 6px;
            margin: 2px 0;
            border-radius: 4px;
            background: rgba(78, 201, 224, 0.2);
        }

        .player-entry.local {
            background: rgba(78, 201, 224, 0.5);
            color: #ffaa00;
        }

        /* Session Panel - FIXED for keyboard input */
        #session-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #4ec9e0;
            z-index: 10000;
            min-width: 320px;
            text-align: center;
            pointer-events: auto;
            display: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #session-panel h3 {
            color: #4ec9e0;
            margin-bottom: 15px;
            font-size: 18px;
        }

        #session-panel input {
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 2px solid #4ec9e0;
            background: #1a2a3a;
            color: white;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: auto;
            cursor: text;
        }

        #session-panel input:focus {
            outline: none;
            border-color: #ffaa44;
            box-shadow: 0 0 10px rgba(78,201,224,0.5);
        }

        #session-panel button {
            padding: 10px 20px;
            margin: 5px;
            background: #4ec9e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            pointer-events: auto;
            transition: all 0.2s;
        }

        #session-panel button:hover {
            background: #6ee0ff;
            transform: scale(1.02);
        }

        #session-cancel-btn {
            background: #ff4444 !important;
            color: white !important;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 15px;
            z-index: 200;
            pointer-events: none;
        }

        .control-zone {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-area {
            width: 140px;
            height: 140px;
            position: relative;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(30, 30, 40, 0.8);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            left: 10px;
            top: 10px;
        }

        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(78, 201, 224, 0.9);
            border-radius: 25px;
            left: 45px;
            top: 45px;
            transition: transform 0.05s linear;
            box-shadow: 0 0 10px rgba(78, 201, 224, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            touch-action: manipulation;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: rgba(78, 201, 224, 0.8);
        }

        #jump-btn {
            background: rgba(78, 201, 224, 0.6);
            border-color: #4ec9e0;
        }

        #sprint-btn {
            background: rgba(255, 170, 68, 0.6);
            border-color: #ffaa44;
        }

        #look-area {
            position: fixed;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 150;
            display: none;
            background: transparent;
            pointer-events: auto;
            touch-action: none;
        }

        #crosshair {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
        }

        .controls-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 9px;
            color: #aaa;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        #device-mode {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: #4ec9e0;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        #notification {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #4ae04a;
            border-radius: 30px;
            padding: 10px 20px;
            color: #4ae04a;
            font-weight: bold;
            z-index: 2000;
            display: none;
            white-space: nowrap;
            font-size: 14px;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            #ui { font-size: 10px; padding: 8px 12px; }
            #info-panel { font-size: 9px; padding: 8px 12px; }
            .action-btn { width: 55px; height: 55px; font-size: 20px; }
            #joystick-area { width: 120px; height: 120px; }
            #joystick-base { width: 100px; height: 100px; left: 10px; top: 10px; }
            #joystick-thumb { width: 40px; height: 40px; left: 40px; top: 40px; }
            #multiplayer-panel { min-width: 180px; top: 90px; }
            #session-panel { min-width: 280px; padding: 20px; }
            #session-panel input { font-size: 18px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>🎮 3D MULTIPLAYER WORLD</h2>
        <p>Play with friends | Move around | See each other in real-time</p>
    </div>

    <div id="info-panel">
        <div>📍 POSITION</div>
        <div id="coordinates">X: 0.0 | Z: 0.0</div>
        <div style="margin-top: 6px;">🎯 FPS: <span id="fps">--</span></div>
        <div>🏃 Speed: <span id="speed">0</span></div>
        <div style="margin-top: 6px;">👥 Online: <span id="player-count">1</span></div>
    </div>

    <div id="crosshair"></div>

    <!-- Multiplayer Panel -->
    <div id="multiplayer-panel">
        <h4>👥 MULTIPLAYER</h4>
        <button id="host-game-btn">🎮 HOST GAME</button>
        <button id="join-game-btn">🔗 JOIN GAME</button>
        <button id="leave-game-btn">🚪 LEAVE GAME</button>
        <div id="session-code-display"></div>
        <hr style="margin: 6px 0;">
        <div id="players-list">
            <div style="color:#888;">Not in a game</div>
        </div>
    </div>

    <div id="session-panel">
        <h3 id="session-title">Create Game Session</h3>
        <input type="text" id="session-code-input" placeholder="Enter 6-digit code" maxlength="6" autocomplete="off" style="text-transform:uppercase">
        <div>
            <button id="session-create-btn">CREATE</button>
            <button id="session-join-btn">JOIN</button>
            <button id="session-cancel-btn">CANCEL</button>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div class="control-zone" id="joystick-area">
            <div id="joystick-base"></div>
            <div id="joystick-thumb"></div>
        </div>
        <div class="action-buttons">
            <div class="action-btn" id="jump-btn">🦘</div>
            <div class="action-btn" id="sprint-btn">🏃</div>
        </div>
    </div>
    <div id="look-area"></div>

    <div class="controls-indicator" id="controls-hint">
        💻 PC: WASD + Mouse | 📱 Mobile: Touch joystick + Drag to look
    </div>
    <div id="device-mode">💻 PC Mode</div>
    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== SUPABASE CONFIGURATION ====================
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ==================== MULTIPLAYER STATE ====================
        let currentSession = null;
        let myPlayerId = null;
        let isHost = false;
        let multiplayerPlayers = new Map();
        let subscription = null;
        let heartbeatInterval = null;
        let lastPositionUpdate = 0;
        
        // ==================== THREE.JS WORLD ====================
        let scene, camera, renderer;
        let localPlayerMesh = null;
        let playerPosition = new THREE.Vector3(0, 1.6, 0);
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        
        // ==================== PLAYER CONTROLS ====================
        let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
        let isSprinting = false;
        let isJumping = false;
        let cameraAngleY = 0, cameraAngleX = 0;
        let isPointerLockActive = false;
        let ignoreKeyboardForInput = false;
        
        // Movement settings
        const WALK_SPEED = 5;
        const SPRINT_SPEED = 9;
        const JUMP_FORCE = 6;
        const GRAVITY = 15;
        let isOnGround = true;
        
        // UI elements
        const coordsEl = document.getElementById('coordinates');
        const fpsEl = document.getElementById('fps');
        const speedEl = document.getElementById('speed');
        const playerCountEl = document.getElementById('player-count');
        
        // FPS counter
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;
        
        // Device detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Touch controls state
        let touchLook = { active: false, lastX: 0, lastY: 0 };
        
        // ==================== CREATE 3D WORLD ====================
        function init3DWorld() {
            console.log("🎨 Creating 3D World...");
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 300);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(playerPosition);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sunLight.position.set(50, 100, 30);
            sunLight.castShadow = true;
            scene.add(sunLight);
            
            const fillLight = new THREE.PointLight(0x88aaff, 0.4);
            fillLight.position.set(0, 15, 0);
            scene.add(fillLight);
            
            // Ground
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c9e5c, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(200, 40, 0x88aaff, 0x446688);
            gridHelper.position.y = -0.4;
            scene.add(gridHelper);
            
            // Grass patches
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x6cae5a });
            for (let i = 0; i < 500; i++) {
                const x = (Math.random() - 0.5) * 180;
                const z = (Math.random() - 0.5) * 180;
                if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
                const grass = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.2, 3), grassMat);
                grass.position.set(x, -0.4, z);
                grass.castShadow = false;
                scene.add(grass);
            }
            
            // Floating particles
            const particleCount = 800;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 180;
                particlePositions[i*3+1] = Math.random() * 12;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 180;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.06 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            // Center marker
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
            const centerMarker = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), markerMat);
            centerMarker.position.set(0, 0.5, 0);
            scene.add(centerMarker);
            
            console.log("✅ 3D World created!");
        }
        
        // ==================== CREATE PLAYER MODEL ====================
        function createPlayerModel(color, playerId = null, isLocal = false) {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            leftEye.position.set(-0.18, 1.38, 0.48);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            rightEye.position.set(0.18, 1.38, 0.48);
            group.add(rightEye);
            
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            leftPupil.position.set(0, 0, 0.08);
            leftEye.add(leftPupil);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            rightPupil.position.set(0, 0, 0.08);
            rightEye.add(rightPupil);
            
            if (isLocal) {
                const crownMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
                const crownBase = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.2, 8), crownMat);
                crownBase.position.y = 1.55;
                group.add(crownBase);
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), crownMat);
                    const angle = (i / 5) * Math.PI * 2;
                    spike.position.x = Math.cos(angle) * 0.5;
                    spike.position.z = Math.sin(angle) * 0.5;
                    spike.position.y = 1.7;
                    group.add(spike);
                }
            } else if (playerId) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'Bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(playerId.slice(0, 8), canvas.width/2, 20);
                
                const texture = new THREE.CanvasTexture(canvas);
                const nameMaterial = new THREE.SpriteMaterial({ map: texture });
                const nameTag = new THREE.Sprite(nameMaterial);
                nameTag.scale.set(1, 0.25, 1);
                nameTag.position.y = 1.8;
                group.add(nameTag);
            }
            
            group.castShadow = true;
            return group;
        }
        
        // ==================== MULTIPLAYER FUNCTIONS ====================
        async function createGameSession(customCode) {
            let code = customCode?.toUpperCase().trim();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing && existing.length > 0) {
                throw new Error('Code already taken!');
            }
            
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            return code;
        }
        
        async function joinGameSession(code) {
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .maybeSingle();
            
            if (error || !data) throw new Error('Game not found!');
            return code.toUpperCase();
        }
        
        async function addPlayerToSession(sessionCode, isHostPlayer = false) {
            myPlayerId = 'p_' + Math.random().toString(36).substring(2, 12);
            isHost = isHostPlayer;
            
            const startX = (Math.random() - 0.5) * 40;
            const startZ = (Math.random() - 0.5) * 40;
            playerPosition.set(startX, 1.6, startZ);
            
            localPlayerMesh = createPlayerModel(0x66ff88, null, true);
            localPlayerMesh.position.copy(playerPosition);
            scene.add(localPlayerMesh);
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            await loadPlayersInSession(sessionCode);
            subscribeToSession(sessionCode);
            
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => sendHeartbeat(), 2000);
            
            updatePlayersUI();
            showNotification(`✅ Joined game! Code: ${sessionCode}`, '#4ae04a');
            return true;
        }
        
        async function loadPlayersInSession(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) return;
            
            for (let p of data) {
                if (p.player_id !== myPlayerId && !multiplayerPlayers.has(p.player_id)) {
                    const playerModel = createPlayerModel(0xff8844, p.player_id, false);
                    playerModel.position.set(p.pos_x, 0.7, p.pos_z);
                    scene.add(playerModel);
                    multiplayerPlayers.set(p.player_id, playerModel);
                }
            }
            updatePlayersUI();
            updatePlayerCount();
        }
        
        function subscribeToSession(sessionCode) {
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            
            subscription = supabase
                .channel(`game:${sessionCode}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId && scene) {
                        const playerModel = createPlayerModel(0xff8844, payload.new.player_id, false);
                        playerModel.position.set(payload.new.pos_x, 0.7, payload.new.pos_z);
                        scene.add(playerModel);
                        multiplayerPlayers.set(payload.new.player_id, playerModel);
                        updatePlayersUI();
                        updatePlayerCount();
                        showNotification(`👤 Player joined!`, '#4ec9e0');
                    }
                    else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        const playerModel = multiplayerPlayers.get(payload.new.player_id);
                        if (playerModel) {
                            playerModel.position.x += (payload.new.pos_x - playerModel.position.x) * 0.3;
                            playerModel.position.z += (payload.new.pos_z - playerModel.position.z) * 0.3;
                        }
                    }
                    else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        const playerModel = multiplayerPlayers.get(payload.old.player_id);
                        if (playerModel && scene) {
                            scene.remove(playerModel);
                            multiplayerPlayers.delete(payload.old.player_id);
                            updatePlayersUI();
                            updatePlayerCount();
                            showNotification(`👋 Player left`, '#ffaa00');
                        }
                    }
                })
                .subscribe();
        }
        
        async function sendHeartbeat() {
            if (!currentSession || !myPlayerId || !localPlayerMesh) return;
            
            try {
                await supabase
                    .from('players')
                    .update({
                        pos_x: localPlayerMesh.position.x,
                        pos_z: localPlayerMesh.position.z,
                        last_seen: new Date()
                    })
                    .eq('player_id', myPlayerId);
            } catch (e) {
                console.warn('Heartbeat failed:', e);
            }
        }
        
        async function leaveGameSession() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
            
            if (isHost && currentSession) {
                await supabase.from('game_sessions').delete().eq('session_code', currentSession);
            }
            
            if (subscription) {
                supabase.removeChannel(subscription);
                subscription = null;
            }
            
            for (let [id, model] of multiplayerPlayers) {
                if (scene) scene.remove(model);
            }
            multiplayerPlayers.clear();
            
            if (localPlayerMesh && scene) {
                scene.remove(localPlayerMesh);
                localPlayerMesh = null;
            }
            
            currentSession = null;
            myPlayerId = null;
            isHost = false;
            
            updatePlayersUI();
            updatePlayerCount();
            document.getElementById('session-code-display').innerHTML = '';
            showNotification('Left game session', '#ffaa00');
        }
        
        function updatePlayersUI() {
            const container = document.getElementById('players-list');
            if (!container) return;
            
            if (!myPlayerId) {
                container.innerHTML = '<div style="color:#888;">Not in a game</div>';
                return;
            }
            
            let html = `<div class="player-entry local">👑 YOU (${isHost ? 'Host' : 'Player'})</div>`;
            for (let [id] of multiplayerPlayers) {
                html += `<div class="player-entry">🎮 ${id.slice(0, 8)}</div>`;
            }
            if (multiplayerPlayers.size === 0) {
                html += '<div style="color:#888;">Waiting for players...</div>';
            }
            container.innerHTML = html;
        }
        
        function updatePlayerCount() {
            if (playerCountEl) {
                playerCountEl.textContent = 1 + multiplayerPlayers.size;
            }
        }
        
        function showNotification(msg, color) {
            const n = document.getElementById('notification');
            n.style.borderColor = color;
            n.style.color = color;
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }
        
        // ==================== MOVEMENT SYSTEM ====================
        function updateMovement(deltaTime) {
            if (!localPlayerMesh) return;
            
            const speed = isSprinting ? SPRINT_SPEED : WALK_SPEED;
            let moveX = 0, moveZ = 0;
            
            if (moveForward) moveZ -= 1;
            if (moveBack) moveZ += 1;
            if (moveLeft) moveX -= 1;
            if (moveRight) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            const forward = new THREE.Vector3(Math.sin(cameraAngleY), 0, Math.cos(cameraAngleY));
            const right = new THREE.Vector3(Math.cos(cameraAngleY), 0, -Math.sin(cameraAngleY));
            
            playerVelocity.x = (moveX * right.x + moveZ * forward.x) * speed;
            playerVelocity.z = (moveX * right.z + moveZ * forward.z) * speed;
            
            playerPosition.x += playerVelocity.x * deltaTime;
            playerPosition.z += playerVelocity.z * deltaTime;
            
            playerVelocity.y -= GRAVITY * deltaTime;
            playerPosition.y += playerVelocity.y * deltaTime;
            
            const groundY = -0.2;
            if (playerPosition.y <= groundY + 1.6) {
                playerPosition.y = groundY + 1.6;
                playerVelocity.y = 0;
                isOnGround = true;
                if (isJumping) isJumping = false;
            } else {
                isOnGround = false;
            }
            
            if (isJumping && isOnGround) {
                playerVelocity.y = JUMP_FORCE;
                isOnGround = false;
                isJumping = false;
            }
            
            const bound = 95;
            playerPosition.x = Math.max(-bound, Math.min(bound, playerPosition.x));
            playerPosition.z = Math.max(-bound, Math.min(bound, playerPosition.z));
            
            localPlayerMesh.position.copy(playerPosition);
            
            camera.position.copy(playerPosition);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraAngleY;
            camera.rotation.x = cameraAngleX;
            
            if (currentSession && myPlayerId) {
                const now = Date.now();
                if (now - lastPositionUpdate > 66) {
                    sendHeartbeat();
                    lastPositionUpdate = now;
                }
            }
            
            const currentSpeed = Math.hypot(playerVelocity.x, playerVelocity.z);
            speedEl.textContent = Math.floor(currentSpeed * 3.6);
            coordsEl.innerHTML = `X: ${playerPosition.x.toFixed(1)} | Z: ${playerPosition.z.toFixed(1)}`;
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            frameCount++;
            
            if (delta >= 1000) {
                fps = frameCount;
                fpsEl.textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
        }
        
        // ==================== PC CONTROLS ====================
        function initPCControls() {
            window.addEventListener('keydown', (e) => {
                // Don't capture keyboard input if an input field is focused
                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    return;
                }
                
                const key = e.code;
                switch(key) {
                    case 'KeyW': moveForward = true; e.preventDefault(); break;
                    case 'KeyS': moveBack = true; e.preventDefault(); break;
                    case 'KeyA': moveLeft = true; e.preventDefault(); break;
                    case 'KeyD': moveRight = true; e.preventDefault(); break;
                    case 'ShiftLeft': case 'ShiftRight': isSprinting = true; e.preventDefault(); break;
                    case 'Space': 
                        if (isOnGround && !isJumping) {
                            isJumping = true;
                        }
                        e.preventDefault();
                        break;
                }
            });
            
            window.addEventListener('keyup', (e) => {
                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    return;
                }
                
                const key = e.code;
                switch(key) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBack = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': case 'ShiftRight': isSprinting = false; break;
                }
            });
            
            renderer.domElement.addEventListener('click', () => {
                // Don't lock pointer if an input is focused
                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    return;
                }
                if (!isMobile) {
                    renderer.domElement.requestPointerLock();
                }
            });
            
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === renderer.domElement) {
                    isPointerLockActive = true;
                    document.addEventListener('mousemove', onMouseMove);
                } else {
                    isPointerLockActive = false;
                    document.removeEventListener('mousemove', onMouseMove);
                }
            });
            
            function onMouseMove(e) {
                if (!isPointerLockActive) return;
                cameraAngleY -= e.movementX * 0.002;
                cameraAngleX -= e.movementY * 0.002;
                cameraAngleX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleX));
            }
        }
        
        // ==================== MOBILE CONTROLS ====================
        function initMobileControls() {
            const mobileControls = document.getElementById('mobile-controls');
            const lookArea = document.getElementById('look-area');
            const joystickArea = document.getElementById('joystick-area');
            const joystickThumb = document.getElementById('joystick-thumb');
            const jumpBtn = document.getElementById('jump-btn');
            const sprintBtn = document.getElementById('sprint-btn');
            
            mobileControls.style.display = 'flex';
            lookArea.style.display = 'block';
            
            let joystickActive = false;
            const maxDist = 40;
            
            function getJoystickPosition(touchX, touchY) {
                const rect = joystickArea.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let dx = touchX - centerX;
                let dy = touchY - centerY;
                const distance = Math.hypot(dx, dy);
                
                if (distance > maxDist) {
                    dx = dx * maxDist / distance;
                    dy = dy * maxDist / distance;
                }
                
                return { x: dx, y: dy, distance: Math.min(distance, maxDist) };
            }
            
            function updateJoystickVisual(x, y) {
                joystickThumb.style.transform = `translate(${x}px, ${y}px)`;
            }
            
            function updateMovementFromJoystick(dx, dy, distance) {
                const angle = Math.atan2(dy, dx);
                const strength = distance / maxDist;
                
                moveForward = false;
                moveBack = false;
                moveLeft = false;
                moveRight = false;
                
                if (strength > 0.1) {
                    const forwardInput = Math.cos(angle);
                    const rightInput = Math.sin(angle);
                    
                    if (forwardInput < -0.3) moveForward = true;
                    if (forwardInput > 0.3) moveBack = true;
                    if (rightInput > 0.3) moveRight = true;
                    if (rightInput < -0.3) moveLeft = true;
                }
            }
            
            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystickActive = true;
                const touch = e.touches[0];
                const pos = getJoystickPosition(touch.clientX, touch.clientY);
                updateJoystickVisual(pos.x, pos.y);
                updateMovementFromJoystick(pos.x, pos.y, pos.distance);
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!joystickActive) return;
                const touch = e.touches[0];
                const pos = getJoystickPosition(touch.clientX, touch.clientY);
                updateJoystickVisual(pos.x, pos.y);
                updateMovementFromJoystick(pos.x, pos.y, pos.distance);
            });
            
            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                updateJoystickVisual(0, 0);
                moveForward = false;
                moveBack = false;
                moveLeft = false;
                moveRight = false;
            });
            
            lookArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchLook.active = true;
                const touch = e.touches[0];
                touchLook.lastX = touch.clientX;
                touchLook.lastY = touch.clientY;
            });
            
            lookArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!touchLook.active) return;
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchLook.lastX;
                const deltaY = touch.clientY - touchLook.lastY;
                
                cameraAngleY -= deltaX * 0.008;
                cameraAngleX -= deltaY * 0.008;
                cameraAngleX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleX));
                
                touchLook.lastX = touch.clientX;
                touchLook.lastY = touch.clientY;
            });
            
            lookArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchLook.active = false;
            });
            
            jumpBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isOnGround && !isJumping) {
                    isJumping = true;
                }
            });
            
            let sprintActive = false;
            sprintBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                sprintActive = !sprintActive;
                isSprinting = sprintActive;
                sprintBtn.style.background = sprintActive ? 'rgba(255, 170, 68, 0.9)' : 'rgba(255, 170, 68, 0.6)';
            });
        }
        
        // ==================== MULTIPLAYER UI ====================
        function addMultiplayerEventListeners() {
            const sessionPanel = document.getElementById('session-panel');
            const codeInput = document.getElementById('session-code-input');
            
            document.getElementById('host-game-btn')?.addEventListener('click', () => {
                if (currentSession) {
                    showNotification('Already in a session! Leave first.', '#ff5555');
                    return;
                }
                sessionPanel.style.display = 'block';
                document.getElementById('session-title').textContent = '🎮 Create Game Session';
                codeInput.focus();
            });
            
            document.getElementById('join-game-btn')?.addEventListener('click', () => {
                if (currentSession) {
                    showNotification('Already in a session! Leave first.', '#ff5555');
                    return;
                }
                sessionPanel.style.display = 'block';
                document.getElementById('session-title').textContent = '🔗 Join Game Session';
                codeInput.focus();
            });
            
            document.getElementById('leave-game-btn')?.addEventListener('click', async () => {
                if (currentSession) {
                    await leaveGameSession();
                } else {
                    showNotification('Not in a game session', '#ffaa00');
                }
            });
            
            document.getElementById('session-create-btn')?.addEventListener('click', async () => {
                const code = codeInput.value;
                
                try {
                    const sessionCode = await createGameSession(code);
                    currentSession = sessionCode;
                    await addPlayerToSession(sessionCode, true);
                    sessionPanel.style.display = 'none';
                    document.getElementById('session-code-display').innerHTML = `<strong>🔑 ${sessionCode}</strong><br>Share this code!`;
                    codeInput.value = '';
                } catch (err) {
                    showNotification(`Error: ${err.message}`, '#ff5555');
                }
            });
            
            document.getElementById('session-join-btn')?.addEventListener('click', async () => {
                const code = codeInput.value;
                
                if (!code || code.length !== 6) {
                    showNotification('Please enter a 6-digit code', '#ff5555');
                    return;
                }
                
                try {
                    const sessionCode = await joinGameSession(code);
                    currentSession = sessionCode;
                    await addPlayerToSession(sessionCode, false);
                    sessionPanel.style.display = 'none';
                    document.getElementById('session-code-display').innerHTML = `<strong>🎮 ${sessionCode}</strong>`;
                    codeInput.value = '';
                } catch (err) {
                    showNotification(`Error: ${err.message}`, '#ff5555');
                }
            });
            
            document.getElementById('session-cancel-btn')?.addEventListener('click', () => {
                sessionPanel.style.display = 'none';
                codeInput.value = '';
            });
            
            // Close panel when clicking outside (optional)
            sessionPanel.addEventListener('click', (e) => {
                if (e.target === sessionPanel) {
                    sessionPanel.style.display = 'none';
                    codeInput.value = '';
                }
            });
        }
        
        // ==================== DEVICE DETECTION ====================
        function detectDevice() {
            const deviceMode = document.getElementById('device-mode');
            
            if (isMobile) {
                deviceMode.innerHTML = `📱 Mobile Mode - Touch controls active`;
                initMobileControls();
                document.getElementById('controls-hint').innerHTML = `📱 Touch left side to move | Right side to look | Jump & Sprint buttons`;
            } else {
                deviceMode.innerHTML = `💻 PC Mode - WASD + Mouse`;
                initPCControls();
                document.getElementById('controls-hint').innerHTML = `💻 WASD to move | Mouse to look | Shift to sprint | Space to jump`;
            }
        }
        
        // ==================== ANIMATION LOOP ====================
        let lastFrameTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let deltaTime = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            updateMovement(deltaTime);
            updateFPS();
            
            const particles = scene.children.find(c => c.isPoints);
            if (particles) {
                particles.rotation.y += 0.002;
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // ==================== RESIZE HANDLER ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ==================== INITIALIZATION ====================
        function init() {
            init3DWorld();
            detectDevice();
            addMultiplayerEventListeners();
            animate();
            
            console.log("✅ Game ready! Create or join a game to play with friends!");
            console.log("📍 Use WASD (PC) or touch joystick (mobile) to move around!");
        }
        
        init();
    </script>
</body>
</html>
