<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Multiplayer Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            border: 1px solid #00ff00;
        }
        button {
            background: #00ff00;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #00cc00; }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #00ff00;
            background: #333;
            color: white;
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #00ff00;
        }
        .error { color: #ff4444; }
        #playersList {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            border: 1px solid #00ff00;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 Multiplayer Game</h3>
        <div id="hostSection">
            <button id="hostBtn">🌟 Create Game</button>
            <input type="text" id="customCode" placeholder="Custom code (optional)" maxlength="6">
        </div>
        <div id="joinSection" style="margin-top: 10px;">
            <input type="text" id="joinCode" placeholder="Enter 6-digit code">
            <button id="joinBtn">🔗 Join Game</button>
        </div>
        <div id="gameInfo" class="status"></div>
    </div>
    <div id="playersList">
        <strong>👥 Players Online</strong><br>
        <div id="players"></div>
    </div>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== SUPABASE SETUP ====================
        // REPLACE WITH YOUR SUPABASE CREDENTIALS:
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ==================== GAME STATE ====================
        let currentSession = null;
        let myPlayerId = null;
        let isHost = false;
        let players = new Map(); // playerId -> { mesh, position, name }
        let localPlayer = null;
        let scene, camera, renderer;
        let keys = { w: false, s: false, a: false, d: false };
        
        // ==================== 3D SETUP ====================
        function setup3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 30),
                new THREE.MeshStandardMaterial({ color: 0x3a9e3a })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const grid = new THREE.GridHelper(30, 20, 0xffffff, 0xcccccc);
            grid.position.y = 0.01;
            scene.add(grid);
            
            // Simple obstacles
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            for (let i = -12; i <= 12; i += 8) {
                const tree = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 2, 6), wallMat);
                tree.position.set(i, 1, -10);
                tree.castShadow = true;
                scene.add(tree);
                
                const tree2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 2, 6), wallMat);
                tree2.position.set(i, 1, 10);
                tree2.castShadow = true;
                scene.add(tree2);
            }
            
            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 5);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
            
            animate();
        }
        
        // Create player character
        function createPlayer(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1, 0.8),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.1;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.25, 0.45);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.25, 0.45);
            group.add(rightEye);
            
            // Pupils
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            leftPupil.position.set(0, 0, 0.05);
            leftEye.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            rightPupil.position.set(0, 0, 0.05);
            rightEye.add(rightPupil);
            
            if (isLocal) {
                // Add a little crown for local player
                const crown = new THREE.Mesh(
                    new THREE.ConeGeometry(0.3, 0.4, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa00 })
                );
                crown.position.y = 1.45;
                group.add(crown);
            }
            
            return group;
        }
        
        // Update player positions
        function updatePlayerPosition(playerId, x, z) {
            if (players.has(playerId)) {
                players.get(playerId).mesh.position.set(x, 0, z);
            }
        }
        
        // Add a player
        function addPlayer(playerId, x, z, isLocal = false) {
            const color = isLocal ? 0x44ff44 : 0xff4444;
            const playerMesh = createPlayer(color, isLocal);
            playerMesh.position.set(x, 0, z);
            scene.add(playerMesh);
            
            players.set(playerId, {
                mesh: playerMesh,
                position: { x, z },
                name: playerId.slice(0, 6)
            });
            
            if (isLocal) {
                localPlayer = playerMesh;
                camera.lookAt(x, 2, z);
            }
            
            updatePlayersList();
            return playerMesh;
        }
        
        // Remove player
        function removePlayer(playerId) {
            if (players.has(playerId)) {
                scene.remove(players.get(playerId).mesh);
                players.delete(playerId);
                updatePlayersList();
            }
        }
        
        // Update UI list
        function updatePlayersList() {
            const listDiv = document.getElementById('players');
            const playerCount = players.size;
            let html = `${playerCount} player${playerCount !== 1 ? 's' : ''}<br>`;
            for (let [id, player] of players) {
                html += `🎮 ${player.name}<br>`;
            }
            listDiv.innerHTML = html;
        }
        
        // ==================== MOVEMENT ====================
        function handleMovement() {
            if (!localPlayer || !currentSession) return;
            
            let moved = false;
            let newX = localPlayer.position.x;
            let newZ = localPlayer.position.z;
            const speed = 0.15;
            
            if (keys.w) { newZ -= speed; moved = true; }
            if (keys.s) { newZ += speed; moved = true; }
            if (keys.a) { newX -= speed; moved = true; }
            if (keys.d) { newX += speed; moved = true; }
            
            // Boundaries
            newX = Math.max(-13, Math.min(13, newX));
            newZ = Math.max(-13, Math.min(13, newZ));
            
            if (moved) {
                localPlayer.position.set(newX, 0, newZ);
                camera.position.x = newX;
                camera.position.z = newZ + 8;
                camera.lookAt(newX, 2, newZ);
                
                // Send position update
                updatePositionInDB(newX, newZ);
            }
        }
        
        async function updatePositionInDB(x, z) {
            if (!currentSession || !myPlayerId) return;
            
            await supabase
                .from('players')
                .update({ pos_x: x, pos_z: z, last_seen: new Date() })
                .eq('player_id', myPlayerId);
        }
        
        // ==================== DATABASE FUNCTIONS ====================
        async function createSession(customCode = null) {
            let code = customCode;
            if (!code || code.length !== 6) {
                // Generate random 6-digit code
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            // Check if code exists
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing && existing.length > 0) {
                throw new Error('Code already taken, try another');
            }
            
            // Create session
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            
            return code;
        }
        
        async function joinSession(code) {
            // Check if session exists
            const { data: session, error } = await supabase
                .from('game_sessions')
                .select('*')
                .eq('session_code', code.toUpperCase())
                .single();
            
            if (error || !session) {
                throw new Error('Game not found');
            }
            
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode, isHostPlayer = false) {
            myPlayerId = Math.random().toString(36).substring(2, 15);
            const startX = (Math.random() - 0.5) * 10;
            const startZ = (Math.random() - 0.5) * 10;
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    is_host: isHostPlayer,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            // Add local player to scene
            addPlayer(myPlayerId, startX, startZ, true);
            
            // Load existing players
            await loadPlayers(sessionCode);
            
            // Subscribe to changes
            subscribeToPlayers(sessionCode);
            
            return startX;
        }
        
        async function loadPlayers(sessionCode) {
            const { data: playersList, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) return;
            
            for (let player of playersList) {
                if (player.player_id !== myPlayerId && !players.has(player.player_id)) {
                    addPlayer(player.player_id, player.pos_x, player.pos_z, false);
                } else if (player.player_id !== myPlayerId && players.has(player.player_id)) {
                    updatePlayerPosition(player.player_id, player.pos_x, player.pos_z);
                }
            }
        }
        
        function subscribeToPlayers(sessionCode) {
            const subscription = supabase
                .channel('players_channel')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                        addPlayer(payload.new.player_id, payload.new.pos_x, payload.new.pos_z, false);
                    } else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        updatePlayerPosition(payload.new.player_id, payload.new.pos_x, payload.new.pos_z);
                    } else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        removePlayer(payload.old.player_id);
                    }
                })
                .subscribe();
            
            return subscription;
        }
        
        // ==================== UI HANDLERS ====================
        document.getElementById('hostBtn').onclick = async () => {
            const customCode = document.getElementById('customCode').value;
            try {
                const code = await createSession(customCode);
                currentSession = code;
                isHost = true;
                await addPlayerToGame(code, true);
                document.getElementById('gameInfo').innerHTML = `✅ Game created! Code: ${code}<br>Share this code with friends`;
                document.getElementById('gameInfo').style.color = '#00ff00';
                document.getElementById('hostSection').style.opacity = '0.5';
                document.getElementById('joinSection').style.opacity = '0.5';
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ Error: ${err.message}`;
                document.getElementById('gameInfo').style.color = '#ff4444';
            }
        };
        
        document.getElementById('joinBtn').onclick = async () => {
            const code = document.getElementById('joinCode').value;
            if (!code) {
                alert('Enter a game code');
                return;
            }
            try {
                currentSession = await joinSession(code);
                isHost = false;
                await addPlayerToGame(currentSession, false);
                document.getElementById('gameInfo').innerHTML = `✅ Joined game: ${currentSession}`;
                document.getElementById('gameInfo').style.color = '#00ff00';
                document.getElementById('hostSection').style.opacity = '0.5';
                document.getElementById('joinSection').style.opacity = '0.5';
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').style.color = '#ff4444';
            }
        };
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            handleMovement();
            renderer.render(scene, camera);
        }
        
        // Clean up on page close
        window.addEventListener('beforeunload', async () => {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
        });
        
        // Start game
        setup3D();
        
        // Show warning if Supabase not configured
        if (SUPABASE_URL.includes('YOUR_PROJECT')) {
            document.getElementById('gameInfo').innerHTML = '⚠️ Configure Supabase first! See instructions below.';
            document.getElementById('gameInfo').style.color = '#ffaa00';
        }
    </script>
</body>
</html>
