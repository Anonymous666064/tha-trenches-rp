<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Metropolis - Multiplayer 3D Open World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }
        /* UI Overlay */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-left: 4px solid #00ffcc;
            pointer-events: none;
            font-family: monospace;
        }
        .hud span {
            color: #00ffcc;
        }
        .stats {
            display: flex;
            gap: 24px;
        }
        .phone-icon {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #1e1e2f;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,255,200,0.3);
            border: 1px solid #00ffcc;
            transition: 0.2s;
            font-size: 28px;
        }
        .phone-icon:hover {
            transform: scale(1.05);
            background: #2a2a3a;
        }
        /* Modal Screens */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15,15,25,0.95);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px;
            width: 350px;
            color: white;
            border: 1px solid #00ffcc88;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 100;
            font-family: monospace;
        }
        .modal input, .modal select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #00ffcc;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }
        .modal button {
            background: #00ccaa;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .modal button:hover {
            background: #00ffcc;
            transform: scale(1.02);
        }
        .close-btn {
            background: #aa3355;
        }
        .close-btn:hover {
            background: #cc4466;
        }
        .hidden {
            display: none;
        }
        .error-message {
            color: #ff6666;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
        .success-message {
            color: #66ff66;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .button-group button {
            flex: 1;
        }
        .login-btn {
            background: #3388ff;
        }
        .register-btn {
            background: #ff8833;
        }
        .phone-app {
            width: 280px;
            background: #0a0a1ad9;
            border-radius: 32px;
            padding: 12px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .app-btn {
            background: #1f1f2f;
            padding: 10px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .app-btn:hover {
            background: #2f2f4f;
            transform: scale(1.05);
        }
        .chat-box {
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            background: #000000aa;
            border-radius: 12px;
            padding: 8px;
        }
        .blackmarket-item {
            background: #2a2a2a;
            margin: 5px 0;
            padding: 5px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        #respawn-screen {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            z-index: 200;
        }
        .username-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="hud">
            <div class="stats">
                <div>❤️ <span id="health-val">100</span></div>
                <div>🍔 <span id="hunger-val">100</span></div>
                <div>💧 <span id="thirst-val">100</span></div>
                <div>💰 $<span id="money-val">0</span></div>
            </div>
        </div>
        <div class="username-display" id="username-display"></div>
        <div class="phone-icon" id="phoneBtn">📱</div>

        <!-- Login/Register Modal -->
        <div id="authModal" class="modal">
            <h3>🎮 NEON METROPOLIS</h3>
            <p style="font-size: 12px; text-align: center;">Enter your credentials</p>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <div class="button-group">
                <button id="loginBtn" class="login-btn">🔐 Login</button>
                <button id="registerBtn" class="register-btn">✨ Register</button>
            </div>
            <div id="authMessage" class="error-message"></div>
        </div>

        <!-- Server Modal -->
        <div id="serverModal" class="modal hidden">
            <h3>🌐 MULTIPLAYER</h3>
            <p>Welcome, <span id="welcomeUsername"></span>!</p>
            <button id="createServerBtn">✨ Create New Server</button>
            <input type="text" id="joinCode" placeholder="Enter Server Code">
            <button id="joinServerBtn">🔗 Join Server</button>
            <button id="closeServerBtn" class="close-btn">Close</button>
        </div>

        <!-- Phone Interface -->
        <div id="phoneModal" class="modal hidden" style="width: 320px;">
            <div class="phone-app">
                <h3>📱 PHONE</h3>
                <div class="app-grid">
                    <div class="app-btn" data-app="jobs">💼 Jobs</div>
                    <div class="app-btn" data-app="vehicles">🚗 Vehicles</div>
                    <div class="app-btn" data-app="chat">💬 Chat</div>
                    <div class="app-btn" data-app="blackmarket">🖤 Black Market</div>
                </div>
                <div id="appContent" style="margin-top:12px; max-height:300px; overflow-y:auto;">
                    <p>Select an app</p>
                </div>
                <button id="closePhoneBtn" class="close-btn">Close</button>
            </div>
        </div>

        <!-- Respawn Screen -->
        <div id="respawn-screen" class="hidden">
            <h2>💀 YOU DIED</h2>
            <button id="respawnBtn">🏥 Respawn at Hospital</button>
        </div>
        
        <!-- Chat Input (floating) -->
        <div id="chatInputArea" style="position: absolute; bottom: 100px; left: 20px; pointer-events: auto; background: #000000aa; border-radius: 20px; padding: 5px; display: none;">
            <input type="text" id="chatMsgInput" placeholder="Chat..." style="width: 200px; background: black; color:white; border:1px solid cyan;">
            <button id="sendChatBtn">Send</button>
        </div>
    </div>

    <!-- Import Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { createClient } from '@supabase/supabase-js';

        // ---------- SUPABASE CONFIG ----------
        const SUPABASE_URL = "https://hcvewiwhtxqpbogcrukk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global state
        let currentUser = null;
        let currentServerId = null;
        let playersMap = new Map();
        let localPlayerMesh = null;
        let localPlayerData = { id: null, username: "", money: 1000, health: 100, hunger: 100, thirst: 100, position: { x: 0, y: 2, z: 0 } };
        let keys = { w: false, s: false, a: false, d: false, shift: false };
        let camera, scene, renderer;
        let moveSpeed = 5;
        let worldGroup;
        let isDead = false;
        let playersChannel = null;
        let chatMessages = [];
        
        // ---------- THREE.JS Setup ----------
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.3);
        backLight.position.set(0, 5, -5);
        scene.add(backLight);
        
        // Ground & City
        const gridHelper = new THREE.GridHelper(200, 40, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // Simple buildings
        worldGroup = new THREE.Group();
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x4a6c8f });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466 });
        for (let i = -6; i <= 6; i++) {
            for (let j = -6; j <= 6; j++) {
                if (Math.random() > 0.7 && (i !== 0 || j !== 0)) {
                    const height = 1 + Math.random() * 3;
                    const box = new THREE.Mesh(new THREE.BoxGeometry(1.5, height, 1.5), buildingMat);
                    box.position.set(i * 4, height/2 - 0.5, j * 4);
                    box.castShadow = true;
                    box.receiveShadow = true;
                    worldGroup.add(box);
                    
                    const roof = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.3, 4), glassMat);
                    roof.position.set(i * 4, height - 0.2, j * 4);
                    worldGroup.add(roof);
                }
            }
        }
        // Hospital & Park marker
        const hospitalSign = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 0.5), new THREE.MeshStandardMaterial({ color: 0xff6666 }));
        hospitalSign.position.set(15, 1, 15);
        worldGroup.add(hospitalSign);
        const parkTree = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 6), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
        parkTree.position.set(-12, 0, -12);
        worldGroup.add(parkTree);
        scene.add(worldGroup);
        
        // Local player representation
        const geometry = new THREE.BoxGeometry(0.8, 1.6, 0.8);
        const material = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266aa });
        localPlayerMesh = new THREE.Mesh(geometry, material);
        localPlayerMesh.castShadow = true;
        scene.add(localPlayerMesh);
        
        function createRemotePlayer(color = 0xffaa44) {
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.8), new THREE.MeshStandardMaterial({ color }));
            box.castShadow = true;
            return box;
        }
        
        // ---------- Authentication Functions ----------
        async function registerUser(username, password) {
            if (!username || !password) {
                showAuthMessage("Please enter username and password", "error");
                return null;
            }
            
            try {
                // Check if user exists
                const { data: existing, error: checkError } = await supabase
                    .from('players')
                    .select('username')
                    .eq('username', username);
                
                if (checkError) {
                    console.error("Check error:", checkError);
                    showAuthMessage("Database error: " + checkError.message, "error");
                    return null;
                }
                
                if (existing && existing.length > 0) {
                    showAuthMessage("Username already exists! Please login.", "error");
                    return null;
                }
                
                // Create new user
                const newPlayer = {
                    username: username,
                    password: password,
                    money: 1000,
                    health: 100,
                    hunger: 100,
                    thirst: 100,
                    position_x: 0,
                    position_y: 2,
                    position_z: 0
                };
                
                const { data: inserted, error: insertError } = await supabase
                    .from('players')
                    .insert([newPlayer])
                    .select();
                
                if (insertError) {
                    console.error("Insert error:", insertError);
                    showAuthMessage("Registration failed: " + insertError.message, "error");
                    return null;
                }
                
                if (inserted && inserted.length > 0) {
                    showAuthMessage("Registration successful! Welcome!", "success");
                    return inserted[0];
                }
                
                return null;
            } catch (error) {
                console.error("Register error:", error);
                showAuthMessage("Connection error. Please try again.", "error");
                return null;
            }
        }
        
        async function loginUser(username, password) {
            if (!username || !password) {
                showAuthMessage("Please enter username and password", "error");
                return null;
            }
            
            try {
                const { data, error } = await supabase
                    .from('players')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password);
                
                if (error) {
                    console.error("Login error:", error);
                    showAuthMessage("Database error: " + error.message, "error");
                    return null;
                }
                
                if (data && data.length > 0) {
                    showAuthMessage("Login successful! Welcome back!", "success");
                    return data[0];
                } else {
                    showAuthMessage("Invalid username or password!", "error");
                    return null;
                }
            } catch (error) {
                console.error("Login error:", error);
                showAuthMessage("Connection error. Please try again.", "error");
                return null;
            }
        }
        
        function showAuthMessage(message, type) {
            const msgDiv = document.getElementById('authMessage');
            msgDiv.textContent = message;
            msgDiv.className = type === 'error' ? 'error-message' : 'success-message';
            setTimeout(() => {
                msgDiv.textContent = '';
            }, 3000);
        }
        
        async function updateLocalPlayerDB() {
            if (!currentUser) return;
            await supabase.from('players').update({
                money: localPlayerData.money,
                health: localPlayerData.health,
                hunger: localPlayerData.hunger,
                thirst: localPlayerData.thirst,
                position_x: localPlayerMesh.position.x,
                position_y: localPlayerMesh.position.y,
                position_z: localPlayerMesh.position.z
            }).eq('id', currentUser.id);
        }
        
        function respawnPlayer() {
            isDead = false;
            localPlayerData.health = 100;
            localPlayerData.hunger = 80;
            localPlayerData.thirst = 80;
            localPlayerMesh.position.set(15, 2, 15);
            localPlayerMesh.visible = true;
            updateLocalPlayerDB();
            document.getElementById('respawn-screen').classList.add('hidden');
        }
        
        function applyDamage(amount) {
            if (isDead) return;
            localPlayerData.health = Math.max(0, localPlayerData.health - amount);
            updateHUD();
            if (localPlayerData.health <= 0) {
                isDead = true;
                localPlayerData.health = 0;
                document.getElementById('respawn-screen').classList.remove('hidden');
                localPlayerMesh.visible = false;
            }
            updateLocalPlayerDB();
        }
        
        // ----- Real-time Multiplayer Sync -----
        async function joinServer(serverCode) {
            if (playersChannel) await supabase.removeChannel(playersChannel);
            currentServerId = serverCode;
            
            playersChannel = supabase.channel(`server:${serverCode}`, {
                config: { broadcast: { ack: true }, presence: { key: currentUser.id } }
            });
            
            playersChannel.on('broadcast', { event: 'player-move' }, (payload) => {
                const { userId, x, y, z } = payload;
                if (userId === currentUser.id) return;
                const remote = playersMap.get(userId);
                if (remote) {
                    remote.data.position = { x, y, z };
                    remote.mesh.position.set(x, y, z);
                }
            });
            
            playersChannel.on('broadcast', { event: 'player-damage' }, (payload) => {
                if (payload.targetId === currentUser.id) {
                    applyDamage(payload.damage);
                }
            });
            
            playersChannel.on('broadcast', { event: 'chat' }, (payload) => {
                chatMessages.unshift(payload);
                updateChatUI();
            });
            
            await playersChannel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await playersChannel.track({
                        user_id: currentUser.id,
                        username: currentUser.username,
                        x: localPlayerMesh.position.x,
                        y: localPlayerMesh.position.y,
                        z: localPlayerMesh.position.z
                    });
                    
                    playersChannel.on('presence', { event: 'sync' }, () => {
                        const state = playersChannel.presenceState();
                        for (let [id, presences] of Object.entries(state)) {
                            if (id === currentUser.id) continue;
                            if (!playersMap.has(id)) {
                                const remoteMesh = createRemotePlayer(0xccaa55);
                                scene.add(remoteMesh);
                                playersMap.set(id, { mesh: remoteMesh, data: { id } });
                            }
                            const pdata = presences[0];
                            if (pdata && playersMap.has(id)) {
                                const p = playersMap.get(id);
                                p.mesh.position.set(pdata.x, pdata.y, pdata.z);
                            }
                        }
                        for (let [id] of playersMap) {
                            if (!state[id] && id !== currentUser.id) {
                                scene.remove(playersMap.get(id).mesh);
                                playersMap.delete(id);
                            }
                        }
                    });
                }
            });
            
            setInterval(() => {
                if (currentServerId && playersChannel && !isDead) {
                    playersChannel.send({
                        type: 'broadcast',
                        event: 'player-move',
                        payload: { userId: currentUser.id, x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z }
                    });
                    playersChannel.track({
                        user_id: currentUser.id, username: currentUser.username,
                        x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z
                    });
                }
            }, 100);
        }
        
        // ---------- UI & Phone Apps ----------
        function updateHUD() {
            document.getElementById('health-val').innerText = Math.floor(localPlayerData.health);
            document.getElementById('hunger-val').innerText = Math.floor(localPlayerData.hunger);
            document.getElementById('thirst-val').innerText = Math.floor(localPlayerData.thirst);
            document.getElementById('money-val').innerText = localPlayerData.money;
        }
        
        function updateChatUI() {
            const chatDiv = document.querySelector('#appContent .chat-box');
            if (chatDiv) {
                chatDiv.innerHTML = chatMessages.slice(0, 15).map(m => `<div><b>${m.username}:</b> ${m.message}</div>`).join('');
            }
        }
        
        function openPhoneApp(appName) {
            const contentDiv = document.getElementById('appContent');
            if (appName === 'jobs') {
                contentDiv.innerHTML = `<h4>💼 Jobs</h4><p>🚔 Police Officer - $150/shift</p><p>🚕 Taxi Driver - $80/ride</p><p>🌿 Weed Farmer - $250/sale</p><button id="weedJob">Sell Weed (+$50)</button>`;
                document.getElementById('weedJob')?.addEventListener('click', () => {
                    localPlayerData.money += 50;
                    updateLocalPlayerDB();
                    updateHUD();
                    alert("You sold weed! +$50");
                });
            } else if (appName === 'vehicles') {
                contentDiv.innerHTML = `<h4>🚗 My Vehicles</h4><p>🚗 Sedan (Spawn)</p><button id="spawnCarBtn">Spawn Vehicle</button>`;
                document.getElementById('spawnCarBtn')?.addEventListener('click', () => {
                    const carGeo = new THREE.BoxGeometry(1, 0.5, 1.8);
                    const carMat = new THREE.MeshStandardMaterial({ color: 0xff3300 });
                    const car = new THREE.Mesh(carGeo, carMat);
                    car.position.copy(localPlayerMesh.position);
                    car.position.y -= 0.6;
                    scene.add(car);
                    setTimeout(() => scene.remove(car), 5000);
                    alert("Vehicle spawned temporarily!");
                });
            } else if (appName === 'chat') {
                contentDiv.innerHTML = `<div class="chat-box" id="chatMsgList"></div><input id="chatInputField" placeholder="Say something" style="width:95%; margin-top:5px;"><button id="sendMsgBtn">Send</button>`;
                updateChatUI();
                document.getElementById('sendMsgBtn')?.addEventListener('click', () => {
                    const input = document.getElementById('chatInputField');
                    if (input.value && playersChannel) {
                        playersChannel.send({ type: 'broadcast', event: 'chat', payload: { username: currentUser.username, message: input.value } });
                        input.value = '';
                    }
                });
            } else if (appName === 'blackmarket') {
                contentDiv.innerHTML = `<h4>🖤 Black Market</h4><div id="bmItems"><div class="blackmarket-item">🔫 Pistol - $300 <button class="buyGun">Buy</button></div><div class="blackmarket-item">💊 Medkit - $100 <button class="buyMedkit">Buy</button></div><div class="blackmarket-item">🌿 Weed - $50 <button class="buyWeed">Buy</button></div></div>`;
                setTimeout(() => {
                    document.querySelector('.buyGun')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 300) {
                            localPlayerData.money -= 300;
                            updateHUD();
                            alert("Bought Pistol! Press F to shoot nearby players!");
                        } else alert("Not enough money!");
                    });
                    document.querySelector('.buyMedkit')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 100 && localPlayerData.health < 100) {
                            localPlayerData.money -= 100;
                            localPlayerData.health = Math.min(100, localPlayerData.health + 50);
                            updateHUD();
                            alert("Health restored!");
                        } else alert("Cannot use medkit!");
                    });
                    document.querySelector('.buyWeed')?.addEventListener('click', () => {
                        if (localPlayerData.money >= 50) {
                            localPlayerData.money -= 50;
                            localPlayerData.hunger = Math.min(100, localPlayerData.hunger + 15);
                            updateHUD();
                            alert("You consumed weed and feel less hungry!");
                        }
                    });
                }, 100);
            }
        }
        
        // ---------- Combat: shoot ray ----------
        function shootRay() {
            if (isDead) {
                alert("You are dead! Respawn first.");
                return;
            }
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const raycaster = new THREE.Raycaster(localPlayerMesh.position, direction, 0, 8);
            let hitPlayerId = null;
            for (let [id, p] of playersMap.entries()) {
                const box = new THREE.Box3().setFromObject(p.mesh);
                if (raycaster.ray.intersectBox(box, new THREE.Vector3())) {
                    hitPlayerId = id;
                    break;
                }
            }
            if (hitPlayerId && playersChannel) {
                playersChannel.send({ type: 'broadcast', event: 'player-damage', payload: { targetId: hitPlayerId, damage: 34 } });
                alert("You shot a player!");
            } else {
                alert("No player in range!");
            }
        }
        
        // ---------- Movement ----------
        function handleMovement(deltaTime) {
            if (isDead) return;
            const speed = moveSpeed * deltaTime * (keys.shift ? 2 : 1);
            let move = new THREE.Vector3(0, 0, 0);
            if (keys.w) move.z -= 1;
            if (keys.s) move.z += 1;
            if (keys.a) move.x -= 1;
            if (keys.d) move.x += 1;
            if (move.length() > 0) move.normalize();
            move.applyQuaternion(camera.quaternion);
            move.y = 0;
            localPlayerMesh.position.x += move.x * speed;
            localPlayerMesh.position.z += move.z * speed;
            localPlayerMesh.position.x = Math.max(-45, Math.min(45, localPlayerMesh.position.x));
            localPlayerMesh.position.z = Math.max(-45, Math.min(45, localPlayerMesh.position.z));
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.2;
            
            // hunger/thirst decay
            if (Date.now() % 60 === 0) {
                localPlayerData.hunger = Math.max(0, localPlayerData.hunger - 0.003);
                localPlayerData.thirst = Math.max(0, localPlayerData.thirst - 0.004);
                if (localPlayerData.hunger <= 0 || localPlayerData.thirst <= 0) applyDamage(0.3);
                updateHUD();
            }
        }
        
        // ---------- Event Listeners ----------
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w') keys.w = true;
            if (e.key === 's') keys.s = true;
            if (e.key === 'a') keys.a = true;
            if (e.key === 'd') keys.d = true;
            if (e.key === 'Shift') keys.shift = true;
            if (e.key === 'f') shootRay();
            if (e.key === 't') {
                document.getElementById('chatInputArea').style.display = 'block';
                document.getElementById('chatMsgInput').focus();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'w') keys.w = false;
            if (e.key === 's') keys.s = false;
            if (e.key === 'a') keys.a = false;
            if (e.key === 'd') keys.d = false;
            if (e.key === 'Shift') keys.shift = false;
        });
        
        document.getElementById('sendChatBtn')?.addEventListener('click', () => {
            const input = document.getElementById('chatMsgInput');
            if (input.value && playersChannel) {
                playersChannel.send({ type: 'broadcast', event: 'chat', payload: { username: currentUser.username, message: input.value } });
                input.value = '';
                document.getElementById('chatInputArea').style.display = 'none';
            }
        });
        
        // Auth UI handlers
        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const player = await loginUser(username, password);
            if (player) {
                currentUser = player;
                localPlayerData.money = player.money;
                localPlayerData.health = player.health;
                localPlayerData.hunger = player.hunger;
                localPlayerData.thirst = player.thirst;
                localPlayerMesh.position.set(player.position_x, player.position_y, player.position_z);
                updateHUD();
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('username-display').innerHTML = `👤 ${player.username}`;
                document.getElementById('welcomeUsername').innerText = player.username;
                document.getElementById('serverModal').classList.remove('hidden');
            }
        };
        
        document.getElementById('registerBtn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const player = await registerUser(username, password);
            if (player) {
                currentUser = player;
                localPlayerData.money = player.money;
                localPlayerData.health = player.health;
                localPlayerData.hunger = player.hunger;
                localPlayerData.thirst = player.thirst;
                localPlayerMesh.position.set(player.position_x, player.position_y, player.position_z);
                updateHUD();
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('username-display').innerHTML = `👤 ${player.username}`;
                document.getElementById('welcomeUsername').innerText = player.username;
                document.getElementById('serverModal').classList.remove('hidden');
            }
        };
        
        document.getElementById('createServerBtn').onclick = () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            alert(`Server Created! Code: ${code}\nShare this code with friends to join!`);
            joinServer(code);
            document.getElementById('serverModal').classList.add('hidden');
        };
        
        document.getElementById('joinServerBtn').onclick = () => {
            const code = document.getElementById('joinCode').value;
            if (code) {
                joinServer(code);
                document.getElementById('serverModal').classList.add('hidden');
            } else {
                alert("Please enter a server code");
            }
        };
        
        document.getElementById('closeServerBtn').onclick = () => document.getElementById('serverModal').classList.add('hidden');
        document.getElementById('phoneBtn').onclick = () => document.getElementById('phoneModal').classList.remove('hidden');
        document.getElementById('closePhoneBtn').onclick = () => document.getElementById('phoneModal').classList.add('hidden');
        document.querySelectorAll('.app-btn').forEach(btn => {
            btn.addEventListener('click', () => openPhoneApp(btn.dataset.app));
        });
        document.getElementById('respawnBtn').onclick = () => { respawnPlayer(); };
        
        // Animation loop
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            handleMovement(delta);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
