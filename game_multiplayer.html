<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Multiplayer Game - Supabase Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 25px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            pointer-events: auto;
            font-size: 14px;
            min-width: 280px;
            max-width: 320px;
        }
        
        #ui h1 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-align: center;
            color: #ffaa44;
        }
        
        .server-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        input {
            flex: 1;
            background: #222;
            border: 1px solid #555;
            color: #0f0;
            padding: 8px 12px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            outline: none;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #3a6ea5, #1e3a5f);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-family: inherit;
        }
        
        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        .danger-btn {
            background: linear-gradient(135deg, #9e3c3c, #6e2c2c);
        }
        
        .success-btn {
            background: linear-gradient(135deg, #2c7a4d, #1e5a3a);
        }
        
        .info-panel {
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 12px;
            font-size: 13px;
        }
        
        .player-count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #88ff88;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .log-container {
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
        }
        
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 4px 2px;
            color: #ddd;
        }
        
        .log-entry.info { color: #aaffdd; }
        .log-entry.join { color: #aaffaa; }
        .log-entry.leave { color: #ffaa88; }
        
        #server-status {
            font-size: 12px;
            background: #111c;
            border-radius: 12px;
            padding: 6px;
            text-align: center;
            margin-top: 8px;
        }
        
        .username-input {
            margin-bottom: 10px;
        }
        
        @media (max-width: 600px) {
            #ui { transform: scale(0.9); transform-origin: top left; width: 280px; padding: 10px; }
            button, input { font-size: 12px; }
        }
        
        #controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            pointer-events: none;
            z-index: 99;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🌀 NEXUS ARENA</h1>
        <div class="username-input">
            <input type="text" id="username" placeholder="Your Username" maxlength="20" value="Player_" + Math.floor(Math.random() * 1000)">
        </div>
        <div class="server-panel">
            <div class="input-group">
                <input type="text" id="serverCode" placeholder="Server ID / Code" value="LOBBY_001">
                <button id="createBtn" class="success-btn">✨ CREATE</button>
            </div>
            <div class="input-group">
                <input type="text" id="joinCode" placeholder="Enter code to join">
                <button id="joinBtn">🔗 JOIN</button>
            </div>
        </div>
        <div class="info-panel">
            <div class="player-count">
                👥 Players: <span id="playerCountDisplay">0</span>
                <span style="font-size:12px">(in server)</span>
            </div>
            <div id="server-status">⚡ No server connected</div>
            <div class="log-container" id="connectivityLog">
                <div class="log-entry info">🟢 Welcome! Enter username and create/join a server.</div>
            </div>
        </div>
    </div>
    <div id="controls-note">
        🕹️ WASD / Arrow Keys to move | 🖱️ Drag to rotate camera
    </div>
    <div class="loading" id="loading">
        Connecting to server...
    </div>

    <!-- Import Three.js and Supabase -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';

        // Supabase configuration
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Game state
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let localPlayerMesh = null;
        let localLabel = null;
        let otherPlayers = new Map(); // id -> { mesh, label, data }
        let updateInterval = null;
        let syncInterval = null;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        
        // Ground
        const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(25, 25),
            new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.7 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Helper functions
        function getRandomColor() {
            const hue = Math.random() * 360;
            return `hsl(${hue}, 70%, 55%)`;
        }
        
        function createPlayerModel(colorHex, isLocal = false) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 1.0, 8), bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 24), headMat);
            head.position.y = 1.05;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            leftEye.position.set(-0.18, 1.18, 0.42);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            rightEye.position.set(0.18, 1.18, 0.42);
            group.add(leftEye);
            group.add(rightEye);
            
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            leftPupil.position.set(-0.18, 1.16, 0.52);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            rightPupil.position.set(0.18, 1.16, 0.52);
            group.add(leftPupil);
            group.add(rightPupil);
            
            if (isLocal) {
                const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 0.4, 6), 
                    new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
                antenna.position.y = 1.45;
                group.add(antenna);
            }
            
            return group;
        }
        
        function makeLabel(text, color = '#ffffff') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.border = `1px solid ${color}`;
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }
        
        function addLogEntry(msg, type = 'info') {
            const logDiv = document.getElementById('connectivityLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (logDiv.children.length > 25) logDiv.removeChild(logDiv.children[0]);
        }
        
        async function syncPlayers() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('server_id', currentServerId)
                .gte('last_seen', new Date(Date.now() - 30000).toISOString());
            
            if (error) {
                console.error('Error syncing players:', error);
                return;
            }
            
            // Update player count
            document.getElementById('playerCountDisplay').innerText = data.length;
            
            // Handle remote players
            const currentRemoteIds = new Set(otherPlayers.keys());
            
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                
                if (!otherPlayers.has(player.id)) {
                    // Add new player
                    const mesh = createPlayerModel(player.color, false);
                    mesh.position.set(player.x, player.y, player.z);
                    scene.add(mesh);
                    
                    const label = makeLabel(player.username, '#aaffdd');
                    label.position.set(player.x, player.y + 1.5, player.z);
                    scene.add(label);
                    
                    otherPlayers.set(player.id, { mesh, label, data: player });
                    addLogEntry(`🟢 ${player.username} joined the server`, 'join');
                } else {
                    // Update existing player position
                    const playerObj = otherPlayers.get(player.id);
                    playerObj.mesh.position.set(player.x, player.y, player.z);
                    playerObj.label.position.set(player.x, player.y + 1.5, player.z);
                    playerObj.data = player;
                }
                currentRemoteIds.delete(player.id);
            }
            
            // Remove disconnected players
            for (const id of currentRemoteIds) {
                const player = otherPlayers.get(id);
                scene.remove(player.mesh);
                scene.remove(player.label);
                addLogEntry(`🔴 ${player.data.username} left the server`, 'leave');
                otherPlayers.delete(id);
            }
        }
        
        async function updatePlayerPosition() {
            if (!currentServerId || !myPlayerId || !localPlayerMesh) return;
            
            const { error } = await supabase
                .from('players')
                .update({
                    x: localPlayerMesh.position.x,
                    y: localPlayerMesh.position.y,
                    z: localPlayerMesh.position.z,
                    last_seen: new Date().toISOString()
                })
                .eq('id', myPlayerId);
            
            if (error) {
                console.error('Error updating position:', error);
            }
        }
        
        async function leaveServer() {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('id', myPlayerId);
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            for (const [id, player] of otherPlayers) {
                scene.remove(player.mesh);
                scene.remove(player.label);
            }
            otherPlayers.clear();
            
            if (localPlayerMesh) {
                scene.remove(localPlayerMesh);
                if (localLabel) scene.remove(localLabel);
                localPlayerMesh = null;
                localLabel = null;
            }
            
            currentServerId = null;
            myPlayerId = null;
            document.getElementById('server-status').innerHTML = '⚡ No server connected';
            document.getElementById('playerCountDisplay').innerText = '0';
            addLogEntry('Disconnected from server', 'info');
        }
        
        async function joinServer(serverId, isCreate = false) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                addLogEntry('Please enter a username', 'info');
                return;
            }
            
            if (!serverId.trim()) {
                addLogEntry('Invalid server ID', 'info');
                return;
            }
            
            await leaveServer();
            currentServerId = serverId.trim();
            
            const spawnPos = { x: (Math.random() - 0.5) * 6, y: 0.5, z: (Math.random() - 0.5) * 6 };
            const playerColor = getRandomColor();
            
            // Create player in database
            const { data, error } = await supabase
                .from('players')
                .insert({
                    username: myUsername,
                    server_id: currentServerId,
                    x: spawnPos.x,
                    y: spawnPos.y,
                    z: spawnPos.z,
                    color: playerColor
                })
                .select()
                .single();
            
            if (error) {
                addLogEntry(`Error joining server: ${error.message}`, 'info');
                return;
            }
            
            myPlayerId = data.id;
            
            // Create local player mesh
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            scene.add(localPlayerMesh);
            
            localLabel = makeLabel(myUsername, '#ffff88');
            localLabel.position.set(spawnPos.x, spawnPos.y + 1.5, spawnPos.z);
            scene.add(localLabel);
            
            document.getElementById('server-status').innerHTML = `🟢 Connected to: ${currentServerId}`;
            addLogEntry(`${isCreate ? 'Created' : 'Joined'} server "${currentServerId}" as ${myUsername}`, 'success');
            
            // Start sync intervals
            await syncPlayers(); // Initial sync
            syncInterval = setInterval(() => syncPlayers(), 1000); // Sync every second
            updateInterval = setInterval(() => updatePlayerPosition(), 50); // Update position 20 times per second
        }
        
        // Keyboard movement
        const keyState = { w: false, s: false, a: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keyState.w = true;
            if (key === 's' || key === 'arrowdown') keyState.s = true;
            if (key === 'a' || key === 'arrowleft') keyState.a = true;
            if (key === 'd' || key === 'arrowright') keyState.d = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keyState.w = false;
            if (key === 's' || key === 'arrowdown') keyState.s = false;
            if (key === 'a' || key === 'arrowleft') keyState.a = false;
            if (key === 'd' || key === 'arrowright') keyState.d = false;
        });
        
        function updateMovement() {
            if (!localPlayerMesh) return;
            
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.w) move.z -= 1;
            if (keyState.s) move.z += 1;
            if (keyState.a) move.x -= 1;
            if (keyState.d) move.x += 1;
            
            if (move.length() > 0) move.normalize();
            const speed = 5.5;
            move.multiplyScalar(speed * 0.016);
            
            let newPos = localPlayerMesh.position.clone().add(move);
            newPos.x = Math.min(12, Math.max(-12, newPos.x));
            newPos.z = Math.min(12, Math.max(-12, newPos.z));
            newPos.y = 0.5;
            
            localPlayerMesh.position.copy(newPos);
            localLabel.position.copy(newPos);
            localLabel.position.y += 1.5;
        }
        
        // UI Event Listeners
        document.getElementById('createBtn').addEventListener('click', () => {
            const code = document.getElementById('serverCode').value.trim();
            if (code) joinServer(code, true);
            else addLogEntry('Enter a server name', 'info');
        });
        
        document.getElementById('joinBtn').addEventListener('click', () => {
            const code = document.getElementById('joinCode').value.trim();
            if (code) joinServer(code, false);
            else addLogEntry('Enter a server code to join', 'info');
        });
        
        // Set random username on load
        const randomNum = Math.floor(Math.random() * 1000);
        document.getElementById('username').value = `Explorer_${randomNum}`;
        
        // Animation loop
        function animate() {
            updateMovement();
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (myPlayerId) {
                supabase.from('players').delete().eq('id', myPlayerId);
            }
        });
        
        addLogEntry('✨ System ready! Enter username and create/join a server.', 'info');
        addLogEntry('💡 Open this page in multiple tabs/windows to see real multiplayer with Supabase!', 'info');
        
        // Add decorative stars
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const positions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 200;
            positions[i*3+1] = (Math.random() - 0.5) * 50 + 10;
            positions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
        scene.add(stars);
    </script>
</body>
</html>
