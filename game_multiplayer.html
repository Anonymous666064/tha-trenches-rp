<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Basic 3D World - Player on Flat Ground</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            border-left: 3px solid #ffaa44;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #info, #controls { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🧙‍♂️ Basic 3D World | <span style="color:#ffaa44;">WASD</span> to Move Player
    </div>
    <div id="controls">
        🎮 Controls: W A S D → Move | Mouse drag to look around
    </div>

    <!-- Import Three.js core and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Cameras, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Bright blue sky
        scene.fog = new THREE.Fog(0x87CEEB, 30, 80); // Gentle fog to blend horizon

        // Perspective Camera (for 3D view)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);
        camera.lookAt(0, 0, 0);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows for better depth
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer for simple text label above player
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Controls (Orbit) but we want to follow player? 
        // Standard OrbitControls would orbit around a fixed point, but we want to orbit relative to player.
        // Instead, we attach OrbitControls to follow the player? Not directly, but we can make the controls target the player position.
        // We'll create a custom setup: OrbitControls with target updated to player position each frame.
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // smooth inertia
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.screenSpacePanning = true; // avoid panning below ground
        controls.maxPolarAngle = Math.PI / 2.2; // limit looking below horizon
        
        // We'll update controls.target to player position later

        // --- Lighting to make the scene vibrant ---
        
        // Ambient light for base illumination
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Directional light (sun) to cast shadows
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 30;
        sunLight.shadow.camera.left = -10;
        sunLight.shadow.camera.right = 10;
        sunLight.shadow.camera.top = 10;
        sunLight.shadow.camera.bottom = -10;
        scene.add(sunLight);
        
        // Fill light from below and back rim light
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // Warm back rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.4);
        rimLight.position.set(-3, 5, -5);
        scene.add(rimLight);
        
        // Optional: a soft hemisphere light
        const hemiLight = new THREE.HemisphereLight(0x8bb5ff, 0x5c6e4d, 0.4);
        scene.add(hemiLight);
        
        // --- Ground: a large flat plane with grass-like texture or simple green grid/plane ---
        // Create a nice checkerboard or simple green plane with subtle grid helper
        
        // Main ground plane (receives shadow)
        const groundGeometry = new THREE.PlaneGeometry(40, 40);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x6c9e4a, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Add a secondary slightly darker ground for texture variation (circular gradient style)
        const groundDetailMat = new THREE.MeshStandardMaterial({ color: 0x5a8540, roughness: 0.9 });
        const groundDetail = new THREE.Mesh(new THREE.PlaneGeometry(38, 38), groundDetailMat);
        groundDetail.rotation.x = -Math.PI / 2;
        groundDetail.position.y = -0.04;
        groundDetail.receiveShadow = true;
        scene.add(groundDetail);
        
        // Grid helper for visual reference (optional but looks cool)
        const gridHelper = new THREE.GridHelper(42, 20, 0x88aa66, 0x446633);
        gridHelper.position.y = -0.02;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);
        
        // Decorative simple stones or grass tufts? Keep minimal but add some floating particles? No, but maybe small flowers.
        // For a clean "basic template", add a few simple trees or cubes to give scale reference, but keep optional.
        // Actually, to make it pleasant, add a few randomly placed low poly bushes/rocks.
        const rockMaterial = new THREE.MeshStandardMaterial({ color: 0xaa9977, roughness: 0.7 });
        const bushMaterial = new THREE.MeshStandardMaterial({ color: 0x6cae4a, roughness: 0.6 });
        
        for (let i = 0; i < 80; i++) {
            // Random position within a 30 unit radius circle, but avoid center area near start? doesn't matter.
            const angle = Math.random() * Math.PI * 2;
            const radius = 5 + Math.random() * 15;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            // Choose object type: 70% bush (small cylinder+sphere), 30% rock
            if (Math.random() > 0.3) {
                // Simple bush: green cylinder + little spheres
                const bushGroup = new THREE.Group();
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.2, 6), bushMaterial);
                base.position.y = 0;
                base.castShadow = true;
                base.receiveShadow = true;
                bushGroup.add(base);
                const top = new THREE.Mesh(new THREE.SphereGeometry(0.25, 5), bushMaterial);
                top.position.y = 0.2;
                top.castShadow = true;
                bushGroup.add(top);
                bushGroup.position.set(x, 0, z);
                scene.add(bushGroup);
            } else {
                // small rock
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2), rockMaterial);
                rock.position.set(x, 0, z);
                rock.scale.set(1, Math.random() * 0.5 + 0.6, 1);
                rock.castShadow = true;
                rock.receiveShadow = true;
                scene.add(rock);
            }
        }
        
        // Also add a few simple trees (cylinder + cone) for charm
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x5fad41 });
        for (let i = 0; i < 25; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 8 + Math.random() * 14;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.8, 6), trunkMat);
            trunk.position.set(x, 0.4, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.7, 8), foliageMat);
            foliage1.position.set(x, 0.85, z);
            foliage1.castShadow = true;
            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.6, 8), foliageMat);
            foliage2.position.set(x, 1.25, z);
            foliage2.castShadow = true;
            scene.add(trunk);
            scene.add(foliage1);
            scene.add(foliage2);
        }
        
        // --- Player Character: a simple capsule-like figure with a sphere on top of a cylinder, plus a floating name tag---
        const playerGroup = new THREE.Group();
        
        // Body (cylinder)
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.9, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4c9aff, metalness: 0.2, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.45;
        playerGroup.add(body);
        
        // Head (sphere)
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, roughness: 0.2 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), headMat);
        head.castShadow = true;
        head.position.y = 0.9 + 0.25;
        playerGroup.add(head);
        
        // Eyes: two small spheres (white + black pupils)
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
        leftEye.position.set(-0.18, 1.18, 0.45);
        leftEye.castShadow = true;
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
        rightEye.position.set(0.18, 1.18, 0.45);
        rightEye.castShadow = true;
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        leftPupil.position.set(-0.18, 1.16, 0.52);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        rightPupil.position.set(0.18, 1.16, 0.52);
        playerGroup.add(leftEye);
        playerGroup.add(rightEye);
        playerGroup.add(leftPupil);
        playerGroup.add(rightPupil);
        
        // Hat? simple cone on head for charm
        const hatMat = new THREE.MeshStandardMaterial({ color: 0xd43f1d });
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.4, 8), hatMat);
        hat.position.y = 1.45;
        hat.castShadow = true;
        playerGroup.add(hat);
        
        // Add a little belt
        const beltMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        const belt = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.07, 16, 32), beltMat);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 0.6;
        belt.castShadow = true;
        playerGroup.add(belt);
        
        playerGroup.position.set(0, 0, 0);
        playerGroup.castShadow = true;
        playerGroup.receiveShadow = false;
        scene.add(playerGroup);
        
        // CSS2D Text label above player
        const playerDiv = document.createElement('div');
        playerDiv.textContent = '🧙‍♂️ Adventurer';
        playerDiv.style.color = 'white';
        playerDiv.style.fontSize = '16px';
        playerDiv.style.fontWeight = 'bold';
        playerDiv.style.textShadow = '1px 1px 0px black';
        playerDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        playerDiv.style.padding = '2px 8px';
        playerDiv.style.borderRadius = '20px';
        playerDiv.style.border = '1px solid gold';
        playerDiv.style.fontFamily = 'sans-serif';
        playerDiv.style.backdropFilter = 'blur(4px)';
        const playerLabel = new CSS2DObject(playerDiv);
        playerLabel.position.set(0, 1.9, 0);
        playerGroup.add(playerLabel);
        
        // --- Simple floating particles or butterflies? optional: just to add life, but keep minimal---
        // Add some floating sparkles around the world (small particles)
        const particleCount = 300;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 60;
            particlePositions[i*3+1] = Math.random() * 4;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 60;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffdd88, size: 0.08, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMat);
        scene.add(particles);
        
        // --- Simple animation loop for floating particles rotation---
        function animateParticles() {
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        // --- Player Movement Logic (WASD) ---
        const keyState = {
            w: false, a: false, s: false, d: false
        };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 'a') keyState.a = true;
            if (key === 's') keyState.s = true;
            if (key === 'd') keyState.d = true;
            // Prevent default scrolling with arrows/WASD
            if (['w','a','s','d'].includes(key)) e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 'a') keyState.a = false;
            if (key === 's') keyState.s = false;
            if (key === 'd') keyState.d = false;
        });
        
        // Movement speed
        const moveSpeed = 5.5;
        // We'll move player on XZ plane, keep Y fixed at 0 (ground level, but note body position offsets - group origin at feet)
        // Player group position Y is 0 (feet on ground)
        
        // To make movement relative to camera direction, we get camera's forward/right vectors on XZ plane.
        function updateMovement(deltaTime) {
            if (!deltaTime || deltaTime > 0.03) deltaTime = 0.016; // safe delta
            
            let moveX = 0;
            let moveZ = 0;
            if (keyState.w) moveZ -= 1;
            if (keyState.s) moveZ += 1;
            if (keyState.a) moveX -= 1;
            if (keyState.d) moveX += 1;
            
            if (moveX === 0 && moveZ === 0) return;
            
            // Normalize diagonal movement
            const len = Math.hypot(moveX, moveZ);
            if (len > 0) {
                moveX /= len;
                moveZ /= len;
            }
            
            // Get camera direction vectors (ignoring pitch)
            const cameraDirection = camera.getWorldDirection(new THREE.Vector3());
            const forward = new THREE.Vector3(cameraDirection.x, 0, cameraDirection.z).normalize();
            const right = new THREE.Vector3(-forward.z, 0, forward.x);
            
            let deltaPos = new THREE.Vector3(0, 0, 0);
            deltaPos.addScaledVector(forward, moveZ);
            deltaPos.addScaledVector(right, moveX);
            deltaPos.multiplyScalar(moveSpeed * deltaTime);
            
            let newX = playerGroup.position.x + deltaPos.x;
            let newZ = playerGroup.position.z + deltaPos.z;
            
            // Boundary limits: keep within ground plane edges (-18 to 18 for nicer visual, since ground is 40 wide)
            const limit = 17.5;
            newX = Math.min(limit, Math.max(-limit, newX));
            newZ = Math.min(limit, Math.max(-limit, newZ));
            
            playerGroup.position.set(newX, 0, newZ);
            
            // Simple rotation: rotate player to face movement direction (optional)
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(deltaPos.x, deltaPos.z);
                playerGroup.rotation.y = angle;
            }
        }
        
        // --- Camera follow & OrbitControls target update ---
        // We want OrbitControls to focus on player, so we update controls.target each frame.
        // This makes the camera orbit around the player smoothly.
        
        // Also we need to make sure camera distance and angle are maintained relative to player.
        // Since we are using OrbitControls, updating target will naturally keep relative orientation.
        
        // --- Optional: Add a simple shadow catcher circle under player? Not needed but nice: add a small dark circle under player for grounding---
        const shadowRingMat = new THREE.MeshStandardMaterial({ color: 0x3a5a2a, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
        const shadowDisc = new THREE.Mesh(new THREE.CircleGeometry(0.7, 8), shadowRingMat);
        shadowDisc.rotation.x = -Math.PI / 2;
        shadowDisc.position.y = 0.01;
        shadowDisc.receiveShadow = false;
        playerGroup.add(shadowDisc);
        
        // Also add a faint glowing aura around player? Small point light
        const playerGlow = new THREE.PointLight(0x88aaff, 0.4, 6);
        playerGlow.position.set(0, 0.8, 0);
        playerGroup.add(playerGlow);
        
        // --- Simple cloud or sky decoration? Since sky is blue, we can add a few fluffy clouds using transparent spheres---
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xf0f8ff, emissive: 0xccccdd, transparent: true, opacity: 0.7 });
        function addCloud(x, z, yOff) {
            const cloudGroup = new THREE.Group();
            const parts = [0.6, 0.5, 0.4];
            parts.forEach((size, idx) => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 7, 7), cloudMat);
                sphere.position.set((idx - 1) * 0.7, 0, idx * 0.4);
                sphere.castShadow = false;
                cloudGroup.add(sphere);
            });
            const extra = new THREE.Mesh(new THREE.SphereGeometry(0.45, 7, 7), cloudMat);
            extra.position.set(0.5, -0.2, -0.3);
            cloudGroup.add(extra);
            cloudGroup.position.set(x, yOff, z);
            scene.add(cloudGroup);
        }
        addCloud(-5, 3, 7);
        addCloud(2, 4, 8);
        addCloud(6, 2.5, 7.5);
        addCloud(-3, 3.5, 6);
        addCloud(0, 5, 9);
        addCloud(8, 3, 6.2);
        addCloud(-7, 3.2, 6.8);
        
        // --- Simple Animation Loop ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Update player movement
            updateMovement(delta);
            
            // Update OrbitControls target to player position (so camera rotates around player)
            controls.target.copy(playerGroup.position);
            controls.update(); // important to call after target change
            
            // Small idle animation: bobbing and eye movement? subtle breathing effect (optional)
            const time = Date.now() * 0.008;
            const bobY = Math.sin(time) * 0.008;
            playerGroup.position.y = bobY; // tiny floating effect
            // adjust shadow disc slightly
            shadowDisc.position.y = 0.01 + Math.abs(bobY) * 0.5;
            // make eyes look around randomly? Not needed, but cute: pupils move slightly?
            const lookX = Math.sin(time * 0.7) * 0.03;
            const lookZ = Math.cos(time * 0.5) * 0.02;
            leftPupil.position.x = -0.18 + lookX * 0.1;
            rightPupil.position.x = 0.18 + lookX * 0.1;
            leftPupil.position.z = 0.52 + lookZ * 0.05;
            rightPupil.position.z = 0.52 + lookZ * 0.05;
            
            // Animate particles slowly drift? already rotating
            // Slight cloud movement?
            
            // Render
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Start the animation
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Small console log to show ready
        console.log('3D World Ready! Use WASD to move the character. Mouse drag to orbit camera.');
        
        // Optional: add a simple help cursor lock? Not needed for basic template, but OrbitControls works fine.
    </script>
</body>
</html>
