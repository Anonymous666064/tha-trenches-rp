<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RP World - City Roleplay Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 11px;
            min-width: 220px;
            max-width: 240px;
        }
        
        .stat-bar {
            margin: 3px 0;
        }
        
        .stat-label {
            display: inline-block;
            width: 45px;
            font-size: 10px;
        }
        
        .bar-bg {
            display: inline-block;
            width: 120px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health-fill { background: #ff4444; }
        .hunger-fill { background: #ffaa44; }
        .thirst-fill { background: #44aaff; }
        
        .money {
            color: #ffaa44;
            font-size: 14px;
            font-weight: bold;
            margin: 3px 0;
        }
        
        #phone {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            border: 2px solid #4a6a8a;
        }
        
        #phone-icon {
            font-size: 24px;
        }
        
        #phone-apps {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 10px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            z-index: 200;
        }
        
        .app-btn {
            background: #2c3e50;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }
        
        .app-btn:hover {
            background: #3e5a6e;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 150;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: red;
            font-size: 48px;
        }
        
        #respawn-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 15px;
            color: white;
            font-size: 10px;
            pointer-events: none;
            z-index: 99;
        }
        
        .server-panel {
            margin-top: 8px;
        }
        
        input, button {
            margin: 4px 0;
            padding: 6px;
            border-radius: 5px;
            border: none;
            width: 100%;
            font-size: 11px;
        }
        
        input {
            background: #222;
            color: white;
            border: 1px solid #555;
        }
        
        button {
            background: #4a6a8a;
            color: white;
            cursor: pointer;
        }
        
        .log-container {
            margin-top: 8px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 9px;
        }
        
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        .log-entry.kill { color: #ff4444; font-weight: bold; }
        .log-entry.join { color: #88ff88; }
        .log-entry.death { color: #ff8888; }
        
        .instruction {
            font-size: 9px;
            color: #ffaa44;
            text-align: center;
            margin-top: 5px;
            padding: 2px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        
        #player-list {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            border-radius: 8px;
            padding: 8px;
            min-width: 140px;
            z-index: 100;
            font-size: 10px;
            backdrop-filter: blur(4px);
        }
        
        #player-list h4 {
            margin: 0 0 5px 0;
            color: #ffaa44;
            font-size: 11px;
            text-align: center;
        }
        
        .player-name {
            padding: 2px 5px;
            border-bottom: 1px solid #333;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="money">💰 $<span id="money">100000</span></div>
        <div class="stat-bar">
            <span class="stat-label">❤️ HP</span>
            <div class="bar-bg"><div class="bar-fill health-fill" id="health-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">🍔 Food</span>
            <div class="bar-bg"><div class="bar-fill hunger-fill" id="hunger-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">💧 Water</span>
            <div class="bar-bg"><div class="bar-fill thirst-fill" id="thirst-bar" style="width: 100%"></div></div>
        </div>
        
        <div class="server-panel">
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="serverCode" placeholder="Server Code" value="RP_CITY">
            <button id="joinGame">🎮 Join Game</button>
            <button id="leaveGame" style="background:#8a4a4a;">🚪 Leave</button>
        </div>
        <div class="log-container" id="log"></div>
        <div class="instruction">💡 Click game to lock mouse | Move mouse to aim | Click to shoot</div>
    </div>
    
    <div id="player-list">
        <h4>👥 Players Online</h4>
        <div id="player-list-content"></div>
    </div>
    
    <div id="phone" onclick="togglePhone()">
        <div id="phone-icon">📱</div>
    </div>
    
    <div id="phone-apps">
        <div class="app-btn" onclick="alert('Coming Soon!')">🚗 Car Shop</div>
        <div class="app-btn" onclick="showInventory()">📦 Inventory</div>
        <div class="app-btn" onclick="alert('Coming Soon!')">🌿 Weed Farm</div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="wasted">
        <div>💀 WASTED 💀</div>
        <div style="font-size: 20px; margin-top: 10px;" id="death-message"></div>
        <button id="respawn-btn" onclick="respawn()">Respawn ($1000)</button>
    </div>
    
    <div id="controls-note">
        🎮 WASD | 🖱️ Click to Lock | 🔫 Click to Shoot
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",

                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

        import { createClient } from '@supabase/supabase-js';
        
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Game state
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let localPlayerMesh = null;
        let localLabel = null;
        let otherPlayers = new Map();
        let isDead = false;
        let updateInterval = null;

        let playerStats = { health: 100, hunger: 100, thirst: 100, money: 100000, kills: 0 };
        
        // Camera controls
        let mouseX = 0;
        let mouseY = 0;
        let cameraPitch = 0;
        let cameraYaw = 0;
        let isPointerLocked = false;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 150, 250);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Create ground
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c9e5e, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // ========== CITY LAYOUT ==========
        
        // Road material
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, roughness: 0.6 });
        const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8 });
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x8b7d6b, roughness: 0.4 });
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x6b5a4a, roughness: 0.7 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 });
        
        // Main roads (grid pattern)
        const roadWidth = 3;
        const roadPositions = [-24, -12, 0, 12, 24];
        
        // Horizontal roads
        roadPositions.forEach(z => {
            const road = new THREE.Mesh(new THREE.BoxGeometry(70, 0.2, roadWidth), roadMat);
            road.position.set(0, 0, z);
            road.receiveShadow = true;
            scene.add(road);
        });
        
        // Vertical roads
        roadPositions.forEach(x => {
            const road = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.2, 70), roadMat);
            road.position.set(x, 0, 0);
            road.receiveShadow = true;
            scene.add(road);
        });
        
        // Sidewalks (around roads)
        const sidewalkPositions = [
            [-27, -13.5], [-27, -1.5], [-27, 10.5], [-27, 22.5],
            [-15, -13.5], [-15, -1.5], [-15, 10.5], [-15, 22.5],
            [-3, -13.5], [-3, -1.5], [-3, 10.5], [-3, 22.5],
            [9, -13.5], [9, -1.5], [9, 10.5], [9, 22.5],
            [21, -13.5], [21, -1.5], [21, 10.5], [21, 22.5]
        ];
        
        sidewalkPositions.forEach(pos => {
            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 2), sidewalkMat);
            sidewalk.position.set(pos[0], 0.05, pos[1]);
            sidewalk.receiveShadow = true;
            scene.add(sidewalk);
        });
        
        // ========== BUILDINGS ==========
        
        // Building positions (x, z, width, depth, height, color)
        const buildings = [
            // Row 1 (North side)
            { x: -30, z: -30, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Bank" },
            { x: -22, z: -30, w: 5, d: 5, h: 3.5, color: 0x9a8b7a, name: "Cafe" },
            { x: -14, z: -30, w: 5, d: 5, h: 6, color: 0x7a6b5a, name: "Police Station" },
            { x: -6, z: -30, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Hospital" },
            { x: 2, z: -30, w: 5, d: 5, h: 5, color: 0x9a8b7a, name: "Hotel" },
            { x: 10, z: -30, w: 5, d: 5, h: 3.5, color: 0x8b7d6b, name: "Restaurant" },
            { x: 18, z: -30, w: 5, d: 5, h: 4, color: 0x7a6b5a, name: "Gym" },
            { x: 26, z: -30, w: 5, d: 5, h: 6, color: 0x9a8b7a, name: "Office Tower" },
            
            // Row 2
            { x: -30, z: -18, w: 5, d: 5, h: 3.5, color: 0x8b7d6b, name: "Clothing Store" },
            { x: -22, z: -18, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Electronics" },
            { x: -14, z: -18, w: 5, d: 5, h: 5, color: 0x7a6b5a, name: "Bar" },
            { x: -6, z: -18, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Bakery" },
            { x: 2, z: -18, w: 5, d: 5, h: 3.5, color: 0x9a8b7a, name: "Pharmacy" },
            { x: 10, z: -18, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Bookstore" },
            { x: 18, z: -18, w: 5, d: 5, h: 5, color: 0x7a6b5a, name: "Nightclub" },
            { x: 26, z: -18, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Arcade" },
            
            // Row 3 (Center - Main Square)
            { x: -30, z: -6, w: 5, d: 5, h: 6, color: 0x7a6b5a, name: "City Hall" },
            { x: -22, z: -6, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Museum" },
            { x: -14, z: -6, w: 5, d: 5, h: 3.5, color: 0x9a8b7a, name: "Coffee Shop" },
            { x: -6, z: -6, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Library" },
            { x: 2, z: -6, w: 5, d: 5, h: 8, color: 0xaa8866, name: "TOWER" }, // Center Tower
            { x: 10, z: -6, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Gallery" },
            { x: 18, z: -6, w: 5, d: 5, h: 5, color: 0x9a8b7a, name: "Theater" },
            { x: 26, z: -6, w: 5, d: 5, h: 4, color: 0x7a6b5a, name: "Courthouse" },
            
            // Row 4
            { x: -30, z: 6, w: 5, d: 5, h: 3.5, color: 0x8b7d6b, name: "Shoe Store" },
            { x: -22, z: 6, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Jewelry" },
            { x: -14, z: 6, w: 5, d: 5, h: 5, color: 0x7a6b5a, name: "Barbershop" },
            { x: -6, z: 6, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Flower Shop" },
            { x: 2, z: 6, w: 5, d: 5, h: 3.5, color: 0x9a8b7a, name: "Toy Store" },

            { x: 18, z: 6, w: 5, d: 5, h: 6, color: 0x7a6b5a, name: "Fitness Center" },
            { x: 26, z: 6, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Spa" },
            
            // Row 5 (South side)
            { x: -30, z: 18, w: 5, d: 5, h: 5, color: 0x8b7d6b, name: "Car Dealership" },
            { x: -22, z: 18, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Gas Station" },
            { x: -14, z: 18, w: 5, d: 5, h: 3.5, color: 0x7a6b5a, name: "Auto Repair" },

            { x: 2, z: 18, w: 5, d: 5, h: 5, color: 0x9a8b7a, name: "Supermarket" },

            { x: 18, z: 18, w: 5, d: 5, h: 3.5, color: 0x7a6b5a, name: "Furniture" },
            { x: 26, z: 18, w: 5, d: 5, h: 6, color: 0x9a8b7a, name: "Warehouse" },
            
            // Row 6 (Far south)
            { x: -30, z: 30, w: 5, d: 5, h: 4, color: 0x8b7d6b, name: "Motel" },

            { x: -14, z: 30, w: 5, d: 5, h: 4, color: 0x7a6b5a, name: "Laundromat" },
            { x: -6, z: 30, w: 5, d: 5, h: 5, color: 0x8b7d6b, name: "Pawn Shop" },
            { x: 2, z: 30, w: 5, d: 5, h: 4, color: 0x9a8b7a, name: "Liquor Store" },
            { x: 10, z: 30, w: 5, d: 5, h: 3.5, color: 0x8b7d6b, name: "Diner" },
            { x: 18, z: 30, w: 5, d: 5, h: 4, color: 0x7a6b5a, name: "Bar" },
            { x: 26, z: 30, w: 5, d: 5, h: 5, color: 0x9a8b7a, name: "Club" }
        ];
        
        // Add all buildings
        buildings.forEach(b => {
            const buildingMatColor = new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.4 });
            const building = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), buildingMatColor);
            building.position.set(b.x, b.h/2, b.z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            
            // Add roof
            const roof = new THREE.Mesh(new THREE.ConeGeometry(b.w/1.5, 0.6, 4), roofMat);
            roof.position.set(b.x, b.h + 0.3, b.z);
            roof.castShadow = true;
            scene.add(roof);
            
            // Add windows
            for (let i = 0; i < 4; i++) {
                const windowGeo = new THREE.BoxGeometry(0.8, 0.8, 0.1);
                const windowMesh = new THREE.Mesh(windowGeo, windowMat);
                const side = i % 2 === 0 ? 1 : -1;
                windowMesh.position.set(b.x + (side * (b.w/2 - 0.5)), b.h/2, b.z);
                windowMesh.castShadow = true;
                scene.add(windowMesh);
            }
            
            // Add building label (CSS2D)
            const labelDiv = document.createElement('div');
            labelDiv.textContent = b.name;
            labelDiv.style.color = '#fff';
            labelDiv.style.fontSize = '10px';
            labelDiv.style.fontWeight = 'bold';
            labelDiv.style.textShadow = '1px 1px black';
            labelDiv.style.background = 'rgba(0,0,0,0.6)';
            labelDiv.style.padding = '2px 6px';
            labelDiv.style.borderRadius = '12px';
            labelDiv.style.border = '1px solid #ffaa44';
            labelDiv.style.whiteSpace = 'nowrap';
            const label = new CSS2DObject(labelDiv);
            label.position.set(b.x, b.h + 0.8, b.z);
            scene.add(label);
        });
        
        // Add street lights at corners
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xccccaa });
        const lampPositions = [
            [-33, -33], [-33, 33], [33, -33], [33, 33],
            [-33, -21], [-33, -9], [-33, 3], [-33, 15], [-33, 27],
            [33, -21], [33, -9], [33, 3], [33, 15], [33, 27]
        ];
        
        lampPositions.forEach(pos => {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3, 6), lightMat);
            pole.position.set(pos[0], 1.5, pos[1]);
            pole.castShadow = true;
            scene.add(pole);
            
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 }));
            lamp.position.set(pos[0], 3, pos[1]);
            lamp.castShadow = true;
            scene.add(lamp);
        });
        
        // Add trees for park areas
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const treeLeavesMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c });
        
        const treePositions = [
            [-27, -27], [-27, 27], [27, -27], [27, 27],
            [-27, 0], [27, 0], [0, -27], [0, 27],
            [-18, -18], [-18, 18], [18, -18], [18, 18]
        ];
        
        treePositions.forEach(pos => {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), treeTrunkMat);
            trunk.position.set(pos[0], 0.6, pos[1]);
            trunk.castShadow = true;
            scene.add(trunk);
            
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1, 8), treeLeavesMat);
            leaves.position.set(pos[0], 1.2, pos[1]);
            leaves.castShadow = true;
            scene.add(leaves);
        });
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        function makeLabel(text, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '11px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.7)';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '15px';
            div.style.whiteSpace = 'nowrap';
            div.style.border = `1px solid ${color}`;
            return new CSS2DObject(div);
        }
        
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.35, 0.45);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.35, 0.45);
            group.add(leftEye);
            group.add(rightEye);
            
            if (isLocal) {
                const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                hat.position.y = 1.55;
                group.add(hat);
            }
            
            return group;
        }
        
        function createBloodEffect(position) {
            for (let i = 0; i < 20; i++) {
                const blood = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                blood.position.set(
                    position.x + (Math.random() - 0.5) * 1,
                    position.y + 0.1,
                    position.z + (Math.random() - 0.5) * 1
                );
                scene.add(blood);
                setTimeout(() => scene.remove(blood), 3000);
            }
        }
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            if (logDiv.children.length > 12) logDiv.removeChild(logDiv.children[0]);
            console.log(msg);
        }
        
        function updateUI() {
            document.getElementById('money').innerText = playerStats.money;
            document.getElementById('health-bar').style.width = `${playerStats.health}%`;
            document.getElementById('hunger-bar').style.width = `${playerStats.hunger}%`;
            document.getElementById('thirst-bar').style.width = `${playerStats.thirst}%`;
        }
        
        function updatePlayerList() {
            const container = document.getElementById('player-list-content');
            container.innerHTML = '';
            container.innerHTML += `<div class="player-name" style="color:#ffaa44">👤 ${myUsername} (You)</div>`;
            for (let [id, player] of otherPlayers) {
                container.innerHTML += `<div class="player-name" style="color:#aaffdd">👥 ${player.name}</div>`;
            }
        }
        
        async function killPlayer(targetId, targetName, targetPos, targetColor) {
            addLog(`💀 YOU KILLED ${targetName}! +$5000!`, 'kill');
            playerStats.money += 5000;
            playerStats.kills++;
            updateUI();
            
            await supabase.from('players').update({ is_alive: false, health: 0 }).eq('id', targetId);
            createBloodEffect(targetPos);
            
            const player = otherPlayers.get(targetId);
            if (player) {
                scene.remove(player.mesh);
                scene.remove(player.label);
                otherPlayers.delete(targetId);
                updatePlayerList();
            }
        }
        
        async function die(killerName = null) {
            if (isDead) return;
            isDead = true;
            
            const message = killerName ? `You were killed by ${killerName}!` : 'You died!';
            addLog(message, 'death');
            document.getElementById('death-message').innerHTML = message;
            
            if (localPlayerMesh) {
                createBloodEffect(localPlayerMesh.position);
                scene.remove(localPlayerMesh);
                scene.remove(localLabel);
                localPlayerMesh = null;
                localLabel = null;
            }
            
            if (myPlayerId) {
                await supabase.from('players').update({ is_alive: false, health: 0 }).eq('id', myPlayerId);
            }
            
            document.getElementById('wasted').style.display = 'flex';
        }
        
        async function respawn() {
            if (playerStats.money >= 1000) {
                playerStats.money -= 1000;
                playerStats.health = 100;
                updateUI();
                document.getElementById('wasted').style.display = 'none';
                addLog('You respawned!', 'info');
                
                const spawnPos = { x: (Math.random() - 0.5) * 40, y: 0.8, z: (Math.random() - 0.5) * 40 };
                const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
                
                await supabase.from('players').update({
                    is_alive: true, health: 100, x: spawnPos.x, y: spawnPos.y, z: spawnPos.z, color: playerColor
                }).eq('id', myPlayerId);
                
                localPlayerMesh = createPlayerModel(playerColor, true);
                localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
                scene.add(localPlayerMesh);
                
                localLabel = makeLabel(myUsername, '#ffff88');
                localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
                scene.add(localLabel);
                
                isDead = false;
                mouseX = 0; mouseY = 0; cameraPitch = 0; cameraYaw = 0;
                camera.rotation.order = 'YXZ';
                camera.rotation.y = 0;
                camera.rotation.x = 0;
            } else {
                addLog('Need $1000 to respawn!', 'info');
            }
        }
        
        async function shoot() {
            if (!localPlayerMesh || isDead || !isPointerLocked) return;
            
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const raycaster = new THREE.Raycaster(camera.position, direction, 0, 30);
            
            for (let [id, player] of otherPlayers) {
                const intersects = raycaster.intersectObject(player.mesh, true);
                if (intersects.length > 0) {
                    await killPlayer(id, player.name, player.mesh.position, player.color);
                    break;
                }
            }
            
            const flash = new THREE.PointLight(0xff6600, 1.5, 8);
            flash.position.copy(camera.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);
        }
        
        async function syncPlayers() {
            if (!currentServerId) return;
            const { data, error } = await supabase.from('players').select('*').eq('server_id', currentServerId).eq('is_alive', true);
            if (error) return;
            
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                if (otherPlayers.has(player.id)) {
                    const existing = otherPlayers.get(player.id);
                    existing.mesh.position.set(player.x, player.y, player.z);
                    existing.label.position.set(player.x, player.y + 1.6, player.z);
                } else {
                    const mesh = createPlayerModel(player.color, false);
                    mesh.position.set(player.x, player.y, player.z);
                    scene.add(mesh);
                    const label = makeLabel(player.username, '#aaffdd');
                    label.position.set(player.x, player.y + 1.6, player.z);
                    scene.add(label);
                    otherPlayers.set(player.id, { mesh, label, name: player.username, color: player.color });
                    addLog(`🟢 ${player.username} joined`, 'join');
                }
            }
            
            const currentIds = new Set(data.map(p => p.id));
            for (let [id, player] of otherPlayers) {
                if (!currentIds.has(id)) {
                    scene.remove(player.mesh);
                    scene.remove(player.label);
                    otherPlayers.delete(id);
                }
            }
            updatePlayerList();
        }
        
        async function updatePosition() {
            if (!myPlayerId || !localPlayerMesh || isDead) return;
            await supabase.from('players').update({
                x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z, last_seen: new Date().toISOString()
            }).eq('id', myPlayerId);
        }
        
        async function checkDeathStatus() {
            if (!currentServerId || !myPlayerId || isDead) return;
            const { data } = await supabase.from('players').select('is_alive').eq('id', myPlayerId).single();
            if (data && data.is_alive === false && !isDead) die();
        }
        
        async function joinServer(serverId) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                myUsername = `Player_${Math.floor(Math.random() * 1000)}`;
                document.getElementById('username').value = myUsername;
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            otherPlayers.forEach(p => { scene.remove(p.mesh); scene.remove(p.label); });
            otherPlayers.clear();
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localLabel) scene.remove(localLabel);
            
            currentServerId = serverId;
            const spawnPos = { x: (Math.random() - 0.5) * 40, y: 0.8, z: (Math.random() - 0.5) * 40 };
            const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { data, error } = await supabase.from('players').insert({
                username: myUsername, server_id: currentServerId, x: spawnPos.x, y: spawnPos.y, z: spawnPos.z,
                color: playerColor, money: playerStats.money, health: 100, is_alive: true
            }).select().single();
            
            if (error) { addLog(`Error: ${error.message}`, 'info'); return; }
            
            myPlayerId = data.id;
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            scene.add(localPlayerMesh);
            
            localLabel = makeLabel(myUsername, '#ffff88');
            localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
            scene.add(localLabel);
            
            addLog(`Joined ${currentServerId} as ${myUsername}`, 'success');
            
            mouseX = 0; mouseY = 0; cameraPitch = 0; cameraYaw = 0;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = 0;
            camera.rotation.x = 0;
            
            await syncPlayers();
            syncInterval = setInterval(() => syncPlayers(), 150);
            updateInterval = setInterval(() => updatePosition(), 50);
            setInterval(() => checkDeathStatus(), 500);
        }
        
        async function leaveServer() {
            if (myPlayerId) await supabase.from('players').delete().eq('id', myPlayerId);
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            otherPlayers.forEach(p => { scene.remove(p.mesh); scene.remove(p.label); });
            otherPlayers.clear();
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localLabel) scene.remove(localLabel);
            currentServerId = null; myPlayerId = null; isDead = false;
            addLog('Left server', 'info');
        }
        
        const keys = { w: false, s: false, a: false, d: false };
        let moveSpeed = 6;
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'tab') { e.preventDefault(); const apps = document.getElementById('phone-apps'); apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex'; }
            if (key === 'escape' && isPointerLocked) document.exitPointerLock();
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        function updateMovement() {
            if (!localPlayerMesh || isDead) return;
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            const move = new THREE.Vector3();
            if (keys.w) move.add(forward);
            if (keys.s) move.sub(forward);
            if (keys.d) move.add(right);
            if (keys.a) move.sub(right);
            
            if (move.length() > 0) move.normalize();
            move.multiplyScalar(moveSpeed * 0.016);
            
            let newPos = localPlayerMesh.position.clone().add(move);
            newPos.x = Math.min(55, Math.max(-55, newPos.x));
            newPos.z = Math.min(55, Math.max(-55, newPos.z));
            newPos.y = 0.8;
            
            localPlayerMesh.position.copy(newPos);
            localLabel.position.copy(newPos);
            localLabel.position.y += 1.6;
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.6;
        }
        
        renderer.domElement.addEventListener('click', () => { renderer.domElement.requestPointerLock(); });
        
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === renderer.domElement;
            if (isPointerLocked) {
                document.addEventListener('mousemove', onMouseMove);
                addLog('🔒 Mouse locked - Move mouse to aim!', 'info');
            } else {
                document.removeEventListener('mousemove', onMouseMove);
            }
        });
        
        function onMouseMove(e) {
            if (!isPointerLocked) return;
            mouseX += e.movementX * 0.002;
            mouseY += e.movementY * 0.002;
            mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
            cameraYaw = mouseX;
            cameraPitch = mouseY;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraYaw;
            camera.rotation.x = cameraPitch;
        }
        
        renderer.domElement.addEventListener('click', (e) => { if (isPointerLocked && !isDead) shoot(); });
        
        function showInventory() { addLog(`📦 Kills: ${playerStats.kills} | Money: $${playerStats.money}`, 'info'); }
        
        window.togglePhone = () => { const apps = document.getElementById('phone-apps'); apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex'; };
        window.respawn = respawn;
        window.showInventory = showInventory;
        
        document.getElementById('joinGame').onclick = () => joinServer(document.getElementById('serverCode').value);
        document.getElementById('leaveGame').onclick = () => leaveServer();
        document.getElementById('username').value = `Citizen_${Math.floor(Math.random() * 1000)}`;
        
        setInterval(() => {
            if (localPlayerMesh && !isDead) {
                playerStats.hunger = Math.max(0, playerStats.hunger - 0.2);
                playerStats.thirst = Math.max(0, playerStats.thirst - 0.3);
                updateUI();
            }
        }, 5000);
        
        function animate() {
            updateMovement();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        addLog('🏙️ Welcome to RP City! Explore the streets and interact with others!', 'info');
        addLog('🔫 Click game to lock mouse - Move around the city!', 'info');
        
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(800 * 3);
        for (let i = 0; i < 800; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
        scene.add(stars);
    </script>
</body>
</html>
