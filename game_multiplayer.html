        // ==================== THREE.JS SETUP ====================

        // ==================== PLAYER MODEL ====================
        function createPlayerModel(color = 0x44aaff, username = "") {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.9, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.2, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.position.y = 0.45;
            group.add(body);
            
            // Head
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), headMat);
            head.castShadow = true;
            head.position.y = 1.15;
            group.add(head);
            
            // Eyes
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
            leftEye.position.set(-0.2, 1.25, 0.48);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
            rightEye.position.set(0.2, 1.25, 0.48);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            leftPupil.position.set(-0.2, 1.23, 0.55);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            rightPupil.position.set(0.2, 1.23, 0.55);
            group.add(leftEye, rightEye, leftPupil, rightPupil);
            
            // Hat
            const hatMat = new THREE.MeshStandardMaterial({ color: 0xd43f1d });
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.45, 8), hatMat);
            hat.position.y = 1.55;
            hat.castShadow = true;
            group.add(hat);
            
            group.castShadow = true;
            
            // Label
            const labelDiv = document.createElement('div');
            labelDiv.textContent = username;
            labelDiv.style.cssText = 'color:#ffdd99; font-size:12px; font-weight:bold; background:rgba(0,0,0,0.6); padding:2px 10px; border-radius:20px; white-space:nowrap;';
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, 1.95, 0);
            group.add(label);
            
            return group;
        }
        
        function createVehicleModel(color = 0x44aaff, name = "Vehicle") {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 4.0), new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.4 }));
            body.position.y = 0.25;
            body.castShadow = true;
            group.add(body);
            
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 2.0), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            roof.position.y = 0.65;
            roof.castShadow = true;
            group.add(roof);
            
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 });
            const positions = [[-0.7, 0.1, -1.2], [0.7, 0.1, -1.2], [-0.7, 0.1, 1.2], [0.7, 0.1, 1.2]];
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.4, 16), wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            group.userData = { name, velocity: new THREE.Vector3(0, 0, 0), fuel: 100 };
            return group;
        }
        
        // ==================== MOVEMENT ====================
        function updateLocalMovement(delta) {
            if (!playerMesh) return;
            
            let moveX = 0, moveZ = 0;
            if (keys['KeyW']) moveZ -= 1;
            if (keys['KeyS']) moveZ += 1;
            if (keys['KeyA']) moveX -= 1;
            if (keys['KeyD']) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            const forward = new THREE.Vector3(Math.sin(cameraAngle), 0, Math.cos(cameraAngle));
            const right = new THREE.Vector3(Math.cos(cameraAngle), 0, -Math.sin(cameraAngle));
            
            let newX = playerMesh.position.x + (moveX * right.x + moveZ * forward.x) * moveSpeed * delta;
            let newZ = playerMesh.position.z + (moveX * right.z + moveZ * forward.z) * moveSpeed * delta;
            
            const limit = 180;
            newX = Math.min(limit, Math.max(-limit, newX));
            newZ = Math.min(limit, Math.max(-limit, newZ));
            
            playerMesh.position.set(newX, 0.7, newZ);
            
            if (moveX !== 0 || moveZ !== 0) {
                const targetRot = Math.atan2(moveX, moveZ) + cameraAngle;
                playerMesh.rotation.y = targetRot;
            }
        }
        
        function updateVehicleMovement(delta, vehicle) {
            if (!vehicle) return;
            if (!vehicle.userData.velocity) vehicle.userData.velocity = new THREE.Vector3(0, 0, 0);
            
            let throttle = 0;
            if (keys['KeyW']) throttle = 1;
            if (keys['KeyS']) throttle = -0.6;
            
            const engineForce = 5900;
            const brakeForce = 1800;
            const mass = 800;
            
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(vehicle.quaternion);
            
            if (throttle !== 0) {
                vehicle.userData.velocity.x += forward.x * throttle * engineForce * delta / mass;
                vehicle.userData.velocity.z += forward.z * throttle * engineForce * delta / mass;
            }
            
            if (keys['Space']) {
                const brakeDir = vehicle.userData.velocity.clone().normalize();
                const brake = brakeForce * delta / mass;
                vehicle.userData.velocity.x -= brakeDir.x * Math.min(brake, Math.abs(vehicle.userData.velocity.x));
                vehicle.userData.velocity.z -= brakeDir.z * Math.min(brake, Math.abs(vehicle.userData.velocity.z));
            }
            
            let steer = 0;
            if (keys['KeyA']) steer = 1;
            if (keys['KeyD']) steer = -1;
            const steeringAngle = steer * 1.2 * Math.max(0.3, 1 - vehicle.userData.velocity.length() / 70);
            vehicle.rotation.y += steeringAngle * delta * 1.5;
            
            vehicle.userData.velocity.multiplyScalar(0.985);
            
            vehicle.position.x += vehicle.userData.velocity.x * delta;
            vehicle.position.z += vehicle.userData.velocity.z * delta;
            
            if (throttle > 0 && vehicle.userData.velocity.length() > 1) {
                vehicle.userData.fuel = Math.max(0, (vehicle.userData.fuel || 100) - 0.045 * delta * 30);
            }
            
            vehicleStats.speed = vehicle.userData.velocity.length() * 4.5;
            vehicleStats.fuel = (vehicle.userData.fuel || 100);
            
            const limit = 180;
            vehicle.position.x = Math.min(limit, Math.max(-limit, vehicle.position.x));
            vehicle.position.z = Math.min(limit, Math.max(-limit, vehicle.position.z));
            vehicle.position.y = 0.25;
        }
        
        // ==================== VEHICLE ENTRY/EXIT ====================
        function enterVehicle() {
            if (isInVehicle || !playerVehicle) return;
            isInVehicle = true;
            playerMesh.visible = false;
            showNotification('🚗 Entered vehicle!', '#4ae04a');
        }
        
        function exitVehicle() {
            if (!isInVehicle) return;
            if (playerMesh && playerVehicle) {
                const exitPos = playerVehicle.position.clone().add(new THREE.Vector3(2, 0, 2));
                playerMesh.position.copy(exitPos);
                playerMesh.visible = true;
            }
            isInVehicle = false;
            showNotification('Exited vehicle', '#ffaa00');
        }
        
        // ==================== REMOTE PLAYERS ====================
        function addRemotePlayer(id, username, x, z, y, rot) {
            if (remotePlayers.has(id)) return;
            
            const mesh = createPlayerModel(0xff8844, username);
            mesh.position.set(x, z || 0, y || 0);
            mesh.rotation.y = rot || 0;
            scene.add(mesh);
            
            remotePlayers.set(id, { 
                mesh, username, x, z: z || 0, y: y || 0, rot: rot || 0, 
                lastUpdate: Date.now(), health: 100, dead: false
            });
            updatePlayerList();
        }
        
        function updateRemotePlayer(id, x, z, y, rot, health = 100, dead = false) {
            const player = remotePlayers.get(id);
            if (player) {
                player.targetX = x;
                player.targetZ = z;
                player.targetY = y;
                player.targetRot = rot;
                player.lastUpdate = Date.now();
                player.health = health;
                player.dead = dead;
            }
        }
        
        function removeRemotePlayer(id) {
            const player = remotePlayers.get(id);
            if (player) {
                scene.remove(player.mesh);
                remotePlayers.delete(id);
                updatePlayerList();
            }
        }
        
        function updatePlayerList() {
            const container = document.getElementById('players-container');
            if (!container) return;
            
            let html = '';
            for (const [id, player] of remotePlayers) {
                const isDead = player.dead ? ' 💀' : '';
                html += `<div class="player-entry">
                    <div class="player-dot ${player.dead ? 'dead' : ''}"></div>
                    <span class="player-name">${player.username}${isDead}</span>
                </div>`;
            }
            if (html === '') html = '<div style="color:#888; text-align:center;">None</div>';
            container.innerHTML = html;
        }
        
        // ==================== CAMERA ====================
        function updateCamera() {
            let target = playerMesh;
            if (isInVehicle && playerVehicle) target = playerVehicle;
            if (!target) return;
            
            if (cameraMode === 'fpv') {
                camera.position.copy(target.position);
                camera.position.y += 0.8;
                camera.rotation.order = 'YXZ';
                camera.rotation.y = cameraAngle;
                camera.rotation.x = cameraPitch;
            } else {
                const orbitX = target.position.x + Math.sin(cameraAngle) * 8;
                const orbitZ = target.position.z + Math.cos(cameraAngle) * 8;
                const orbitY = target.position.y + 2 + cameraPitch * 1.2;
                camera.position.lerp(new THREE.Vector3(orbitX, orbitY, orbitZ), 0.1);
                camera.lookAt(target.position.clone().add(new THREE.Vector3(0, 0.8, 0)));
            }
        }
        
        function toggleCamera() {
            cameraMode = cameraMode === 'tpv' ? 'fpv' : 'tpv';
            document.getElementById('camera-mode-indicator').textContent = `VIEW: ${cameraMode.toUpperCase()}`;
        }
        
        // ==================== SUPABASE SYNC ====================
        async function setupRealtime() {
            syncChannel = supabase
                .channel('players-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'players' }, (payload) => {
                    if (payload.new.id !== playerId) {
                        addRemotePlayer(payload.new.id, payload.new.username, payload.new.x, payload.new.z, payload.new.y, payload.new.rotation_y);
                    }
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'players' }, (payload) => {
                    if (payload.new.id !== playerId) {
                        updateRemotePlayer(payload.new.id, payload.new.x, payload.new.z, payload.new.y, payload.new.rotation_y, payload.new.health, payload.new.is_dead);
                    }
                })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'players' }, (payload) => {
                    removeRemotePlayer(payload.old.id);
                })
                .subscribe();
            
            // Load existing players
            const { data: existingPlayers } = await supabase.from('players').select('*').neq('id', playerId);
            if (existingPlayers) {
                existingPlayers.forEach(p => addRemotePlayer(p.id, p.username, p.x, p.z, p.y, p.rotation_y));
            }
            
            document.getElementById('status').innerHTML = '🟢 Connected';
            document.getElementById('status').style.color = '#4ae04a';
        }
        
        async function sendPlayerPosition() {
            if (!playerMesh || !playerId) return;
            
            const pos = isInVehicle && playerVehicle ? playerVehicle.position : playerMesh.position;
            const rot = isInVehicle && playerVehicle ? playerVehicle.rotation.y : playerMesh.rotation.y;
            
            await supabase.from('players').upsert({
                id: playerId,
                username: playerUsername,
                x: pos.x,
                z: pos.z,
                y: pos.y,
                rotation_y: rot,
                is_in_vehicle: isInVehicle,
                health: playerStats.health,
                is_dead: playerStats.dead,
                updated_at: new Date().toISOString()
            }, { onConflict: 'id' });
        }
        
        async function sendPlayerStats() {
            if (!playerId) return;
            
            await supabase.from('player_stats').upsert({
                player_id: playerId,
                money: gameData.money,
                bank: gameData.bank,
                updated_at: new Date().toISOString()
            }, { onConflict: 'player_id' });
        }
        
        async function loadPlayerStats() {
            const { data, error } = await supabase.from('player_stats').select('*').eq('player_id', playerId).single();
            if (data && !error) {
                gameData.money = data.money || 10000;
                gameData.bank = data.bank || 2500;
                updateMoneyDisplay();
            }
        }
        
        // ==================== AUTH ====================
        async function login(username, password) {
            try {
                document.getElementById('auth-message').textContent = 'Logging in...';
                
                const email = `${username}@gturf.local`;
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) throw new Error(error.message || 'Login failed');
                
                currentUser = data.user;
                playerId = data.user.id;
                playerUsername = username;
                
                document.getElementById('auth-modal').style.display = 'none';
                initGame();
                showNotification(`Welcome, ${playerUsername}!`, '#4ae04a');
                return true;
            } catch (error) {
                document.getElementById('auth-message').textContent = `Error: ${error.message}`;
                return false;
            }
        }
        
        async function signup(username, email, password, confirm) {
            if (password !== confirm) {
                document.getElementById('auth-message').textContent = 'Passwords do not match!';
                return false;
            }
            if (username.length < 3) {
                document.getElementById('auth-message').textContent = 'Username must be 3+ chars!';
                return false;
            }
            
            try {
                document.getElementById('auth-message').textContent = 'Creating account...';
                const { data, error } = await supabase.auth.signUp({
                    email: email || `${username}@gturf.local`,
                    password: password,
                    options: { data: { username } }
                });
                
                if (error) throw new Error(error.message || 'Signup failed');
                
                showNotification('Account created! Please login.', '#4ae04a');
                document.getElementById('login-tab').click();
                document.getElementById('login-username').value = username;
                return true;
            } catch (error) {
                document.getElementById('auth-message').textContent = `Error: ${error.message}`;
                return false;
            }
        }
        
        // ==================== GAME INIT ====================
        function initGame() {
            initThree();
            
            playerMesh = createPlayerModel(0x44aaff, playerUsername);
            playerMesh.position.set(0, 0.7, 0);
            scene.add(playerMesh);
            
            playerVehicle = createVehicleModel(0x44aaff, "Test Vehicle");
            playerVehicle.position.set(5, 0.25, 5);
            scene.add(playerVehicle);
            
            // Event listeners
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyE' && !e.repeat) {
                    if (isInVehicle) exitVehicle();
                    else if (playerMesh.position.distanceTo(playerVehicle.position) < 2.5) enterVehicle();
                }
                if (e.code === 'KeyV') toggleCamera();
            });
            
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    cameraAngle -= e.movementX * 0.0025;
                    cameraPitch -= e.movementY * 0.0025;
                    cameraPitch = Math.max(-0.8, Math.min(0.8, cameraPitch));
                }
            });
            
            renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
            
            setupRealtime();
            loadPlayerStats();
            
            // Animation loop
            let lastTime = performance.now();
            
            function animate() {
                const now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                
                if (isInVehicle && playerVehicle) {
                    updateVehicleMovement(delta, playerVehicle);
                    playerMesh.position.copy(playerVehicle.position);
                } else {
                    updateLocalMovement(delta);
                }
                
                updateCamera();
                
                if (now - lastSendTime > sendInterval * 1000) {
                    lastSendTime = now;
                    sendPlayerPosition();
                }
                
                if (now - lastStatsSendTime > statsSendInterval * 1000) {
                    lastStatsSendTime = now;
                    sendPlayerStats();
                }
                
                for (const [id, player] of remotePlayers) {
                    if (player.targetX !== undefined) {
                        player.mesh.position.x += (player.targetX - player.mesh.position.x) * 0.2;
                        player.mesh.position.z += (player.targetZ - player.mesh.position.z) * 0.2;
                        if (player.targetRot !== undefined) {
                            player.mesh.rotation.y += (player.targetRot - player.mesh.rotation.y) * 0.2;
                        }
                    }
                }
                
                updateHUD();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        // ==================== UI EVENT LISTENERS ====================
        document.getElementById('login-btn')?.addEventListener('click', () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            if (username && password) login(username, password);
            else document.getElementById('auth-message').textContent = 'Enter username and password';
        });
        
        document.getElementById('signup-btn')?.addEventListener('click', () => {
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            signup(username, email, password, confirm);
        });
        
        document.getElementById('login-tab')?.addEventListener('click', () => {
            document.getElementById('login-form').style.display = 'flex';
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-tab').classList.add('active');
            document.getElementById('signup-tab').classList.remove('active');
        });
        
        document.getElementById('signup-tab')?.addEventListener('click', () => {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'flex';
            document.getElementById('signup-tab').classList.add('active');
            document.getElementById('login-tab').classList.remove('active');
        });
        
        // Check for existing session
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session?.user) {
                currentUser = session.user;
                playerId = session.user.id;
                playerUsername = session.user.user_metadata?.username || session.user.email?.split('@')[0] || 'Player';
                document.getElementById('auth-modal').style.display = 'none';
                initGame();
                showNotification(`Welcome back, ${playerUsername}!`, '#4ae04a');
            }
        });
    </script>
</body>
</html>
