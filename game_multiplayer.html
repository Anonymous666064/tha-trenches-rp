<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Multiplayer World - Live Characters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        /* UI Panel */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 20, 15, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 24px;
            color: white;
            z-index: 100;
            border: 1px solid rgba(0, 255, 136, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 320px;
            pointer-events: auto;
            font-weight: 500;
            transition: 0.2s;
        }

        h3 {
            margin: 0 0 15px 0;
            color: #00ffaa;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            background: linear-gradient(135deg, #00dd88, #00aa55);
            border: none;
            padding: 10px 20px;
            margin: 5px 6px;
            cursor: pointer;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #22ff99, #00cc66);
            box-shadow: 0 6px 14px rgba(0,255,100,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        input {
            padding: 10px 14px;
            margin: 5px;
            border-radius: 40px;
            border: 1px solid #00ffaa;
            background: #1e2a24;
            color: white;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ffaa44;
            box-shadow: 0 0 8px #ffaa44;
        }

        .status {
            margin-top: 14px;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            font-weight: 500;
        }

        .success {
            color: #88ff88;
            border-left: 3px solid #88ff88;
        }

        .error {
            color: #ff8888;
            border-left: 3px solid #ff8888;
        }

        .info {
            color: #ffcc88;
            border-left: 3px solid #ffcc88;
        }

        #playersList {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-radius: 24px;
            color: white;
            font-size: 14px;
            border: 1px solid #00ffaa;
            min-width: 200px;
            z-index: 100;
            pointer-events: none;
            text-align: left;
            font-weight: 500;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 40px;
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .code-badge {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }

        #leaveBtn {
            margin-top: 14px;
            background: #e34d4d;
            width: 100%;
            background: linear-gradient(135deg, #ff5555, #cc3333);
        }

        #leaveBtn:hover {
            background: linear-gradient(135deg, #ff6666, #dd4444);
        }

        hr {
            border-color: #00ffaa40;
            margin: 8px 0;
        }

        @media (max-width: 700px) {
            #ui { min-width: 260px; padding: 14px; }
            button { padding: 8px 14px; font-size: 12px; }
            .controls { font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="ui">
    <h3>✨ 3D MULTIPLAYER ARENA</h3>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button id="hostBtn">🌟 CREATE GAME</button>
        <input type="text" id="customCode" placeholder="CUSTOM 6-CODE" maxlength="6" style="width: 120px; text-transform: uppercase;">
    </div>
    <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
        <input type="text" id="joinCode" placeholder="ENTER 6-DIGIT CODE" maxlength="6" style="width: 140px; text-transform: uppercase;">
        <button id="joinBtn">🔗 JOIN GAME</button>
    </div>
    <div id="gameInfo" class="status info">✨ Ready to explore the 3D world</div>
    <div id="activeCode" style="margin-top: 8px; text-align: center;"></div>
</div>

<div id="playersList">
    <strong>👥 PLAYERS ONLINE</strong>
    <hr>
    <div id="players">✨ Waiting for players...</div>
</div>

<div class="controls">
    🎮 WASD to move | 🌟 Explore vibrant world!
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
    import * as THREE from 'three';

    // ==================== SUPABASE CONFIG ====================
    const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== GLOBAL STATE ====================
    let currentSession = null;
    let myPlayerId = null;
    let isHost = false;
    let players = new Map(); // id -> { mesh, name, lastX, lastZ }
    let localPlayerMesh = null;
    let scene, camera, renderer;
    let keys = { w: false, s: false, a: false, d: false };
    let subscription = null;
    let lastPositionUpdate = 0;
    let heartbeatInterval = null;
    let cleanupInterval = null;

    // ==================== 3D WORLD - FULLY IMMERSIVE ====================
    function init3DWorld() {
        console.log("🎨 Building 3D world...");
        try {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1030);
            scene.fog = new THREE.FogExp2(0x0a1030, 0.025);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 9, 18);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            console.log("✅ Renderer created and added to DOM");

            // ---- GROUND ----
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a8c5a, roughness: 0.7, metalness: 0.05 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(34, 34), groundMat);
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -0.6;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);

            // decorative grid
            const gridHelper = new THREE.GridHelper(34, 24, 0x88ffaa, 0x448866);
            gridHelper.position.y = -0.55;
            scene.add(gridHelper);

            // ---- grass patches ----
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x6cae5a });
            for (let i = 0; i < 320; i++) {
                const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.25, 3), grassMat);
                const x = (Math.random() - 0.5) * 28;
                const z = (Math.random() - 0.5) * 28;
                blade.position.set(x, -0.5, z);
                blade.castShadow = false;
                blade.receiveShadow = true;
                scene.add(blade);
            }

            // ---- trees ----
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0xbd7a4a });
            const leafMatGreen = new THREE.MeshStandardMaterial({ color: 0x6fbf4c });
            const leafMatGold = new THREE.MeshStandardMaterial({ color: 0xe8b55a });
            
            for (let i = 0; i < 45; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 10 + Math.random() * 7;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 1.6, 6), trunkMat);
                trunk.position.set(x, -0.4, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leafType = Math.random() > 0.6 ? leafMatGold : leafMatGreen;
                const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.75, 1.0, 8), leafType);
                foliage1.position.set(x, 0.5, z);
                foliage1.castShadow = true;
                scene.add(foliage1);
                
                const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.9, 8), leafType);
                foliage2.position.set(x, 1.1, z);
                foliage2.castShadow = true;
                scene.add(foliage2);
            }

            // ---- floating magic orbs ----
            const orbColors = [0xff44aa, 0x44ffcc, 0xffaa44, 0x66aaff, 0xff6688];
            for (let i = 0; i < 140; i++) {
                const color = orbColors[Math.floor(Math.random() * orbColors.length)];
                const orbMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.35 });
                const orb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), orbMat);
                const rad = Math.random() * Math.PI * 2;
                const radDist = 4 + Math.random() * 12;
                orb.position.x = Math.cos(rad) * radDist;
                orb.position.z = Math.sin(rad) * radDist;
                orb.position.y = 0.7 + Math.random() * 2.8;
                orb.castShadow = true;
                scene.add(orb);
            }

            // ---- floating particles ----
            const particleCount = 900;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 36;
                particlePositions[i*3+1] = Math.random() * 5;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 32;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.06, transparent: true, opacity: 0.6 });
            const particlesSys = new THREE.Points(particleGeo, particleMat);
            scene.add(particlesSys);

            // ---- lighting ----
            const ambientLight = new THREE.AmbientLight(0x40405c, 0.65);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xfff5cf, 1.3);
            mainLight.position.set(12, 22, 6);
            mainLight.castShadow = true;
            mainLight.receiveShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 35;
            mainLight.shadow.camera.left = -14;
            mainLight.shadow.camera.right = 14;
            mainLight.shadow.camera.top = 14;
            mainLight.shadow.camera.bottom = -14;
            scene.add(mainLight);
            
            const backFill = new THREE.PointLight(0x6688ff, 0.55);
            backFill.position.set(-4, 6, -8);
            scene.add(backFill);
            
            const warmFill = new THREE.PointLight(0xffaa66, 0.5);
            warmFill.position.set(5, 4, 6);
            scene.add(warmFill);
            
            const rimGlow = new THREE.PointLight(0xff88aa, 0.45);
            rimGlow.position.set(-3, 5, 9);
            scene.add(rimGlow);
            
            // decorative central crystal
            const centralCrystal = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.8, 1.2, 8),
                new THREE.MeshStandardMaterial({ color: 0x77aaff, emissive: 0x2266aa, emissiveIntensity: 0.4 })
            );
            centralCrystal.position.set(0, -0.2, 0);
            centralCrystal.castShadow = true;
            scene.add(centralCrystal);
            
            console.log("✅ 3D world ready with lighting & details");
            startAnimation();
        } catch (err) {
            console.error("3D init error:", err);
        }
    }

    // ========== CREATE STYLIZED CHARACTER ==========
    function buildPlayerModel(primaryColor, isLocal = false) {
        const group = new THREE.Group();
        
        // body
        const bodyMat = new THREE.MeshStandardMaterial({ color: primaryColor, roughness: 0.25, metalness: 0.1 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.9, 12), bodyMat);
        body.position.y = 0.45;
        body.castShadow = true;
        group.add(body);
        
        // head
        const headMat = new THREE.MeshStandardMaterial({ color: 0xfcd7a0, roughness: 0.2 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), headMat);
        head.position.y = 1.0;
        head.castShadow = true;
        group.add(head);
        
        // eyes
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeWhiteMat);
        leftEye.position.set(-0.19, 1.12, 0.52);
        group.add(leftEye);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeWhiteMat);
        rightEye.position.set(0.19, 1.12, 0.52);
        group.add(rightEye);
        
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
        leftPupil.position.set(0, 0, 0.1);
        leftEye.add(leftPupil);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
        rightPupil.position.set(0, 0, 0.1);
        rightEye.add(rightPupil);
        
        // crown for local player
        if (isLocal) {
            const hatBase = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.62, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0x442200 }));
            hatBase.position.y = 1.38;
            group.add(hatBase);
            for (let i = 0; i < 5; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.4, 6), new THREE.MeshStandardMaterial({ color: 0xffdd88 }));
                const ang = (i / 5) * Math.PI * 2;
                spike.position.x = Math.cos(ang) * 0.45;
                spike.position.z = Math.sin(ang) * 0.45;
                spike.position.y = 1.52;
                group.add(spike);
            }
        } else {
            const tinyGem = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 }));
            tinyGem.position.set(0, 1.32, 0.45);
            group.add(tinyGem);
        }
        return group;
    }

    function addPlayerToScene(playerId, x, z, isLocal = false) {
        if (!scene) return null;
        const color = isLocal ? 0x66ffaa : 0xffaa66;
        const model = buildPlayerModel(color, isLocal);
        model.position.set(x, -0.2, z);
        scene.add(model);
        players.set(playerId, { mesh: model, name: playerId.slice(0, 6), lastX: x, lastZ: z });
        if (isLocal) localPlayerMesh = model;
        updatePlayerUI();
        return model;
    }

    function removePlayerFromScene(playerId) {
        const entry = players.get(playerId);
        if (entry && scene) {
            scene.remove(entry.mesh);
            players.delete(playerId);
            updatePlayerUI();
        }
    }

    function updatePlayerUI() {
        const container = document.getElementById('players');
        if (!container) return;
        if (players.size === 0) {
            container.innerHTML = '✨ No players yet...';
            return;
        }
        let html = '';
        for (let [id, p] of players) {
            const isMe = id === myPlayerId;
            const crown = (isHost && isMe) ? '👑 ' : '';
            const youTag = isMe ? ' (YOU)' : '';
            html += `${crown}🎮 ${p.name}${youTag}<br>`;
        }
        container.innerHTML = html;
    }

    // ========== MOVEMENT & SYNC ==========
    function handleMovementAndCamera() {
        if (!localPlayerMesh || !currentSession) return;
        let moved = false;
        let newX = localPlayerMesh.position.x;
        let newZ = localPlayerMesh.position.z;
        const speed = 0.21;
        
        if (keys.w) { newZ -= speed; moved = true; }
        if (keys.s) { newZ += speed; moved = true; }
        if (keys.a) { newX -= speed; moved = true; }
        if (keys.d) { newX += speed; moved = true; }
        
        const bound = 13.5;
        newX = Math.min(bound, Math.max(-bound, newX));
        newZ = Math.min(bound, Math.max(-bound, newZ));
        
        if (moved) {
            localPlayerMesh.position.set(newX, -0.2, newZ);
            // smooth camera follow
            const targetCamX = newX * 0.35;
            const targetCamZ = newZ + 12;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.position.y = 8.5;
            camera.lookAt(newX, 1.2, newZ);
            
            const now = Date.now();
            if (now - lastPositionUpdate > 65) {
                updatePositionInDB(newX, newZ);
                lastPositionUpdate = now;
            }
        } else {
            // idle camera follow
            const targetCamX = localPlayerMesh.position.x * 0.3;
            const targetCamZ = localPlayerMesh.position.z + 12;
            camera.position.x += (targetCamX - camera.position.x) * 0.05;
            camera.position.z += (targetCamZ - camera.position.z) * 0.05;
            camera.lookAt(localPlayerMesh.position.x, 1.2, localPlayerMesh.position.z);
        }
    }
    
    async function updatePositionInDB(x, z) {
        if (!currentSession || !myPlayerId) return;
        try {
            await supabase
                .from('players')
                .update({ pos_x: x, pos_z: z, last_seen: new Date() })
                .eq('player_id', myPlayerId);
        } catch(e) { /* silent */ }
    }
    
    async function sendHeartbeat() {
        if (!currentSession || !myPlayerId) return;
        try {
            await supabase.from('players').update({ last_seen: new Date() }).eq('player_id', myPlayerId);
        } catch(e) {}
    }
    
    async function cleanupZombiePlayers() {
        if (!currentSession) return;
        const cutoff = new Date(Date.now() - 12000);
        const { data, error } = await supabase
            .from('players')
            .select('player_id')
            .eq('session_id', currentSession)
            .lt('last_seen', cutoff.toISOString());
        if (error) return;
        for (let p of data) {
            if (p.player_id !== myPlayerId) {
                await supabase.from('players').delete().eq('player_id', p.player_id);
                console.log(`🧹 removed zombie: ${p.player_id.slice(0,6)}`);
            }
        }
    }

    // ========== DATABASE & SESSION LOGIC ==========
    async function createGameSession(customCode) {
        let code = customCode?.toUpperCase().trim();
        if (!code || code.length !== 6) {
            code = Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        const { data: existing } = await supabase.from('game_sessions').select('session_code').eq('session_code', code);
        if (existing && existing.length > 0) throw new Error('❌ Code already exists');
        const { error } = await supabase.from('game_sessions').insert({ session_code: code });
        if (error) throw error;
        return code;
    }
    
    async function joinGameSession(code) {
        const { data, error } = await supabase.from('game_sessions').select('session_code').eq('session_code', code.toUpperCase()).maybeSingle();
        if (error || !data) throw new Error('Game not found');
        return code.toUpperCase();
    }
    
    async function registerPlayer(sessionCode, isHostPlayer) {
        myPlayerId = 'p_' + Math.random().toString(36).substring(2, 12);
        isHost = isHostPlayer;
        const startX = (Math.random() - 0.5) * 10;
        const startZ = (Math.random() - 0.5) * 10;
        const { error } = await supabase.from('players').insert({
            player_id: myPlayerId,
            session_id: sessionCode,
            pos_x: startX,
            pos_z: startZ,
            last_seen: new Date()
        });
        if (error) throw error;
        addPlayerToScene(myPlayerId, startX, startZ, true);
        await loadExistingPlayers(sessionCode);
        subscribeToDBChanges(sessionCode);
        
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => sendHeartbeat(), 2800);
        if (cleanupInterval) clearInterval(cleanupInterval);
        cleanupInterval = setInterval(() => cleanupZombiePlayers(), 5000);
    }
    
    async function loadExistingPlayers(sessionCode) {
        const { data, error } = await supabase.from('players').select('*').eq('session_id', sessionCode);
        if (error) return;
        for (let p of data) {
            if (p.player_id !== myPlayerId && !players.has(p.player_id)) {
                addPlayerToScene(p.player_id, p.pos_x, p.pos_z, false);
            }
        }
    }
    
    function subscribeToDBChanges(sessionCode) {
        if (subscription) supabase.removeChannel(subscription);
        subscription = supabase
            .channel(`players_live:${sessionCode}`)
            .on('postgres_changes', {
                event: '*', schema: 'public', table: 'players',
                filter: `session_id=eq.${sessionCode}`
            }, (payload) => {
                if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                    addPlayerToScene(payload.new.player_id, payload.new.pos_x, payload.new.pos_z, false);
                }
                else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                    const existing = players.get(payload.new.player_id);
                    if (existing) {
                        existing.mesh.position.set(payload.new.pos_x, -0.2, payload.new.pos_z);
                        existing.lastX = payload.new.pos_x;
                        existing.lastZ = payload.new.pos_z;
                    }
                }
                else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                    removePlayerFromScene(payload.old.player_id);
                }
            })
            .subscribe();
    }
    
    async function leaveGame() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (cleanupInterval) clearInterval(cleanupInterval);
        if (subscription) supabase.removeChannel(subscription);
        if (myPlayerId) await supabase.from('players').delete().eq('player_id', myPlayerId);
        if (isHost && currentSession) await supabase.from('game_sessions').delete().eq('session_code', currentSession);
        for (let [id, p] of players) if (p.mesh && scene) scene.remove(p.mesh);
        players.clear();
        localPlayerMesh = null;
        currentSession = null;
        myPlayerId = null;
        isHost = false;
        document.getElementById('hostBtn').disabled = false;
        document.getElementById('joinBtn').disabled = false;
        const leaveBtn = document.getElementById('leaveBtn');
        if (leaveBtn) leaveBtn.remove();
        document.getElementById('gameInfo').innerHTML = '✨ Left the game. Ready!';
        document.getElementById('gameInfo').className = 'status info';
        document.getElementById('activeCode').innerHTML = '';
        document.getElementById('players').innerHTML = '✨ Waiting for players...';
        if (camera) { camera.position.set(0, 9, 18); camera.lookAt(0, 0, 0); }
    }
    
    function addLeaveButtonUI() {
        if (document.getElementById('leaveBtn')) return;
        const btn = document.createElement('button');
        btn.id = 'leaveBtn';
        btn.textContent = '🚪 LEAVE GAME';
        btn.style.marginTop = '12px';
        btn.style.width = '100%';
        btn.onclick = async () => { await leaveGame(); };
        document.getElementById('ui').appendChild(btn);
    }
    
    // ========== UI CONTROLS ==========
    let connectingLock = false;
    document.getElementById('hostBtn').onclick = async () => {
        if (connectingLock) return;
        connectingLock = true;
        const custom = document.getElementById('customCode').value;
        try {
            const code = await createGameSession(custom);
            currentSession = code;
            await registerPlayer(code, true);
            document.getElementById('gameInfo').innerHTML = `✅ GAME READY! Code: <strong>${code}</strong><br>Share to invite friends`;
            document.getElementById('gameInfo').className = 'status success';
            document.getElementById('activeCode').innerHTML = `<div class="code-badge">🔑 ${code}</div>`;
            document.getElementById('hostBtn').disabled = true;
            document.getElementById('joinBtn').disabled = true;
            addLeaveButtonUI();
        } catch (err) {
            document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
            document.getElementById('gameInfo').className = 'status error';
        } finally { connectingLock = false; }
    };
    
    document.getElementById('joinBtn').onclick = async () => {
        if (connectingLock) return;
        connectingLock = true;
        const code = document.getElementById('joinCode').value.trim();
        if (!code) {
            document.getElementById('gameInfo').innerHTML = '❌ Enter a game code';
            document.getElementById('gameInfo').className = 'status error';
            connectingLock = false; return;
        }
        try {
            const sessionCode = await joinGameSession(code);
            currentSession = sessionCode;
            await registerPlayer(sessionCode, false);
            document.getElementById('gameInfo').innerHTML = `✅ Joined game: ${sessionCode}`;
            document.getElementById('gameInfo').className = 'status success';
            document.getElementById('activeCode').innerHTML = `<div class="code-badge">🎮 ${sessionCode}</div>`;
            document.getElementById('hostBtn').disabled = true;
            document.getElementById('joinBtn').disabled = true;
            addLeaveButtonUI();
        } catch (err) {
            document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
            document.getElementById('gameInfo').className = 'status error';
        } finally { connectingLock = false; }
    };
    
    // FIXED: Keyboard event handlers with proper error checking
    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        // Only handle WASD keys and prevent default for them
        if (k === 'w' || k === 's' || k === 'a' || k === 'd') {
            keys[k] = true;
            e.preventDefault();
        }
    });
    
    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        // Only update WASD keys
        if (k === 'w' || k === 's' || k === 'a' || k === 'd') {
            keys[k] = false;
            e.preventDefault();
        }
    });
    
    window.addEventListener('beforeunload', async () => {
        if (myPlayerId) await supabase.from('players').delete().eq('player_id', myPlayerId);
        if (isHost && currentSession) await supabase.from('game_sessions').delete().eq('session_code', currentSession);
    });
    
    function startAnimation() {
        function animate() {
            requestAnimationFrame(animate);
            handleMovementAndCamera();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        animate();
    }
    
    // BOOTSTRAP WORLD - Ensure it runs
    console.log("🎮 Starting game...");
    init3DWorld();
    console.log("🎮 3D multiplayer world fully operational");
</script>
</body>
</html>
