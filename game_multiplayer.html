<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RP Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

/* MENUS */
.screen {
    position:absolute;
    width:100%; height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    color:white;
}

.hidden { display:none; }

button, input {
    padding:10px;
    margin:10px;
    font-size:16px;
}

#gameCanvas { display:none; }
</style>
</head>

<body>

<!-- MAIN MENU -->
<div id="menu" class="screen">
    <h1>RP GAME</h1>
    <button onclick="selectMode('single')">Story Mode</button>
    <button onclick="selectMode('multi')">Multiplayer</button>
</div>

<!-- AUTH -->
<div id="auth" class="screen hidden">
    <h2>Login / Signup</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
</div>

<!-- SERVER MENU -->
<div id="serverMenu" class="screen hidden">
    <h2>Multiplayer</h2>
    <input id="serverCode" placeholder="Server Code">
    <button onclick="createServer()">Create Server</button>
    <button onclick="joinServer()">Join Server</button>
</div>

<!-- PAUSE -->
<div id="pauseMenu" class="screen hidden">
    <h2>Paused</h2>
    <button onclick="resumeGame()">Resume</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE (FIXED)
========================= */
const sb = window.supabase.createClient(
  "https://hcvewiwhtxqpbogcrukk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw"
);

/* =========================
   GLOBAL STATE
========================= */
let mode = null;
let user = null;
let serverId = null;

/* =========================
   MENU FLOW
========================= */
window.selectMode = function(m){
    mode = m;
    menu.classList.add("hidden");
    auth.classList.remove("hidden");
}

window.login = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if(error) return alert(error.message);

    user = data.user;
    afterAuth();
}

window.signup = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await sb.auth.signUp({ email, password });

    if(error) return alert(error.message);

    alert("Account created! Now login.");
}

function afterAuth(){
    auth.classList.add("hidden");

    if(mode === "multi"){
        serverMenu.classList.remove("hidden");
    } else {
        startGame();
    }
}

/* =========================
   SERVER SYSTEM
========================= */
window.createServer = async function(){
    const code = document.getElementById("serverCode").value;

    const { data, error } = await sb
        .from("servers")
        .insert([{ code }])
        .select();

    if(error) return alert(error.message);

    serverId = data[0].id;
    startGame();
}

window.joinServer = async function(){
    const code = document.getElementById("serverCode").value;

    const { data, error } = await sb
        .from("servers")
        .select("*")
        .eq("code", code)
        .single();

    if(error) return alert("Server not found");

    serverId = data.id;
    startGame();
}

/* =========================
   THREE.JS WORLD
========================= */
let scene, camera, renderer, player;

function startGame(){
    serverMenu.classList.add("hidden");
    gameCanvas.style.display = "block";

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,2,5);

    renderer = new THREE.WebGLRenderer({ canvas: gameCanvas });
    renderer.setSize(window.innerWidth, window.innerHeight);

    /* GROUND */
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(500,500),
        new THREE.MeshStandardMaterial({ color:0x228822 })
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    /* LIGHT */
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10,20,10);
    scene.add(light);

    /* PLAYER */
    player = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({ color:0x00ffcc })
    );
    player.position.set(0,1,0);
    scene.add(player);

    animate();
}

/* =========================
   CONTROLS
========================= */
let keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(e.key === "Escape"){
        pauseMenu.classList.remove("hidden");
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function movePlayer(){
    const speed = 0.1;

    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;

    camera.position.x = player.position.x;
    camera.position.z = player.position.z + 5;
}

/* =========================
   LOOP
========================= */
let time = 0;

function animate(){
    requestAnimationFrame(animate);

    movePlayer();

    time += 0.002;
    scene.background = new THREE.Color().setHSL(0.6,1,Math.abs(Math.sin(time)));

    renderer.render(scene, camera);
}

/* =========================
   PAUSE
========================= */
window.resumeGame = function(){
    pauseMenu.classList.add("hidden");
}

/* =========================
   RESIZE
========================= */
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
