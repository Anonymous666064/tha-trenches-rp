<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer PVP Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e2a3a, #0f1720);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            border: 1px solid rgba(255, 170, 102, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .modal-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #ffaa66, #ff8844);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: rgba(30, 40, 55, 0.9);
            border: 1px solid #3a4a5a;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        input:focus {
            border-color: #ffaa66;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: linear-gradient(135deg, #ffaa66, #ff8844);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .error {
            color: #ff8866;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .success {
            color: #66ff99;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .link {
            text-align: center;
            margin-top: 15px;
            color: #8a9bb0;
            cursor: pointer;
        }
        
        .link a {
            color: #ffaa66;
            text-decoration: none;
        }
        
        .hidden {
            display: none;
        }
        
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        
        #health-bar {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 300px;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            padding: 5px;
            z-index: 10;
        }
        
        #health-fill {
            height: 25px;
            background: linear-gradient(90deg, #ff4444, #ff8844);
            border-radius: 8px;
            transition: width 0.2s;
        }
        
        #server-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            color: #ffaa66;
            font-family: monospace;
            text-align: right;
            z-index: 10;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
        }
        
        #controls kbd {
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            color: #ffaa66;
        }
        
        #lock-message {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 15px 30px;
            border-radius: 40px;
            color: white;
            font-family: monospace;
            font-size: 18px;
            border: 1px solid #ffaa66;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">⚔️ PVP ARENA ⚔️</div>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">LOGIN</button>
            <div id="login-error" class="error"></div>
            <div class="link">Don't have an account? <a id="show-signup">Sign Up</a></div>
        </div>
    </div>
    
    <div id="signup-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">📝 CREATE ACCOUNT</div>
            <input type="text" id="signup-username" placeholder="Username (min 3 characters)">
            <input type="password" id="signup-password" placeholder="Password (min 4 characters)">
            <input type="password" id="signup-confirm" placeholder="Confirm Password">
            <button id="signup-btn">SIGN UP</button>
            <div id="signup-error" class="error"></div>
            <div class="link">Already have an account? <a id="show-login">Login</a></div>
        </div>
    </div>
    
    <div id="server-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">🏰 SERVER</div>
            <button id="create-server-btn">✨ CREATE NEW SERVER</button>
            <div style="text-align: center; margin: 10px 0; color: #8a9bb0;">OR</div>
            <input type="text" id="join-code" placeholder="Enter Server Code">
            <button id="join-server-btn">🔗 JOIN SERVER</button>
            <div id="server-error" class="error"></div>
        </div>
    </div>
    
    <div id="game-ui" class="hidden">
        🎮 <span id="player-name">Player</span>
    </div>
    <div id="health-bar" class="hidden">
        <div id="health-fill" style="width: 100%"></div>
    </div>
    <div id="server-info" class="hidden">
        🏰 Server: <span id="server-code-display"></span>
    </div>
    <div id="controls" class="hidden">
        🖱️ <kbd>CLICK</kbd> lock | <kbd>WASD</kbd> move | <kbd>SPACE</kbd> jump | <kbd>LEFT CLICK</kbd> punch!
    </div>
    <div id="lock-message" class="hidden">🔒 Click to lock mouse and play!</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // ==================== SUPABASE CONFIG ====================
        // REPLACE WITH YOUR SUPABASE URL AND ANON KEY
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key-here';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ==================== GAME STATE ====================
        let currentUser = null;
        let currentServer = null;
        let gameActive = false;
        let localPlayerHealth = 100;
        let localPlayerMesh = null;
        let otherPlayers = {};
        let lastAttackTime = 0;
        const ATTACK_COOLDOWN = 800;
        const ATTACK_DAMAGE = 25;
        const ATTACK_RANGE = 2.5;
        
        let moveState = { forward: false, backward: false, left: false, right: false, jump: false };
        let isGrounded = true;
        let verticalVelocity = 0;
        const GRAVITY = 20;
        const JUMP_FORCE = 8;
        let mouseLockActive = false;
        let yaw = 0;
        let pitch = 0;
        
        // Three.js
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.008);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        sunLight.position.set(10, 15, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a6e5a, roughness: 0.85 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const gridHelper = new THREE.GridHelper(50, 25, 0x88aaff, 0x446688);
        gridHelper.position.y = -0.05;
        scene.add(gridHelper);
        
        const MAIN_SPAWN = { x: 0, z: 0 };
        const RESPAWN_POINTS = [
            { x: 12, z: 12 }, { x: -12, z: 12 }, { x: 12, z: -12 }, { x: -12, z: -12 },
            { x: 8, z: -8 }, { x: -8, z: 8 }, { x: 0, z: 15 }, { x: 15, z: 0 }
        ];
        
        function getRandomRespawn() {
            return RESPAWN_POINTS[Math.floor(Math.random() * RESPAWN_POINTS.length)];
        }
        
        function createPlayerModel(color, username) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.55, 0.55, 1.0, 24),
                new THREE.MeshStandardMaterial({ color: color, metalness: 0.3 })
            );
            body.castShadow = true;
            body.position.y = 0.5;
            group.add(body);
            
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 16),
                new THREE.MeshStandardMaterial({ color: 0x88ccff })
            );
            head.position.y = 1.05;
            head.castShadow = true;
            group.add(head);
            
            return group;
        }
        
        async function callFunction(funcName, params) {
            try {
                const { data, error } = await supabase.rpc(funcName, params);
                if (error) throw error;
                return data;
            } catch (err) {
                console.error(`Error calling ${funcName}:`, err);
                throw err;
            }
        }
        
        async function signup(username, password) {
            if (username.length < 3) throw new Error('Username must be at least 3 characters');
            if (password.length < 4) throw new Error('Password must be at least 4 characters');
            return await callFunction('create_user', { p_username: username, p_password: password });
        }
        
        async function login(username, password) {
            return await callFunction('login_user', { p_username: username, p_password: password });
        }
        
        async function createServer(hostUsername) {
            return await callFunction('create_server', { p_host_username: hostUsername });
        }
        
        async function joinServer(serverCode, username) {
            return await callFunction('join_server', { p_server_code: serverCode, p_username: username });
        }
        
        async function getServerPlayers(serverCode) {
            return await callFunction('get_server_players', { p_server_code: serverCode });
        }
        
        async function updatePlayerState(serverCode, username, x, z, health) {
            await callFunction('update_player_state', {
                p_server_code: serverCode,
                p_username: username,
                p_x: x,
                p_z: z,
                p_health: health
            });
        }
        
        async function performAttack(serverCode, attacker, victim, damage) {
            return await callFunction('handle_attack', {
                p_server_code: serverCode,
                p_attacker: attacker,
                p_victim: victim,
                p_damage: damage
            });
        }
        
        async function respawn(serverCode, username, x, z) {
            await callFunction('respawn_player', {
                p_server_code: serverCode,
                p_username: username,
                p_x: x,
                p_z: z
            });
        }
        
        let syncInterval;
        
        async function syncGameState() {
            if (!currentServer || !currentUser || !gameActive) return;
            
            try {
                const players = await getServerPlayers(currentServer);
                
                for (const player of players) {
                    if (player.username === currentUser.username) {
                        localPlayerHealth = player.health;
                        const percent = (localPlayerHealth / 100) * 100;
                        document.getElementById('health-fill').style.width = `${percent}%`;
                        
                        if (localPlayerHealth <= 0) {
                            const respawnPoint = getRandomRespawn();
                            localPlayerMesh.position.set(respawnPoint.x, 0.55, respawnPoint.z);
                            await respawn(currentServer, currentUser.username, respawnPoint.x, respawnPoint.z);
                            localPlayerHealth = 100;
                        }
                    } else {
                        if (!otherPlayers[player.username]) {
                            const mesh = createPlayerModel(0xff6666, player.username);
                            scene.add(mesh);
                            otherPlayers[player.username] = mesh;
                        }
                        otherPlayers[player.username].position.set(player.position_x, 0.55, player.position_z);
                    }
                }
                
                for (const username in otherPlayers) {
                    if (!players.find(p => p.username === username)) {
                        scene.remove(otherPlayers[username]);
                        delete otherPlayers[username];
                    }
                }
            } catch (err) {
                console.error('Sync error:', err);
            }
        }
        
        function handleAttack() {
            if (!mouseLockActive || !currentServer || !currentUser) return;
            
            const now = Date.now();
            if (now - lastAttackTime < ATTACK_COOLDOWN) return;
            lastAttackTime = now;
            
            const direction = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
            const origin = localPlayerMesh.position.clone();
            origin.y += 0.8;
            
            for (const [username, mesh] of Object.entries(otherPlayers)) {
                const targetPos = mesh.position.clone();
                targetPos.y += 0.8;
                const dist = origin.distanceTo(targetPos);
                
                if (dist < ATTACK_RANGE) {
                    const toTarget = targetPos.clone().sub(origin).normalize();
                    const angle = direction.angleTo(toTarget);
                    
                    if (angle < Math.PI / 3) {
                        performAttack(currentServer, currentUser.username, username, ATTACK_DAMAGE);
                        mesh.children[0].material.emissiveIntensity = 0.8;
                        setTimeout(() => { mesh.children[0].material.emissiveIntensity = 0; }, 150);
                        break;
                    }
                }
            }
        }
        
        function handleMovement(delta) {
            if (!mouseLockActive) return;
            
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0, 0, 0);
            if (moveState.forward) move.add(forward);
            if (moveState.backward) move.sub(forward);
            if (moveState.right) move.add(right);
            if (moveState.left) move.sub(right);
            if (move.length() > 0) move.normalize();
            
            const speed = 7.0;
            let newX = localPlayerMesh.position.x + move.x * speed * delta;
            let newZ = localPlayerMesh.position.z + move.z * speed * delta;
            const boundary = 22;
            newX = Math.max(-boundary, Math.min(boundary, newX));
            newZ = Math.max(-boundary, Math.min(boundary, newZ));
            localPlayerMesh.position.x = newX;
            localPlayerMesh.position.z = newZ;
            
            isGrounded = localPlayerMesh.position.y <= 0.55;
            if (moveState.jump && isGrounded) {
                verticalVelocity = JUMP_FORCE;
                isGrounded = false;
                moveState.jump = false;
            }
            if (!isGrounded) {
                verticalVelocity -= GRAVITY * delta;
                localPlayerMesh.position.y += verticalVelocity * delta;
                if (localPlayerMesh.position.y <= 0.55) {
                    localPlayerMesh.position.y = 0.55;
                    verticalVelocity = 0;
                }
            }
            
            const cameraPos = localPlayerMesh.position.clone();
            cameraPos.y += 1.2;
            camera.position.copy(cameraPos);
            const lookDir = new THREE.Vector3(Math.sin(yaw), Math.sin(pitch), Math.cos(yaw));
            camera.lookAt(cameraPos.clone().add(lookDir));
            
            if (Math.random() < 0.1) {
                updatePlayerState(currentServer, currentUser.username, newX, newZ, localPlayerHealth);
            }
        }
        
        document.getElementById('login-btn').onclick = async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                document.getElementById('login-error').innerText = 'Please enter username and password';
                return;
            }
            
            try {
                const result = await login(username, password);
                if (result.success) {
                    currentUser = { username };
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('server-modal').classList.remove('hidden');
                } else {
                    document.getElementById('login-error').innerText = result.error;
                }
            } catch (err) {
                document.getElementById('login-error').innerText = 'Connection error. Check console.';
            }
        };
        
        document.getElementById('signup-btn').onclick = async () => {
            const username = document.getElementById('signup-username').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            if (!username || !password) {
                document.getElementById('signup-error').innerText = 'Please fill all fields';
                return;
            }
            if (password !== confirm) {
                document.getElementById('signup-error').innerText = 'Passwords do not match';
                return;
            }
            
            try {
                const result = await signup(username, password);
                if (result.success) {
                    document.getElementById('signup-modal').classList.add('hidden');
                    document.getElementById('login-modal').classList.remove('hidden');
                    document.getElementById('signup-error').innerText = '';
                    document.getElementById('signup-username').value = '';
                    document.getElementById('signup-password').value = '';
                    document.getElementById('signup-confirm').value = '';
                } else {
                    document.getElementById('signup-error').innerText = result.error;
                }
            } catch (err) {
                document.getElementById('signup-error').innerText = err.message;
            }
        };
        
        document.getElementById('show-signup').onclick = () => {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('signup-modal').classList.remove('hidden');
        };
        
        document.getElementById('show-login').onclick = () => {
            document.getElementById('signup-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('hidden');
        };
        
        document.getElementById('create-server-btn').onclick = async () => {
            try {
                const result = await createServer(currentUser.username);
                if (result.success) {
                    currentServer = result.server_code;
                    await joinServer(currentServer, currentUser.username);
                    startGame();
                } else {
                    document.getElementById('server-error').innerText = result.error;
                }
            } catch (err) {
                document.getElementById('server-error').innerText = 'Failed to create server';
            }
        };
        
        document.getElementById('join-server-btn').onclick = async () => {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (!code) {
                document.getElementById('server-error').innerText = 'Please enter a server code';
                return;
            }
            
            try {
                const result = await joinServer(code, currentUser.username);
                if (result.success) {
                    currentServer = code;
                    startGame();
                } else {
                    document.getElementById('server-error').innerText = result.error;
                }
            } catch (err) {
                document.getElementById('server-error').innerText = 'Failed to join server';
            }
        };
        
        function startGame() {
            gameActive = true;
            document.getElementById('server-modal').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('health-bar').classList.remove('hidden');
            document.getElementById('server-info').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('lock-message').classList.remove('hidden');
            document.getElementById('player-name').innerText = currentUser.username;
            document.getElementById('server-code-display').innerText = currentServer;
            
            localPlayerMesh = createPlayerModel(0x44aaff, currentUser.username);
            localPlayerMesh.position.set(MAIN_SPAWN.x, 0.55, MAIN_SPAWN.z);
            scene.add(localPlayerMesh);
            
            const canvas = renderer.domElement;
            canvas.addEventListener('click', () => {
                if (!mouseLockActive) canvas.requestPointerLock();
            });
            
            document.addEventListener('pointerlockchange', () => {
                mouseLockActive = document.pointerLockElement === canvas;
                document.body.style.cursor = mouseLockActive ? 'none' : 'auto';
                document.getElementById('lock-message').classList.add('hidden');
            });
            
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0 && mouseLockActive) handleAttack();
            });
            
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') moveState.forward = true;
                if (key === 's') moveState.backward = true;
                if (key === 'a') moveState.left = true;
                if (key === 'd') moveState.right = true;
                if (key === ' ') { moveState.jump = true; e.preventDefault(); }
                if (key === 'escape' && mouseLockActive) document.exitPointerLock();
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') moveState.forward = false;
                if (key === 's') moveState.backward = false;
                if (key === 'a') moveState.left = false;
                if (key === 'd') moveState.right = false;
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!mouseLockActive) return;
                yaw -= e.movementX * 0.0025;
                pitch -= e.movementY * 0.0025;
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            });
            
            syncInterval = setInterval(syncGameState, 100);
            animate();
        }
        
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (gameActive) handleMovement(delta);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
