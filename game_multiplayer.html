<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP Game</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

/* MENUS */
#menu, #auth, #serverMenu, #pauseMenu {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    color:white;
}

button, input {
    margin:10px;
    padding:10px;
    font-size:16px;
}

#pauseMenu { display:none; }
#auth, #serverMenu { display:none; }

#gameCanvas { display:none; }
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu">
    <h1>RP GAME</h1>
    <button onclick="selectMode('single')">Story Mode</button>
    <button onclick="selectMode('multi')">Multiplayer</button>
</div>

<!-- AUTH -->
<div id="auth">
    <h2>Login / Signup</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
</div>

<!-- SERVER MENU -->
<div id="serverMenu">
    <h2>Multiplayer</h2>
    <input id="serverCode" placeholder="Server Code">
    <button onclick="createServer()">Create Server</button>
    <button onclick="joinServer()">Join Server</button>
</div>

<!-- PAUSE -->
<div id="pauseMenu">
    <h2>Paused</h2>
    <button onclick="resumeGame()">Resume</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE CONFIG
========================= */
const supabase = window.supabase.createClient(
  "https://hcvewiwhtxqpbogcrukk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw"
);

let mode = null;
let user = null;
let serverId = null;

/* =========================
   MENU FLOW
========================= */
function selectMode(m) {
    mode = m;
    document.getElementById("menu").style.display="none";
    document.getElementById("auth").style.display="flex";
}

async function login() {
    const email = emailInput.value;
    const password = passwordInput.value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if(error) return alert(error.message);

    user = data.user;
    afterAuth();
}

async function signup() {
    const email = emailInput.value;
    const password = passwordInput.value;

    const { data, error } = await supabase.auth.signUp({ email, password });

    if(error) return alert(error.message);

    alert("Account created! Now login.");
}

function afterAuth() {
    document.getElementById("auth").style.display="none";

    if(mode === "multi"){
        document.getElementById("serverMenu").style.display="flex";
    } else {
        startGame();
    }
}

/* =========================
   SERVER SYSTEM
========================= */
async function createServer() {
    const code = document.getElementById("serverCode").value;

    const { data, error } = await supabase
        .from("servers")
        .insert([{ code }])
        .select();

    if(error) return alert(error.message);

    serverId = data[0].id;
    startGame();
}

async function joinServer() {
    const code = document.getElementById("serverCode").value;

    const { data, error } = await supabase
        .from("servers")
        .select("*")
        .eq("code", code)
        .single();

    if(error) return alert("Server not found");

    serverId = data.id;
    startGame();
}

/* =========================
   THREE.JS WORLD
========================= */
let scene, camera, renderer, player;

function startGame(){
    document.getElementById("serverMenu").style.display="none";
    document.getElementById("gameCanvas").style.display="block";

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,2,5);

    renderer = new THREE.WebGLRenderer({ canvas: gameCanvas });
    renderer.setSize(window.innerWidth, window.innerHeight);

    /* GROUND */
    const groundGeo = new THREE.PlaneGeometry(500,500);
    const groundMat = new THREE.MeshStandardMaterial({ color:0x228822 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    /* LIGHT */
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10,20,10);
    scene.add(light);

    /* PLAYER */
    const geo = new THREE.BoxGeometry(1,2,1);
    const mat = new THREE.MeshStandardMaterial({ color:0x00ffcc });
    player = new THREE.Mesh(geo, mat);
    player.position.set(0,1,0);
    scene.add(player);

    animate();

    if(mode === "multi") setupRealtime();
}

/* =========================
   CONTROLS
========================= */
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if(e.key === "Escape"){
        document.getElementById("pauseMenu").style.display="flex";
    }
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function movePlayer(){
    const speed = 0.1;

    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;

    camera.position.x = player.position.x;
    camera.position.z = player.position.z + 5;
}

/* =========================
   MULTIPLAYER SYNC
========================= */
let channel;

function setupRealtime(){
    channel = supabase.channel("room-"+serverId)
    .on("broadcast", { event:"move" }, payload => {
        // TODO: update other players
    })
    .subscribe();
}

function sendPosition(){
    if(mode !== "multi") return;

    channel.send({
        type:"broadcast",
        event:"move",
        payload:{
            x:player.position.x,
            z:player.position.z,
            user:user.id
        }
    });
}

/* =========================
   GAME LOOP
========================= */
let time = 0;

function animate(){
    requestAnimationFrame(animate);

    movePlayer();
    sendPosition();

    /* DAY NIGHT */
    time += 0.001;
    scene.background = new THREE.Color().setHSL(0.6,1,Math.abs(Math.sin(time)));

    renderer.render(scene, camera);
}

/* =========================
   PAUSE
========================= */
function resumeGame(){
    document.getElementById("pauseMenu").style.display="none";
}

/* =========================
   RESIZE
========================= */
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
