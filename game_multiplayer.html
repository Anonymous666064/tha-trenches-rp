<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Working Multiplayer 3D</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#menu {
  position:fixed;
  width:100%;
  height:100%;
  background:#0a0f1e;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button { background:#4ec9e0; cursor:pointer; }
</style>
</head>
<body>

<div id="menu">
  <h1>🌍 Multiplayer Test</h1>
  <input id="username" placeholder="Username">
  <input id="server" placeholder="Server Code">
  <button onclick="start()">Play</button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* ================= SUPABASE ================= */

const supabase = createClient(
  "https://hcvewiwhtxqpbogcrukk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw"
);

let id = crypto.randomUUID();
let server = "";

let players = {};
let meshes = {};

/* ================= THREE ================= */

let scene, camera, renderer;
let player;
let yaw = 0;

let keys = {};

/* ================= INPUT ================= */

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* ================= START ================= */

window.start = async () => {
  const username = document.getElementById('username').value;
  server = document.getElementById('server').value;

  if (!username || !server) return alert("Enter info");

  document.getElementById('menu').style.display = "none";

  await supabase.from('players').upsert({
    id,
    username,
    server
  });

  init();
  realtime();
  animate();
};

/* ================= INIT ================= */

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff,0.5));

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshStandardMaterial({ color:0x228B22 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color:0x00ffcc })
  );
  player.position.y = 1;
  scene.add(player);

  /* MOUSE LOCK */
  document.body.addEventListener('click', () => {
    document.body.requestPointerLock();
  });

  document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === document.body) {
      yaw -= e.movementX * 0.002;
    }
  });
}

/* ================= REALTIME ================= */

function realtime() {
  supabase.channel('room-'+server)
    .on('postgres_changes',{
      event:'*',
      schema:'public',
      table:'players',
      filter:`server=eq.${server}`
    }, payload => {
      players[payload.new.id] = payload.new;
    })
    .subscribe();
}

/* ================= SYNC ================= */

async function sync() {
  await supabase.from('players').update({
    x: player.position.x,
    y: player.position.y,
    z: player.position.z,
    rot: yaw
  }).eq('id', id);
}

setInterval(sync, 100);

/* ================= MOVEMENT ================= */

function move() {
  let speed = 0.15;

  let forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  let right = new THREE.Vector3(forward.z,0,-forward.x);

  if (keys['w']) player.position.add(forward.clone().multiplyScalar(-speed));
  if (keys['s']) player.position.add(forward.clone().multiplyScalar(speed));
  if (keys['a']) player.position.add(right.clone().multiplyScalar(-speed));
  if (keys['d']) player.position.add(right.clone().multiplyScalar(speed));

  camera.position.copy(player.position).add(new THREE.Vector3(0,5,10));
  camera.lookAt(player.position);
}

/* ================= OTHER PLAYERS ================= */

function updatePlayers() {
  for (let pid in players) {
    if (pid === id) continue;

    let data = players[pid];

    if (!meshes[pid]) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({ color:0xff4444 })
      );
      mesh.position.y = 1;
      scene.add(mesh);
      meshes[pid] = mesh;
    }

    meshes[pid].position.set(data.x, data.y, data.z);
  }
}

/* ================= LOOP ================= */

function animate() {
  requestAnimationFrame(animate);

  move();
  updatePlayers();

  renderer.render(scene, camera);
}
</script>

</body>
</html>
