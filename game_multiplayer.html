<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RP World - Open World Multiplayer RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 11px;
            min-width: 220px;
            max-width: 240px;
        }
        
        .stat-bar {
            margin: 3px 0;
        }
        
        .stat-label {
            display: inline-block;
            width: 45px;
            font-size: 10px;
        }
        
        .bar-bg {
            display: inline-block;
            width: 120px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health-fill { background: #ff4444; }
        .hunger-fill { background: #ffaa44; }
        .thirst-fill { background: #44aaff; }
        
        .money {
            color: #ffaa44;
            font-size: 14px;
            font-weight: bold;
            margin: 3px 0;
        }
        
        #phone {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            border: 2px solid #4a6a8a;
        }
        
        #phone-icon {
            font-size: 24px;
        }
        
        #phone-apps {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 10px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            z-index: 200;
        }
        
        .app-btn {
            background: #2c3e50;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }
        
        .app-btn:hover {
            background: #3e5a6e;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 150;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: red;
            font-size: 48px;
        }
        
        #respawn-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 15px;
            color: white;
            font-size: 10px;
            pointer-events: none;
            z-index: 99;
        }
        
        .server-panel {
            margin-top: 8px;
        }
        
        input, button {
            margin: 4px 0;
            padding: 6px;
            border-radius: 5px;
            border: none;
            width: 100%;
            font-size: 11px;
        }
        
        input {
            background: #222;
            color: white;
            border: 1px solid #555;
        }
        
        button {
            background: #4a6a8a;
            color: white;
            cursor: pointer;
        }
        
        .log-container {
            margin-top: 8px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 9px;
        }
        
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        .log-entry.kill { color: #ff4444; font-weight: bold; }
        .log-entry.join { color: #88ff88; }
        .log-entry.death { color: #ff8888; }
        
        .instruction {
            font-size: 9px;
            color: #ffaa44;
            text-align: center;
            margin-top: 5px;
            padding: 2px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        
        #player-list {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            border-radius: 8px;
            padding: 8px;
            min-width: 140px;
            z-index: 100;
            font-size: 10px;
            backdrop-filter: blur(4px);
        }
        
        #player-list h4 {
            margin: 0 0 5px 0;
            color: #ffaa44;
            font-size: 11px;
            text-align: center;
        }
        
        .player-name {
            padding: 2px 5px;
            border-bottom: 1px solid #333;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="money">💰 $<span id="money">100000</span></div>
        <div class="stat-bar">
            <span class="stat-label">❤️ HP</span>
            <div class="bar-bg"><div class="bar-fill health-fill" id="health-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">🍔 Food</span>
            <div class="bar-bg"><div class="bar-fill hunger-fill" id="hunger-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">💧 Water</span>
            <div class="bar-bg"><div class="bar-fill thirst-fill" id="thirst-bar" style="width: 100%"></div></div>
        </div>
        
        <div class="server-panel">
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="serverCode" placeholder="Server Code" value="RP_WORLD">
            <button id="joinGame">🎮 Join</button>
            <button id="leaveGame" style="background:#8a4a4a;">🚪 Leave</button>
        </div>
        <div class="log-container" id="log"></div>
        <div class="instruction">💡 Click game to lock mouse | Move mouse to aim | Click to shoot</div>
    </div>
    
    <div id="player-list">
        <h4>👥 Players Online</h4>
        <div id="player-list-content"></div>
    </div>
    
    <div id="phone" onclick="togglePhone()">
        <div id="phone-icon">📱</div>
    </div>
    
    <div id="phone-apps">
        <div class="app-btn" onclick="alert('Coming Soon!')">🚗 Car Shop</div>
        <div class="app-btn" onclick="showInventory()">📦 Inventory</div>
        <div class="app-btn" onclick="alert('Coming Soon!')">🌿 Weed Farm</div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="wasted">
        <div>💀 WASTED 💀</div>
        <div style="font-size: 20px; margin-top: 10px;" id="death-message"></div>
        <button id="respawn-btn" onclick="respawn()">Respawn ($1000)</button>
    </div>
    
    <div id="controls-note">
        🎮 WASD | 🖱️ Click to Lock | 🔫 Click to Shoot
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';
        
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Game state
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let localPlayerMesh = null;
        let localLabel = null;
        let otherPlayers = new Map();
        let isDead = false;
        let updateInterval = null;
        let syncInterval = null;
        
        let playerStats = { health: 100, hunger: 100, thirst: 100, money: 100000, kills: 0 };
        
        // Camera controls for mouse lock aiming
        let mouseX = 0;
        let mouseY = 0;
        let cameraPitch = 0;
        let cameraYaw = 0;
        let isPointerLocked = false;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 120, 200);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Create world - Open field with NO TREES
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x6aab5a });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(250, 250), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Simple grid helper
        const gridHelper = new THREE.GridHelper(250, 50, 0x88aaff, 0x446688);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        // Add some simple rocks/decoration (very minimal)
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 90 + Math.random() * 50;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3), rockMat);
            rock.position.set(x, 0.2, z);
            rock.castShadow = true;
            scene.add(rock);
        }
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        function makeLabel(text, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '11px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.7)';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '15px';
            div.style.whiteSpace = 'nowrap';
            div.style.border = `1px solid ${color}`;
            return new CSS2DObject(div);
        }
        
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.35, 0.45);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.35, 0.45);
            group.add(leftEye);
            group.add(rightEye);
            
            if (isLocal) {
                const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                hat.position.y = 1.55;
                group.add(hat);
            }
            
            return group;
        }
        
        function createBloodEffect(position) {
            for (let i = 0; i < 20; i++) {
                const blood = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                blood.position.set(
                    position.x + (Math.random() - 0.5) * 1,
                    position.y + 0.1,
                    position.z + (Math.random() - 0.5) * 1
                );
                scene.add(blood);
                setTimeout(() => scene.remove(blood), 3000);
            }
        }
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            if (logDiv.children.length > 12) logDiv.removeChild(logDiv.children[0]);
            console.log(msg);
        }
        
        function updateUI() {
            document.getElementById('money').innerText = playerStats.money;
            document.getElementById('health-bar').style.width = `${playerStats.health}%`;
            document.getElementById('hunger-bar').style.width = `${playerStats.hunger}%`;
            document.getElementById('thirst-bar').style.width = `${playerStats.thirst}%`;
        }
        
        function updatePlayerList() {
            const container = document.getElementById('player-list-content');
            container.innerHTML = '';
            container.innerHTML += `<div class="player-name" style="color:#ffaa44">👤 ${myUsername} (You)</div>`;
            for (let [id, player] of otherPlayers) {
                container.innerHTML += `<div class="player-name" style="color:#aaffdd">👥 ${player.name}</div>`;
            }
        }
        
        // Kill a player
        async function killPlayer(targetId, targetName, targetPos, targetColor) {
            addLog(`💀 YOU KILLED ${targetName}! +$5000!`, 'kill');
            
            // Update killer's money
            playerStats.money += 5000;
            playerStats.kills++;
            updateUI();
            
            // Mark target as dead in database
            await supabase
                .from('players')
                .update({ is_alive: false, health: 0 })
                .eq('id', targetId);
            
            // Create death effect
            createBloodEffect(targetPos);
            
            // Remove from scene
            const player = otherPlayers.get(targetId);
            if (player) {
                scene.remove(player.mesh);
                scene.remove(player.label);
                otherPlayers.delete(targetId);
                updatePlayerList();
            }
        }
        
        // Local player death
        async function die(killerName = null) {
            if (isDead) return;
            isDead = true;
            
            const message = killerName ? `You were killed by ${killerName}!` : 'You died!';
            addLog(message, 'death');
            document.getElementById('death-message').innerHTML = message;
            
            // Create death effect
            if (localPlayerMesh) {
                createBloodEffect(localPlayerMesh.position);
                scene.remove(localPlayerMesh);
                scene.remove(localLabel);
                localPlayerMesh = null;
                localLabel = null;
            }
            
            // Mark as dead in database
            if (myPlayerId) {
                await supabase
                    .from('players')
                    .update({ is_alive: false, health: 0 })
                    .eq('id', myPlayerId);
            }
            
            document.getElementById('wasted').style.display = 'flex';
        }
        
        async function respawn() {
            if (playerStats.money >= 1000) {
                playerStats.money -= 1000;
                playerStats.health = 100;
                updateUI();
                document.getElementById('wasted').style.display = 'none';
                
                addLog('You respawned!', 'info');
                
                const spawnPos = { x: (Math.random() - 0.5) * 25, y: 0.8, z: (Math.random() - 0.5) * 25 };
                const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
                
                // Update existing player
                await supabase
                    .from('players')
                    .update({
                        is_alive: true,
                        health: 100,
                        x: spawnPos.x,
                        y: spawnPos.y,
                        z: spawnPos.z,
                        color: playerColor
                    })
                    .eq('id', myPlayerId);
                
                // Create local player again
                localPlayerMesh = createPlayerModel(playerColor, true);
                localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
                scene.add(localPlayerMesh);
                
                localLabel = makeLabel(myUsername, '#ffff88');
                localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
                scene.add(localLabel);
                
                isDead = false;
                
                // Reset camera
                mouseX = 0;
                mouseY = 0;
                cameraPitch = 0;
                cameraYaw = 0;
                camera.rotation.order = 'YXZ';
                camera.rotation.y = 0;
                camera.rotation.x = 0;
                
                addLog('You have respawned!', 'info');
            } else {
                addLog('Need $1000 to respawn!', 'info');
            }
        }
        
        // Shooting
        async function shoot() {
            if (!localPlayerMesh || isDead || !isPointerLocked) return;
            
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const raycaster = new THREE.Raycaster(camera.position, direction, 0, 30);
            
            for (let [id, player] of otherPlayers) {
                const intersects = raycaster.intersectObject(player.mesh, true);
                if (intersects.length > 0) {
                    const distance = camera.position.distanceTo(intersects[0].point);
                    if (distance < 30) {
                        await killPlayer(id, player.name, player.mesh.position, player.color);
                    }
                    break;
                }
            }
            
            // Muzzle flash
            const flash = new THREE.PointLight(0xff6600, 1.5, 8);
            flash.position.copy(camera.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);
        }
        
        // Sync players from database
        async function syncPlayers() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('server_id', currentServerId)
                .eq('is_alive', true);
            
            if (error) {
                console.error('Sync error:', error);
                return;
            }
            
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                
                if (otherPlayers.has(player.id)) {
                    const existing = otherPlayers.get(player.id);
                    existing.mesh.position.set(player.x, player.y, player.z);
                    existing.label.position.set(player.x, player.y + 1.6, player.z);
                } else {
                    const mesh = createPlayerModel(player.color, false);
                    mesh.position.set(player.x, player.y, player.z);
                    scene.add(mesh);
                    
                    const label = makeLabel(player.username, '#aaffdd');
                    label.position.set(player.x, player.y + 1.6, player.z);
                    scene.add(label);
                    
                    otherPlayers.set(player.id, { mesh, label, name: player.username, color: player.color });
                    addLog(`🟢 ${player.username} joined`, 'join');
                }
            }
            
            const currentIds = new Set(data.map(p => p.id));
            for (let [id, player] of otherPlayers) {
                if (!currentIds.has(id)) {
                    scene.remove(player.mesh);
                    scene.remove(player.label);
                    otherPlayers.delete(id);
                    addLog(`🔴 ${player.name} left`, 'info');
                }
            }
            
            updatePlayerList();
        }
        
        // Update local player position
        async function updatePosition() {
            if (!myPlayerId || !localPlayerMesh || isDead) return;
            
            await supabase
                .from('players')
                .update({
                    x: localPlayerMesh.position.x,
                    y: localPlayerMesh.position.y,
                    z: localPlayerMesh.position.z,
                    last_seen: new Date().toISOString()
                })
                .eq('id', myPlayerId);
        }
        
        // Check if local player died
        async function checkDeathStatus() {
            if (!currentServerId || !myPlayerId || isDead) return;
            
            const { data } = await supabase
                .from('players')
                .select('is_alive')
                .eq('id', myPlayerId)
                .single();
            
            if (data && data.is_alive === false && !isDead) {
                die();
            }
        }
        
        async function joinServer(serverId) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                myUsername = `Player_${Math.floor(Math.random() * 1000)}`;
                document.getElementById('username').value = myUsername;
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            otherPlayers.forEach(p => {
                scene.remove(p.mesh);
                scene.remove(p.label);
            });
            otherPlayers.clear();
            
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localLabel) scene.remove(localLabel);
            
            currentServerId = serverId;
            const spawnPos = { x: (Math.random() - 0.5) * 25, y: 0.8, z: (Math.random() - 0.5) * 25 };
            const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { data, error } = await supabase
                .from('players')
                .insert({
                    username: myUsername,
                    server_id: currentServerId,
                    x: spawnPos.x,
                    y: spawnPos.y,
                    z: spawnPos.z,
                    color: playerColor,
                    money: playerStats.money,
                    health: 100,
                    is_alive: true
                })
                .select()
                .single();
            
            if (error) {
                addLog(`Error: ${error.message}`, 'info');
                return;
            }
            
            myPlayerId = data.id;
            
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            scene.add(localPlayerMesh);
            
            localLabel = makeLabel(myUsername, '#ffff88');
            localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
            scene.add(localLabel);
            
            addLog(`Joined server as ${myUsername}`, 'success');
            
            mouseX = 0;
            mouseY = 0;
            cameraPitch = 0;
            cameraYaw = 0;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = 0;
            camera.rotation.x = 0;
            
            await syncPlayers();
            
            syncInterval = setInterval(() => syncPlayers(), 150);
            updateInterval = setInterval(() => updatePosition(), 50);
            setInterval(() => checkDeathStatus(), 500);
        }
        
        async function leaveServer() {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('id', myPlayerId);
            }
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            otherPlayers.forEach(p => {
                scene.remove(p.mesh);
                scene.remove(p.label);
            });
            otherPlayers.clear();
            
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localLabel) scene.remove(localLabel);
            
            currentServerId = null;
            myPlayerId = null;
            isDead = false;
            addLog('Left server', 'info');
        }
        
        // Movement
        const keys = { w: false, s: false, a: false, d: false };
        let moveSpeed = 6;
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'tab') {
                e.preventDefault();
                const apps = document.getElementById('phone-apps');
                apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
            }
            if (key === 'escape' && isPointerLocked) {
                document.exitPointerLock();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        function updateMovement() {
            if (!localPlayerMesh || isDead) return;
            
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            const move = new THREE.Vector3();
            if (keys.w) move.add(forward);
            if (keys.s) move.sub(forward);
            if (keys.d) move.add(right);
            if (keys.a) move.sub(right);
            
            if (move.length() > 0) move.normalize();
            move.multiplyScalar(moveSpeed * 0.016);
            
            let newPos = localPlayerMesh.position.clone().add(move);
            newPos.x = Math.min(110, Math.max(-110, newPos.x));
            newPos.z = Math.min(110, Math.max(-110, newPos.z));
            newPos.y = 0.8;
            
            localPlayerMesh.position.copy(newPos);
            localLabel.position.copy(newPos);
            localLabel.position.y += 1.6;
            
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.6;
        }
        
        // Mouse lock
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', lockChange);
        
        function lockChange() {
            if (document.pointerLockElement === renderer.domElement) {
                isPointerLocked = true;
                document.addEventListener('mousemove', onMouseMove);
                addLog('🔒 Mouse locked - Move mouse to aim!', 'info');
            } else {
                isPointerLocked = false;
                document.removeEventListener('mousemove', onMouseMove);
                addLog('🔓 Mouse unlocked', 'info');
            }
        }
        
        function onMouseMove(e) {
            if (!isPointerLocked) return;
            
            mouseX += e.movementX * 0.002;
            mouseY += e.movementY * 0.002;
            mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
            
            cameraYaw = mouseX;
            cameraPitch = mouseY;
            
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraYaw;
            camera.rotation.x = cameraPitch;
        }
        
        renderer.domElement.addEventListener('click', (e) => {
            if (isPointerLocked && !isDead) shoot();
        });
        
        function showInventory() {
            addLog(`📦 Kills: ${playerStats.kills} | Money: $${playerStats.money}`, 'info');
        }
        
        window.togglePhone = () => {
            const apps = document.getElementById('phone-apps');
            apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
        };
        
        window.respawn = respawn;
        window.showInventory = showInventory;
        
        document.getElementById('joinGame').onclick = () => joinServer(document.getElementById('serverCode').value);
        document.getElementById('leaveGame').onclick = () => leaveServer();
        document.getElementById('username').value = `Player_${Math.floor(Math.random() * 1000)}`;
        
        // Survival mechanics
        setInterval(() => {
            if (localPlayerMesh && !isDead) {
                playerStats.hunger = Math.max(0, playerStats.hunger - 0.2);
                playerStats.thirst = Math.max(0, playerStats.thirst - 0.3);
                updateUI();
            }
        }, 5000);
        
        // Animation
        function animate() {
            updateMovement();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        addLog('✨ Welcome! Click game to lock mouse and aim!', 'info');
        addLog('🔫 Move mouse to look around - Click to shoot!', 'info');
        
        // Stars
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(800 * 3);
        for (let i = 0; i < 800; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
        scene.add(stars);
    </script>
</body>
</html>
