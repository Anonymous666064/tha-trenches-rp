<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer RP Game</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#menu {
  position:fixed;
  width:100%;
  height:100%;
  background:#0a0f1e;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

input, button {
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
}

button {
  background:#4ec9e0;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="menu">
  <h1>🌍 Multiplayer RP</h1>
  <input id="username" placeholder="Username">
  <input id="serverCode" placeholder="Server Code">
  <button onclick="createServer()">Create Server</button>
  <button onclick="joinServer()">Join Server</button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  "https://hcvewiwhtxqpbogcrukk.supabase.co",
  "YOUR_API_KEY_HERE"
);

let playerId = crypto.randomUUID();
let server = null;

let scene, camera, renderer;
let player;
let players = {};
let meshes = {};

let keys = {};

/* ================= INPUT ================= */
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* ================= SERVER ================= */

window.createServer = async () => {
  const code = document.getElementById('serverCode').value;
  const username = document.getElementById('username').value;

  if (!code || !username) return alert("Enter username + code");

  await supabase.from('servers').insert({ code });

  startGame(username, code);
};

window.joinServer = async () => {
  const code = document.getElementById('serverCode').value;
  const username = document.getElementById('username').value;

  if (!code || !username) return alert("Enter username + code");

  startGame(username, code);
};

/* ================= START ================= */

async function startGame(username, code) {
  server = code;

  document.getElementById('menu').style.display = "none";

  await supabase.from('players').upsert({
    id: playerId,
    username,
    server,
    x: 0,
    y: 1,
    z: 0
  });

  initWorld();
  setupRealtime();
  animate();
}

/* ================= WORLD ================= */

function initWorld() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHTS
  const sun = new THREE.DirectionalLight(0xffffff, 1);
  sun.position.set(10,20,10);
  scene.add(sun);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  // GROUND
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshStandardMaterial({ color:0x2ecc71 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // PLAYER (YOU)
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color:0x00ffcc })
  );
  player.position.y = 1;
  scene.add(player);
}

/* ================= REALTIME ================= */

function setupRealtime() {
  supabase.channel('room-'+server)
    .on('postgres_changes',{
      event:'*',
      schema:'public',
      table:'players',
      filter:`server=eq.${server}`
    }, payload => {
      players[payload.new.id] = payload.new;
    })
    .subscribe();
}

/* ================= SYNC ================= */

async function syncPlayer() {
  await supabase.from('players').update({
    x: player.position.x,
    y: player.position.y,
    z: player.position.z
  }).eq('id', playerId);
}

setInterval(syncPlayer, 100);

/* ================= OTHER PLAYERS ================= */

function updateOtherPlayers() {
  for (let id in players) {
    if (id === playerId) continue;

    let data = players[id];

    if (!meshes[id]) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({ color:0xff4444 })
      );
      mesh.position.y = 1;
      scene.add(mesh);
      meshes[id] = mesh;
    }

    meshes[id].position.set(data.x, data.y, data.z);
  }
}

/* ================= MOVEMENT ================= */

function updateMovement() {
  let speed = 0.15;

  if (keys['w']) player.position.z -= speed;
  if (keys['s']) player.position.z += speed;
  if (keys['a']) player.position.x -= speed;
  if (keys['d']) player.position.x += speed;

  // CAMERA FOLLOW
  camera.position.x = player.position.x;
  camera.position.y = player.position.y + 6;
  camera.position.z = player.position.z + 10;

  camera.lookAt(player.position);
}

/* ================= LOOP ================= */

function animate() {
  requestAnimationFrame(animate);

  updateMovement();
  updateOtherPlayers();

  renderer.render(scene, camera);
}
</script>

</body>
</html>
