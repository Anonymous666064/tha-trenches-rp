<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer World - Simple 3D Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            font-family: monospace;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        #session-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 30px;
            border-radius: 20px;
            z-index: 1000;
            text-align: center;
            border: 2px solid #4ec9e0;
            min-width: 350px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        #session-panel h2 {
            margin: 0 0 20px 0;
            color: #4ec9e0;
        }
        
        #session-panel input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid #4ec9e0;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        #session-panel button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #4ec9e0;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        #session-panel button:hover {
            background: #7dd9ff;
            transform: scale(1.02);
        }
        
        #session-panel .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
        }
        
        #session-panel .status.error {
            color: #ff6666;
            border-left: 3px solid #ff6666;
        }
        
        #session-panel .status.success {
            color: #66ff66;
            border-left: 3px solid #66ff66;
        }
        
        #session-panel .status.info {
            color: #ffaa66;
            border-left: 3px solid #ffaa66;
        }
        
        #player-count {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #4ec9e0;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        #session-id-display {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffaa66;
            padding: 8px 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            font-family: monospace;
            backdrop-filter: blur(5px);
            pointer-events: none;
            display: none;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 MULTIPLAYER WORLD<br>
        WASD to move | Mouse to look
    </div>
    <div id="controls">
        🖱️ Click to lock mouse | ESC to release
    </div>
    <div id="player-count">
        👥 Players: <span id="player-count-number">0</span>
    </div>
    <div id="session-id-display">
        🔑 Session ID: <span id="session-id-text"></span>
    </div>
    
    <div id="session-panel">
        <h2>🌐 MULTIPLAYER GAME</h2>
        <input type="text" id="player-name" placeholder="Your Name" value="Player">
        <input type="text" id="session-id-input" placeholder="Session ID (leave empty to create new)">
        <button id="join-btn">🎮 JOIN / CREATE GAME</button>
        <div class="status info" id="session-status">Ready to connect</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        // ==================== SUPABASE SETUP ====================
        console.log('Creating Supabase client...');
        const supabase = createClient(
            'https://hcvewiwhtxqpbogcrukk.supabase.co',
            'sb_publishable_aOPgE3PvcNPiVyaIEK1evQ_NBi_TXHw'
        );
        console.log('Supabase client created');
        
        // ==================== HELPER FUNCTIONS ====================
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        // ==================== GAME VARIABLES ====================
        let scene, camera, renderer;
        let currentPlayer = null;
        let currentPlayerId = null;
        let currentPlayerName = "";
        let otherPlayers = new Map();
        let currentSessionId = null;
        let keys = { w: false, s: false, a: false, d: false };
        let mouseX = 0, mouseY = 0;
        let moveSpeed = 5;
        let pointerLocked = false;
        let syncInterval = null;
        let subscription = null;
        let worldCreated = false;
        
        // Colors for different players
        const playerColors = [
            0xff6b6b, 0x4ec9e0, 0x9b59b6, 0x2ecc71, 0xe74c3c, 0xf39c12, 0x1abc9c, 0x3498db
        ];
        
        // ==================== CREATE 3D WORLD ====================
        function initWorld() {
            console.log('Creating 3D world...');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            console.log('Renderer created');
            
            // Ground (grid)
            const gridHelper = new THREE.GridHelper(200, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);
            
            // Ground plane
            const groundPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x2c5a2c, roughness: 0.8, metalness: 0.1 })
            );
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -0.5;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
            directionalLight.position.set(10, 20, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0x4466cc, 0.3);
            backLight.position.set(-5, 10, -5);
            scene.add(backLight);
            
            // Simple colored cubes to mark positions (helps verify rendering)
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
            for (let i = -3; i <= 3; i++) {
                const marker = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), markerMat);
                marker.position.set(i * 5, 0, i * 5);
                scene.add(marker);
            }
            
            // Floating particles for ambiance
            const particleCount = 300;
            const particlesGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 150;
                particlePositions[i*3+1] = Math.random() * 15;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 150;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particlesMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.1, transparent: true, opacity: 0.5 });
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);
            
            worldCreated = true;
            console.log('World created successfully!');
            
            // Add a test cube to ensure rendering works
            const testCube = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 })
            );
            testCube.position.set(0, 2, 0);
            scene.add(testCube);
            console.log('Test red cube added at (0,2,0) - you should see it!');
        }
        
        // ==================== CREATE CYLINDRICAL PLAYER ====================
        function createPlayerMesh(color, name = "") {
            const group = new THREE.Group();
            
            // Body (cylinder)
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 16), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Head (sphere)
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
            leftEye.position.set(-0.18, 1.35, 0.45);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
            rightEye.position.set(0.18, 1.35, 0.45);
            group.add(rightEye);
            
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
            leftPupil.position.set(-0.18, 1.33, 0.52);
            group.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
            rightPupil.position.set(0.18, 1.33, 0.52);
            group.add(rightPupil);
            
            // Name tag
            if (name) {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'Bold 20px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.fillText(name, canvas.width/2, canvas.height/2 + 8);
                ctx.strokeStyle = '#4ec9e0';
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
                
                const texture = new THREE.CanvasTexture(canvas);
                const nameMat = new THREE.MeshStandardMaterial({ map: texture, transparent: true });
                const namePlate = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.4), nameMat);
                namePlate.position.y = 1.75;
                group.add(namePlate);
                group.userData.namePlate = namePlate;
                group.userData.nameTexture = texture;
            }
            
            return group;
        }
        
        // ==================== UPDATE NAME TAG ====================
        function updateNameTag(mesh, name) {
            if (mesh.userData.namePlate && mesh.userData.nameTexture) {
                const canvas = mesh.userData.nameTexture.image;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'Bold 20px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.fillText(name, canvas.width/2, canvas.height/2 + 8);
                mesh.userData.nameTexture.needsUpdate = true;
            }
        }
        
        // ==================== SUPABASE MULTIPLAYER FUNCTIONS ====================
        async function createSession(sessionId, playerName) {
            console.log('Creating session:', sessionId);
            const { data, error } = await supabase
                .from('sessions')
                .insert({ 
                    id: sessionId,
                    name: `Game Session`,
                    host: currentPlayerId,
                    players: [currentPlayerId]
                })
                .select();
            
            if (error) {
                console.error('Error creating session:', error);
                return null;
            }
            console.log('Session created:', data);
            return data?.[0] || null;
        }
        
        async function joinSession(sessionId, playerName) {
            console.log('Joining session:', sessionId);
            const { data: session, error } = await supabase
                .from('sessions')
                .select('*')
                .eq('id', sessionId)
                .single();
            
            if (error) {
                console.error('Session not found:', error);
                return null;
            }
            
            const playersList = session.players || [];
            const { error: updateError } = await supabase
                .from('sessions')
                .update({ players: [...playersList, currentPlayerId] })
                .eq('id', sessionId);
            
            if (updateError) {
                console.error('Error joining session:', updateError);
                return null;
            }
            
            console.log('Joined session:', session);
            return session;
        }
        
        async function syncPlayerPosition() {
            if (!currentSessionId || !currentPlayerId || !currentPlayer) return;
            
            const position = {
                x: currentPlayer.position.x,
                y: currentPlayer.position.y,
                z: currentPlayer.position.z,
                rotation: currentPlayer.rotation.y
            };
            
            const { error } = await supabase
                .from('players')
                .upsert({
                    session_id: currentSessionId,
                    player_id: currentPlayerId,
                    name: currentPlayerName,
                    data: position,
                    last_updated: new Date().toISOString()
                }, { onConflict: 'session_id, player_id' });
            
            if (error) console.error('Sync error:', error);
        }
        
        async function listenForPlayers() {
            if (!currentSessionId) return;
            
            console.log('Listening for players in session:', currentSessionId);
            
            subscription = supabase
                .channel(`players:${currentSessionId}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${currentSessionId}`
                }, (payload) => {
                    const { new: newPlayer, old: oldPlayer, eventType } = payload;
                    const playerId = newPlayer?.player_id || oldPlayer?.player_id;
                    
                    if (playerId === currentPlayerId) return;
                    
                    if (eventType === 'INSERT' || eventType === 'UPDATE') {
                        if (!otherPlayers.has(playerId)) {
                            const color = playerColors[Math.abs(playerId.charCodeAt(0) % playerColors.length)];
                            const playerMesh = createPlayerMesh(color, newPlayer.name);
                            playerMesh.userData.playerId = playerId;
                            scene.add(playerMesh);
                            otherPlayers.set(playerId, { mesh: playerMesh, name: newPlayer.name, lastPosition: null });
                            updatePlayerCount();
                            console.log(`Player ${newPlayer.name} joined - Total: ${otherPlayers.size + 1}`);
                        }
                        
                        const playerData = otherPlayers.get(playerId);
                        if (playerData && newPlayer?.data) {
                            const pos = newPlayer.data;
                            if (playerData.lastPosition) {
                                playerData.mesh.position.lerp(new THREE.Vector3(pos.x, pos.y, pos.z), 0.3);
                            } else {
                                playerData.mesh.position.set(pos.x, pos.y, pos.z);
                            }
                            playerData.mesh.rotation.y = pos.rotation || 0;
                            playerData.lastPosition = { x: pos.x, y: pos.y, z: pos.z };
                            
                            if (playerData.name !== newPlayer.name) {
                                playerData.name = newPlayer.name;
                                updateNameTag(playerData.mesh, newPlayer.name);
                            }
                        }
                    } else if (eventType === 'DELETE') {
                        const playerData = otherPlayers.get(playerId);
                        if (playerData) {
                            scene.remove(playerData.mesh);
                            otherPlayers.delete(playerId);
                            updatePlayerCount();
                            console.log(`Player ${playerData.name} left - Total: ${otherPlayers.size + 1}`);
                        }
                    }
                })
                .subscribe();
        }
        
        async function cleanupSession() {
            if (!currentSessionId || !currentPlayerId) return;
            
            console.log('Cleaning up session...');
            await supabase
                .from('players')
                .delete()
                .eq('session_id', currentSessionId)
                .eq('player_id', currentPlayerId);
            
            const { data: session } = await supabase
                .from('sessions')
                .select('players')
                .eq('id', currentSessionId)
                .single();
            
            if (session && session.players) {
                const newPlayers = session.players.filter(pid => pid !== currentPlayerId);
                await supabase
                    .from('sessions')
                    .update({ players: newPlayers })
                    .eq('id', currentSessionId);
            }
            
            if (syncInterval) clearInterval(syncInterval);
            if (subscription) supabase.removeChannel(subscription);
        }
        
        function updatePlayerCount() {
            const count = otherPlayers.size + 1;
            document.getElementById('player-count-number').textContent = count;
        }
        
        // ==================== GAME LOOP & MOVEMENT ====================
        function handleMovement(deltaTime) {
            if (!currentPlayer) return;
            
            const move = new THREE.Vector3();
            if (keys.w) move.z -= 1;
            if (keys.s) move.z += 1;
            if (keys.a) move.x -= 1;
            if (keys.d) move.x += 1;
            
            if (move.length() > 0) {
                move.normalize();
            }
            
            const forward = new THREE.Vector3(-Math.sin(camera.rotation.y), 0, -Math.cos(camera.rotation.y));
            const right = new THREE.Vector3(Math.cos(camera.rotation.y), 0, -Math.sin(camera.rotation.y));
            
            let newX = currentPlayer.position.x + (move.x * right.x + move.z * forward.x) * moveSpeed * deltaTime;
            let newZ = currentPlayer.position.z + (move.x * right.z + move.z * forward.z) * moveSpeed * deltaTime;
            
            const boundary = 85;
            newX = Math.max(-boundary, Math.min(boundary, newX));
            newZ = Math.max(-boundary, Math.min(boundary, newZ));
            
            currentPlayer.position.x = newX;
            currentPlayer.position.z = newZ;
            
            if (move.x !== 0 || move.z !== 0) {
                const angle = Math.atan2(move.x, move.z);
                currentPlayer.rotation.y = angle;
            }
        }
        
        // ==================== SETUP GAME ====================
        async function startGame(sessionId, playerName) {
            currentPlayerId = generateUUID();
            currentPlayerName = playerName || 'Player';
            
            const statusDiv = document.getElementById('session-status');
            statusDiv.textContent = 'Connecting to server...';
            statusDiv.className = 'status info';
            
            let finalSessionId = sessionId;
            if (!finalSessionId) {
                finalSessionId = generateUUID();
                console.log('Generated new session ID:', finalSessionId);
            }
            
            // Check if session exists
            const { data: existingSession } = await supabase
                .from('sessions')
                .select('*')
                .eq('id', finalSessionId)
                .single();
            
            let session;
            if (existingSession) {
                session = await joinSession(finalSessionId, playerName);
                if (!session) {
                    statusDiv.textContent = '❌ Failed to join session!';
                    statusDiv.className = 'status error';
                    return false;
                }
                statusDiv.textContent = `✅ Joined existing session!`;
                statusDiv.className = 'status success';
            } else {
                session = await createSession(finalSessionId, playerName);
                if (!session) {
                    statusDiv.textContent = '❌ Failed to create session! Make sure tables exist in Supabase.';
                    statusDiv.className = 'status error';
                    return false;
                }
                statusDiv.textContent = `✅ Session created! Share this ID with friends:`;
                statusDiv.className = 'status success';
            }
            
            currentSessionId = finalSessionId;
            
            // Show session ID
            const sessionDisplay = document.getElementById('session-id-display');
            const sessionIdText = document.getElementById('session-id-text');
            sessionIdText.textContent = finalSessionId;
            sessionDisplay.style.display = 'block';
            
            // Add player to players table
            const { error: playerError } = await supabase
                .from('players')
                .insert({
                    session_id: currentSessionId,
                    player_id: currentPlayerId,
                    name: playerName,
                    data: { x: 0, y: 0, z: 0, rotation: 0 },
                    last_updated: new Date().toISOString()
                });
            
            if (playerError) console.error('Error adding player:', playerError);
            
            // Create player mesh
            const playerColor = playerColors[Math.abs(currentPlayerId.charCodeAt(0) % playerColors.length)];
            currentPlayer = createPlayerMesh(playerColor, playerName);
            currentPlayer.position.set(0, 0, 0);
            scene.add(currentPlayer);
            console.log('Player created and added to scene');
            
            // Start listening for other players
            await listenForPlayers();
            
            // Hide session panel
            document.getElementById('session-panel').classList.add('hidden');
            
            updatePlayerCount();
            
            // Start position sync
            syncInterval = setInterval(() => {
                syncPlayerPosition();
            }, 100);
            
            // Fetch existing players
            const { data: existingPlayers } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', currentSessionId);
            
            if (existingPlayers) {
                existingPlayers.forEach(player => {
                    if (player.player_id !== currentPlayerId) {
                        const color = playerColors[Math.abs(player.player_id.charCodeAt(0) % playerColors.length)];
                        const playerMesh = createPlayerMesh(color, player.name);
                        playerMesh.userData.playerId = player.player_id;
                        if (player.data) {
                            playerMesh.position.set(player.data.x, player.data.y, player.data.z);
                            playerMesh.rotation.y = player.data.rotation || 0;
                        }
                        scene.add(playerMesh);
                        otherPlayers.set(player.player_id, { mesh: playerMesh, name: player.name, lastPosition: player.data });
                        console.log(`Loaded existing player: ${player.name}`);
                    }
                });
                updatePlayerCount();
            }
            
            return true;
        }
        
        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = true;
                if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true;
                if (key === 'd') keys.d = true;
                if (key === 'escape') {
                    document.exitPointerLock();
                    pointerLocked = false;
                }
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = false;
                if (key === 's') keys.s = false;
                if (key === 'a') keys.a = false;
                if (key === 'd') keys.d = false;
            });
            
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
            
            document.addEventListener('pointerlockchange', () => {
                pointerLocked = document.pointerLockElement === renderer.domElement;
                if (pointerLocked) {
                    document.addEventListener('mousemove', onMouseMove);
                } else {
                    document.removeEventListener('mousemove', onMouseMove);
                }
            });
            
            function onMouseMove(e) {
                if (!pointerLocked) return;
                mouseX += e.movementX * 0.002;
                mouseY += e.movementY * 0.002;
                mouseY = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, mouseY));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = mouseX;
                camera.rotation.x = mouseY;
            }
            
            document.getElementById('join-btn').addEventListener('click', async () => {
                const playerName = document.getElementById('player-name').value || 'Player';
                const sessionId = document.getElementById('session-id-input').value || '';
                const statusDiv = document.getElementById('session-status');
                statusDiv.textContent = 'Connecting...';
                statusDiv.className = 'status info';
                await startGame(sessionId, playerName);
            });
        }
        
        // ==================== ANIMATION LOOP ====================
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            handleMovement(deltaTime);
            
            if (currentPlayer && !pointerLocked) {
                camera.position.lerp(new THREE.Vector3(
                    currentPlayer.position.x,
                    5,
                    currentPlayer.position.z + 8
                ), 0.1);
                camera.lookAt(currentPlayer.position);
            } else if (currentPlayer && pointerLocked) {
                camera.position.copy(currentPlayer.position);
                camera.position.y += 1.2;
            }
            
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
            
            requestAnimationFrame(animate);
        }
        
        // ==================== INITIALIZE ====================
        async function init() {
            console.log('=== GAME INITIALIZATION START ===');
            initWorld();
            setupEventListeners();
            animate();
            console.log('=== GAME READY ===');
        }
        
        window.addEventListener('beforeunload', () => {
            cleanupSession();
        });
        
        init();
    </script>
</body>
</html>
