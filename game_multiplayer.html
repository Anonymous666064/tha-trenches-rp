<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RP World - Open World Multiplayer RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
        }
        
        /* Main UI */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 15px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 12px;
            min-width: 280px;
            max-width: 320px;
        }
        
        /* Stats Bars */
        .stat-bar {
            margin: 5px 0;
        }
        
        .stat-label {
            display: inline-block;
            width: 50px;
        }
        
        .bar-bg {
            display: inline-block;
            width: 150px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health-fill { background: #ff4444; width: 100%; }
        .hunger-fill { background: #ffaa44; width: 100%; }
        .thirst-fill { background: #44aaff; width: 100%; }
        
        .money {
            color: #ffaa44;
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        
        /* Phone */
        #phone {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #4a6a8a;
            transition: transform 0.2s;
        }
        
        #phone:hover {
            transform: scale(1.05);
        }
        
        #phone-icon {
            font-size: 30px;
        }
        
        #phone-apps {
            position: absolute;
            bottom: 90px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 15px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
            z-index: 200;
            border: 1px solid #4a6a8a;
        }
        
        .app-btn {
            background: #2c3e50;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        
        .app-btn:hover {
            background: #3e5a6e;
        }
        
        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 150;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
        }
        
        /* Wasted Screen */
        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: red;
            font-size: 48px;
            font-weight: bold;
        }
        
        #respawn-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Vehicle UI */
        #vehicle-ui {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }
        
        /* NPC Interaction */
        #npc-interaction {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 10px;
            display: none;
            z-index: 150;
            min-width: 250px;
        }
        
        .shop-item {
            margin: 5px 0;
            padding: 5px;
            background: #333;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .shop-item:hover {
            background: #555;
        }
        
        /* Controls */
        #controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 10px;
            pointer-events: none;
            z-index: 99;
        }
        
        .server-panel {
            margin-top: 10px;
        }
        
        input, button {
            margin: 5px 0;
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
        
        button {
            background: #4a6a8a;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #5a7a9a;
        }
        
        .log-container {
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 10px;
        }
        
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="money">💰 $<span id="money">500</span></div>
        <div class="stat-bar">
            <span class="stat-label">❤️ Health</span>
            <div class="bar-bg"><div class="bar-fill health-fill" id="health-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">🍔 Hunger</span>
            <div class="bar-bg"><div class="bar-fill hunger-fill" id="hunger-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">💧 Thirst</span>
            <div class="bar-bg"><div class="bar-fill thirst-fill" id="thirst-bar" style="width: 100%"></div></div>
        </div>
        
        <div class="server-panel">
            <input type="text" id="username" placeholder="Username" value="Player_" + Math.floor(Math.random() * 1000)>
            <input type="text" id="serverCode" placeholder="Server Code" value="RP_WORLD">
            <button id="joinGame">Join Game</button>
            <button id="leaveGame" style="background:#8a4a4a;">Leave Game</button>
        </div>
        <div class="log-container" id="log"></div>
    </div>
    
    <div id="phone" onclick="togglePhone()">
        <div id="phone-icon">📱</div>
    </div>
    
    <div id="phone-apps">
        <div class="app-btn" onclick="openCarShop()">🚗 Car Dealership</div>
        <div class="app-btn" onclick="spawnVehicle()">🚙 Spawn Vehicle</div>
        <div class="app-btn" onclick="openInventory()">📦 Inventory</div>
        <div class="app-btn" onclick="startWeedJob()">🌿 Weed Farm</div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="wasted">
        <div>💀 WASTED 💀</div>
        <button id="respawn-btn" onclick="respawn()">Respawn ($100)</button>
    </div>
    
    <div id="vehicle-ui">
        🚗 In Vehicle | Press E to exit
    </div>
    
    <div id="npc-interaction"></div>
    
    <div id="controls-note">
        WASD Move | Hold Right Click + Drag to Rotate Camera | E Interact | TAB Phone | F Enter/Exit Vehicle
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';
        
        // Supabase setup
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Game state
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let localPlayerMesh = null;
        let localLabel = null;
        let otherPlayers = new Map();
        let npcs = [];
        let currentVehicle = null;
        let isInVehicle = false;
        let currentWeapon = 'pistol';
        let ammo = { pistol: 30, shotgun: 15, rifle: 40 };
        let inventory = [];
        let updateInterval = null;
        let syncInterval = null;
        let dayTime = 0.5;
        
        // Player stats
        let playerStats = { health: 100, hunger: 100, thirst: 100, money: 500 };
        
        // Camera control variables
        let cameraAngleX = 0; // Horizontal rotation
        let cameraAngleY = 0.5; // Vertical rotation (slightly above)
        const cameraDistance = 5;
        let isMouseDown = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 80, 150);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Create flat terrain
        const terrainSize = 150;
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, 50, 50);
        terrainGeometry.rotateX(-Math.PI / 2);
        
        const vertices = terrainGeometry.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            vertices[i+1] = 0; // Flat terrain
        }
        
        terrainGeometry.computeVertexNormals();
        const terrainMaterial = new THREE.MeshStandardMaterial({ color: 0x5c9e5e, roughness: 0.8, metalness: 0.1 });
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        scene.add(terrain);
        
        // City buildings (flat area)
        const buildingColors = [0xccaa88, 0xaa8866, 0x88aacc, 0x88ccaa, 0xcc88aa];
        
        for (let i = -6; i <= 6; i++) {
            for (let j = -6; j <= 6; j++) {
                if (Math.abs(i) < 3 && Math.abs(j) < 3) continue; // Center plaza
                const height = Math.random() * 5 + 2;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(2.8, height, 2.8),
                    new THREE.MeshStandardMaterial({ color: buildingColors[Math.floor(Math.random() * buildingColors.length)] })
                );
                building.position.set(i * 5.5, height/2, j * 5.5);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
            }
        }
        
        // Roads
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        for (let i = -35; i <= 35; i += 7) {
            const roadX = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.1, terrainSize), roadMat);
            roadX.position.set(i, 0.05, 0);
            roadX.receiveShadow = true;
            scene.add(roadX);
            
            const roadZ = new THREE.Mesh(new THREE.BoxGeometry(terrainSize, 0.1, 5.5), roadMat);
            roadZ.position.set(0, 0.05, i);
            roadZ.receiveShadow = true;
            scene.add(roadZ);
        }
        
        // Add grass/ground details
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x6aab5a });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(terrainSize, terrainSize), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // NPCs
        const npcPositions = [
            { x: 20, z: 14, type: 'food', name: '🏪 Convenience Store', color: 0xffaa88 },
            { x: -18, z: 20, type: 'weapons', name: '🔫 Gun Dealer', color: 0xcc8866 },
            { x: 14, z: -18, type: 'drug_dealer', name: '🌿 Weed Dealer', color: 0x88aa66 }
        ];
        
        npcPositions.forEach(pos => {
            const npcMat = new THREE.MeshStandardMaterial({ color: pos.color });
            const npc = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.9, 0.9), npcMat);
            npc.position.set(pos.x, 0.95, pos.z);
            npc.userData = { type: pos.type, name: pos.name };
            npc.castShadow = true;
            scene.add(npc);
            npcs.push(npc);
            
            const npcLabel = makeLabel(pos.name, '#ffaa88');
            npcLabel.position.set(pos.x, 1.9, pos.z);
            scene.add(npcLabel);
        });
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // Helper functions
        function makeLabel(text, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.7)';
            div.style.padding = '4px 12px';
            div.style.borderRadius = '20px';
            div.style.border = `1px solid ${color}`;
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }
        
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.35, 0.45);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.35, 0.45);
            group.add(leftEye);
            group.add(rightEye);
            
            // Pupils
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            leftPupil.position.set(-0.2, 1.33, 0.55);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
            rightPupil.position.set(0.2, 1.33, 0.55);
            group.add(leftPupil);
            group.add(rightPupil);
            
            if (isLocal) {
                const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                hat.position.y = 1.6;
                group.add(hat);
            }
            
            return group;
        }
        
        function createVehicle(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 2.2), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 0.2;
            body.castShadow = true;
            group.add(body);
            
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 1.4), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            roof.position.y = 0.55;
            roof.castShadow = true;
            group.add(roof);
            
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const positions = [[-0.6, 0.1, -0.9], [0.6, 0.1, -0.9], [-0.6, 0.1, 0.9], [0.6, 0.1, 0.9]];
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16), wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            return group;
        }
        
        // Camera control with right mouse button
        function handleMouseDown(event) {
            if (event.button === 2) { // Right mouse button
                isMouseDown = true;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
                event.preventDefault();
                renderer.domElement.style.cursor = 'grabbing';
            }
        }
        
        function handleMouseUp(event) {
            if (event.button === 2) {
                isMouseDown = false;
                renderer.domElement.style.cursor = 'default';
            }
        }
        
        function handleMouseMove(event) {
            if (isMouseDown) {
                const deltaX = event.clientX - lastMouseX;
                const deltaY = event.clientY - lastMouseY;
                
                cameraAngleX += deltaX * 0.01;
                cameraAngleY += deltaY * 0.01;
                
                // Limit vertical angle to avoid flipping
                cameraAngleY = Math.max(0.2, Math.min(1.2, cameraAngleY));
                
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        }
        
        // Prevent context menu on right click
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        renderer.domElement.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mouseup', handleMouseUp);
        window.addEventListener('mousemove', handleMouseMove);
        
        // UI Updates
        function updateUI() {
            document.getElementById('money').innerText = playerStats.money;
            document.getElementById('health-bar').style.width = `${playerStats.health}%`;
            document.getElementById('hunger-bar').style.width = `${playerStats.hunger}%`;
            document.getElementById('thirst-bar').style.width = `${playerStats.thirst}%`;
        }
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth' });
            if (logDiv.children.length > 15) logDiv.removeChild(logDiv.children[0]);
        }
        
        // Combat system
        function dealDamageToPlayer(targetId, damage) {
            const target = otherPlayers.get(targetId);
            if (target) {
                addLog(`Hit ${target.data.username} for ${damage} damage!`, 'info');
                // Simulate damage - in real implementation, update database
                if (Math.random() > 0.7) {
                    removeRemotePlayer(targetId);
                    addLog(`💀 ${target.data.username} was killed!`, 'info');
                }
            }
        }
        
        function shoot() {
            if (!localPlayerMesh) return;
            
            // Get camera direction for shooting
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const raycaster = new THREE.Raycaster(camera.position, direction, 0, 15);
            
            // Check for other players
            for (let [id, player] of otherPlayers) {
                const intersects = raycaster.intersectObject(player.mesh);
                if (intersects.length > 0) {
                    dealDamageToPlayer(id, 35);
                    break;
                }
            }
            
            // Muzzle flash
            const flash = new THREE.PointLight(0xff6600, 1, 5);
            flash.position.copy(camera.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);
            
            // Recoil effect
            cameraAngleY += 0.05;
            setTimeout(() => { cameraAngleY -= 0.05; }, 50);
        }
        
        // Remote player management
        function addRemotePlayer(id, name, position, color) {
            if (otherPlayers.has(id)) return;
            const mesh = createPlayerModel(color, false);
            mesh.position.copy(position);
            scene.add(mesh);
            const label = makeLabel(name, '#aaffdd');
            label.position.copy(position);
            label.position.y += 1.6;
            scene.add(label);
            otherPlayers.set(id, { mesh, label, name, data: { username: name } });
            addLog(`🟢 ${name} joined the server`, 'join');
            updatePlayerCountUI();
        }
        
        function removeRemotePlayer(id) {
            const entry = otherPlayers.get(id);
            if (entry) {
                scene.remove(entry.mesh);
                scene.remove(entry.label);
                addLog(`🔴 ${entry.name} left the server`, 'leave');
                otherPlayers.delete(id);
                updatePlayerCountUI();
            }
        }
        
        function updatePlayerCountUI() {
            const count = otherPlayers.size + (localPlayerMesh ? 1 : 0);
        }
        
        // Database sync functions
        async function syncPlayers() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('server_id', currentServerId)
                .gte('last_seen', new Date(Date.now() - 30000).toISOString());
            
            if (error) {
                console.error('Error syncing players:', error);
                return;
            }
            
            const currentRemoteIds = new Set(otherPlayers.keys());
            
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                
                if (!otherPlayers.has(player.id)) {
                    addRemotePlayer(player.id, player.username, new THREE.Vector3(player.x, player.y, player.z), player.color);
                } else {
                    const playerObj = otherPlayers.get(player.id);
                    playerObj.mesh.position.set(player.x, player.y, player.z);
                    playerObj.label.position.set(player.x, player.y + 1.6, player.z);
                }
                currentRemoteIds.delete(player.id);
            }
            
            for (const id of currentRemoteIds) {
                removeRemotePlayer(id);
            }
        }
        
        async function updatePlayerPosition() {
            if (!currentServerId || !myPlayerId || !localPlayerMesh) return;
            
            const { error } = await supabase
                .from('players')
                .update({
                    x: localPlayerMesh.position.x,
                    y: localPlayerMesh.position.y,
                    z: localPlayerMesh.position.z,
                    last_seen: new Date().toISOString()
                })
                .eq('id', myPlayerId);
            
            if (error) console.error('Error updating position:', error);
        }
        
        async function leaveServer() {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('id', myPlayerId);
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            for (const [id, player] of otherPlayers) {
                scene.remove(player.mesh);
                scene.remove(player.label);
            }
            otherPlayers.clear();
            
            if (localPlayerMesh) {
                scene.remove(localPlayerMesh);
                if (localLabel) scene.remove(localLabel);
                localPlayerMesh = null;
                localLabel = null;
            }
            
            currentServerId = null;
            myPlayerId = null;
            addLog('Disconnected from server', 'info');
        }
        
        async function joinServer(serverId, isCreate = false) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                addLog('Please enter a username', 'info');
                return;
            }
            
            if (!serverId.trim()) {
                addLog('Invalid server ID', 'info');
                return;
            }
            
            await leaveServer();
            currentServerId = serverId.trim();
            
            const spawnPos = { x: (Math.random() - 0.5) * 12, y: 0.8, z: (Math.random() - 0.5) * 12 };
            const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { data, error } = await supabase
                .from('players')
                .insert({
                    username: myUsername,
                    server_id: currentServerId,
                    x: spawnPos.x,
                    y: spawnPos.y,
                    z: spawnPos.z,
                    color: playerColor,
                    money: playerStats.money
                })
                .select()
                .single();
            
            if (error) {
                addLog(`Error joining server: ${error.message}`, 'info');
                return;
            }
            
            myPlayerId = data.id;
            
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            scene.add(localPlayerMesh);
            
            localLabel = makeLabel(myUsername, '#ffff88');
            localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
            scene.add(localLabel);
            
            addLog(`${isCreate ? 'Created' : 'Joined'} server "${currentServerId}" as ${myUsername}`, 'success');
            
            await syncPlayers();
            syncInterval = setInterval(() => syncPlayers(), 1000);
            updateInterval = setInterval(() => updatePlayerPosition(), 50);
        }
        
        // Movement with camera-relative controls
        const keys = { w: false, s: false, a: false, d: false };
        let moveSpeed = 6;
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'e') interactWithNPC();
            if (key === 'tab') {
                e.preventDefault();
                togglePhone();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        function updateMovement() {
            if (!localPlayerMesh) return;
            
            // Calculate camera direction for movement (horizontal only)
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();
            
            const cameraRight = new THREE.Vector3();
            cameraRight.crossVectors(new THREE.Vector3(0, 1, 0), cameraDirection);
            cameraRight.normalize();
            
            const move = new THREE.Vector3();
            
            if (keys.w) move.add(cameraDirection);
            if (keys.s) move.sub(cameraDirection);
            if (keys.d) move.add(cameraRight);
            if (keys.a) move.sub(cameraRight);
            
            move.normalize();
            move.multiplyScalar(moveSpeed * 0.016);
            
            let newPos = localPlayerMesh.position.clone().add(move);
            newPos.x = Math.min(65, Math.max(-65, newPos.x));
            newPos.z = Math.min(65, Math.max(-65, newPos.z));
            newPos.y = 0.8;
            
            localPlayerMesh.position.copy(newPos);
            localLabel.position.copy(newPos);
            localLabel.position.y += 1.6;
        }
        
        // Update camera position based on player and rotation angles
        function updateCamera() {
            if (!localPlayerMesh) return;
            
            // Calculate camera position in spherical coordinates
            const x = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const z = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const y = Math.sin(cameraAngleY) * cameraDistance + 1.5;
            
            camera.position.x = localPlayerMesh.position.x + x;
            camera.position.z = localPlayerMesh.position.z + z;
            camera.position.y = localPlayerMesh.position.y + y;
            camera.lookAt(localPlayerMesh.position);
        }
        
        // NPC Interaction
        function interactWithNPC() {
            if (!localPlayerMesh) return;
            
            for (let npc of npcs) {
                const distance = localPlayerMesh.position.distanceTo(npc.position);
                if (distance < 3) {
                    const type = npc.userData.type;
                    showShopUI(type);
                    break;
                }
            }
        }
        
        function showShopUI(type) {
            const ui = document.getElementById('npc-interaction');
            ui.innerHTML = `<h3>${type === 'food' ? '🏪 Convenience Store' : type === 'weapons' ? '🔫 Gun Shop' : '🌿 Weed Dealer'}</h3>`;
            
            if (type === 'food') {
                ui.innerHTML += `
                    <div class="shop-item" onclick="buyItem('water', 10)">💧 Water - $10 (Restores thirst +30)</div>
                    <div class="shop-item" onclick="buyItem('burger', 15)">🍔 Burger - $15 (Restores hunger +40)</div>
                    <div class="shop-item" onclick="buyItem('soda', 8)">🥤 Soda - $8 (Restores thirst +20)</div>
                `;
            } else if (type === 'weapons') {
                ui.innerHTML += `
                    <div class="shop-item" onclick="buyWeapon('pistol', 500)">🔫 Pistol - $500 (30 ammo)</div>
                    <div class="shop-item" onclick="buyWeapon('shotgun', 1200)">🔫 Shotgun - $1200 (15 ammo)</div>
                    <div class="shop-item" onclick="buyWeapon('rifle', 2000)">🔫 Rifle - $2000 (40 ammo)</div>
                `;
            } else if (type === 'drug_dealer') {
                ui.innerHTML += `
                    <div class="shop-item" onclick="buyItem('weed_seed', 50)">🌱 Weed Seed - $50</div>
                    <div class="shop-item" onclick="sellWeed()">💵 Sell Weed - $100 each</div>
                `;
            }
            
            ui.style.display = 'block';
            setTimeout(() => { ui.style.display = 'none'; }, 8000);
        }
        
        window.buyItem = (item, price) => {
            if (playerStats.money >= price) {
                playerStats.money -= price;
                if (item === 'water') playerStats.thirst = Math.min(100, playerStats.thirst + 30);
                if (item === 'burger') playerStats.hunger = Math.min(100, playerStats.hunger + 40);
                if (item === 'soda') playerStats.thirst = Math.min(100, playerStats.thirst + 20);
                if (item === 'weed_seed') inventory.push({ name: 'weed_seed', qty: 1 });
                updateUI();
                addLog(`Bought ${item} for $${price}`);
            } else {
                addLog('Not enough money!');
            }
        };
        
        window.buyWeapon = (weapon, price) => {
            if (playerStats.money >= price) {
                playerStats.money -= price;
                currentWeapon = weapon;
                addLog(`Bought ${weapon}!`);
                updateUI();
            } else {
                addLog('Not enough money!');
            }
        };
        
        window.sellWeed = () => {
            addLog('Grow weed first by buying seeds from the Weed Dealer!');
        };
        
        // Phone functions
        window.togglePhone = () => {
            const apps = document.getElementById('phone-apps');
            apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
        };
        
        window.openCarShop = () => {
            addLog('🚗 Car Dealership: Sedan ($5000) - Sports Car ($15000)');
        };
        
        window.spawnVehicle = () => {
            if (playerStats.money >= 5000 && !currentVehicle) {
                playerStats.money -= 5000;
                currentVehicle = createVehicle(0xff4444);
                currentVehicle.position.copy(localPlayerMesh.position);
                currentVehicle.position.z += 2;
                scene.add(currentVehicle);
                addLog('Vehicle spawned! Press F to enter');
                updateUI();
            } else if (currentVehicle) {
                addLog('You already have a vehicle spawned!');
            } else {
                addLog('Not enough money! Need $5000');
            }
        };
        
        window.openInventory = () => {
            addLog(`📦 Inventory: ${inventory.length} items | Weapon: ${currentWeapon} | Ammo: ${ammo[currentWeapon]}`);
        };
        
        window.startWeedJob = () => {
            addLog('🌿 Weed Farming: Buy seeds from Weed Dealer, plant, wait to grow, then sell!');
        };
        
        window.respawn = () => {
            if (playerStats.money >= 100) {
                playerStats.money -= 100;
                playerStats.health = 100;
                playerStats.hunger = 80;
                playerStats.thirst = 80;
                updateUI();
                document.getElementById('wasted').style.display = 'none';
                
                if (localPlayerMesh) {
                    localPlayerMesh.position.set(0, 0.8, 0);
                }
                addLog('You respawned at the city center!');
            } else {
                addLog('Not enough money to respawn!');
            }
        };
        
        function die() {
            document.getElementById('wasted').style.display = 'flex';
            addLog('You died! Click respawn to continue.');
        }
        
        function takeDamage(amount) {
            playerStats.health = Math.max(0, playerStats.health - amount);
            updateUI();
            if (playerStats.health <= 0) {
                die();
            }
        }
        
        // Survival mechanics
        setInterval(() => {
            if (localPlayerMesh) {
                playerStats.hunger = Math.max(0, playerStats.hunger - 0.3);
                playerStats.thirst = Math.max(0, playerStats.thirst - 0.4);
                if (playerStats.hunger <= 0 || playerStats.thirst <= 0) {
                    takeDamage(1);
                }
                updateUI();
            }
        }, 5000);
        
        // Day/Night cycle
        function updateDayNight() {
            dayTime += 0.0005;
            if (dayTime > 1) dayTime -= 1;
            const intensity = Math.sin(dayTime * Math.PI);
            dirLight.intensity = 0.4 + intensity * 0.6;
            scene.background.setHSL(0.55, 0.5, 0.2 + intensity * 0.3);
        }
        
        // Shooting with left mouse click
        renderer.domElement.addEventListener('click', (e) => {
            if (e.button === 0 && !isMouseDown) { // Left click only when not rotating camera
                shoot();
            }
        });
        
        // UI buttons
        document.getElementById('joinGame').onclick = () => {
            const code = document.getElementById('serverCode').value;
            joinServer(code, false);
        };
        
        document.getElementById('leaveGame').onclick = () => {
            leaveServer();
        };
        
        // Set random username
        document.getElementById('username').value = `Player_${Math.floor(Math.random() * 1000)}`;
        
        // Animation loop
        function animate() {
            updateMovement();
            updateCamera();
            updateDayNight();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        addLog('✨ Welcome to RP World! Join a server to start playing.', 'info');
        addLog('💡 Hold RIGHT CLICK + Drag to rotate camera 360 degrees!', 'info');
        
        // Add decorative elements
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 50 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
        scene.add(stars);
    </script>
</body>
</html>
