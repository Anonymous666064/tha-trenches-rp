<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer 3D World - Fixed Real-time</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            border-left: 3px solid #00ffaa;
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #player-count {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #00ffaa;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #debug {
            position: absolute;
            bottom: 20px;
            left: 200px;
            background: rgba(0,0,0,0.7);
            color: #88ff88;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            max-width: 300px;
            white-space: pre-wrap;
        }
        @media (max-width: 600px) {
            #info, #controls, #player-count, #debug { font-size: 9px; padding: 4px 8px; }
            #debug { left: 10px; bottom: 60px; max-width: 200px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🌍 Multiplayer World | <span style="color:#00ffaa;">WASD</span> to Move
    </div>
    <div id="controls">
        🎮 WASD: Move | 🖱️ Mouse Drag: Look around
    </div>
    <div id="player-count">
        👥 Players: <span id="playerCount">1</span>
    </div>
    <div id="status">
        🔄 Connecting...
    </div>
    <div id="debug">
        📡 Debug: Initializing...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';

        // Debug logging function
        function debugLog(message) {
            const debugEl = document.getElementById('debug');
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            console.log(logMessage);
            debugEl.innerHTML = `📡 ${logMessage}<br>${debugEl.innerHTML.split('<br>').slice(0, 4).join('<br>')}`;
        }

        // --- Supabase Configuration ---
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // --- Generate a unique player ID ---
        let playerId = localStorage.getItem('player_id');
        if (!playerId) {
            playerId = 'player_' + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
            localStorage.setItem('player_id', playerId);
        }
        debugLog(`Player ID: ${playerId}`);
        
        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 100);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 Renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        const hemiLight = new THREE.HemisphereLight(0x8bb5ff, 0x5c6e4d, 0.4);
        scene.add(hemiLight);
        
        // --- Ground ---
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x6c9e4a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const gridHelper = new THREE.GridHelper(52, 25, 0x88aa66, 0x446633);
        gridHelper.position.y = -0.02;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        // --- Decorative elements ---
        const rockMaterial = new THREE.MeshStandardMaterial({ color: 0xaa9977 });
        const bushMaterial = new THREE.MeshStandardMaterial({ color: 0x6cae4a });
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x5fad41 });
        
        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 7 + Math.random() * 18;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            if (Math.random() > 0.6) {
                const bushGroup = new THREE.Group();
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.2, 6), bushMaterial);
                base.position.y = 0;
                base.castShadow = true;
                bushGroup.add(base);
                const top = new THREE.Mesh(new THREE.SphereGeometry(0.25, 5), bushMaterial);
                top.position.y = 0.2;
                top.castShadow = true;
                bushGroup.add(top);
                bushGroup.position.set(x, 0, z);
                scene.add(bushGroup);
            } else if (Math.random() > 0.3) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.8, 6), trunkMat);
                trunk.position.set(x, 0.4, z);
                trunk.castShadow = true;
                const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.7, 8), foliageMat);
                foliage1.position.set(x, 0.85, z);
                foliage1.castShadow = true;
                const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.6, 8), foliageMat);
                foliage2.position.set(x, 1.25, z);
                foliage2.castShadow = true;
                scene.add(trunk);
                scene.add(foliage1);
                scene.add(foliage2);
            }
        }
        
        // --- Local Player Model ---
        const localPlayerGroup = new THREE.Group();
        
        const bodyGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.9, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.position.y = 0.45;
        localPlayerGroup.add(body);
        
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), headMat);
        head.castShadow = true;
        head.position.y = 1.15;
        localPlayerGroup.add(head);
        
        // Eyes
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
        leftEye.position.set(-0.2, 1.25, 0.48);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeWhiteMat);
        rightEye.position.set(0.2, 1.25, 0.48);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        leftPupil.position.set(-0.2, 1.23, 0.55);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        rightPupil.position.set(0.2, 1.23, 0.55);
        localPlayerGroup.add(leftEye, rightEye, leftPupil, rightPupil);
        
        // Hat
        const hatMat = new THREE.MeshStandardMaterial({ color: 0xd43f1d });
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.45, 8), hatMat);
        hat.position.y = 1.55;
        hat.castShadow = true;
        localPlayerGroup.add(hat);
        
        localPlayerGroup.position.set(0, 0, 0);
        localPlayerGroup.castShadow = true;
        scene.add(localPlayerGroup);
        
        // Local player label
        const localLabelDiv = document.createElement('div');
        localLabelDiv.textContent = `You (${playerId.slice(-6)})`;
        localLabelDiv.style.cssText = 'color:#aaffdd; font-size:14px; font-weight:bold; background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:20px; border:1px solid #44ffaa; font-family:sans-serif; white-space:nowrap;';
        const localLabel = new CSS2DObject(localLabelDiv);
        localLabel.position.set(0, 2.0, 0);
        localPlayerGroup.add(localLabel);
        
        // --- Remote Players Storage ---
        const remotePlayers = new Map();
        
        function createRemotePlayerModel(id) {
            const group = new THREE.Group();
            // Generate consistent color based on ID
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
            const color = (Math.abs(hash) % 0x88aaff) | 0xff8844;
            
            const bodyGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.9, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.position.y = 0.45;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), headMat);
            head.castShadow = true;
            head.position.y = 1.15;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), eyeMat);
            leftEye.position.set(-0.18, 1.27, 0.5);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), eyeMat);
            rightEye.position.set(0.18, 1.27, 0.5);
            group.add(leftEye, rightEye);
            
            const hatMat = new THREE.MeshStandardMaterial({ color: 0x33aa55 });
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.58, 0.42, 8), hatMat);
            hat.position.y = 1.53;
            hat.castShadow = true;
            group.add(hat);
            
            group.castShadow = true;
            return group;
        }
        
        // --- Movement Logic ---
        const keyState = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 'a') keyState.a = true;
            if (key === 's') keyState.s = true;
            if (key === 'd') keyState.d = true;
            if (['w','a','s','d'].includes(key)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 'a') keyState.a = false;
            if (key === 's') keyState.s = false;
            if (key === 'd') keyState.d = false;
        });
        
        const MOVE_SPEED = 6.0;
        const WORLD_LIMIT = 22;
        
        function updateLocalMovement(deltaTime) {
            let moveX = 0, moveZ = 0;
            if (keyState.w) moveZ -= 1;
            if (keyState.s) moveZ += 1;
            if (keyState.a) moveX -= 1;
            if (keyState.d) moveX += 1;
            if (moveX === 0 && moveZ === 0) return false;
            
            const len = Math.hypot(moveX, moveZ);
            if (len > 0) { moveX /= len; moveZ /= len; }
            
            const cameraDir = camera.getWorldDirection(new THREE.Vector3());
            const forward = new THREE.Vector3(cameraDir.x, 0, cameraDir.z).normalize();
            const right = new THREE.Vector3(-forward.z, 0, forward.x);
            
            let deltaPos = new THREE.Vector3(0, 0, 0);
            deltaPos.addScaledVector(forward, moveZ);
            deltaPos.addScaledVector(right, moveX);
            deltaPos.multiplyScalar(MOVE_SPEED * deltaTime);
            
            let newX = localPlayerGroup.position.x + deltaPos.x;
            let newZ = localPlayerGroup.position.z + deltaPos.z;
            newX = Math.min(WORLD_LIMIT, Math.max(-WORLD_LIMIT, newX));
            newZ = Math.min(WORLD_LIMIT, Math.max(-WORLD_LIMIT, newZ));
            
            localPlayerGroup.position.set(newX, 0, newZ);
            
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(deltaPos.x, deltaPos.z);
                localPlayerGroup.rotation.y = angle;
            }
            return true;
        }
        
        // --- Supabase Real-time Setup ---
        const TABLE_NAME = 'player_positions';
        let lastSentTime = 0;
        let sendInterval = 0.066; // ~15 fps
        
        async function sendPosition() {
            const x = localPlayerGroup.position.x;
            const z = localPlayerGroup.position.z;
            try {
                const { data, error } = await supabase
                    .from(TABLE_NAME)
                    .upsert({ 
                        id: playerId, 
                        x: x, 
                        z: z, 
                        updated_at: new Date().toISOString() 
                    }, { 
                        onConflict: 'id',
                        ignoreDuplicates: false 
                    });
                if (error) {
                    debugLog(`Send error: ${error.message}`);
                } else {
                    debugLog(`Position sent: (${x.toFixed(2)}, ${z.toFixed(2)})`);
                }
            } catch(e) {
                debugLog(`Send exception: ${e.message}`);
            }
        }
        
        function handlePlayerUpdate(data) {
            if (!data || data.id === playerId) {
                if (data && data.id === playerId) debugLog(`Ignoring self update`);
                return;
            }
            
            debugLog(`Received update from ${data.id.slice(-6)}: (${data.x?.toFixed(2)}, ${data.z?.toFixed(2)})`);
            
            const remoteId = data.id;
            const x = data.x;
            const z = data.z;
            
            if (remotePlayers.has(remoteId)) {
                const player = remotePlayers.get(remoteId);
                player.targetPos = { x, z };
                player.lastUpdate = Date.now();
                player.group.position.x += (x - player.group.position.x) * 0.3;
                player.group.position.z += (z - player.group.position.z) * 0.3;
            } else {
                debugLog(`Creating new remote player: ${remoteId.slice(-6)}`);
                const remoteGroup = createRemotePlayerModel(remoteId);
                remoteGroup.position.set(x, 0, z);
                scene.add(remoteGroup);
                
                const remoteLabelDiv = document.createElement('div');
                remoteLabelDiv.textContent = `${remoteId.slice(-6)}`;
                remoteLabelDiv.style.cssText = 'color:#ffdd99; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:16px; border:1px solid #ffaa66; font-family:sans-serif; white-space:nowrap;';
                const remoteLabel = new CSS2DObject(remoteLabelDiv);
                remoteLabel.position.set(0, 1.95, 0);
                remoteGroup.add(remoteLabel);
                
                remotePlayers.set(remoteId, {
                    group: remoteGroup,
                    label: remoteLabel,
                    targetPos: { x, z },
                    lastUpdate: Date.now()
                });
                updatePlayerCount();
            }
        }
        
        function updatePlayerCount() {
            const count = remotePlayers.size + 1;
            document.getElementById('playerCount').innerText = count;
            debugLog(`Player count: ${count} (${remotePlayers.size} remote, 1 local)`);
        }
        
        function cleanupStalePlayers() {
            const now = Date.now();
            let removed = 0;
            for (const [id, player] of remotePlayers.entries()) {
                if (now - player.lastUpdate > 15000) { // 15 seconds timeout
                    debugLog(`Removing stale player: ${id.slice(-6)}`);
                    scene.remove(player.group);
                    remotePlayers.delete(id);
                    removed++;
                }
            }
            if (removed > 0) updatePlayerCount();
        }
        
        // --- Load existing players on startup ---
        async function loadExistingPlayers() {
            try {
                debugLog(`Loading existing players from ${TABLE_NAME}...`);
                const { data, error } = await supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .neq('id', playerId);
                
                if (error) {
                    debugLog(`Load error: ${error.message}`);
                    return;
                }
                
                debugLog(`Found ${data?.length || 0} existing players`);
                if (data) {
                    data.forEach(row => handlePlayerUpdate(row));
                }
            } catch(e) {
                debugLog(`Load exception: ${e.message}`);
            }
        }
        
        // --- Initialize Realtime Subscription ---
        let subscription;
        
        async function initRealtime() {
            debugLog(`Initializing Supabase real-time for table: ${TABLE_NAME}`);
            
            // First, send initial position
            await sendPosition();
            
            // Create the channel with proper configuration
            subscription = supabase
                .channel('player-positions-channel')
                .on(
                    'postgres_changes',
                    {
                        event: '*',  // Listen to INSERT, UPDATE, DELETE
                        schema: 'public',
                        table: TABLE_NAME
                    },
                    (payload) => {
                        debugLog(`Realtime event: ${payload.eventType} for ${payload.new?.id?.slice(-6) || 'unknown'}`);
                        if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                            handlePlayerUpdate(payload.new);
                        } else if (payload.eventType === 'DELETE') {
                            const deletedId = payload.old?.id;
                            if (deletedId && remotePlayers.has(deletedId)) {
                                debugLog(`Removing deleted player: ${deletedId.slice(-6)}`);
                                scene.remove(remotePlayers.get(deletedId).group);
                                remotePlayers.delete(deletedId);
                                updatePlayerCount();
                            }
                        }
                    }
                )
                .subscribe((status) => {
                    debugLog(`Subscription status: ${status}`);
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('status').innerHTML = '🟢 Real-time Connected';
                        document.getElementById('status').style.color = '#00ffaa';
                    } else if (status === 'CHANNEL_ERROR') {
                        document.getElementById('status').innerHTML = '🔴 Connection Error';
                        document.getElementById('status').style.color = '#ff6666';
                    } else {
                        document.getElementById('status').innerHTML = `🟡 ${status}`;
                    }
                });
            
            // Also load existing players
            setTimeout(() => loadExistingPlayers(), 1000);
        }
        
        // --- Animation Loop ---
        let lastFrameTime = performance.now();
        let lastSendFrame = 0;
        
        async function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            // Update local movement
            updateLocalMovement(delta);
            
            // Throttle position sending (every 50ms)
            if (now - lastSendFrame > 50) {
                lastSendFrame = now;
                await sendPosition();
            }
            
            // Smooth remote player interpolation
            for (const player of remotePlayers.values()) {
                if (player.targetPos) {
                    player.group.position.x += (player.targetPos.x - player.group.position.x) * 0.2;
                    player.group.position.z += (player.targetPos.z - player.group.position.z) * 0.2;
                    
                    const dx = player.targetPos.x - player.group.position.x;
                    const dz = player.targetPos.z - player.group.position.z;
                    if (Math.hypot(dx, dz) > 0.01) {
                        player.group.rotation.y = Math.atan2(dx, dz);
                    }
                }
            }
            
            cleanupStalePlayers();
            
            // Update orbit controls target
            controls.target.copy(localPlayerGroup.position);
            controls.update();
            
            // Idle animation
            const time = Date.now() * 0.006;
            const bob = Math.sin(time) * 0.005;
            localPlayerGroup.position.y = bob;
            localLabel.position.y = 2.0 + Math.abs(bob) * 0.2;
            
            // Eye movement
            const pupils = localPlayerGroup.children.filter(c => c.geometry?.type === 'SphereGeometry' && c.material?.color?.getHex() === 0x000000);
            if (pupils.length === 2) {
                const lookX = Math.sin(time * 0.8) * 0.04;
                const lookZ = Math.cos(time * 0.6) * 0.03;
                pupils[0].position.x = -0.2 + lookX;
                pupils[1].position.x = 0.2 + lookX;
                pupils[0].position.z = 0.55 + lookZ;
                pupils[1].position.z = 0.55 + lookZ;
            }
            
            // Render
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // --- Start Application ---
        async function start() {
            debugLog(`Starting multiplayer app with ID: ${playerId}`);
            
            // Test Supabase connection first
            try {
                const { data, error } = await supabase.from(TABLE_NAME).select('count').limit(1);
                if (error) {
                    debugLog(`Table check error: ${error.message}`);
                    document.getElementById('status').innerHTML = '⚠️ Table missing';
                    document.getElementById('status').style.color = '#ff6666';
                } else {
                    debugLog(`Table "${TABLE_NAME}" exists and is accessible`);
                    await initRealtime();
                }
            } catch(e) {
                debugLog(`Connection test failed: ${e.message}`);
                document.getElementById('status').innerHTML = '⚠️ Connection Failed';
            }
            
            animate();
        }
        
        start();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', async () => {
            debugLog(`Cleaning up player ${playerId.slice(-6)}`);
            try {
                await supabase.from(TABLE_NAME).delete().eq('id', playerId);
            } catch(e) {}
        });
    </script>
</body>
</html>
