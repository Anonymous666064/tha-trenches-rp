<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple 3D Multiplayer</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#menu {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    color:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    z-index:100;
}

input, button {
    padding:10px;
    margin:5px;
    width:200px;
}

#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:monospace;
    z-index:10;
}

#players {
    position:absolute;
    top:10px;
    right:10px;
    color:#4ec9e0;
    font-weight:bold;
    z-index:10;
}
</style>
</head>
<body>

<div id="menu">
    <h3>Enter Server Code</h3>
    <input id="code" maxlength="6" placeholder="ABC123">
    <br>
    <button id="join">JOIN / CREATE</button>
</div>

<div id="ui">Not connected</div>
<div id="players">Players: 0</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ================= SUPABASE =================
const supabase = createClient(
    "https://hcvewiwhtxqpbogcrukk.supabase.co",
    "sb_publishable_aOPgE3PvcNPiVyaIEK1evQ_NBi_TXHw"
);

// ================= GAME VARS =================
let session = null;
const playerId = crypto.randomUUID();
const others = new Map();

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1).position.set(10,20,10));
scene.add(new THREE.AmbientLight(0x404040,0.6));

// GROUND
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x3a8c3a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
function createPlayer(color){
    const g = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5,0.5,1.2,16),
        new THREE.MeshStandardMaterial({color})
    );
    body.position.y = 0.6;
    g.add(body);

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.4,16,16),
        new THREE.MeshStandardMaterial({color:0xffccaa})
    );
    head.position.y = 1.4;
    g.add(head);

    return g;
}

const player = createPlayer(0x4ec9e0);
scene.add(player);

// ================= CONTROLS =================
let keys={}, yaw=0, pitch=0;

window.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement!==document.body) return;

    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch = Math.max(-1, Math.min(1, pitch));

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;
});

// MOVE
function move(dt){
    const dir=new THREE.Vector3();
    if(keys.w) dir.z--;
    if(keys.s) dir.z++;
    if(keys.a) dir.x--;
    if(keys.d) dir.x++;

    if(dir.length()>0) dir.normalize();

    const forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

    player.position.x+=(dir.x*right.x+dir.z*forward.x)*5*dt;
    player.position.z+=(dir.x*right.z+dir.z*forward.z)*5*dt;
}

// ================= PLAYER COUNT =================
function updatePlayerCount(){
    document.getElementById("players").textContent =
        "Players: " + (others.size + 1);
}

// ================= MULTIPLAYER =================
function startGame(code){
    session = code;

    document.getElementById("menu").style.display="none";
    document.getElementById("ui").textContent="Server: "+session;

    // SEND DATA
    setInterval(async ()=>{
        await supabase.from("players").upsert({
            id: playerId,
            session: session,
            x: player.position.x,
            y: player.position.y,
            z: player.position.z,
            rotation: yaw,
            updated_at: new Date().toISOString()
        });
    },100);

    // LISTEN
    supabase.channel("room-"+session)
    .on("postgres_changes", {
        event:"*",
        schema:"public",
        table:"players",
        filter:`session=eq.${session}`
    }, payload=>{
        const p = payload.new;
        if(!p || p.id===playerId) return;

        if(!others.has(p.id)){
            const mesh = createPlayer(Math.random()*0xffffff);
            scene.add(mesh);
            others.set(p.id, mesh);
            updatePlayerCount();
        }

        const mesh = others.get(p.id);
        mesh.position.lerp(new THREE.Vector3(p.x,p.y,p.z),0.3);
    })
    .subscribe();

    // REMOVE OLD PLAYERS
    setInterval(async ()=>{
        const cutoff = new Date(Date.now()-10000).toISOString();
        await supabase.from("players")
            .delete()
            .eq("session", session)
            .lt("updated_at", cutoff);
    },5000);
}

// ================= MENU =================
document.getElementById("join").onclick=()=>{
    const code = document.getElementById("code").value.toUpperCase();

    if(code.length !== 6){
        alert("Enter 6 character code");
        return;
    }

    startGame(code);
};

// ================= LOOP =================
let last=performance.now();

function animate(){
    const now=performance.now();
    const dt=(now-last)/1000;
    last=now;

    move(dt);

    camera.position.lerp(
        new THREE.Vector3(player.position.x,5,player.position.z+8),
        0.1
    );

    camera.lookAt(player.position);

    renderer.render(scene,camera);
    requestAnimationFrame(animate);
}
animate();

</script>
</body>
</html>
