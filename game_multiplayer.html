<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RP World - City Roleplay Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 11px;
            min-width: 220px;
        }
        
        .stat-bar {
            margin: 3px 0;
        }
        
        .stat-label {
            display: inline-block;
            width: 45px;
            font-size: 10px;
        }
        
        .bar-bg {
            display: inline-block;
            width: 120px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health-fill { background: #ff4444; }
        .hunger-fill { background: #ffaa44; }
        .thirst-fill { background: #44aaff; }
        
        .money {
            color: #ffaa44;
            font-size: 14px;
            font-weight: bold;
            margin: 3px 0;
        }
        
        #phone {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            border: 2px solid #4a6a8a;
        }
        
        #phone-icon {
            font-size: 24px;
        }
        
        #phone-apps {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 10px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            z-index: 200;
        }
        
        .app-btn {
            background: #2c3e50;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }
        
        .app-btn:hover {
            background: #3e5a6e;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 150;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: red;

        #respawn-btn {

        input, button {

            border: none;

        .log-container {

        #player-list {

            right: 20px;
            background: rgba(0,0,0,0.75);

            padding: 8px;

            z-index: 100;

            backdrop-filter: blur(4px);
        }
        
        #player-list h4 {
            margin: 0 0 5px 0;
            color: #ffaa44;
            font-size: 11px;
            text-align: center;
        }
        
        .player-name {
            padding: 2px 5px;
            border-bottom: 1px solid #333;

        #vehicle-prompt {

            bottom: 100px;

        #speedometer {

        #vehicle-status {
            position: absolute;

            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            color: #ffaa44;
            display: none;
            z-index: 100;
        }
    </style>
</head>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';
        
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============ GAME STATE ============
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let isDead = false;
        let playerStats = { health: 100, hunger: 100, thirst: 100, money: 100000, kills: 0 };
        
        // Vehicle state
        let currentVehicleId = null;
        let isDriver = false;
        let vehicleSpeed = 0;
        let lastUpdateTime = 0;
        
        // Three.js objects
        let scene, camera, renderer, labelRenderer;
        let localPlayerMesh = null;
        let localPlayerLabel = null;
        let otherPlayers = new Map();
        let vehicles = new Map();
        
        // Input state
        const keys = { w: false, s: false, a: false, d: false };
        let moveSpeed = 6;
        let mouseX = 0, mouseY = 0;
        let cameraYaw = 0, cameraPitch = 0;
        let isPointerLocked = false;
        
        // Sync intervals
        let updateInterval = null;
        let syncInterval = null;
        let driveSyncInterval = null;
        
        // ============ CREATE CAR MODEL ============
        function createCarModel(color) {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(1.8, 0.5, 4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.7 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.25;
            body.castShadow = true;
            group.add(body);
            
            const roofGeo = new THREE.BoxGeometry(1.4, 0.4, 2.5);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 0.7;
            roof.castShadow = true;
            group.add(roof);
            
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
            const wheelPositions = [[-0.9, 0.2, -1.2], [0.9, 0.2, -1.2], [-0.9, 0.2, 1.2], [0.9, 0.2, 1.2]];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466 });
            const frontWindow = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.8), windowMat);
            frontWindow.position.set(0, 0.85, 1.4);
            group.add(frontWindow);
            
            return group;
        }
        
        // ============ CREATE PLAYER MODEL ============
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.35, 0.45);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.35, 0.45);
            group.add(leftEye);
            group.add(rightEye);
            
            if (isLocal) {
                const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                hat.position.y = 1.55;
                group.add(hat);
            }
            
            return group;
        }
        
        // ============ CREATE LABEL ============
        function createLabel(text, color, borderColor = null) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '11px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.7)';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '15px';
            div.style.whiteSpace = 'nowrap';
            div.style.border = `1px solid ${borderColor || color}`;
            return new CSS2DObject(div);
        }
        
        // ============ CREATE CITY ============
        function createCity() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7e3a, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, roughness: 0.4 });
            const roadPositions = [-40, -20, 0, 20, 40];
            const roadWidth = 4;
            
            roadPositions.forEach(z => {
                const road = new THREE.Mesh(new THREE.BoxGeometry(100, 0.2, roadWidth), roadMat);
                road.position.set(0, 0, z);
                road.receiveShadow = true;
                scene.add(road);
            });
            
            roadPositions.forEach(x => {
                const road = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.2, 100), roadMat);
                road.position.set(x, 0, 0);
                road.receiveShadow = true;
                scene.add(road);
            });
            
            const buildingColors = [0x8b7d6b, 0x9a8b7a, 0x7a6b5a, 0x9d8b72];
            for (let bx = -3; bx <= 3; bx++) {
                for (let bz = -3; bz <= 3; bz++) {
                    if (bx === 0 && bz === 0) continue;
                    const baseX = bx * 20;
                    const baseZ = bz * 20;
                    const offsets = [[-6, -6], [6, -6], [-6, 6], [6, 6]];
                    offsets.forEach(offset => {
                        const x = baseX + offset[0];
                        const z = baseZ + offset[1];
                        const height = 2 + Math.random() * 4;
                        const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                        const building = new THREE.Mesh(new THREE.BoxGeometry(6, height, 6), new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 }));
                        building.position.set(x, height/2, z);
                        building.castShadow = true;
                        scene.add(building);
                    });
                }
            }
            
            const plazaMat = new THREE.MeshStandardMaterial({ color: 0xccccaa });
            const plaza = new THREE.Mesh(new THREE.BoxGeometry(15, 0.2, 15), plazaMat);
            plaza.position.set(0, 0, 0);
            plaza.receiveShadow = true;
            scene.add(plaza);
        }
        
        // ============ VEHICLE CLASS ============
        class Vehicle {
            constructor(id, x, z, color, driverId, passengers) {
                this.id = id;
                this.mesh = createCarModel(color);
                this.mesh.position.set(x, 0.2, z);
                scene.add(this.mesh);
                
                this.label = createLabel('🚗 Vehicle', '#ffaa44', '#ffaa44');
                this.label.position.set(x, 1.4, z);
                scene.add(this.label);
                
                this.driverId = driverId;
                this.passengers = passengers || [];
                this.x = x;
                this.z = z;
                this.targetX = x;
                this.targetZ = z;
                this.color = color;
                this.rotation = 0;
                this.targetRotation = 0;
            }
            
            updatePosition(x, z, immediate = false) {
                if (immediate) {
                    this.x = x;
                    this.z = z;
                    this.mesh.position.set(x, 0.2, z);
                    this.label.position.set(x, 1.4, z);
                } else {
                    this.targetX = x;
                    this.targetZ = z;
                }
            }
            
            updateRotation(rotation, immediate = false) {
                if (immediate) {
                    this.rotation = rotation;
                    this.mesh.rotation.y = rotation;
                } else {
                    this.targetRotation = rotation;
                }
            }
            
            updateLabel() {
                let text = '🚗 Vehicle';
                if (this.driverId) text = '🚗 Vehicle (Driven)';
                if (this.passengers.length > 0) text += ` +${this.passengers.length}`;
                this.label.element.textContent = text;
            }
            
            interpolate(deltaTime) {
                const speed = 10 * deltaTime;
                this.x += (this.targetX - this.x) * speed;
                this.z += (this.targetZ - this.z) * speed;
                this.mesh.position.set(this.x, 0.2, this.z);
                this.label.position.set(this.x, 1.4, this.z);
                
                this.rotation += (this.targetRotation - this.rotation) * speed;
                this.mesh.rotation.y = this.rotation;
            }
            
            dispose() {
                scene.remove(this.mesh);
                scene.remove(this.label);
            }
        }
        
        // ============ VEHICLE FUNCTIONS ============
        async function spawnVehicle() {
            if (!currentServerId || !myPlayerId) {
                addLog('Join a server first!', 'info');
                return;
            }
            
            if (playerStats.money < 5000) {
                addLog('Need $5000 to spawn a vehicle!', 'info');
                return;
            }
            
            playerStats.money -= 5000;
            updateUI();
            
            let spawnX = 0, spawnZ = 0;
            if (localPlayerMesh && localPlayerMesh.visible) {
                spawnX = localPlayerMesh.position.x + 3;
                spawnZ = localPlayerMesh.position.z + 3;
            }
            
            const vehicleColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { error } = await supabase.from('vehicles').insert({
                server_id: currentServerId,
                x: spawnX,
                z: spawnZ,
                color: vehicleColor,
                driver_id: null,
                passengers: []
            });
            
            if (error) {
                addLog(`Failed to spawn vehicle: ${error.message}`, 'info');
                playerStats.money += 5000;
                updateUI();
            } else {
                addLog(`🚗 Vehicle spawned! Walk up and press E to enter`, 'vehicle');
            }
        }
        
        async function enterVehicle(vehicleId) {
            if (currentVehicleId) return;
            
            const vehicle = vehicles.get(vehicleId);
            if (!vehicle) return;
            
            // Get latest vehicle data
            const { data: vehicleData } = await supabase
                .from('vehicles')
                .select('*')
                .eq('id', vehicleId)
                .single();
            
            if (!vehicleData) return;
            
            // Check if vehicle has driver
            if (vehicleData.driver_id && vehicleData.driver_id !== myPlayerId) {
                if ((vehicleData.passengers || []).length >= 3) {
                    addLog('Vehicle is full!', 'info');
                    return;
                }
                const newPassengers = [...(vehicleData.passengers || []), myPlayerId];
                await supabase.from('vehicles').update({
                    passengers: newPassengers
                }).eq('id', vehicleId);
                isDriver = false;
                addLog(`You entered as a passenger`, 'vehicle');
            } else {
                await supabase.from('vehicles').update({
                    driver_id: myPlayerId
                }).eq('id', vehicleId);
                isDriver = true;
                addLog(`You are now driving! Use WASD to drive`, 'vehicle');
                document.getElementById('speedometer').style.display = 'block';
                
                // Start drive sync interval (only driver updates position)
                if (driveSyncInterval) clearInterval(driveSyncInterval);
                driveSyncInterval = setInterval(() => {
                    if (currentVehicleId && isDriver) {
                        const v = vehicles.get(currentVehicleId);
                        if (v) {
                            supabase.from('vehicles').update({
                                x: v.x,
                                z: v.z
                            }).eq('id', currentVehicleId).catch(console.error);
                        }
                    }
                }, 50);
            }
            
            currentVehicleId = vehicleId;
            
            if (localPlayerMesh) {
                localPlayerMesh.visible = false;
                localPlayerLabel.visible = false;
            }
            
            document.getElementById('vehicle-status').style.display = 'block';
            document.getElementById('vehicle-status').innerHTML = isDriver ? '🚗 Driving' : '🚗 Passenger';
            
            await syncVehicles();
        }
        
        async function exitVehicle() {
            if (!currentVehicleId) return;
            
            const vehicle = vehicles.get(currentVehicleId);
            if (vehicle) {
                if (isDriver) {
                    await supabase.from('vehicles').update({
                        driver_id: null
                    }).eq('id', currentVehicleId);
                    if (driveSyncInterval) clearInterval(driveSyncInterval);
                } else {
                    const { data: vehicleData } = await supabase
                        .from('vehicles')
                        .select('passengers')
                        .eq('id', currentVehicleId)
                        .single();
                    const newPassengers = (vehicleData?.passengers || []).filter(id => id !== myPlayerId);
                    await supabase.from('vehicles').update({
                        passengers: newPassengers
                    }).eq('id', currentVehicleId);
                }
                
                if (localPlayerMesh) {
                    localPlayerMesh.position.set(vehicle.x + 3, 0.8, vehicle.z + 3);
                    localPlayerMesh.visible = true;
                    localPlayerLabel.position.copy(localPlayerMesh.position);
                    localPlayerLabel.position.y += 1.6;
                    localPlayerLabel.visible = true;
                    camera.position.copy(localPlayerMesh.position);
                    camera.position.y += 1.6;
                }
            }
            
            addLog(`You exited the vehicle`, 'vehicle');
            
            currentVehicleId = null;
            isDriver = false;
            vehicleSpeed = 0;
            
            document.getElementById('speedometer').style.display = 'none';
            document.getElementById('vehicle-status').style.display = 'none';
            
            await syncVehicles();
        }
        
        // ============ VEHICLE SYNC (READ ONLY) ============
        async function syncVehicles() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('vehicles')
                .select('*')
                .eq('server_id', currentServerId);
            
            if (error) return;
            
            for (const v of data) {
                if (vehicles.has(v.id)) {
                    const vehicle = vehicles.get(v.id);
                    // Don't update position if this is the vehicle we're driving
                    if (currentVehicleId !== v.id) {
                        vehicle.updatePosition(v.x, v.z, false);
                    }
                    vehicle.driverId = v.driver_id;
                    vehicle.passengers = v.passengers || [];
                    vehicle.updateLabel();
                } else {
                    const vehicle = new Vehicle(v.id, v.x, v.z, v.color, v.driver_id, v.passengers);
                    vehicles.set(v.id, vehicle);
                }
            }
            
            for (const [id, vehicle] of vehicles) {
                if (!data.find(v => v.id === id)) {
                    vehicle.dispose();
                    vehicles.delete(id);
                }
            }
        }
        
        // ============ DRIVING LOGIC ============
        function updateDriving(deltaTime) {
            if (!currentVehicleId || !isDriver || !isPointerLocked) return;
            
            const vehicle = vehicles.get(currentVehicleId);
            if (!vehicle) return;
            
            const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, vehicle.rotation, 0));
            
            const acceleration = 15;
            const braking = 20;
            const maxSpeed = 30;
            
            if (keys.w) {
                vehicleSpeed += acceleration * deltaTime;
                if (vehicleSpeed > maxSpeed) vehicleSpeed = maxSpeed;
            } else if (keys.s) {
                vehicleSpeed -= braking * deltaTime;
                if (vehicleSpeed < -maxSpeed/2) vehicleSpeed = -maxSpeed/2;
            } else {
                if (vehicleSpeed > 0) vehicleSpeed -= 8 * deltaTime;
                if (vehicleSpeed < 0) vehicleSpeed += 8 * deltaTime;
                if (Math.abs(vehicleSpeed) < 0.5) vehicleSpeed = 0;
            }
            
            const speedKmh = Math.abs(vehicleSpeed) * 3.6;
            document.getElementById('speedometer').innerHTML = `${Math.floor(speedKmh)} km/h`;
            
            if (vehicleSpeed !== 0) {
                const move = forward.clone().multiplyScalar(vehicleSpeed * deltaTime);
                let newX = vehicle.x + move.x;
                let newZ = vehicle.z + move.z;
                
                newX = Math.min(85, Math.max(-85, newX));
                newZ = Math.min(85, Math.max(-85, newZ));
                
                vehicle.updatePosition(newX, newZ, true);
                
                if (Math.abs(vehicleSpeed) > 1) {
                    let turnSpeed = 3.0;
                    if (keys.a) vehicle.updateRotation(vehicle.rotation + turnSpeed * deltaTime, true);
                    if (keys.d) vehicle.updateRotation(vehicle.rotation - turnSpeed * deltaTime, true);
                }
            }
            
            const cameraOffset = new THREE.Vector3(0, 1.6, 5);
            const rotatedOffset = cameraOffset.clone().applyEuler(new THREE.Euler(0, vehicle.rotation, 0));
            camera.position.copy(new THREE.Vector3(vehicle.x, 0.5, vehicle.z).add(rotatedOffset));
            camera.lookAt(new THREE.Vector3(vehicle.x, 0.5, vehicle.z));
        }
        
        // ============ PLAYER SYNC ============
        async function syncPlayers() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('server_id', currentServerId)
                .eq('is_alive', true);
            
            if (error) return;
            
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                
                if (otherPlayers.has(player.id)) {
                    const existing = otherPlayers.get(player.id);
                    existing.mesh.position.set(player.x, player.y, player.z);
                    existing.label.position.set(player.x, player.y + 1.6, player.z);
                } else {
                    const mesh = createPlayerModel(player.color, false);
                    mesh.position.set(player.x, player.y, player.z);
                    scene.add(mesh);
                    const label = createLabel(player.username, '#aaffdd', '#aaffdd');
                    label.position.set(player.x, player.y + 1.6, player.z);
                    scene.add(label);
                    otherPlayers.set(player.id, { mesh, label, name: player.username });
                    addLog(`🟢 ${player.username} joined`, 'join');
                }
            }
            
            for (const [id, player] of otherPlayers) {
                if (!data.find(p => p.id === id)) {
                    scene.remove(player.mesh);
                    scene.remove(player.label);
                    otherPlayers.delete(id);
                }
            }
            
            updatePlayerList();
        }
        
        function updatePlayerList() {
            const container = document.getElementById('player-list-content');
            container.innerHTML = `<div class="player-name" style="color:#ffaa44">👤 ${myUsername} (You)</div>`;
            for (const [id, player] of otherPlayers) {
                container.innerHTML += `<div class="player-name" style="color:#aaffdd">👥 ${player.name}</div>`;
            }
        }
        
        async function updatePlayerPosition() {
            if (!myPlayerId) return;
            if (!currentVehicleId && localPlayerMesh && localPlayerMesh.visible) {
                await supabase.from('players').update({
                    x: localPlayerMesh.position.x,
                    y: localPlayerMesh.position.y,
                    z: localPlayerMesh.position.z,
                    last_seen: new Date().toISOString()
                }).eq('id', myPlayerId);
            }
        }
        
        // ============ CHECK NEARBY VEHICLES ============
        function checkNearbyVehicles() {
            if (!localPlayerMesh || currentVehicleId || !localPlayerMesh.visible) return;
            
            let nearestId = null;
            let minDist = 3.5;
            
            for (const [id, vehicle] of vehicles) {
                const dist = Math.hypot(localPlayerMesh.position.x - vehicle.x, localPlayerMesh.position.z - vehicle.z);
                if (dist < minDist) {
                    minDist = dist;
                    nearestId = id;
                }
            }
            
            const prompt = document.getElementById('vehicle-prompt');
            if (nearestId) {
                prompt.style.display = 'block';
                window.nearbyVehicleId = nearestId;
            } else {
                prompt.style.display = 'none';
                window.nearbyVehicleId = null;
            }
        }
        
        // ============ WALKING MOVEMENT ============
        function updateWalking(deltaTime) {
            if (!localPlayerMesh || !localPlayerMesh.visible || currentVehicleId) return;
            
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            const move = new THREE.Vector3();
            if (keys.w) move.add(forward);
            if (keys.s) move.sub(forward);
            if (keys.d) move.add(right);
            if (keys.a) move.sub(right);
            
            if (move.length() > 0) move.normalize();
            move.multiplyScalar(moveSpeed * deltaTime);
            
            let newX = localPlayerMesh.position.x + move.x;
            let newZ = localPlayerMesh.position.z + move.z;
            newX = Math.min(85, Math.max(-85, newX));
            newZ = Math.min(85, Math.max(-85, newZ));
            
            localPlayerMesh.position.set(newX, 0.8, newZ);
            localPlayerLabel.position.copy(localPlayerMesh.position);
            localPlayerLabel.position.y += 1.6;
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.6;
        }
        
        // ============ PASSENGER CAMERA ============
        function updatePassengerCamera(deltaTime) {
            if (!currentVehicleId || isDriver) return;
            
            const vehicle = vehicles.get(currentVehicleId);
            if (!vehicle) return;
            
            const cameraOffset = new THREE.Vector3(0, 1.6, 5);
            const rotatedOffset = cameraOffset.clone().applyEuler(new THREE.Euler(0, vehicle.rotation, 0));
            camera.position.copy(new THREE.Vector3(vehicle.x, 0.5, vehicle.z).add(rotatedOffset));
            camera.lookAt(new THREE.Vector3(vehicle.x, 0.5, vehicle.z));
        }
        
        // ============ UTILITY FUNCTIONS ============
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            if (logDiv.children.length > 12) logDiv.removeChild(logDiv.children[0]);
        }
        
        function updateUI() {
            document.getElementById('money').innerText = playerStats.money;
            document.getElementById('health-bar').style.width = `${playerStats.health}%`;
            document.getElementById('hunger-bar').style.width = `${playerStats.hunger}%`;
            document.getElementById('thirst-bar').style.width = `${playerStats.thirst}%`;
        }
        
        // ============ JOIN/LEAVE SERVER ============
        async function joinServer(serverId) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                myUsername = `Citizen_${Math.floor(Math.random() * 1000)}`;
                document.getElementById('username').value = myUsername;
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            if (driveSyncInterval) clearInterval(driveSyncInterval);
            
            for (const [id, player] of otherPlayers) {
                scene.remove(player.mesh);
                scene.remove(player.label);
            }
            otherPlayers.clear();
            for (const [id, vehicle] of vehicles) {
                vehicle.dispose();
            }
            vehicles.clear();
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localPlayerLabel) scene.remove(localPlayerLabel);
            
            currentServerId = serverId;
            const spawnX = (Math.random() - 0.5) * 60;
            const spawnZ = (Math.random() - 0.5) * 60;
            const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { data, error } = await supabase.from('players').insert({
                username: myUsername,
                server_id: currentServerId,
                x: spawnX,
                y: 0.8,
                z: spawnZ,
                color: playerColor,
                money: playerStats.money,
                health: 100,
                is_alive: true
            }).select().single();
            
            if (error) {
                addLog(`Error: ${error.message}`, 'info');
                return;
            }
            
            myPlayerId = data.id;
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnX, 0.8, spawnZ);
            scene.add(localPlayerMesh);
            
            localPlayerLabel = createLabel(myUsername, '#ffff88', '#ffff88');
            localPlayerLabel.position.set(spawnX, 2.4, spawnZ);
            scene.add(localPlayerLabel);
            
            addLog(`Joined ${currentServerId} as ${myUsername}`, 'join');
            
            camera.position.set(spawnX, 2.4, spawnZ);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = 0;
            camera.rotation.x = 0;
            mouseX = 0;
            mouseY = 0;
            
            await syncVehicles();
            await syncPlayers();
            
            syncInterval = setInterval(async () => {
                await syncVehicles();
                await syncPlayers();
            }, 100);
            updateInterval = setInterval(() => updatePlayerPosition(), 50);
        }
        
        async function leaveServer() {
            if (currentVehicleId) await exitVehicle();
            if (myPlayerId) await supabase.from('players').delete().eq('id', myPlayerId);
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            if (driveSyncInterval) clearInterval(driveSyncInterval);
            
            for (const [id, player] of otherPlayers) {
                scene.remove(player.mesh);
                scene.remove(player.label);
            }
            otherPlayers.clear();
            for (const [id, vehicle] of vehicles) {
                vehicle.dispose();
            }
            vehicles.clear();
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localPlayerLabel) scene.remove(localPlayerLabel);
            
            currentServerId = null;
            myPlayerId = null;
            currentVehicleId = null;
            isDriver = false;
            addLog('Left server', 'info');
        }
        
        async function respawn() {
            if (playerStats.money >= 1000) {
                playerStats.money -= 1000;
                playerStats.health = 100;
                updateUI();
                document.getElementById('wasted').style.display = 'none';
                addLog('You respawned!', 'info');
                
                const spawnX = (Math.random() - 0.5) * 60;
                const spawnZ = (Math.random() - 0.5) * 60;
                const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
                
                await supabase.from('players').update({
                    is_alive: true,
                    health: 100,
                    x: spawnX,
                    y: 0.8,
                    z: spawnZ,
                    color: playerColor
                }).eq('id', myPlayerId);
                
                if (localPlayerMesh) scene.remove(localPlayerMesh);
                if (localPlayerLabel) scene.remove(localPlayerLabel);
                
                localPlayerMesh = createPlayerModel(playerColor, true);
                localPlayerMesh.position.set(spawnX, 0.8, spawnZ);
                scene.add(localPlayerMesh);
                
                localPlayerLabel = createLabel(myUsername, '#ffff88', '#ffff88');
                localPlayerLabel.position.set(spawnX, 2.4, spawnZ);
                scene.add(localPlayerLabel);
                
                isDead = false;
            } else {
                addLog('Need $1000 to respawn!', 'info');
            }
        }
        
        function showInventory() {
            addLog(`📦 Kills: ${playerStats.kills} | Money: $${playerStats.money}`, 'info');
        }
        
        // ============ EVENT LISTENERS ============
        document.addEventListener('keydown', async (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            
            if (key === 'e') {
                if (!currentVehicleId && window.nearbyVehicleId) {
                    await enterVehicle(window.nearbyVehicleId);
                } else if (currentVehicleId) {
                    await exitVehicle();
                }
            }
            
            if (key === 'tab') {
                e.preventDefault();
                const apps = document.getElementById('phone-apps');
                apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
            }
            if (key === 'escape' && isPointerLocked) document.exitPointerLock();
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        function onMouseMove(e) {
            if (!isPointerLocked) return;
            mouseX += e.movementX * 0.002;
            mouseY += e.movementY * 0.002;
            mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
            cameraYaw = mouseX;
            cameraPitch = mouseY;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraYaw;
            camera.rotation.x = cameraPitch;
        }
        
        // ============ ANIMATION LOOP ============
        let lastFrameTime = 0;
        function animate(currentTime) {
            const deltaTime = Math.min(0.033, (currentTime - lastFrameTime) / 1000);
            lastFrameTime = currentTime;
            
            if (!isDead) {
                updateDriving(deltaTime);
                updatePassengerCamera(deltaTime);
                updateWalking(deltaTime);
                checkNearbyVehicles();
                
                // Interpolate other vehicles for smooth movement
                for (const [id, vehicle] of vehicles) {
                    if (currentVehicleId !== id) {
                        vehicle.interpolate(deltaTime);
                    }
                }
            }
            
            if (renderer && labelRenderer) {
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            requestAnimationFrame(animate);
        }
        
        // ============ INITIALIZATION ============
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 250);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2.4, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            
            renderer.domElement.addEventListener('click', () => {
                if (!isPointerLocked) renderer.domElement.requestPointerLock();
            });
            
            document.addEventListener('pointerlockchange', () => {
                isPointerLocked = document.pointerLockElement === renderer.domElement;
                if (isPointerLocked) {
                    document.addEventListener('mousemove', onMouseMove);
                } else {
                    document.removeEventListener('mousemove', onMouseMove);
                }
            });
            
            createCity();
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);
            
            document.getElementById('joinGame').onclick = () => joinServer(document.getElementById('serverCode').value);
            document.getElementById('leaveGame').onclick = () => leaveServer();
            document.getElementById('username').value = `Citizen_${Math.floor(Math.random() * 1000)}`;
            
            window.togglePhone = () => {
                const apps = document.getElementById('phone-apps');
                apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
            };
            window.spawnVehicle = spawnVehicle;
            window.showInventory = showInventory;
            window.respawn = respawn;
            
            lastFrameTime = performance.now();
            requestAnimationFrame(animate);
            
            addLog('🏙️ Welcome to RP City! Fully synced vehicle system!', 'info');
            addLog('🚗 Open phone (TAB) to spawn a car for $5000', 'vehicle');
            addLog('🚗 Walk up to a car and press E to enter', 'vehicle');
            addLog('👥 Drivers and passengers both see the vehicle moving!', 'vehicle');
        }
        
        init();
    </script>
</body>
</html>
