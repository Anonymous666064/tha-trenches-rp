<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Multiplayer Game - Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            border: 1px solid #00ff88;
            min-width: 280px;
            pointer-events: auto;
        }

        h3 {
            margin: 0 0 10px 0;
            color: #00ff88;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            background: #222;
            color: white;
            text-align: center;
        }

        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .success { color: #00ff88; background: rgba(0,255,136,0.1); }
        .error { color: #ff4444; background: rgba(255,68,68,0.1); }
        .info { color: #ffaa44; background: rgba(255,170,68,0.1); }

        #playersPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            border: 1px solid #00ff88;
            min-width: 180px;
            z-index: 100;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        .code-badge {
            font-size: 18px;
            font-weight: bold;
            background: #000;
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 8px;
        }

        #leaveBtn {
            background: #ff4444;
            margin-top: 10px;
            width: 100%;
        }

        #leaveBtn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 3D MULTIPLAYER</h3>
        <div>
            <button id="hostBtn">🌟 CREATE GAME</button>
            <input type="text" id="customCode" placeholder="Custom code" maxlength="6" style="width: 100px; text-transform: uppercase;">
        </div>
        <div style="margin-top: 8px;">
            <input type="text" id="joinCode" placeholder="Enter 6-digit code" maxlength="6" style="width: 120px; text-transform: uppercase;">
            <button id="joinBtn">🔗 JOIN GAME</button>
        </div>
        <div id="gameInfo" class="status info">⚡ Ready to play</div>
        <div id="activeCode" style="margin-top: 8px; text-align: center;"></div>
        <div id="leaveBtnContainer"></div>
    </div>

    <div id="playersPanel">
        <strong>👥 Players Online</strong>
        <hr style="margin: 8px 0; border-color: #00ff88;">
        <div id="playersList">Waiting for players...</div>
    </div>

    <div class="controls">
        🎮 WASD to move | 🖱️ Mouse to look | Click to lock mouse
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== SUPABASE ====================
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== GAME STATE ====================
        let currentSession = null;
        let myPlayerId = null;
        let isHost = false;
        let remotePlayers = new Map();
        let subscription = null;
        let heartbeatInterval = null;
        let lastUpdateTime = 0;

        // ==================== THREE.JS ====================
        let scene, camera, renderer;
        let localPlayer = null;
        let keys = { w: false, s: false, a: false, d: false };
        let cameraAngle = 0, cameraPitch = 0;
        let playerPosition = new THREE.Vector3(0, 1.6, 0);
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        let isOnGround = true;
        
        const GRAVITY = 20;
        const WALK_SPEED = 6;
        const JUMP_FORCE = 7;

        // ==================== CREATE 3D WORLD ====================
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 100, 200);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(playerPosition);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
            dirLight.position.set(50, 100, 30);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // Ground
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c9e5c, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(200, 20, 0x88aaff, 0x446688);
            gridHelper.position.y = -0.4;
            scene.add(gridHelper);
            
            // Simple trees
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
            
            for (let i = 0; i < 50; i++) {
                const angle = (i / 50) * Math.PI * 2;
                const radius = 85;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1.5, 6), trunkMat);
                trunk.position.set(x, -0.2, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 8), leafMat);
                leaves.position.set(x, 0.6, z);
                leaves.castShadow = true;
                scene.add(leaves);
            }
            
            // Center marker
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
            const marker = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), markerMat);
            marker.position.set(0, 0.5, 0);
            scene.add(marker);
            
            console.log("3D world created");
        }
        
        // ==================== CREATE PLAYER MODEL ====================
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), headMat);
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            leftEye.position.set(-0.18, 1.38, 0.48);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeMat);
            rightEye.position.set(0.18, 1.38, 0.48);
            group.add(rightEye);
            
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            leftPupil.position.set(0, 0, 0.08);
            leftEye.add(leftPupil);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            rightPupil.position.set(0, 0, 0.08);
            rightEye.add(rightPupil);
            
            // Crown for local player
            if (isLocal) {
                const crownMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
                const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.2, 8), crownMat);
                crown.position.y = 1.55;
                group.add(crown);
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), crownMat);
                    const angle = (i / 5) * Math.PI * 2;
                    spike.position.x = Math.cos(angle) * 0.5;
                    spike.position.z = Math.sin(angle) * 0.5;
                    spike.position.y = 1.7;
                    group.add(spike);
                }
            }
            
            return group;
        }
        
        // ==================== MULTIPLAYER FUNCTIONS ====================
        async function createGameSession(customCode) {
            let code = customCode?.toUpperCase().trim();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing && existing.length > 0) {
                throw new Error('Code already taken!');
            }
            
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            return code;
        }
        
        async function joinGameSession(code) {
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .maybeSingle();
            
            if (error || !data) throw new Error('Game not found!');
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode, isHostPlayer = false) {
            myPlayerId = 'p_' + Math.random().toString(36).substring(2, 12);
            isHost = isHostPlayer;
            
            const startX = (Math.random() - 0.5) * 60;
            const startZ = (Math.random() - 0.5) * 60;
            playerPosition.set(startX, 1.6, startZ);
            
            localPlayer = createPlayerModel(0x66ff88, true);
            localPlayer.position.copy(playerPosition);
            scene.add(localPlayer);
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            await loadPlayers(sessionCode);
            subscribeToGame(sessionCode);
            
            heartbeatInterval = setInterval(() => updatePosition(), 50);
            
            updatePlayersList();
            return true;
        }
        
        async function loadPlayers(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) return;
            
            for (let p of data) {
                if (p.player_id !== myPlayerId && !remotePlayers.has(p.player_id)) {
                    const playerModel = createPlayerModel(0xff8844, false);
                    playerModel.position.set(p.pos_x, 0.7, p.pos_z);
                    scene.add(playerModel);
                    remotePlayers.set(p.player_id, { mesh: playerModel, lastX: p.pos_x, lastZ: p.pos_z });
                }
            }
            updatePlayersList();
        }
        
        function subscribeToGame(sessionCode) {
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            
            subscription = supabase
                .channel(`game:${sessionCode}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.new.player_id !== myPlayerId && !remotePlayers.has(payload.new.player_id)) {
                        const playerModel = createPlayerModel(0xff8844, false);
                        playerModel.position.set(payload.new.pos_x, 0.7, payload.new.pos_z);
                        scene.add(playerModel);
                        remotePlayers.set(payload.new.player_id, { mesh: playerModel, lastX: payload.new.pos_x, lastZ: payload.new.pos_z });
                        updatePlayersList();
                        showMessage(`👤 Player joined!`, '#4ec9e0');
                    }
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.new.player_id !== myPlayerId) {
                        const remote = remotePlayers.get(payload.new.player_id);
                        if (remote) {
                            // Smooth interpolation
                            remote.mesh.position.x += (payload.new.pos_x - remote.mesh.position.x) * 0.3;
                            remote.mesh.position.z += (payload.new.pos_z - remote.mesh.position.z) * 0.3;
                        }
                    }
                })
                .on('postgres_changes', {
                    event: 'DELETE',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    const remote = remotePlayers.get(payload.old.player_id);
                    if (remote) {
                        scene.remove(remote.mesh);
                        remotePlayers.delete(payload.old.player_id);
                        updatePlayersList();
                        showMessage(`👋 Player left`, '#ffaa00');
                    }
                })
                .subscribe();
        }
        
        async function updatePosition() {
            if (!currentSession || !myPlayerId) return;
            
            await supabase
                .from('players')
                .update({
                    pos_x: playerPosition.x,
                    pos_z: playerPosition.z,
                    last_seen: new Date()
                })
                .eq('player_id', myPlayerId);
        }
        
        async function leaveGame() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (myPlayerId) await supabase.from('players').delete().eq('player_id', myPlayerId);
            if (isHost && currentSession) await supabase.from('game_sessions').delete().eq('session_code', currentSession);
            if (subscription) supabase.removeChannel(subscription);
            
            for (let [id, data] of remotePlayers) scene.remove(data.mesh);
            remotePlayers.clear();
            if (localPlayer) scene.remove(localPlayer);
            localPlayer = null;
            
            currentSession = null;
            myPlayerId = null;
            isHost = false;
            
            updatePlayersList();
            document.getElementById('activeCode').innerHTML = '';
            document.getElementById('gameInfo').innerHTML = '⚡ Left game. Ready to play!';
            document.getElementById('gameInfo').className = 'status info';
            document.getElementById('hostBtn').disabled = false;
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('leaveBtnContainer').innerHTML = '';
            
            showMessage('Left game', '#ffaa00');
        }
        
        function updatePlayersList() {
            const container = document.getElementById('playersList');
            if (!container) return;
            
            if (!myPlayerId) {
                container.innerHTML = 'Not in a game';
                return;
            }
            
            let html = `<div style="color:#00ff88">👑 YOU (${isHost ? 'Host' : 'Player'})</div>`;
            for (let [id] of remotePlayers) {
                html += `<div>🎮 ${id.slice(0, 8)}</div>`;
            }
            if (remotePlayers.size === 0) {
                html += '<div style="color:#888;">Waiting for players...</div>';
            }
            container.innerHTML = html;
            document.getElementById('playersPanel').querySelector('strong').innerHTML = `👥 Players Online (${1 + remotePlayers.size})`;
        }
        
        function showMessage(msg, color) {
            const info = document.getElementById('gameInfo');
            info.innerHTML = msg;
            info.className = 'status success';
            info.style.color = color;
            setTimeout(() => {
                if (currentSession) {
                    info.innerHTML = `✅ In game: ${currentSession}`;
                    info.className = 'status success';
                } else {
                    info.innerHTML = '⚡ Ready to play';
                    info.className = 'status info';
                }
            }, 2000);
        }
        
        function addLeaveButton() {
            const container = document.getElementById('leaveBtnContainer');
            container.innerHTML = '';
            const btn = document.createElement('button');
            btn.id = 'leaveBtn';
            btn.textContent = '🚪 LEAVE GAME';
            btn.onclick = () => leaveGame();
            container.appendChild(btn);
        }
        
        // ==================== MOVEMENT ====================
        function updateMovement(deltaTime) {
            if (!localPlayer) return;
            
            let moveX = 0, moveZ = 0;
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            const forward = new THREE.Vector3(Math.sin(cameraAngle), 0, Math.cos(cameraAngle));
            const right = new THREE.Vector3(Math.cos(cameraAngle), 0, -Math.sin(cameraAngle));
            
            playerVelocity.x = (moveX * right.x + moveZ * forward.x) * WALK_SPEED;
            playerVelocity.z = (moveX * right.z + moveZ * forward.z) * WALK_SPEED;
            
            playerPosition.x += playerVelocity.x * deltaTime;
            playerPosition.z += playerVelocity.z * deltaTime;
            
            playerVelocity.y -= GRAVITY * deltaTime;
            playerPosition.y += playerVelocity.y * deltaTime;
            
            const groundY = -0.2;
            if (playerPosition.y <= groundY + 1.6) {
                playerPosition.y = groundY + 1.6;
                playerVelocity.y = 0;
                isOnGround = true;
            } else {
                isOnGround = false;
            }
            
            // Jump
            if (keys.space && isOnGround) {
                playerVelocity.y = JUMP_FORCE;
                isOnGround = false;
                keys.space = false;
            }
            
            const bound = 95;
            playerPosition.x = Math.max(-bound, Math.min(bound, playerPosition.x));
            playerPosition.z = Math.max(-bound, Math.min(bound, playerPosition.z));
            
            localPlayer.position.copy(playerPosition);
            
            // Camera follow
            camera.position.x += (playerPosition.x - camera.position.x) * 0.1;
            camera.position.z += (playerPosition.z + 8 - camera.position.z) * 0.1;
            camera.position.y = 6;
            camera.lookAt(playerPosition);
            
            // Update UI
            document.getElementById('coordinates').innerHTML = `X: ${playerPosition.x.toFixed(1)} | Z: ${playerPosition.z.toFixed(1)}`;
        }
        
        // ==================== EVENT HANDLERS ====================
        let connecting = false;
        
        document.getElementById('hostBtn').onclick = async () => {
            if (connecting || currentSession) return;
            connecting = true;
            const customCode = document.getElementById('customCode').value;
            try {
                const code = await createGameSession(customCode);
                currentSession = code;
                await addPlayerToGame(code, true);
                document.getElementById('gameInfo').innerHTML = `✅ Game Created! Code: <strong>${code}</strong>`;
                document.getElementById('gameInfo').className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🔑 ${code}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
                addLeaveButton();
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').className = 'status error';
            } finally {
                connecting = false;
            }
        };
        
        document.getElementById('joinBtn').onclick = async () => {
            if (connecting || currentSession) return;
            connecting = true;
            const code = document.getElementById('joinCode').value;
            if (!code) {
                document.getElementById('gameInfo').innerHTML = '❌ Please enter a code';
                document.getElementById('gameInfo').className = 'status error';
                connecting = false;
                return;
            }
            try {
                const sessionCode = await joinGameSession(code);
                currentSession = sessionCode;
                await addPlayerToGame(sessionCode, false);
                document.getElementById('gameInfo').innerHTML = `✅ Joined game: ${sessionCode}`;
                document.getElementById('gameInfo').className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🎮 ${sessionCode}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
                addLeaveButton();
            } catch (err) {
                document.getElementById('gameInfo').innerHTML = `❌ ${err.message}`;
                document.getElementById('gameInfo').className = 'status error';
            } finally {
                connecting = false;
            }
        };
        
        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
        });
        
        // Mouse look
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                document.addEventListener('mousemove', onMouseMove);
            } else {
                document.removeEventListener('mousemove', onMouseMove);
            }
        });
        
        function onMouseMove(e) {
            cameraAngle -= e.movementX * 0.002;
            cameraPitch -= e.movementY * 0.002;
            cameraPitch = Math.max(-0.8, Math.min(0.8, cameraPitch));
        }
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // FPS counter
        let frameCount = 0;
        let lastFpsTime = performance.now();
        
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        }
        
        // ==================== ANIMATION LOOP ====================
        let lastFrameTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let deltaTime = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            updateMovement(deltaTime);
            updateFPS();
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // ==================== START ====================
        function init() {
            init3D();
            animate();
            console.log("Game ready! Create or join a game to play with friends!");
        }
        
        init();
    </script>
</body>
</html>
