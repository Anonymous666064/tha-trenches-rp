<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RP World - Open World Multiplayer RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 15px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 12px;
            min-width: 280px;
            max-width: 320px;
        }
        
        .stat-bar {
            margin: 5px 0;
        }
        
        .stat-label {
            display: inline-block;
            width: 50px;
        }
        
        .bar-bg {
            display: inline-block;
            width: 150px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .health-fill { background: #ff4444; width: 100%; }
        .hunger-fill { background: #ffaa44; width: 100%; }
        .thirst-fill { background: #44aaff; width: 100%; }
        
        .money {
            color: #ffaa44;
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        
        #phone {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #4a6a8a;
            transition: transform 0.2s;
        }
        
        #phone:hover {
            transform: scale(1.05);
        }
        
        #phone-icon {
            font-size: 30px;
        }
        
        #phone-apps {
            position: absolute;
            bottom: 90px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 15px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
            z-index: 200;
            border: 1px solid #4a6a8a;
        }
        
        .app-btn {
            background: #2c3e50;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        
        .app-btn:hover {
            background: #3e5a6e;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 150;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: red;
            font-size: 48px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        #respawn-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        #respawn-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }
        
        #npc-interaction {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 15px;
            border-radius: 10px;
            display: none;
            z-index: 150;
            min-width: 250px;
            text-align: center;
        }
        
        .shop-item {
            margin: 5px 0;
            padding: 8px;
            background: #333;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .shop-item:hover {
            background: #555;
            transform: scale(1.02);
        }
        
        #controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            pointer-events: none;
            z-index: 99;
        }
        
        .server-panel {
            margin-top: 10px;
        }
        
        input, button {
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }
        
        input {
            background: #222;
            color: white;
            border: 1px solid #555;
        }
        
        button {
            background: #4a6a8a;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:hover {
            background: #5a7a9a;
            transform: scale(1.02);
        }
        
        .log-container {
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 10px;
        }
        
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        .log-entry.kill {
            color: #ff4444;
            font-weight: bold;
        }
        
        .log-entry.join {
            color: #88ff88;
        }
        
        .log-entry.death {
            color: #ff8888;
        }
        
        .instruction {
            font-size: 11px;
            color: #ffaa44;
            text-align: center;
            margin-top: 5px;
            padding: 3px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        
        #debug-console {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 10px;
            min-width: 280px;
            max-width: 350px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 9px;
            color: #0f0;
            z-index: 150;
            pointer-events: none;
        }
        
        #debug-console h4 {
            margin: 0 0 5px 0;
            color: #ffaa44;
            text-align: center;
        }
        
        .debug-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        .debug-entry.kill { color: #ff6666; }
        .debug-entry.death { color: #ffaa66; }
        .debug-entry.respawn { color: #66ff66; }
        .debug-entry.hit { color: #ffff66; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="money">💰 $<span id="money">100000</span></div>
        <div class="stat-bar">
            <span class="stat-label">❤️ Health</span>
            <div class="bar-bg"><div class="bar-fill health-fill" id="health-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">🍔 Hunger</span>
            <div class="bar-bg"><div class="bar-fill hunger-fill" id="hunger-bar" style="width: 100%"></div></div>
        </div>
        <div class="stat-bar">
            <span class="stat-label">💧 Thirst</span>
            <div class="bar-bg"><div class="bar-fill thirst-fill" id="thirst-bar" style="width: 100%"></div></div>
        </div>
        
        <div class="server-panel">
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="serverCode" placeholder="Server Code" value="RP_WORLD">
            <button id="joinGame">🎮 Join Game</button>
            <button id="leaveGame" style="background:#8a4a4a;">🚪 Leave Game</button>
        </div>
        <div class="log-container" id="log"></div>
        <div class="instruction">💡 Click on game to lock mouse | Click to shoot | ESC to unlock</div>
    </div>
    
    <div id="debug-console">
        <h4>🔍 DEBUG CONSOLE</h4>
        <div id="debug-log"></div>
    </div>
    
    <div id="phone" onclick="togglePhone()">
        <div id="phone-icon">📱</div>
    </div>
    
    <div id="phone-apps">
        <div class="app-btn" onclick="openCarShop()">🚗 Car Dealership</div>
        <div class="app-btn" onclick="spawnVehicle()">🚙 Spawn Vehicle</div>
        <div class="app-btn" onclick="openInventory()">📦 Inventory</div>
        <div class="app-btn" onclick="startWeedJob()">🌿 Weed Farm</div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="wasted">
        <div>💀 WASTED 💀</div>
        <div style="font-size: 20px; margin-top: 10px;" id="death-message">You were killed!</div>
        <button id="respawn-btn" onclick="respawn()">Respawn ($1000)</button>
    </div>
    
    <div id="npc-interaction"></div>
    
    <div id="controls-note">
        🎮 WASD Move | 🖱️ Click to Lock Mouse | 🔫 Click to Shoot | E Interact | TAB Phone
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { createClient } from '@supabase/supabase-js';
        
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentServerId = null;
        let myPlayerId = null;
        let myUsername = '';
        let localPlayerMesh = null;
        let localLabel = null;
        let otherPlayers = new Map();
        let deadBodies = [];
        let npcs = [];
        let updateInterval = null;
        let syncInterval = null;
        let isDead = false;
        let lastKiller = null;
        
        let playerStats = { health: 100, hunger: 100, thirst: 100, money: 100000, kills: 0 };
        let currentWeapon = 'pistol';
        let weaponDamage = { pistol: 34, shotgun: 50, rifle: 40 };
        
        let mouseX = 0, mouseY = 0, cameraPitch = 0, cameraYaw = 0;
        let isPointerLocked = false;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.Fog(0x0a0a2a, 80, 150);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Create terrain and world
        const terrainSize = 150;
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, 50, 50);
        terrainGeometry.rotateX(-Math.PI / 2);
        const terrainMaterial = new THREE.MeshStandardMaterial({ color: 0x5c9e5e, roughness: 0.8 });
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        scene.add(terrain);
        
        // Buildings
        const buildingColors = [0xccaa88, 0xaa8866, 0x88aacc, 0x88ccaa];
        for (let i = -6; i <= 6; i++) {
            for (let j = -6; j <= 6; j++) {
                if (Math.abs(i) < 3 && Math.abs(j) < 3) continue;
                const height = Math.random() * 5 + 2;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(2.8, height, 2.8),
                    new THREE.MeshStandardMaterial({ color: buildingColors[Math.floor(Math.random() * buildingColors.length)] })
                );
                building.position.set(i * 5.5, height/2, j * 5.5);
                building.castShadow = true;
                scene.add(building);
            }
        }
        
        // Roads
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        for (let i = -35; i <= 35; i += 7) {
            const roadX = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.1, terrainSize), roadMat);
            roadX.position.set(i, 0.05, 0);
            scene.add(roadX);
            
            const roadZ = new THREE.Mesh(new THREE.BoxGeometry(terrainSize, 0.1, 5.5), roadMat);
            roadZ.position.set(0, 0.05, i);
            scene.add(roadZ);
        }
        
        // Ground plane
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(terrainSize, terrainSize), new THREE.MeshStandardMaterial({ color: 0x6aab5a }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        scene.add(groundPlane);
        
        // NPCs
        const npcPositions = [
            { x: 20, z: 14, type: 'food', name: '🏪 Convenience Store', color: 0xffaa88 },
            { x: -18, z: 20, type: 'weapons', name: '🔫 Gun Dealer', color: 0xcc8866 },
            { x: 14, z: -18, type: 'drug_dealer', name: '🌿 Weed Dealer', color: 0x88aa66 }
        ];
        
        npcPositions.forEach(pos => {
            const npc = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.9, 0.9), new THREE.MeshStandardMaterial({ color: pos.color }));
            npc.position.set(pos.x, 0.95, pos.z);
            npc.userData = { type: pos.type, name: pos.name };
            npc.castShadow = true;
            scene.add(npc);
            npcs.push(npc);
            
            const label = makeLabel(pos.name, '#ffaa88');
            label.position.set(pos.x, 1.9, pos.z);
            scene.add(label);
        });
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        function makeLabel(text, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.7)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }
        
        function createPlayerModel(color, isLocal = false) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), new THREE.MeshStandardMaterial({ color, roughness: 0.3 }));
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            head.position.y = 1.25;
            head.castShadow = true;
            group.add(head);
            
            if (isLocal) {
                const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                hat.position.y = 1.6;
                group.add(hat);
            }
            
            return group;
        }
        
        function createRagdoll(position, color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 1.2), new THREE.MeshStandardMaterial({ color, roughness: 0.5 }));
            body.position.set(0, 0.2, 0);
            body.rotation.x = Math.PI / 2;
            group.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            head.position.set(0, 0.5, 0.4);
            group.add(head);
            
            group.position.copy(position);
            scene.add(group);
            
            // Blood particles
            for (let i = 0; i < 20; i++) {
                const blood = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                blood.position.set(position.x + (Math.random() - 0.5) * 1.2, position.y + 0.1, position.z + (Math.random() - 0.5) * 1.2);
                scene.add(blood);
            }
            
            return group;
        }
        
        function addDebugLog(message, type = 'info') {
            const debugDiv = document.getElementById('debug-log');
            const entry = document.createElement('div');
            entry.className = `debug-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugDiv.appendChild(entry);
            if (debugDiv.children.length > 20) debugDiv.removeChild(debugDiv.children[0]);
            console.log(message);
        }
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            if (logDiv.children.length > 15) logDiv.removeChild(logDiv.children[0]);
        }
        
        function updateUI() {
            document.getElementById('money').innerText = playerStats.money;
            document.getElementById('health-bar').style.width = `${playerStats.health}%`;
            document.getElementById('hunger-bar').style.width = `${playerStats.hunger}%`;
            document.getElementById('thirst-bar').style.width = `${playerStats.thirst}%`;
        }
        
        // Kill player function - updates database and notifies all clients
        async function killPlayer(targetId, targetName, targetPosition, targetColor, killerName) {
            addDebugLog(`🔫 ${killerName} KILLED ${targetName}!`, 'kill');
            addLog(`💀 ${killerName} KILLED ${targetName}! +$5000 reward!`, 'kill');
            
            // Update killer's money in database
            const { data: killerData } = await supabase
                .from('players')
                .select('money, kills')
                .eq('id', myPlayerId)
                .single();
            
            if (killerData && killerName === myUsername) {
                playerStats.money = killerData.money + 5000;
                playerStats.kills = (killerData.kills || 0) + 1;
                await supabase.from('players').update({ 
                    money: playerStats.money,
                    kills: playerStats.kills
                }).eq('id', myPlayerId);
                updateUI();
            }
            
            // Mark target as dead in database
            await supabase.from('players').update({ 
                is_alive: false,
                health: 0
            }).eq('id', targetId);
            
            // Create ragdoll at target position
            createRagdoll(targetPosition, targetColor);
            
            // Remove player from scene immediately
            const playerEntry = otherPlayers.get(targetId);
            if (playerEntry) {
                scene.remove(playerEntry.mesh);
                scene.remove(playerEntry.label);
                otherPlayers.delete(targetId);
            }
        }
        
        // Handle local player death
        async function die(killerName = null) {
            if (isDead) return;
            isDead = true;
            lastKiller = killerName;
            
            addDebugLog(`💀 YOU DIED! Killed by: ${killerName || 'Unknown'}`, 'death');
            addLog(`💀 You were killed by ${killerName || 'someone'}!`, 'death');
            document.getElementById('death-message').innerHTML = `You were killed by ${killerName || 'someone'}!`;
            
            // Create ragdoll for local player
            if (localPlayerMesh) {
                createRagdoll(localPlayerMesh.position, localPlayerMesh.children[0].material.color.getHexString());
                scene.remove(localPlayerMesh);
                scene.remove(localLabel);
                localPlayerMesh = null;
                localLabel = null;
            }
            
            // Update database to mark as dead
            if (myPlayerId) {
                await supabase.from('players').update({ 
                    is_alive: false,
                    health: 0
                }).eq('id', myPlayerId);
            }
            
            // Show wasted screen
            document.getElementById('wasted').style.display = 'flex';
        }
        
        async function respawn() {
            if (playerStats.money >= 1000) {
                playerStats.money -= 1000;
                playerStats.health = 100;
                playerStats.hunger = 80;
                playerStats.thirst = 80;
                isDead = false;
                updateUI();
                document.getElementById('wasted').style.display = 'none';
                
                addDebugLog(`🔄 ${myUsername} respawned!`, 'respawn');
                addLog('You respawned at the city center!', 'info');
                
                // Rejoin the server
                if (currentServerId) {
                    await joinServer(currentServerId, false);
                }
            } else {
                addLog('Not enough money to respawn! Need $1000', 'info');
            }
        }
        
        // Shooting system
        async function shoot() {
            if (!localPlayerMesh || isDead || !isPointerLocked) {
                if (!isPointerLocked) addDebugLog('Click game to lock mouse first!', 'info');
                return;
            }
            
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const raycaster = new THREE.Raycaster(camera.position, direction, 0, 30);
            
            let hitDetected = false;
            
            // Check for other players
            for (let [id, player] of otherPlayers) {
                const intersects = raycaster.intersectObject(player.mesh, true);
                if (intersects.length > 0) {
                    hitDetected = true;
                    const distance = camera.position.distanceTo(intersects[0].point);
                    if (distance < 30) {
                        addDebugLog(`💥 HIT! Shot hit ${player.name} at ${distance.toFixed(1)}m`, 'hit');
                        await killPlayer(id, player.name, player.mesh.position, player.color, myUsername);
                    }
                    break;
                }
            }
            
            if (!hitDetected) {
                addDebugLog(`❌ MISS!`, 'info');
            }
            
            // Muzzle flash
            const flash = new THREE.PointLight(0xff6600, 1.5, 10);
            flash.position.copy(camera.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);
            
            // Tracer effect
            const tracer = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshBasicMaterial({ color: 0xffaa44 }));
            tracer.position.copy(camera.position);
            scene.add(tracer);
            let progress = 0;
            const tracerInterval = setInterval(() => {
                progress += 0.1;
                if (progress >= 1) {
                    clearInterval(tracerInterval);
                    scene.remove(tracer);
                } else {
                    tracer.position.copy(camera.position.clone().add(direction.clone().multiplyScalar(progress * 30)));
                }
            }, 16);
        }
        
        // Sync players from database
        async function syncPlayers() {
            if (!currentServerId) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('server_id', currentServerId)
                .eq('is_alive', true)
                .gte('last_seen', new Date(Date.now() - 30000).toISOString());
            
            if (error) {
                console.error('Error syncing players:', error);
                return;
            }
            
            // Update existing players and add new ones
            for (const player of data) {
                if (player.id === myPlayerId) continue;
                
                const pos = new THREE.Vector3(player.x, player.y, player.z);
                
                if (otherPlayers.has(player.id)) {
                    const existing = otherPlayers.get(player.id);
                    existing.mesh.position.lerp(pos, 0.3);
                    existing.label.position.copy(existing.mesh.position);
                    existing.label.position.y += 1.6;
                } else {
                    const mesh = createPlayerModel(player.color, false);
                    mesh.position.copy(pos);
                    scene.add(mesh);
                    
                    const label = makeLabel(player.username, '#aaffdd');
                    label.position.copy(pos);
                    label.position.y += 1.6;
                    scene.add(label);
                    
                    otherPlayers.set(player.id, { mesh, label, name: player.username, color: player.color });
                    addDebugLog(`👥 ${player.username} joined the server`, 'join');
                }
            }
            
            // Remove players that are no longer in the database
            for (let [id, player] of otherPlayers) {
                const stillExists = data.some(p => p.id === id);
                if (!stillExists) {
                    scene.remove(player.mesh);
                    scene.remove(player.label);
                    otherPlayers.delete(id);
                    addDebugLog(`👋 ${player.name} left/disconnected`, 'info');
                }
            }
        }
        
        // Update player position in database
        async function updatePlayerPosition() {
            if (!currentServerId || !myPlayerId || !localPlayerMesh || isDead) return;
            
            await supabase
                .from('players')
                .update({
                    x: localPlayerMesh.position.x,
                    y: localPlayerMesh.position.y,
                    z: localPlayerMesh.position.z,
                    last_seen: new Date().toISOString()
                })
                .eq('id', myPlayerId);
        }
        
        async function joinServer(serverId, isCreate = false) {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                myUsername = `Player_${Math.floor(Math.random() * 1000)}`;
                document.getElementById('username').value = myUsername;
            }
            
            if (!serverId.trim()) {
                addLog('Invalid server ID', 'info');
                return;
            }
            
            // Leave current server first
            if (myPlayerId) {
                await supabase.from('players').delete().eq('id', myPlayerId);
                if (updateInterval) clearInterval(updateInterval);
                if (syncInterval) clearInterval(syncInterval);
                otherPlayers.forEach(p => { scene.remove(p.mesh); scene.remove(p.label); });
                otherPlayers.clear();
                if (localPlayerMesh) scene.remove(localPlayerMesh);
                if (localLabel) scene.remove(localLabel);
            }
            
            currentServerId = serverId.trim();
            const spawnPos = { x: (Math.random() - 0.5) * 15, y: 0.8, z: (Math.random() - 0.5) * 15 };
            const playerColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            
            const { data, error } = await supabase
                .from('players')
                .insert({
                    username: myUsername,
                    server_id: currentServerId,
                    x: spawnPos.x,
                    y: spawnPos.y,
                    z: spawnPos.z,
                    color: playerColor,
                    money: playerStats.money,
                    health: 100,
                    is_alive: true
                })
                .select()
                .single();
            
            if (error) {
                addLog(`Error: ${error.message}`, 'info');
                return;
            }
            
            myPlayerId = data.id;
            
            localPlayerMesh = createPlayerModel(playerColor, true);
            localPlayerMesh.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            scene.add(localPlayerMesh);
            
            localLabel = makeLabel(myUsername, '#ffff88');
            localLabel.position.set(spawnPos.x, spawnPos.y + 1.6, spawnPos.z);
            scene.add(localLabel);
            
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.6;
            
            addDebugLog(`🎮 ${myUsername} joined server "${currentServerId}"`, 'respawn');
            addLog(`Joined server "${currentServerId}" as ${myUsername}`, 'success');
            
            await syncPlayers();
            syncInterval = setInterval(() => syncPlayers(), 500);
            updateInterval = setInterval(() => updatePlayerPosition(), 50);
        }
        
        async function leaveServer() {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('id', myPlayerId);
            }
            
            if (updateInterval) clearInterval(updateInterval);
            if (syncInterval) clearInterval(syncInterval);
            
            otherPlayers.forEach(p => { scene.remove(p.mesh); scene.remove(p.label); });
            otherPlayers.clear();
            
            if (localPlayerMesh) scene.remove(localPlayerMesh);
            if (localLabel) scene.remove(localLabel);
            
            localPlayerMesh = null;
            localLabel = null;
            currentServerId = null;
            myPlayerId = null;
            addLog('Disconnected from server', 'info');
        }
        
        // Movement
        const keys = { w: false, s: false, a: false, d: false };
        let moveSpeed = 6;
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'e') {
                for (let npc of npcs) {
                    if (localPlayerMesh && localPlayerMesh.position.distanceTo(npc.position) < 3) {
                        const ui = document.getElementById('npc-interaction');
                        ui.innerHTML = `<h3>${npc.userData.name}</h3><div class="shop-item">Coming soon!</div>`;
                        ui.style.display = 'block';
                        setTimeout(() => ui.style.display = 'none', 3000);
                    }
                }
            }
            if (key === 'tab') {
                e.preventDefault();
                const apps = document.getElementById('phone-apps');
                apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
            }
            if (key === 'escape' && isPointerLocked) document.exitPointerLock();
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        function updateMovement() {
            if (!localPlayerMesh || isDead) return;
            
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            const move = new THREE.Vector3();
            if (keys.w) move.add(forward);
            if (keys.s) move.sub(forward);
            if (keys.d) move.add(right);
            if (keys.a) move.sub(right);
            
            if (move.length() > 0) move.normalize();
            move.multiplyScalar(moveSpeed * 0.016);
            
            let newPos = localPlayerMesh.position.clone().add(move);
            newPos.x = Math.min(65, Math.max(-65, newPos.x));
            newPos.z = Math.min(65, Math.max(-65, newPos.z));
            newPos.y = 0.8;
            
            localPlayerMesh.position.copy(newPos);
            localLabel.position.copy(newPos);
            localLabel.position.y += 1.6;
            camera.position.copy(localPlayerMesh.position);
            camera.position.y += 1.6;
        }
        
        // Mouse lock
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === renderer.domElement;
            if (isPointerLocked) {
                document.addEventListener('mousemove', onMouseMove);
                addDebugLog('🔒 Mouse locked - Ready to shoot!', 'info');
            } else {
                document.removeEventListener('mousemove', onMouseMove);
                addDebugLog('🔓 Mouse unlocked', 'info');
            }
        });
        
        function onMouseMove(e) {
            if (!isPointerLocked) return;
            mouseX += e.movementX * 0.002;
            mouseY += e.movementY * 0.002;
            mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
            cameraYaw = mouseX;
            cameraPitch = mouseY;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraYaw;
            camera.rotation.x = cameraPitch;
        }
        
        renderer.domElement.addEventListener('click', (e) => {
            if (isPointerLocked && !isDead) shoot();
        });
        
        // UI handlers
        window.togglePhone = () => {
            const apps = document.getElementById('phone-apps');
            apps.style.display = apps.style.display === 'flex' ? 'none' : 'flex';
        };
        
        window.openCarShop = () => addLog('🚗 Car Dealership: Sedan ($5000) - Sports Car ($15000)');
        window.spawnVehicle = () => addLog('Vehicle spawning coming soon!');
        window.openInventory = () => addLog(`📦 Kills: ${playerStats.kills} | Weapon: ${currentWeapon} | Money: $${playerStats.money}`);
        window.startWeedJob = () => addLog('🌿 Weed Farming coming soon!');
        
        document.getElementById('joinGame').onclick = () => joinServer(document.getElementById('serverCode').value, false);
        document.getElementById('leaveGame').onclick = () => leaveServer();
        document.getElementById('username').value = `Player_${Math.floor(Math.random() * 1000)}`;
        
        // Survival mechanics
        setInterval(() => {
            if (localPlayerMesh && !isDead) {
                playerStats.hunger = Math.max(0, playerStats.hunger - 0.2);
                playerStats.thirst = Math.max(0, playerStats.thirst - 0.3);
                updateUI();
            }
        }, 5000);
        
        // Day/night cycle
        let dayTime = 0.5;
        function updateDayNight() {
            dayTime += 0.0005;
            if (dayTime > 1) dayTime -= 1;
            const intensity = Math.sin(dayTime * Math.PI);
            dirLight.intensity = 0.4 + intensity * 0.6;
            scene.background.setHSL(0.55, 0.5, 0.1 + intensity * 0.2);
        }
        
        // Animation
        function animate() {
            updateMovement();
            updateDayNight();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Stars
        const stars = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })
        );
        const starPositions = new Float32Array(800 * 3);
        for (let i = 0; i < 800; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 50 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        stars.geometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(stars);
        
        addDebugLog('🎮 GAME READY! Join a server to start playing!', 'respawn');
        addLog('✨ Welcome! Click on game to lock mouse and start playing!', 'info');
    </script>
</body>
</html>
