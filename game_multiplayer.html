<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer 3D Game - Join Friends!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            border: 1px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
            min-width: 300px;
            pointer-events: auto;
        }
        h3 {
            margin: 0 0 15px 0;
            color: #00ff88;
        }
        button {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(135deg, #00ff99, #00dd77);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            background: #222;
            color: white;
            font-size: 14px;
            text-align: center;
        }
        .status {
            margin-top: 12px;
            font-size: 12px;
            padding: 8px;
            border-radius: 5px;
            background: rgba(0,0,0,0.5);
        }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .info { color: #ffaa44; }
        #playersList {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            border: 1px solid #00ff88;
            min-width: 180px;
            z-index: 100;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }
        .code-badge {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #000;
            padding: 5px 15px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }
        @media (max-width: 700px) {
            #ui { min-width: 260px; padding: 15px; }
            button { padding: 8px 15px; font-size: 12px; }
            input { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 3D Multiplayer Arena</h3>
        <div>
            <button id="hostBtn">🌟 Create Game</button>
            <input type="text" id="customCode" placeholder="Custom code" maxlength="6" style="width: 100px; text-transform: uppercase;">
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="joinCode" placeholder="Enter 6-digit code" maxlength="6" style="width: 120px; text-transform: uppercase;">
            <button id="joinBtn">🔗 Join Game</button>
        </div>
        <div id="gameInfo" class="status info">⚡ Ready to play</div>
        <div id="activeCode" style="margin-top: 10px; text-align: center;"></div>
    </div>
    <div id="playersList">
        <strong>👥 Players Online</strong>
        <hr style="margin: 8px 0; border-color: #00ff88;">
        <div id="players"></div>
    </div>
    <div class="controls">
        🎮 WASD to move | 🏃‍♂️ Explore with friends!
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import * as THREE from 'three';

        // ========== YOUR SUPABASE CREDENTIALS ==========
        const SUPABASE_URL = 'https://hcvewiwhtxqpbogcrukk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdmV3aXdodHhxcGJvZ2NydWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ4MzMsImV4cCI6MjA5MDQ3MDgzM30.UsdvDyrGl4OhmbDjonyOagknHf--Zhe-fhCi0LFVoQw';
        
        console.log('🎮 Game starting...');
        console.log('Supabase URL:', SUPABASE_URL);
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase client created');
        
        // ========== GAME STATE ==========
        let currentSession = null;
        let myPlayerId = null;
        let players = new Map();
        let localPlayer = null;
        let scene, camera, renderer;
        let keys = { w: false, s: false, a: false, d: false };
        let subscription = null;
        let lastUpdateTime = 0;
        
        // ========== 3D WORLD ==========
        function setup3D() {
            console.log("🎨 Setting up 3D world...");
            
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2a);
            scene.fog = new THREE.FogExp2(0x0a0a2a, 0.015);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setClearColor(0x0a0a2a);
            document.body.appendChild(renderer.domElement);
            
            // ========== GROUND ==========
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7a3a, roughness: 0.7 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(30, 20, 0x88ff88, 0x44aa44);
            gridHelper.position.y = -0.4;
            scene.add(gridHelper);
            
            // ========== TREES ==========
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x3a9e3a });
            
            for (let i = 0; i < 30; i++) {
                const angle = (i / 30) * Math.PI * 2;
                const radius = 12;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), trunkMat);
                trunk.position.set(x, 0, z);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.9, 8), leafMat);
                leaves.position.set(x, 0.9, z);
                leaves.castShadow = true;
                scene.add(leaves);
            }
            
            // ========== FLOATING ORBS ==========
            const orbMat = new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0x331133 });
            for (let i = 0; i < 50; i++) {
                const orb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), orbMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 8 + Math.random() * 10;
                orb.position.x = Math.cos(angle) * radius;
                orb.position.z = Math.sin(angle) * radius;
                orb.position.y = 0.5 + Math.random() * 2;
                scene.add(orb);
            }
            
            // ========== LIGHTING ==========
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            mainLight.position.set(10, 20, 5);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466ff, 0.4);
            fillLight.position.set(0, 5, 0);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0xffaa66, 0.3);
            backLight.position.set(-5, 5, -8);
            scene.add(backLight);
            
            console.log("✅ 3D world ready!");
            
            // Start animation
            animate();
        }
        
        function createPlayer(color, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 0.9, 8),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
            );
            body.position.y = 0.45;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.0;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeWhite);
            leftEye.position.set(-0.18, 1.12, 0.48);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), eyeWhite);
            rightEye.position.set(0.18, 1.12, 0.48);
            group.add(rightEye);
            
            // Pupils
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            leftPupil.position.set(0, 0, 0.08);
            leftEye.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
            rightPupil.position.set(0, 0, 0.08);
            rightEye.add(rightPupil);
            
            // Crown for local player
            if (isLocal) {
                const crown = new THREE.Mesh(
                    new THREE.ConeGeometry(0.4, 0.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa44 })
                );
                crown.position.y = 1.38;
                group.add(crown);
            }
            
            return group;
        }
        
        function addPlayer(playerId, x, z, isLocal = false) {
            const color = isLocal ? 0x44ff88 : 0xff8844;
            const playerMesh = createPlayer(color, isLocal);
            playerMesh.position.set(x, 0, z);
            scene.add(playerMesh);
            
            players.set(playerId, { mesh: playerMesh, name: playerId.slice(0, 6) });
            
            if (isLocal) {
                localPlayer = playerMesh;
                camera.position.set(x, 8, x + 12);
                console.log(`✅ Local player spawned at (${x.toFixed(1)}, ${z.toFixed(1)})`);
            }
            
            updatePlayersList();
            return playerMesh;
        }
        
        function removePlayer(playerId) {
            const player = players.get(playerId);
            if (player) {
                scene.remove(player.mesh);
                players.delete(playerId);
                updatePlayersList();
            }
        }
        
        function updatePlayersList() {
            const listDiv = document.getElementById('players');
            if (!listDiv) return;
            
            if (players.size === 0) {
                listDiv.innerHTML = 'Waiting for players...';
                return;
            }
            
            let html = '';
            for (let [id, player] of players) {
                const isMe = id === myPlayerId;
                html += `🎮 ${player.name}${isMe ? ' (YOU)' : ''}<br>`;
            }
            listDiv.innerHTML = html;
        }
        
        function handleMovement() {
            if (!localPlayer || !currentSession) return;
            
            let moved = false;
            let newX = localPlayer.position.x;
            let newZ = localPlayer.position.z;
            const speed = 0.22;
            
            if (keys.w) { newZ -= speed; moved = true; }
            if (keys.s) { newZ += speed; moved = true; }
            if (keys.a) { newX -= speed; moved = true; }
            if (keys.d) { newX += speed; moved = true; }
            
            newX = Math.max(-13, Math.min(13, newX));
            newZ = Math.max(-13, Math.min(13, newZ));
            
            if (moved) {
                localPlayer.position.set(newX, 0, newZ);
                
                // Camera follow
                camera.position.x += (newX - camera.position.x) * 0.1;
                camera.position.z = newZ + 10;
                camera.position.y = 8;
                camera.lookAt(newX, 1.5, newZ);
                
                const now = Date.now();
                if (now - lastUpdateTime > 66) {
                    updatePositionInDB(newX, newZ);
                    lastUpdateTime = now;
                }
            }
        }
        
        async function updatePositionInDB(x, z) {
            if (!currentSession || !myPlayerId) return;
            try {
                await supabase
                    .from('players')
                    .update({ pos_x: x, pos_z: z, last_seen: new Date() })
                    .eq('player_id', myPlayerId);
            } catch (e) {
                console.warn('Update failed:', e);
            }
        }
        
        // ========== DATABASE FUNCTIONS ==========
        async function createSession(customCode) {
            let code = customCode?.toUpperCase();
            if (!code || code.length !== 6) {
                code = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            console.log(`Creating session: ${code}`);
            
            const { data: existing } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code);
            
            if (existing && existing.length > 0) {
                throw new Error('Code already taken!');
            }
            
            const { error } = await supabase
                .from('game_sessions')
                .insert({ session_code: code });
            
            if (error) throw error;
            return code;
        }
        
        async function joinSession(code) {
            console.log(`Joining session: ${code}`);
            
            const { data, error } = await supabase
                .from('game_sessions')
                .select('session_code')
                .eq('session_code', code.toUpperCase())
                .maybeSingle();
            
            if (error) throw error;
            if (!data) throw new Error('Game not found!');
            
            return code.toUpperCase();
        }
        
        async function addPlayerToGame(sessionCode) {
            myPlayerId = 'p_' + Math.random().toString(36).substring(2, 15);
            const startX = (Math.random() - 0.5) * 10;
            const startZ = (Math.random() - 0.5) * 10;
            
            const { error } = await supabase
                .from('players')
                .insert({
                    player_id: myPlayerId,
                    session_id: sessionCode,
                    pos_x: startX,
                    pos_z: startZ,
                    last_seen: new Date()
                });
            
            if (error) throw error;
            
            addPlayer(myPlayerId, startX, startZ, true);
            await loadPlayers(sessionCode);
            subscribeToPlayers(sessionCode);
        }
        
        async function loadPlayers(sessionCode) {
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('session_id', sessionCode);
            
            if (error) {
                console.error('Load error:', error);
                return;
            }
            
            console.log(`Loaded ${data.length} players`);
            
            for (let p of data) {
                if (p.player_id !== myPlayerId && !players.has(p.player_id)) {
                    addPlayer(p.player_id, p.pos_x, p.pos_z, false);
                }
            }
        }
        
        function subscribeToPlayers(sessionCode) {
            if (subscription) {
                supabase.removeChannel(subscription);
            }
            
            subscription = supabase
                .channel(`players:${sessionCode}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players',
                    filter: `session_id=eq.${sessionCode}`
                }, (payload) => {
                    if (payload.eventType === 'INSERT' && payload.new.player_id !== myPlayerId) {
                        console.log(`➕ Player joined: ${payload.new.player_id.slice(0, 6)}`);
                        addPlayer(payload.new.player_id, payload.new.pos_x, payload.new.pos_z, false);
                    } else if (payload.eventType === 'UPDATE' && payload.new.player_id !== myPlayerId) {
                        const player = players.get(payload.new.player_id);
                        if (player) {
                            player.mesh.position.set(payload.new.pos_x, 0, payload.new.pos_z);
                        }
                    } else if (payload.eventType === 'DELETE' && payload.old.player_id !== myPlayerId) {
                        console.log(`➖ Player left: ${payload.old.player_id.slice(0, 6)}`);
                        removePlayer(payload.old.player_id);
                    }
                })
                .subscribe();
        }
        
        // ========== UI ==========
        let isConnecting = false;
        
        document.getElementById('hostBtn').onclick = async () => {
            if (isConnecting) return;
            isConnecting = true;
            const customCode = document.getElementById('customCode').value;
            const infoDiv = document.getElementById('gameInfo');
            
            try {
                const code = await createSession(customCode);
                currentSession = code;
                await addPlayerToGame(code);
                
                infoDiv.innerHTML = `✅ Game Created! Code: <strong style="font-size:18px">${code}</strong><br>Share this code with friends!`;
                infoDiv.className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🔑 ${code}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
            } catch (err) {
                infoDiv.innerHTML = `❌ ${err.message}`;
                infoDiv.className = 'status error';
                console.error(err);
            } finally {
                isConnecting = false;
            }
        };
        
        document.getElementById('joinBtn').onclick = async () => {
            if (isConnecting) return;
            isConnecting = true;
            const code = document.getElementById('joinCode').value;
            const infoDiv = document.getElementById('gameInfo');
            
            if (!code) {
                infoDiv.innerHTML = '❌ Please enter a game code';
                infoDiv.className = 'status error';
                isConnecting = false;
                return;
            }
            
            try {
                currentSession = await joinSession(code);
                await addPlayerToGame(currentSession);
                
                infoDiv.innerHTML = `✅ Joined game: <strong>${currentSession}</strong>`;
                infoDiv.className = 'status success';
                document.getElementById('activeCode').innerHTML = `<div class="code-badge">🎮 ${currentSession}</div>`;
                document.getElementById('hostBtn').disabled = true;
                document.getElementById('joinBtn').disabled = true;
            } catch (err) {
                infoDiv.innerHTML = `❌ ${err.message}`;
                infoDiv.className = 'status error';
                console.error(err);
            } finally {
                isConnecting = false;
            }
        };
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                keys[key] = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });
        
        // Cleanup
        window.addEventListener('beforeunload', async () => {
            if (myPlayerId) {
                await supabase.from('players').delete().eq('player_id', myPlayerId);
            }
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            handleMovement();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // Start game
        setup3D();
        console.log("🎮 Game ready! Create or join a game to start playing!");
    </script>
</body>
</html>
