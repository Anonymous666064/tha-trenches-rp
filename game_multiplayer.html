<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D World - Cross-Platform Controls</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            border-left: 4px solid #00ff88;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }

        #ui h2 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #00ff88;
        }

        #ui p {
            font-size: 10px;
            color: #ccc;
        }

        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            text-align: right;
            border-right: 3px solid #00ff88;
        }

        #coordinates {
            font-size: 10px;
            color: #88ff88;
            margin-top: 5px;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 15px;
            z-index: 200;
            pointer-events: none;
        }

        .control-zone {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-area {
            width: 140px;
            height: 140px;
            position: relative;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(30, 30, 40, 0.8);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            left: 10px;
            top: 10px;
        }

        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(78, 201, 224, 0.9);
            border-radius: 25px;
            left: 45px;
            top: 45px;
            transition: transform 0.05s linear;
            box-shadow: 0 0 10px rgba(78, 201, 224, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            touch-action: manipulation;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: rgba(78, 201, 224, 0.8);
        }

        #jump-btn {
            background: rgba(78, 201, 224, 0.6);
            border-color: #4ec9e0;
        }

        #sprint-btn {
            background: rgba(255, 170, 68, 0.6);
            border-color: #ffaa44;
        }

        /* Look controls for mobile */
        #look-area {
            position: fixed;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 150;
            display: none;
            background: transparent;
            pointer-events: auto;
            touch-action: none;
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.3);
        }

        /* Controls indicator */
        .controls-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 9px;
            color: #aaa;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        /* Device indicator */
        #device-mode {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: #4ec9e0;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #ui { font-size: 10px; padding: 8px 12px; }
            #info-panel { font-size: 9px; padding: 8px 12px; }
            .action-btn { width: 55px; height: 55px; font-size: 20px; }
            #joystick-area { width: 120px; height: 120px; }
            #joystick-base { width: 100px; height: 100px; left: 10px; top: 10px; }
            #joystick-thumb { width: 40px; height: 40px; left: 40px; top: 40px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>🎮 3D WORLD</h2>
        <p>Cross-platform controls | Explore the open world</p>
    </div>

    <div id="info-panel">
        <div>📍 POSITION</div>
        <div id="coordinates">X: 0.0 | Z: 0.0</div>
        <div style="margin-top: 6px;">🎯 FPS: <span id="fps">--</span></div>
        <div>🏃 Speed: <span id="speed">0</span></div>
    </div>

    <div id="crosshair"></div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div class="control-zone" id="joystick-area">
            <div id="joystick-base"></div>
            <div id="joystick-thumb"></div>
        </div>
        <div class="action-buttons">
            <div class="action-btn" id="jump-btn">🦘</div>
            <div class="action-btn" id="sprint-btn">🏃</div>
        </div>
    </div>
    <div id="look-area"></div>

    <div class="controls-indicator" id="controls-hint">
        💻 PC: WASD + Mouse | 📱 Mobile: Touch joystick + Drag to look
    </div>
    <div id="device-mode">💻 PC Mode</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== THREE.JS WORLD ====================
        let scene, camera, renderer;
        
        // Player state
        let playerPosition = new THREE.Vector3(0, 1.6, 0);
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        let cameraAngleY = 0, cameraAngleX = 0;
        let isOnGround = true;
        
        // Movement state
        let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
        let isSprinting = false;
        let isJumping = false;
        
        // Settings
        const WALK_SPEED = 5;
        const SPRINT_SPEED = 9;
        const JUMP_FORCE = 6;
        const GRAVITY = 15;
        
        // UI elements
        const coordsEl = document.getElementById('coordinates');
        const fpsEl = document.getElementById('fps');
        const speedEl = document.getElementById('speed');
        
        // FPS counter
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;
        
        // Device detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let isPointerLockActive = false;
        
        // Touch controls state
        let touchJoystick = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
        let touchLook = { active: false, lastX: 0, lastY: 0 };
        
        // ==================== CREATE SIMPLE 3D WORLD ====================
        function init3DWorld() {
            console.log("🎨 Creating 3D World...");
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 300);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(playerPosition);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Simple lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sunLight.position.set(50, 100, 30);
            sunLight.castShadow = true;
            scene.add(sunLight);
            
            const fillLight = new THREE.PointLight(0x88aaff, 0.4);
            fillLight.position.set(0, 15, 0);
            scene.add(fillLight);
            
            // Ground plane with grid
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c9e5c, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper for reference
            const gridHelper = new THREE.GridHelper(200, 40, 0x88aaff, 0x446688);
            gridHelper.position.y = -0.4;
            scene.add(gridHelper);
            
            // Simple decorative grass patches (small green cylinders)
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x6cae5a });
            for (let i = 0; i < 500; i++) {
                const x = (Math.random() - 0.5) * 180;
                const z = (Math.random() - 0.5) * 180;
                if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
                const grass = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.2, 3), grassMat);
                grass.position.set(x, -0.4, z);
                grass.castShadow = false;
                scene.add(grass);
            }
            
            // Floating particles for ambiance
            const particleCount = 800;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 180;
                particlePositions[i*3+1] = Math.random() * 12;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 180;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.06 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            // Simple center marker (floating orb)
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
            const centerMarker = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), markerMat);
            centerMarker.position.set(0, 0.5, 0);
            scene.add(centerMarker);
            
            console.log("✅ Simple 3D World created!");
        }
        
        // ==================== MOVEMENT SYSTEM ====================
        function updateMovement(deltaTime) {
            const speed = isSprinting ? SPRINT_SPEED : WALK_SPEED;
            let moveX = 0, moveZ = 0;
            
            if (moveForward) moveZ -= 1;
            if (moveBack) moveZ += 1;
            if (moveLeft) moveX -= 1;
            if (moveRight) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            const forward = new THREE.Vector3(Math.sin(cameraAngleY), 0, Math.cos(cameraAngleY));
            const right = new THREE.Vector3(Math.cos(cameraAngleY), 0, -Math.sin(cameraAngleY));
            
            playerVelocity.x = (moveX * right.x + moveZ * forward.x) * speed;
            playerVelocity.z = (moveX * right.z + moveZ * forward.z) * speed;
            
            playerPosition.x += playerVelocity.x * deltaTime;
            playerPosition.z += playerVelocity.z * deltaTime;
            
            // Gravity
            playerVelocity.y -= GRAVITY * deltaTime;
            playerPosition.y += playerVelocity.y * deltaTime;
            
            const groundY = -0.2;
            if (playerPosition.y <= groundY + 1.6) {
                playerPosition.y = groundY + 1.6;
                playerVelocity.y = 0;
                isOnGround = true;
                if (isJumping) isJumping = false;
            } else {
                isOnGround = false;
            }
            
            // Handle jump
            if (isJumping && isOnGround) {
                playerVelocity.y = JUMP_FORCE;
                isOnGround = false;
                isJumping = false;
            }
            
            // Boundaries
            const bound = 95;
            playerPosition.x = Math.max(-bound, Math.min(bound, playerPosition.x));
            playerPosition.z = Math.max(-bound, Math.min(bound, playerPosition.z));
            
            // Update camera
            camera.position.copy(playerPosition);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = cameraAngleY;
            camera.rotation.x = cameraAngleX;
            
            // Update UI
            const currentSpeed = Math.hypot(playerVelocity.x, playerVelocity.z);
            speedEl.textContent = Math.floor(currentSpeed * 3.6);
            coordsEl.innerHTML = `X: ${playerPosition.x.toFixed(1)} | Z: ${playerPosition.z.toFixed(1)}`;
        }
        
        // ==================== FPS COUNTER ====================
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            frameCount++;
            
            if (delta >= 1000) {
                fps = frameCount;
                fpsEl.textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
        }
        
        // ==================== PC CONTROLS ====================
        function initPCControls() {
            window.addEventListener('keydown', (e) => {
                const key = e.code;
                switch(key) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBack = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': case 'ShiftRight': isSprinting = true; break;
                    case 'Space': 
                        if (isOnGround && !isJumping) {
                            isJumping = true;
                        }
                        break;
                }
                e.preventDefault();
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.code;
                switch(key) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBack = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': case 'ShiftRight': isSprinting = false; break;
                }
            });
            
            // Mouse look (PC)
            renderer.domElement.addEventListener('click', () => {
                if (!isMobile) {
                    renderer.domElement.requestPointerLock();
                }
            });
            
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === renderer.domElement) {
                    isPointerLockActive = true;
                    document.addEventListener('mousemove', onMouseMove);
                } else {
                    isPointerLockActive = false;
                    document.removeEventListener('mousemove', onMouseMove);
                }
            });
            
            function onMouseMove(e) {
                if (!isPointerLockActive) return;
                cameraAngleY -= e.movementX * 0.002;
                cameraAngleX -= e.movementY * 0.002;
                cameraAngleX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleX));
            }
        }
        
        // ==================== MOBILE CONTROLS ====================
        function initMobileControls() {
            const mobileControls = document.getElementById('mobile-controls');
            const lookArea = document.getElementById('look-area');
            const joystickArea = document.getElementById('joystick-area');
            const joystickThumb = document.getElementById('joystick-thumb');
            const jumpBtn = document.getElementById('jump-btn');
            const sprintBtn = document.getElementById('sprint-btn');
            
            mobileControls.style.display = 'flex';
            lookArea.style.display = 'block';
            
            // Joystick logic
            let joystickActive = false;
            let joystickCenter = { x: 0, y: 0 };
            const maxDist = 40;
            
            function getJoystickPosition(touchX, touchY) {
                const rect = joystickArea.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let dx = touchX - centerX;
                let dy = touchY - centerY;
                const distance = Math.hypot(dx, dy);
                
                if (distance > maxDist) {
                    dx = dx * maxDist / distance;
                    dy = dy * maxDist / distance;
                }
                
                return { x: dx, y: dy, distance: Math.min(distance, maxDist) };
            }
            
            function updateJoystickVisual(x, y) {
                joystickThumb.style.transform = `translate(${x}px, ${y}px)`;
            }
            
            function updateMovementFromJoystick(dx, dy, distance) {
                const angle = Math.atan2(dy, dx);
                const strength = distance / maxDist;
                
                moveForward = false;
                moveBack = false;
                moveLeft = false;
                moveRight = false;
                
                if (strength > 0.1) {
                    const forwardInput = Math.cos(angle);
                    const rightInput = Math.sin(angle);
                    
                    if (forwardInput < -0.3) moveForward = true;
                    if (forwardInput > 0.3) moveBack = true;
                    if (rightInput > 0.3) moveRight = true;
                    if (rightInput < -0.3) moveLeft = true;
                }
            }
            
            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystickActive = true;
                const touch = e.touches[0];
                const rect = joystickArea.getBoundingClientRect();
                joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                const pos = getJoystickPosition(touch.clientX, touch.clientY);
                updateJoystickVisual(pos.x, pos.y);
                updateMovementFromJoystick(pos.x, pos.y, pos.distance);
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!joystickActive) return;
                const touch = e.touches[0];
                const pos = getJoystickPosition(touch.clientX, touch.clientY);
                updateJoystickVisual(pos.x, pos.y);
                updateMovementFromJoystick(pos.x, pos.y, pos.distance);
            });
            
            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                updateJoystickVisual(0, 0);
                moveForward = false;
                moveBack = false;
                moveLeft = false;
                moveRight = false;
            });
            
            // Touch look (drag on right side of screen)
            lookArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchLook.active = true;
                const touch = e.touches[0];
                touchLook.lastX = touch.clientX;
                touchLook.lastY = touch.clientY;
            });
            
            lookArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!touchLook.active) return;
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchLook.lastX;
                const deltaY = touch.clientY - touchLook.lastY;
                
                cameraAngleY -= deltaX * 0.008;
                cameraAngleX -= deltaY * 0.008;
                cameraAngleX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleX));
                
                touchLook.lastX = touch.clientX;
                touchLook.lastY = touch.clientY;
            });
            
            lookArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchLook.active = false;
            });
            
            // Jump button
            jumpBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isOnGround && !isJumping) {
                    isJumping = true;
                }
            });
            
            // Sprint button (toggle)
            let sprintActive = false;
            sprintBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                sprintActive = !sprintActive;
                isSprinting = sprintActive;
                sprintBtn.style.background = sprintActive ? 'rgba(255, 170, 68, 0.9)' : 'rgba(255, 170, 68, 0.6)';
            });
            
            // Prevent default touch events on canvas to avoid interference
            renderer.domElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
            });
        }
        
        // ==================== REMOTE CONTROLS (WebSocket/Network) ====================
        // This sets up a simple WebSocket server for remote control
        // For a full implementation, you'd need a backend server
        
        let remoteControlActive = false;
        let wsConnection = null;
        
        function initRemoteControls() {
            // You can connect to a WebSocket server here
            // For demo purposes, we'll simulate remote control via URL params
            const urlParams = new URLSearchParams(window.location.search);
            const remoteHost = urlParams.get('remote');
            
            if (remoteHost) {
                console.log(`🔌 Attempting to connect to remote controller at ${remoteHost}`);
                document.getElementById('device-mode').innerHTML = `📡 Remote Mode (${remoteHost})`;
                
                // Simulate WebSocket connection
                // In production, you'd connect to a real WebSocket server:
                // wsConnection = new WebSocket(`ws://${remoteHost}:8080`);
                // wsConnection.onmessage = handleRemoteMessage;
            }
        }
        
        function handleRemoteMessage(data) {
            // Parse remote control commands
            try {
                const cmd = JSON.parse(data);
                switch(cmd.type) {
                    case 'move':
                        moveForward = cmd.forward || false;
                        moveBack = cmd.back || false;
                        moveLeft = cmd.left || false;
                        moveRight = cmd.right || false;
                        break;
                    case 'look':
                        cameraAngleY += cmd.yaw || 0;
                        cameraAngleX += cmd.pitch || 0;
                        cameraAngleX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleX));
                        break;
                    case 'sprint':
                        isSprinting = cmd.active || false;
                        break;
                    case 'jump':
                        if (isOnGround && !isJumping) {
                            isJumping = true;
                        }
                        break;
                }
            } catch(e) {
                console.warn('Invalid remote command');
            }
        }
        
        // ==================== DEVICE DETECTION ====================
        function detectDevice() {
            const deviceMode = document.getElementById('device-mode');
            
            if (isMobile) {
                deviceMode.innerHTML = `📱 Mobile Mode - Touch controls active`;
                initMobileControls();
                document.getElementById('controls-hint').innerHTML = `📱 Touch left side to move | Right side to look | Jump & Sprint buttons`;
            } else {
                deviceMode.innerHTML = `💻 PC Mode - WASD + Mouse`;
                initPCControls();
                document.getElementById('controls-hint').innerHTML = `💻 WASD to move | Mouse to look | Shift to sprint | Space to jump`;
            }
        }
        
        // ==================== ANIMATION LOOP ====================
        let lastFrameTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let deltaTime = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            updateMovement(deltaTime);
            updateFPS();
            
            // Simple animation for particles
            const particles = scene.children.find(c => c.isPoints);
            if (particles) {
                particles.rotation.y += 0.002;
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // ==================== RESIZE HANDLER ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ==================== INITIALIZATION ====================
        function init() {
            init3DWorld();
            detectDevice();
            initRemoteControls();
            animate();
            
            console.log("✅ Game ready! Controls active for your device.");
